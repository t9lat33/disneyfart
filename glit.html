<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#1a1a2e;font-family:'DM Sans',sans-serif;color:#c7d5e0}

.shell{
  background:#202036;
  width:860px;
  max-width:100%;
  margin:0 auto;
  min-height:100vh;
  border-left:1px solid rgba(255,255,255,0.08);
  border-right:1px solid rgba(255,255,255,0.08);
  display:flex;
  flex-direction:column;
}

/* TOOLBAR */
.toolbar{
  display:flex;align-items:center;gap:10px;
  padding:12px 16px;
  background:rgba(0,0,0,0.3);
  border-bottom:1px solid rgba(255,255,255,0.07);
  flex-shrink:0;flex-wrap:wrap;
  position:sticky;top:0;z-index:100;
}
.search{
  flex:1;min-width:150px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:7px;padding:6px 12px;
  color:#e0e0f0;font-size:13px;font-family:inherit;outline:none;
  transition:border-color .2s;
}
.search:focus{border-color:rgba(100,160,255,0.5)}
.search::placeholder{color:#555570}
.filter-btns{display:flex;gap:5px;flex-wrap:wrap}
.fbtn{
  padding:4px 11px;border-radius:6px;
  border:1px solid rgba(255,255,255,0.1);
  background:rgba(255,255,255,0.04);
  color:#8a8aaa;font-size:11px;
  font-family:'Rajdhani',sans-serif;font-weight:700;letter-spacing:.8px;
  cursor:pointer;transition:all .15s;
}
.fbtn:hover{background:rgba(255,255,255,0.1);color:#dde}
.fbtn.on{background:rgba(80,140,255,0.18);border-color:rgba(80,140,255,0.45);color:#88bbff}
.count{
  font-family:'Rajdhani',sans-serif;font-size:12px;color:#555570;white-space:nowrap;
}
.count span{color:#88bbff}

/* SCROLL */
.scroll-area{flex:1;overflow-y:auto;padding:12px 16px 24px}
.scroll-area::-webkit-scrollbar{width:5px}
.scroll-area::-webkit-scrollbar-track{background:transparent}
.scroll-area::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:4px}

/* SECTION */
.section{margin-bottom:18px}
.section-bar{
  display:flex;align-items:center;gap:8px;
  padding:7px 0 7px;
  border-bottom:1px solid rgba(255,255,255,0.07);
  margin-bottom:8px;cursor:pointer;user-select:none;
}
.section-title{font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:700;color:#c7d5e0}
.section-badge{
  padding:2px 7px;font-size:9px;font-weight:700;
  font-family:'Rajdhani',sans-serif;letter-spacing:.8px;border-radius:4px;
}
.badge-hydra{background:rgba(80,180,255,0.18);color:#66c0f4;border:1px solid rgba(80,180,255,0.25)}
.badge-gnmath{background:rgba(60,220,140,0.18);color:#4af49a;border:1px solid rgba(60,220,140,0.25)}
.badge-lumin{background:rgba(230,210,60,0.18);color:#e8d44d;border:1px solid rgba(230,210,60,0.25)}
.badge-archive{background:rgba(255,160,60,0.18);color:#f4a336;border:1px solid rgba(255,160,60,0.25)}
.badge-t9{background:rgba(180,80,255,0.2);color:#cc88ff;border:1px solid rgba(180,80,255,0.3)}
.section-count{font-family:'Rajdhani',sans-serif;font-size:11px;color:#555570;margin-left:2px}
.section-toggle{margin-left:auto;font-size:11px;color:#555570;padding:2px 8px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:5px;cursor:pointer}
.section-toggle:hover{color:#aaa}
.section-content.collapsed{display:none}
.section-status{padding:14px 0;text-align:center;color:#555570;font-size:12px;display:flex;align-items:center;justify-content:center;gap:10px}
.spinner{width:18px;height:18px;border:2px solid rgba(100,160,255,0.12);border-top-color:#66aaff;border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

/* GRID — virtual scroll container */
.grid-outer{position:relative;width:100%}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(138px,1fr));
  gap:7px;
}

/* CARD */
.card{
  background:#16182a;
  border:1px solid rgba(255,255,255,0.06);
  border-radius:9px;overflow:hidden;cursor:pointer;
  transition:transform .13s,border-color .13s,box-shadow .13s;
  display:flex;flex-direction:column;
  contain:layout style;
}
.card:hover{
  transform:translateY(-2px);
  border-color:rgba(100,160,255,0.3);
  box-shadow:0 6px 20px rgba(0,0,0,0.45);
}
.thumb{
  width:100%;aspect-ratio:16/9;
  background:#0d0f1e;position:relative;overflow:hidden;
}
.thumb img{
  width:100%;height:100%;object-fit:cover;display:block;
  opacity:0;transition:opacity .22s;
}
.thumb img.vis{opacity:1}
.thumb-ph{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  color:rgba(255,255,255,0.05);
  font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:700;
  letter-spacing:1px;text-align:center;padding:4px;line-height:1.1;
  pointer-events:none;
}

.card-info{padding:6px 8px 4px;flex:1;display:flex;flex-direction:column;gap:2px}
.card-name{font-size:11.5px;color:#d0d0e8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500}
.card-author{font-size:10px;color:#555570;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.play-btn{
  margin:0 8px 8px;
  background:rgba(60,120,240,0.18);
  border:1px solid rgba(60,120,240,0.32);
  color:#88aaff;border-radius:5px;padding:4px;
  font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;
  cursor:pointer;transition:background .13s;text-align:center;
}
.play-btn:hover{background:rgba(60,120,240,0.35)}

.empty{text-align:center;padding:32px;color:#444460;font-size:13px}

/* LUMIN progress */
.lumin-status{font-size:11px;color:#8a8a60;padding:4px 0;font-family:'Rajdhani',sans-serif}
#luminProgress{height:2px;background:#e8d44d;width:0%;transition:width .4s;border-radius:1px;margin-bottom:6px}

/* VIEWER */
#viewer{
  position:fixed;inset:0;background:#000;
  z-index:9999;display:none;flex-direction:column;
}
.vbar{
  background:#12121e;border-bottom:1px solid rgba(255,255,255,0.08);
  height:44px;padding:0 14px;
  display:flex;align-items:center;gap:10px;flex-shrink:0;
}
.vtitle{font-family:'Rajdhani',sans-serif;font-size:16px;color:#d0d0e8;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.vbtn{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:#aaa;padding:4px 12px;font-size:11px;border-radius:6px;cursor:pointer;transition:background .15s}
.vbtn:hover{background:rgba(255,255,255,0.12)}
.vbtn.exit{background:rgba(200,40,40,0.15);border-color:rgba(200,40,40,0.3);color:#f88}
.vbtn.exit:hover{background:rgba(200,40,40,0.3)}
#gameFrame{flex:1;border:none;width:100%;background:#000}
</style>

<div class="shell">

  </div>

  <div class="scroll-area" id="scrollArea">

    <!-- HYDRA -->
    <div class="section" id="sec-hydra">
      <div class="section-bar" onclick="toggleSec('hydra')">

        <span class="section-badge badge-hydra">HYDRA</span>
        <span class="section-count" id="cnt-hydra">0</span>
        <span class="section-toggle" id="tog-hydra">▾</span>
      </div>
      <div class="section-content" id="content-hydra">
        <div class="section-status"><div class="spinner"></div><span>Loading…</span></div>
      </div>
    </div>

    <!-- GNMATH -->
    <div class="section" id="sec-gnmath">
      <div class="section-bar" onclick="toggleSec('gnmath')">
        <span class="section-title">🧮 GN Math</span>
        <span class="section-badge badge-gnmath">GNMATH</span>
        <span class="section-count" id="cnt-gnmath">0</span>
        <span class="section-toggle" id="tog-gnmath">▾</span>
      </div>
      <div class="section-content" id="content-gnmath">
        <div class="section-status"><div class="spinner"></div><span>Loading…</span></div>
      </div>
    </div>

    <!-- LUMIN -->
    <div class="section" id="sec-lumin">
      <div class="section-bar" onclick="toggleSec('lumin')">
        <span class="section-title">⚡ LuminSDK</span>
        <span class="section-badge badge-lumin">LUMIN</span>
        <span class="section-count" id="cnt-lumin">0</span>
        <span class="section-toggle" id="tog-lumin">▾</span>
      </div>
      <div class="section-content" id="content-lumin">
        <div id="luminProgress"></div>
        <div class="lumin-status" id="luminStatus">Initialising LuminSDK…</div>
        <div class="grid" id="grid-lumin"></div>
      </div>
    </div>

    <!-- ARCHIVE -->
    <div class="section" id="sec-archive">
      <div class="section-bar" onclick="toggleSec('archive')">
        <span class="section-title">📦 Archive</span>
        <span class="section-badge badge-archive">ARCHIVE</span>
        <span class="section-count" id="cnt-archive">0</span>
        <span class="section-toggle" id="tog-archive">▾</span>
      </div>
      <div class="section-content" id="content-archive">
        <div class="section-status"><div class="spinner"></div><span>Loading…</span></div>
      </div>
    </div>

    <!-- T9 -->
    <div class="section" id="sec-t9">
      <div class="section-bar" onclick="toggleSec('t9')">
        <span class="section-title">⭐ T9 Collection</span>
        <span class="section-badge badge-t9">T9</span>
        <span class="section-count" id="cnt-t9">0</span>
        <span class="section-toggle" id="tog-t9">▾</span>
      </div>
      <div class="section-content" id="content-t9">
        <div class="section-status"><div class="spinner"></div><span>Loading…</span></div>
      </div>
    </div>

  </div>
</div>

<!-- VIEWER -->
<div id="viewer">
  <div class="vbar">
    <div class="vtitle" id="vTitle">Game</div>
    <button class="vbtn" onclick="fullscreenGame()">⛶ Fullscreen</button>
    <button class="vbtn" onclick="newTabGame()">↗ New Tab</button>
    <button class="vbtn exit" onclick="closeGame()">✕ Exit</button>
  </div>
  <iframe id="gameFrame" allowfullscreen sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-pointer-lock allow-modals"></iframe>
</div>

/* ═══════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════ */
// Per-source raw data
const sourceData = { hydra:[], gnmath:[], lumin:[], archive:[], t9:[] };
// Per-source currently-displayed filtered items
const sourceFiltered = { hydra:[], gnmath:[], lumin:[], archive:[], t9:[] };

let activeFilter = 'all';
let searchQ = '';
let imgObserver = null;
let searchTimer = null;
let currentGame = null;
let currentBlobUrl = null;

const ORDER = ['hydra','gnmath','lumin','archive','t9'];

/* ═══════════════════════════════════════════════
   LAZY IMAGE OBSERVER
═══════════════════════════════════════════════ */
function initObserver(){
  imgObserver = new IntersectionObserver(entries => {
    for(const e of entries){
      if(!e.isIntersecting) continue;
      const img = e.target.querySelector('img[data-src]');
      if(img){
        if(img.dataset.luminToken){
          const tok = img.dataset.luminToken;
          delete img.dataset.luminToken;
          if(typeof Lumin!=='undefined'){
            Lumin.getImageUrl(tok).then(url=>{img.dataset.src=url;loadImg(img);}).catch(()=>{});
          }
        } else {
          loadImg(img);
        }
      }
      imgObserver.unobserve(e.target);
    }
  },{rootMargin:'500px 0px',threshold:0});
}

function loadImg(img){
  const src = img.dataset.src;
  const alt = img.dataset.alt||'';
  if(!src){img.classList.add('vis');return;}
  img.src = src;
  img.onload = ()=>img.classList.add('vis');
  img.onerror = ()=>{if(alt&&img.src!==alt){img.src=alt;}};
}

/* ═══════════════════════════════════════════════
   TOGGLE SECTION
═══════════════════════════════════════════════ */
function toggleSec(src){
  const c = document.getElementById('content-'+src);
  const t = document.getElementById('tog-'+src);
  c.classList.toggle('collapsed');
  t.textContent = c.classList.contains('collapsed') ? '▸' : '▾';
}

/* ═══════════════════════════════════════════════
   FILTER / SEARCH
═══════════════════════════════════════════════ */
function setFilter(el,src){
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
  activeFilter = src;
  // Show/hide sections
  ORDER.forEach(s=>{
    document.getElementById('sec-'+s).style.display =
      (src==='all'||src===s)?'':'none';
  });
  applySearch();
}

function applySearch(){
  clearTimeout(searchTimer);
  ORDER.forEach(src=>{
    const arr = sourceData[src];
    let filtered;
    if(!searchQ){
      filtered = arr;
    } else {
      filtered = arr.filter(g=>getName(g,src).toLowerCase().includes(searchQ));
    }
    sourceFiltered[src] = filtered;
    // Only render visible sections
    if(activeFilter==='all'||activeFilter===src){
      renderGrid(src,filtered);
    }
  });
  updateCount();
}

function updateCount(){
  let total=0;
  ORDER.forEach(src=>{
    if(activeFilter==='all'||activeFilter===src) total+=sourceFiltered[src].length;
  });
  document.getElementById('visCount').textContent = total.toLocaleString()+' games';
}

function getName(g,src){
  if(src==='hydra') return g.title||g.name||g.file_name||'';
  return g.name||'';
}

/* ═══════════════════════════════════════════════
   RENDER GRID — DocumentFragment, no innerHTML
═══════════════════════════════════════════════ */
function renderGrid(src, games){
  const content = document.getElementById('content-'+src);
  document.getElementById('cnt-'+src).textContent = games.length;

  // Remove any existing grid for this section (not lumin — lumin appends)
  if(src!=='lumin'){
    let grid = content.querySelector('.grid');
    if(!grid){
      grid = document.createElement('div');
      grid.className='grid';
      content.innerHTML='';
      content.appendChild(grid);
    } else {
      grid.innerHTML='';
    }
    if(!games.length){
      grid.innerHTML='<div class="empty">No games found</div>';
      return;
    }
    const frag = document.createDocumentFragment();
    for(const g of games) frag.appendChild(makeCard(g,src));
    grid.appendChild(frag);
  }
}

function makeCard(g, src){
  const card = document.createElement('div');
  card.className='card';

  // Thumb
  const thumb = document.createElement('div');
  thumb.className='thumb';

  const ph = document.createElement('div');
  ph.className='thumb-ph';
  ph.textContent = getName(g,src).slice(0,12);
  thumb.appendChild(ph);

  let primaryCover='', altCover='';
  if(src==='hydra'){
    primaryCover = g.thumb ? HYDRA_BASES[0]+g.thumb.replace(/^\/+/,'') : '';
    altCover     = g.thumb ? HYDRA_BASES[1]+g.thumb.replace(/^\/+/,'') : '';
  } else if(src==='t9'){
    primaryCover = g.cover.startsWith('http') ? g.cover : T9_SITE+'/'+g.cover;
  } else if(src==='archive'){
    primaryCover = g.cover||'';
  } else if(src==='gnmath'){
    primaryCover = g.coverFull||'';
  }

  if(primaryCover){
    const img = document.createElement('img');
    img.alt='';
    img.dataset.src = primaryCover;
    if(altCover) img.dataset.alt = altCover;
    thumb.appendChild(img);
    imgObserver.observe(thumb);
  }

  card.appendChild(thumb);

  // Info
  const info = document.createElement('div');
  info.className='card-info';
  const nameEl = document.createElement('div');
  nameEl.className='card-name';
  nameEl.title = getName(g,src);
  nameEl.textContent = getName(g,src);
  info.appendChild(nameEl);
  if(g.author){
    const au = document.createElement('div');
    au.className='card-author';
    au.textContent = g.author;
    info.appendChild(au);
  }
  card.appendChild(info);

  // Play btn
  const btn = document.createElement('button');
  btn.className='play-btn';
  btn.textContent='▶ Play';
  btn.addEventListener('click',e=>{e.stopPropagation();launchGame(g,src);});
  card.appendChild(btn);

  card.addEventListener('click',()=>launchGame(g,src));
  return card;
}

/* ═══════════════════════════════════════════════
   LUMIN CARDS — appended incrementally
═══════════════════════════════════════════════ */
function appendLuminCards(games){
  const grid = document.getElementById('grid-lumin');
  const frag = document.createDocumentFragment();
  for(const game of games){
    const card = document.createElement('div');
    card.className='card';

    const thumb = document.createElement('div');
    thumb.className='thumb';

    const ph = document.createElement('div');
    ph.className='thumb-ph';
    ph.textContent=(game.name||'').slice(0,12);
    thumb.appendChild(ph);

    const img = document.createElement('img');
    img.alt='';
    if(game.image_url){
      img.dataset.src=game.image_url;
    } else if(game.image_token){
      img.dataset.luminToken=game.image_token;
      img.dataset.src='';
    }
    thumb.appendChild(img);
    imgObserver.observe(thumb);
    card.appendChild(thumb);

    const info = document.createElement('div');
    info.className='card-info';
    const nameEl = document.createElement('div');
    nameEl.className='card-name';
    nameEl.textContent=game.name||game.id||'';
    nameEl.title=nameEl.textContent;
    info.appendChild(nameEl);
    card.appendChild(info);

    const btn = document.createElement('button');
    btn.className='play-btn';
    btn.textContent='▶ Play';
    btn.addEventListener('click',e=>{e.stopPropagation();launchLuminGame(game);});
    card.appendChild(btn);
    card.addEventListener('click',()=>launchLuminGame(game));

    frag.appendChild(card);
  }
  grid.appendChild(frag);
}

/* ═══════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════ */
async function init(){
  initObserver();

  document.getElementById('searchInput').addEventListener('input',e=>{
    clearTimeout(searchTimer);
    searchTimer = setTimeout(()=>{
      searchQ = e.target.value.toLowerCase().trim();
      applySearch();
    },200);
  });

  // T9 — instant
  sourceData.t9 = T9_GAMES;
  applySearch();

  // Parallel fetches
  await Promise.allSettled([fetchHydra(), fetchArchive(), fetchGnMath(), fetchLumin()]);
}

/* ═══════════════════════════════════════════════
   FETCHERS
═══════════════════════════════════════════════ */
async function fetchHydra(){
  for(const url of HYDRA_DATA_URLS){
    try{
      const r=await fetch(url); if(!r.ok) continue;
      const data=await r.json();
      const seen=new Set();
      sourceData.hydra = data.filter(g=>{
        const k=(g.file_name||'').toLowerCase().trim();
        if(!k||seen.has(k)) return false; seen.add(k); return true;
      }).map(g=>({...g,source:'hydra'}));
      applySearch(); return;
    }catch(e){}
  }
  document.getElementById('content-hydra').innerHTML='<div class="empty">Failed to load Hydra</div>';
}

async function fetchArchive(){
  try{
    const r=await fetch(ARCHIVE_JSON); if(!r.ok) throw new Error();
    const data=await r.json();
    sourceData.archive = data.map(e=>({
      name:e.name.replace(/^cl/i,''),
      cover:resolvePH(e.cover||''),
      url:resolvePH(e.url||''),
      source:'archive'
    }));
    applySearch();
  }catch(e){
    document.getElementById('content-archive').innerHTML='<div class="empty">Failed to load Archive</div>';
  }
}

async function fetchGnMath(){
  let all=[];
  for(const src of GNMATH_SOURCES){
    for(const url of src.zonesurls){
      try{
        const r=await fetch(url+'?t='+Date.now()); if(!r.ok) continue;
        const data=await r.json();
        all.push(...data.map(z=>({
          ...z,source:'gnmath',
          name:z.name||z.title||z.file_name||'',
          coverFull:z.cover?(z.cover.replace('{COVER_URL}',src.coverURL).replace('{HTML_URL}',src.htmlURL)):'',
          playUrl:z.url?(z.url.replace('{HTML_URL}',src.htmlURL).replace('{COVER_URL}',src.coverURL)):''
        })));
        break;
      }catch(e){}
    }
  }
  const seen=new Set();
  sourceData.gnmath=all.filter(z=>{
    const k=z.name.toLowerCase().trim();
    if(!k||seen.has(k)) return false; seen.add(k); return true;
  });
  applySearch();
}

async function fetchLumin(){
  const statusEl=document.getElementById('luminStatus');
  const progressEl=document.getElementById('luminProgress');
  const countEl=document.getElementById('cnt-lumin');

  if(typeof Lumin==='undefined'){
    statusEl.textContent='LuminSDK not available.';
    return;
  }
  try{
    await Lumin.init({headless:true});
    statusEl.textContent='Loading LuminSDK games…';
  }catch(e){
    statusEl.textContent='LuminSDK init failed: '+e.message;
    return;
  }

  let page=1, allGames=[], finished=false, fails=0;
  while(!finished){
    try{
      const res=await Lumin.getGames({page,limit:100});
      if(!res.games||res.games.length===0){finished=true;break;}
      allGames.push(...res.games);
      fails=0;
      const pct=Math.min(90,page*3);
      progressEl.style.width=pct+'%';
      statusEl.textContent=`Loading… ${allGames.length} games`;
      appendLuminCards(res.games);
      sourceData.lumin=allGames;
      countEl.textContent=allGames.length;
      updateCount();
      page++;
    }catch(err){
      fails++;page++;
      if(fails>5||page>500) finished=true;
    }
  }
  // Deduplicate
  const seen=new Set();
  sourceData.lumin=allGames.filter(g=>{
    if(seen.has(g.id)) return false; seen.add(g.id); return true;
  });
  countEl.textContent=sourceData.lumin.length;
  progressEl.style.width='100%';
  setTimeout(()=>{progressEl.style.display='none';},600);
  statusEl.style.display='none';
  updateCount();
}

function resolvePH(str){
  return str.replace(/\{(HTML|COVER)_URL\d\}/g,m=>ARCHIVE_BASES[m]??m);
}

/* ═══════════════════════════════════════════════
   LAUNCHER
═══════════════════════════════════════════════ */
async function launchGame(g,src){
  currentGame={g,src};
  const name=getName(g,src);
  document.getElementById('vTitle').textContent=name;
  document.getElementById('viewer').style.display='flex';
  document.getElementById('gameFrame').src='about:blank';

  if(src==='hydra'){
    await loadHydra(g);
  } else {
    const url = src==='archive' ? g.url : src==='gnmath' ? g.playUrl : (g.url.startsWith('http')?g.url:T9_SITE+g.url);
    await fetchAndWrite(url);
  }
}

async function launchLuminGame(game){
  currentGame={g:game,src:'lumin'};
  document.getElementById('vTitle').textContent=game.name||game.id;
  document.getElementById('viewer').style.display='flex';
  document.getElementById('gameFrame').src='about:blank';
  try{Lumin.loadGame(game.id);}catch(e){alert('Lumin load failed: '+e.message);}
}

async function loadHydra(g){
  for(const base of HYDRA_BASES){
    try{
      const r=await fetch(base+'gmes/'+g.file_name+'?t='+Date.now());
      if(!r.ok) continue;
      const html=await r.text();
      const frame=document.getElementById('gameFrame');
      frame.contentDocument.open();
      frame.contentDocument.write(html);
      frame.contentDocument.close();
      return;
    }catch(e){}
  }
  document.getElementById('gameFrame').src=HYDRA_BASES[0]+'gmes/'+g.file_name;
}

async function fetchAndWrite(url){
  if(!url) return;
  const frame=document.getElementById('gameFrame');
  try{
    const r=await fetch(url); if(!r.ok) throw new Error();
    const html=await r.text();
    if(currentBlobUrl){URL.revokeObjectURL(currentBlobUrl);currentBlobUrl=null;}
    const blob=new Blob([html],{type:'text/html'});
    currentBlobUrl=URL.createObjectURL(blob);
    frame.src=currentBlobUrl;
  }catch(e){
    if(currentBlobUrl){URL.revokeObjectURL(currentBlobUrl);currentBlobUrl=null;}
    frame.src=url;
  }
}

function closeGame(){
  document.getElementById('viewer').style.display='none';
  document.getElementById('gameFrame').src='about:blank';
  if(currentBlobUrl){URL.revokeObjectURL(currentBlobUrl);currentBlobUrl=null;}
}
function fullscreenGame(){
  const f=document.getElementById('gameFrame');
  (f.requestFullscreen||f.webkitRequestFullscreen||f.msRequestFullscreen)?.call(f);
}
async function newTabGame(){
  if(!currentGame) return;
  const {g,src}=currentGame;
  if(src==='hydra'){
    const w=window.open('about:blank','_blank');
    for(const base of HYDRA_BASES){
      try{
        const r=await fetch(base+'gmes/'+g.file_name+'?t='+Date.now());
        if(!r.ok) continue;
        const html=await r.text();
        w.document.open();w.document.write(html);w.document.close();return;
      }catch(e){}
    }
  } else {
    const url=src==='archive'?g.url:src==='gnmath'?g.playUrl:(g.url.startsWith('http')?g.url:T9_SITE+g.url);
    window.open(url,'_blank');
  }
}

document.addEventListener('keydown',e=>{
  if(e.key==='Escape'&&document.getElementById('viewer').style.display==='flex') closeGame();
});

init().catch(console.error);
