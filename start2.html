<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>T9 OS - Next Gen Boot</title>
  <style>
    /* RESET & BASE — keep everything else intact but only touch boot screen */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* This ensures the main content stays hidden until boot completes */
    #content {
      display: none;
    }

    /* ============================================
       ENHANCED BOOT SCREEN — sick, futuristic, animated 
       ============================================ */
    #startup {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(ellipse at 30% 40%, #0a0f1f, #020408);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 10000;
      font-family: 'Segoe UI', 'Orbitron', 'Fira Code', monospace;
      backdrop-filter: blur(2px);
      overflow: hidden;
    }

    /* ANIMATED GRID BACKGROUND (cyber-deep) */
    .boot-grid {
      position: absolute;
      width: 200%;
      height: 200%;
      top: -50%;
      left: -50%;
      background-image: 
        linear-gradient(rgba(0, 255, 255, 0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 255, 255, 0.08) 1px, transparent 1px);
      background-size: 55px 55px;
      animation: gridShift 22s linear infinite;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes gridShift {
      0% { transform: translate(0, 0) rotate(0deg); }
      100% { transform: translate(60px, 60px) rotate(1deg); }
    }

    /* ORBITING PARTICLES (tech glow) */
    .particle-field {
      position: absolute;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }
    .particle {
      position: absolute;
      background: radial-gradient(circle, #0af, #f0f);
      border-radius: 50%;
      opacity: 0;
      animation: floatParticle 6s infinite alternate;
    }
    @keyframes floatParticle {
      0% { opacity: 0; transform: translateY(0) scale(0.2); }
      30% { opacity: 0.7; }
      100% { opacity: 0; transform: translateY(-180px) scale(1.2); }
    }

    /* MAIN LOGO CONTAINER — insane animations */
    .logo-super {
      position: relative;
      z-index: 12;
      margin-bottom: 30px;
      filter: drop-shadow(0 0 20px cyan) drop-shadow(0 0 35px #ff00c3);
      animation: logoEntrance 1.2s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards, 
                 logoFloating 2.8s infinite ease-in-out 0.5s;
    }

    @keyframes logoEntrance {
      0% { opacity: 0; transform: scale(0.2) rotate(-15deg); filter: blur(8px);}
      60% { opacity: 1; transform: scale(1.1) rotate(2deg);}
      100% { opacity: 1; transform: scale(1) rotate(0deg); filter: blur(0);}
    }

    @keyframes logoFloating {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-12px); }
      100% { transform: translateY(0px); }
    }

    .boot-logo-img {
      width: 160px;
      height: 160px;
      object-fit: contain;
      border-radius: 32px;
      background: rgba(10, 20, 40, 0.3);
      box-shadow: 
        0 0 30px #00aaff,
        0 0 60px #ff00cc,
        inset 0 0 15px rgba(255,255,255,0.3);
      transition: all 0.3s;
      animation: glitchPulse 1.8s infinite alternate;
    }

    @keyframes glitchPulse {
      0% { box-shadow: 0 0 10px cyan, 0 0 20px #ff44ee; filter: brightness(1);}
      100% { box-shadow: 0 0 35px #0af, 0 0 65px #ff44cc, inset 0 0 20px white; filter: brightness(1.2);}
    }

    /* ORBITAL RINGS */
    .orbit-ring {
      position: absolute;
      top: 50%;
      left: 50%;
      border-radius: 50%;
      pointer-events: none;
      transform: translate(-50%, -50%);
    }
    .ring-primary {
      width: 230px;
      height: 230px;
      border: 2px solid rgba(0, 212, 255, 0.7);
      border-top-color: #ff44cc;
      border-right-color: rgba(0,255,200,0.2);
      animation: spinRing 5s linear infinite;
    }
    .ring-secondary {
      width: 270px;
      height: 270px;
      border: 1.5px dashed rgba(0, 180, 255, 0.6);
      border-bottom-color: #ff88ff;
      animation: spinReverse 8s linear infinite;
    }
    .ring-tertiary {
      width: 190px;
      height: 190px;
      border: 1px solid rgba(0, 255, 255, 0.5);
      border-left-color: #ff33aa;
      animation: spinRing 3.5s linear infinite;
    }
    @keyframes spinRing {
      from { transform: translate(-50%, -50%) rotate(0deg); }
      to { transform: translate(-50%, -50%) rotate(360deg); }
    }
    @keyframes spinReverse {
      from { transform: translate(-50%, -50%) rotate(0deg); }
      to { transform: translate(-50%, -50%) rotate(-360deg); }
    }

    /* PROGRESS BAR — NEXT GEN STYLE */
    .progress-neon {
      width: 340px;
      margin-top: 35px;
      position: relative;
      z-index: 12;
    }
    .bar-container {
      width: 100%;
      height: 10px;
      background: #11131f;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: inset 0 1px 4px #00000066, 0 0 5px cyan;
      border: 0.5px solid rgba(0, 255, 255, 0.5);
    }
    .bar {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #00c6ff, #a020f0, #ff44cc);
      background-size: 200% 100%;
      border-radius: 12px;
      animation: fillBoot 2.6s cubic-bezier(0.25, 0.86, 0.4, 1) forwards, shimmerMove 1.2s infinite linear;
      box-shadow: 0 0 12px cyan;
    }
    @keyframes fillBoot {
      0% { width: 0%; }
      12% { width: 7%; }
      25% { width: 24%; }
      42% { width: 45%; }
      60% { width: 68%; }
      78% { width: 86%; }
      100% { width: 100%; }
    }
    @keyframes shimmerMove {
      0% { background-position: 0% 0%; }
      100% { background-position: 200% 0%; }
    }

    /* PERCENTAGE + STATUS */
    .stats-boot {
      display: flex;
      justify-content: space-between;
      margin-top: 16px;
      font-family: 'Fira Code', monospace;
      font-weight: 600;
    }
    .percent-boot {
      font-size: 1.5rem;
      background: linear-gradient(135deg, #fff, #7df9ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: 1.5px;
      text-shadow: 0 0 5px #0af;
    }
    .msg-boot {
      color: #b4e6ff;
      background: rgba(0, 20, 50, 0.6);
      backdrop-filter: blur(4px);
      padding: 5px 15px;
      border-radius: 40px;
      font-size: 0.8rem;
      letter-spacing: 1px;
      border-left: 2px solid cyan;
    }

    /* BOOT LOG (TERMINAL FEEL) */
    .boot-terminal {
      background: rgba(2, 6, 20, 0.75);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      padding: 14px 20px;
      margin-top: 32px;
      width: 420px;
      max-width: 85vw;
      border: 1px solid rgba(0, 255, 255, 0.4);
      font-family: 'Fira Code', monospace;
      font-size: 0.7rem;
      color: #9ad8ff;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
      z-index: 12;
    }
    .log-line {
      white-space: nowrap;
      overflow-x: hidden;
      display: flex;
      gap: 10px;
      margin-bottom: 6px;
      opacity: 0;
      animation: fadeLine 0.2s forwards;
    }
    @keyframes fadeLine {
      from { opacity: 0; transform: translateX(-6px);}
      to { opacity: 1; transform: translateX(0);}
    }
    .prompt {
      color: #3eff9e;
    }
    .cursor-block {
      display: inline-block;
      width: 8px;
      height: 12px;
      background: cyan;
      vertical-align: middle;
      margin-left: 4px;
      animation: blinkBoot 1s step-end infinite;
    }
    @keyframes blinkBoot {
      0%,100% { opacity: 1; }
      50% { opacity: 0; }
    }

    /* FAKE SYSTEM METRICS */
    .boot-metrics {
      display: flex;
      gap: 18px;
      margin-top: 20px;
      z-index: 12;
      font-size: 0.65rem;
      background: rgba(0,0,0,0.4);
      padding: 8px 18px;
      border-radius: 60px;
      backdrop-filter: blur(4px);
      font-family: monospace;
      color: #77ccff;
    }
    .metric-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* ADDITIONAL GLOW OVERLAY */
    .scan-glow {
      position: absolute;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 50% 30%, rgba(0, 255, 255, 0.05) 0%, transparent 70%);
      pointer-events: none;
      z-index: 3;
    }

    /* RESPONSIVE */
    @media (max-width: 550px) {
      .boot-logo-img { width: 110px; height: 110px; }
      .ring-primary { width: 170px; height: 170px; }
      .ring-secondary { width: 200px; height: 200px; }
      .ring-tertiary { width: 140px; height: 140px; }
      .progress-neon { width: 260px; }
      .boot-terminal { width: 90%; padding: 10px; font-size: 0.6rem;}
      .percent-boot { font-size: 1.2rem; }
    }

  // ENHANCED BOOT SEQUENCE (dynamic messages, progress sync)
  (function() {
    const bootPhases = [
      { percent: 0, msg: "Booting....", log: "Loading OS V3.5" },
      { percent: 8, msg: "VERIFYING OS", log: "Loading Games" },
      { percent: 19, msg: "Loading browser", log: "Loading browser" },

    ];
    let startTime = performance.now();
    const DURATION = 2800;
    const percentSpan = document.getElementById('bootPercent');
    const msgSpan = document.getElementById('bootMsg');
    const progressFill = document.getElementById('bootProgressBar');
    const dynamicLog = document.getElementById('dynamicLog');
    const terminalDiv = document.getElementById('bootTerminal');
    
    function addLogLine(text) {
      const line = document.createElement('div');
      line.className = 'log-line';
      line.innerHTML = `<span class="prompt">></span> ${text}`;
      terminalDiv.appendChild(line);
      terminalDiv.scrollTop = terminalDiv.scrollHeight;
      while(terminalDiv.children.length > 7) terminalDiv.removeChild(terminalDiv.firstChild);
    }
    
    function updateBoot(now) {
      let elapsed = now - startTime;
      let percent = Math.min(100, (elapsed / DURATION) * 100);
      if(progressFill) progressFill.style.width = `${percent}%`;
      if(percentSpan) percentSpan.innerText = `${Math.floor(percent)}%`;
      
      let active = bootPhases[0];
      for(let i=bootPhases.length-1; i>=0; i--) {
        if(percent >= bootPhases[i].percent) { active = bootPhases[i]; break; }
      }
      if(msgSpan && msgSpan.innerText !== active.msg) {
        msgSpan.innerText = active.msg;
        addLogLine(active.log);
      }
      if(dynamicLog && percent < 100) {
        const dots = ['.', '..', '...', '....'];
        let idx = Math.floor(elapsed / 320) % dots.length;
        dynamicLog.innerHTML = `<span class="prompt">⟳</span> processing T9 core ${dots[idx]}<span class="cursor-block"></span>`;
      } else if (percent >= 100 && dynamicLog) {
        dynamicLog.innerHTML = `<span class="prompt">✔</span> Boot sequence complete. System online.`;
      }
      if(percent < 100) requestAnimationFrame(updateBoot);
      else {
        setTimeout(() => {
          document.getElementById('startup').style.display = 'none';
          document.getElementById('content').style.display = 'block';
        }, 400);
      }
    }
    requestAnimationFrame(updateBoot);
    // generate floating particles
    const particleField = document.getElementById('bootParticles');
    for(let i=0;i<55;i++) {
      let p = document.createElement('div');
      p.classList.add('particle');
      let size = Math.random() * 5 + 2;
      p.style.width = `${size}px`;
      p.style.height = `${size}px`;
      p.style.left = `${Math.random() * 100}%`;
      p.style.top = `${Math.random() * 100}%`;
      p.style.animationDelay = `${Math.random() * 8}s`;
      p.style.animationDuration = `${Math.random() * 4 + 4}s`;
      p.style.background = `radial-gradient(circle, ${Math.random() > 0.6 ? '#0af' : '#f6f'}, transparent)`;
      particleField.appendChild(p);
    }
  })();
