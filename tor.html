  <script>
    const SEARCH_ENGINES = {
      duckduckgo: { name:'DuckDuckGo', short:'DDG', url:'https://duckduckgo.com/?q=' },
      google: { name:'Google', short:'GGL', url:'https://www.google.com/search?q=' },
      bing: { name:'Bing', short:'BNG', url:'https://www.bing.com/search?q=' },
      brave: { name:'Brave', short:'BRV', url:'https://search.brave.com/search?q=' },
      startpage: { name:'Startpage', short:'SPG', url:'https://www.startpage.com/sp/search?query=' },
      ecosia: { name:'Ecosia', short:'ECO', url:'https://www.ecosia.org/search?q=' },
    };

    const B = (() => {
      let tabs = [mkTab()];
      let cur = 0;
      let recent = [];
      let currentProxy = 'scramjet';
      let currentSearch = localStorage.getItem('t9_search') || 'duckduckgo';

      function mkTab(url, title) { 
        return { url: url||'', title: title||'New Tab', fav: null, hist: url?[url]:[], hidx: url?0:-1 }; 
      }
      function ct() { return tabs[cur]; }

      function resolveUrl(raw) {
        raw = (raw||'').trim();
        if (!raw) return null;
        if (/^https?:\/\//i.test(raw)) return raw;
        if (raw.includes('.') && !raw.includes(' ')) return 'https://' + raw;
        return SEARCH_ENGINES[currentSearch].url + encodeURIComponent(raw);
      }

      function renderTabs() {
        const strip = document.getElementById('tab-strip');
        strip.querySelectorAll('.tab').forEach(el => el.remove());
        tabs.forEach((t,i) => {
          const d = document.createElement('div');
          d.className = `tab flex items-center gap-2 h-9 min-w-[120px] max-w-[200px] px-3 rounded-t-ff text-[13px] font-medium cursor-pointer transition-fast border-b-[3px] flex-shrink-0 ${
            i===cur ? 'active bg-ff-tab-active text-ff-text border-ff-accent' : 'text-ff-text-muted border-transparent hover:bg-ff-tab-hover'
          }`;
          d.innerHTML = `<span class="w-4 h-4 flex items-center justify-center flex-shrink-0">${t.fav ? `<img src="${t.fav}" class="w-4 h-4 rounded-sm">` : '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/></svg>'}</span><span class="truncate flex-1">${t.title}</span><button class="tab-close-btn ml-1 w-5 h-5 rounded-full flex items-center justify-center text-ff-text-muted hover:text-ff-text hover:bg-ff-border transition-fast flex-shrink-0 text-[10px] font-bold">x</button>`;
          d.onclick = (e) => { 
            if (e.target.closest('.tab-close-btn')) return;
            if(cur!==i){ cur=i; sync(); } 
          };
          d.querySelector('.tab-close-btn').onclick = (e)=>{ 
            e.stopPropagation(); 
            closeTab(i); 
          };
          strip.insertBefore(d, document.getElementById('btn-newtab'));
        });
        document.getElementById('btn-back').disabled = ct().hidx <= 0;
        document.getElementById('btn-fwd').disabled = ct().hidx >= ct().hist.length-1;
      }

      function sync() {
        const t = ct();
        document.getElementById('url-input').value = t.url;
        renderTabs();
        hideError();
        if (t.url) { showFrame(); doLoad(t.url, false); }
        else { showNew(); }
      }

      function addTab(url, title) {
        tabs.push(mkTab(url, title));
        cur = tabs.length-1;
        sync();
        if(!url) setTimeout(()=>document.getElementById('url-input').focus(),60);
      }

      function closeTab(i) {
        const t = tabs[i];
        if(t.url) { recent.unshift({url:t.url, title:t.title, fav:t.fav}); if(recent.length>8)recent.pop(); }
        if(tabs.length===1){ tabs=[mkTab()]; cur=0; sync(); return; }
        tabs.splice(i,1);
        if(cur>=tabs.length)cur=tabs.length-1;
        sync();
      }

      function navigate(raw, pushHist=true) {
        const url = resolveUrl(raw);
        if(!url) return;
        const t = ct();
        if(pushHist){ t.hist = t.hist.slice(0, t.hidx+1); t.hist.push(url); t.hidx = t.hist.length-1; }
        t.url=url; t.title=url; 
        try { t.fav=`https://www.google.com/s2/favicons?domain=${new URL(url).hostname}&sz=32`; } catch(e){}
        document.getElementById('url-input').value=url;
        renderTabs(); hideError(); showFrame();
        doLoad(url, pushHist);
        hideOmni();
      }

      async function doLoad(url, updateHash) {
        startProg(); hideError();
        const frame = document.getElementById('proxy-frame');
        frame.src = window.__vaporScramjet.encodeUrl(url);
        frame.onload = ()=>{ stopProg(); };
      }

      function back(){ const t=ct(); if(t.hidx>0){ t.hidx--; t.url=t.hist[t.hidx]; sync(); doLoad(t.url,false); } }
      function fwd(){ const t=ct(); if(t.hidx<t.hist.length-1){ t.hidx++; t.url=t.hist[t.hidx]; sync(); doLoad(t.url,false); } }
      function reload(){ if(ct().url) doLoad(ct().url,false); }
      function home(){ ct().url=''; ct().title='New Tab'; document.getElementById('url-input').value=''; renderTabs(); hideError(); showNew(); }

      function showFrame(){ document.getElementById('proxy-frame').classList.remove('hidden'); document.getElementById('newtab').classList.add('hidden'); }
      function showNew(){ document.getElementById('proxy-frame').classList.add('hidden'); document.getElementById('newtab').classList.remove('hidden'); }
      function hideError(){ document.getElementById('error-page').classList.add('hidden'); }

      function startProg(){ 
        const b=document.getElementById('prog-bar'); 
        b.style.transition = 'none'; b.classList.remove('progress-animate');
        b.style.width='20%'; b.style.left='0';
        requestAnimationFrame(() => {
          b.classList.add('!opacity-100');
          b.classList.add('progress-animate');
        });
      }
      function stopProg(){ 
        const b=document.getElementById('prog-bar'); 
        b.style.width='100%'; b.style.left='0';
        b.classList.remove('progress-animate');
        setTimeout(()=> { b.classList.remove('!opacity-100'); b.style.width='0'; }, 200);
      }

      function focusUrl(){ document.getElementById('url-input').select(); }
      function onFocus(){}
      function onBlur(){}
      function onInput(val){}
      function onKey(e){ 
        if(e.key==='Enter'){ navigate(e.target.value); hideOmni(); } 
      }
      function hideOmni(){ document.getElementById('omni').classList.add('hidden'); }

      function toggleProxyDropdown(e){
        e.stopPropagation();
        const d=document.getElementById('proxy-dropdown');
        const rect = document.getElementById('badge-proxy').getBoundingClientRect();
        d.style.top = (rect.bottom + 6) + 'px';
        d.style.left = (rect.left - 20) + 'px';
        d.innerHTML=`<div class="px-4 py-2 text-[11px] font-semibold text-ff-text-muted uppercase tracking-wider">Proxy</div>
          <div class="px-4 py-2.5 hover:bg-ff-tab-hover rounded-ff cursor-pointer text-sm flex items-center gap-3 transition-fast ${currentProxy==='scramjet'?'text-ff-text font-medium bg-ff-tab':''}" onclick="B.setProxy('scramjet')"><span class="w-2 h-2 rounded-full bg-ff-green"></span> Scramjet</div>
          <div class="px-4 py-2.5 hover:bg-ff-tab-hover rounded-ff cursor-pointer text-sm flex items-center gap-3 transition-fast ${currentProxy==='ultraviolet'?'text-ff-text font-medium bg-ff-tab':''}" onclick="B.setProxy('ultraviolet')"><span class="w-2 h-2 rounded-full bg-ff-purple"></span> Ultraviolet</div>`;
        d.classList.remove('hidden');
        setTimeout(() => document.addEventListener('click', () => d.classList.add('hidden'), { once: true }), 0);
      }
      function setProxy(p){ 
        currentProxy=p; 
        document.getElementById('proxy-name').textContent=p==='scramjet'?'SJ':'UV'; 
        document.getElementById('proxy-dot').className = `w-2 h-2 rounded-full ${p==='scramjet'?'bg-ff-green':'bg-ff-purple'}`;
        document.getElementById('proxy-dropdown').classList.add('hidden'); 
        if(ct().url) doLoad(ct().url, false);
      }

      function toggleSeDropdownChrome(e){ 
        e.stopPropagation(); 
        const d=document.getElementById('se-dropdown-chrome');
        const rect = document.getElementById('badge-se').getBoundingClientRect();
        d.style.top = (rect.bottom + 6) + 'px';
        d.style.left = (rect.left - 40) + 'px';
        d.innerHTML=`<div class="px-4 py-2 text-[11px] font-semibold text-ff-text-muted uppercase tracking-wider">Search Engine</div>` + 
          Object.entries(SEARCH_ENGINES).map(([k,v])=>`<div class="px-4 py-2.5 hover:bg-ff-tab-hover rounded-ff cursor-pointer text-sm flex items-center gap-4 transition-fast ${currentSearch===k?'text-ff-text font-medium bg-ff-tab':''}" onclick="B.setSearchEngine('${k}')"><span class="font-mono text-xs text-ff-accent">${v.short}</span><span class="text-ff-text-secondary">${v.name}</span></div>`).join(''); 
        d.classList.remove('hidden');
        setTimeout(() => document.addEventListener('click', () => d.classList.add('hidden'), { once: true }), 0);
      }
      function setSearchEngine(key){ 
        currentSearch=key; 
        localStorage.setItem('t9_search',key); 
        document.getElementById('se-name-badge').textContent=SEARCH_ENGINES[key].short; 
        document.getElementById('se-dropdown-chrome').classList.add('hidden'); 
      }

      function star(){ 
        const btn = document.getElementById('btn-star');
        const svg = document.getElementById('star-svg');
        if (svg.getAttribute('fill') === 'currentColor') {
          svg.setAttribute('fill', 'none');
          btn.classList.remove('text-ff-accent');
        } else {
          svg.setAttribute('fill', 'currentColor');
          btn.classList.add('text-ff-accent');
        }
      }
      function menu(e){
        e.stopPropagation();
        const old = document.getElementById('_ctxmenu');
        if(old) { old.remove(); return; }
        const m = document.createElement('div');
        m.id = '_ctxmenu';
        const rect = e.target.closest('button').getBoundingClientRect();
        m.className = 'fixed z-[9999] bg-ff-tab rounded-ff p-2 min-w-[220px] shadow-2xl border border-ff-border';
        m.style.top = (rect.bottom + 6) + 'px';
        m.style.right = (window.innerWidth - rect.right) + 'px';
        const items = [
          ['New Tab', () => B.addTab(), 'Ctrl+T'],
          ['Reload', () => B.reload(), 'Ctrl+R'],
          ['Home', () => B.home(), 'Alt+Home'],
          [null, null, null],
          ['Bookmarks', () => {}, ''],
          ['History', () => {}, ''],
          [null, null, null],
          ['Settings', () => {}, ''],
        ];
        items.forEach(([lbl, fn, shortcut]) => {
          if (!lbl) { const sep = document.createElement('div'); sep.className = 'border-t border-ff-border my-1'; m.appendChild(sep); return; }
          const item = document.createElement('div');
          item.className = 'px-4 py-2 hover:bg-ff-tab-hover rounded-ff cursor-pointer text-sm text-ff-text-secondary hover:text-ff-text transition-fast flex items-center justify-between';
          item.innerHTML = `<span>${lbl}</span>${shortcut ? `<span class="text-[11px] text-ff-text-muted font-mono">${shortcut}</span>` : ''}`;
          item.onclick = () => { if(fn) fn(); m.remove(); };
          m.appendChild(item);
        });
        document.body.appendChild(m);
        setTimeout(() => document.addEventListener('click', () => m.remove(), { once: true }), 0);
      }
      function retryLoad(){ if(ct().url) doLoad(ct().url,false); }
      function switchAndRetry(){ 
        currentProxy = currentProxy==='scramjet'?'ultraviolet':'scramjet'; 
        setProxy(currentProxy); 
        retryLoad(); 
      }

      const updateTime = () => {
        const el = document.getElementById('clock2');
        if(el) {
          const now = new Date();
          el.textContent = now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true }) + ' · ' + now.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
        }
      };
      updateTime();
      setInterval(updateTime, 60000);

      renderTabs(); 
      showNew();
      document.getElementById('se-name-badge').textContent = SEARCH_ENGINES[currentSearch].short;

      return { 
        addTab, closeTab, navigate, back, fwd, reload, home, 
        focusUrl, onFocus, onBlur, onInput, onKey, 
        star, menu, setProxy, toggleProxyDropdown, 
        setSearchEngine, toggleSeDropdownChrome, 
        retryLoad, switchAndRetry, cur 
      };
    })();

    document.addEventListener('keydown', e => {
      if ((e.ctrlKey || e.metaKey) && e.key === 't') { e.preventDefault(); B.addTab(); }
      if ((e.ctrlKey || e.metaKey) && e.key === 'w') {
        e.preventDefault();
        if (B.cur !== undefined) {
          const tabs = document.querySelectorAll('.tab');
          if (tabs[B.cur]) tabs[B.cur].querySelector('.tab-close-btn')?.click();
        }
      }
      if ((e.ctrlKey || e.metaKey) && e.key === 'r') { e.preventDefault(); B.reload(); }
    });
  </script>
</body>
</html>
