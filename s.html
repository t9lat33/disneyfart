<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SPLASH</title>
  <meta name="title" content="SPLASH" />
  <meta name="description" content="a modern web proxy browser" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="SPLASH" />
  <meta property="og:description" content="a modern web proxy browser" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0a0b;
      --bg2:       #111114;
      --bg3:       #18181c;
      --bg4:       #202026;
      --border:    rgba(255,255,255,0.07);
      --border2:   rgba(255,255,255,0.13);
      --accent:    #5b8fff;
      --accent2:   #a78bfa;
      --text:      #e8e8ee;
      --text2:     #8888a0;
      --text3:     #55556a;
      --success:   #3ecf8e;
      --danger:    #ff5f6d;
      --tab-h:     34px;
      --nav-h:     48px;
      --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
      --font-logo: 'Space Mono', monospace;
      --radius:    8px;
      --radius-lg: 12px;
    }

    html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: var(--font-mono); }

    /* ── LAYOUT ─────────────────────────────── */
    #browser { display: flex; flex-direction: column; height: 100vh; }

    /* ── CHROME TOP ─────────────────────────── */
    #chrome {
      flex-shrink: 0;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      user-select: none;
    }

    /* ── TAB BAR ────────────────────────────── */
    #tab-strip {
      display: flex;
      align-items: flex-end;
      padding: 8px 8px 0;
      gap: 2px;
      overflow-x: auto;
      overflow-y: hidden;
      scrollbar-width: none;
    }
    #tab-strip::-webkit-scrollbar { display: none; }

    .tab {
      display: flex; align-items: center; gap: 7px;
      padding: 0 10px;
      height: var(--tab-h);
      border-radius: 8px 8px 0 0;
      border: 1px solid transparent;
      border-bottom: none;
      font-size: 11px;
      color: var(--text2);
      min-width: 100px; max-width: 220px;
      cursor: pointer;
      flex-shrink: 0;
      position: relative;
      transition: background .15s, color .15s;
      font-family: var(--font-mono);
      letter-spacing: 0.02em;
    }
    .tab:hover { background: var(--bg3); color: var(--text); }
    .tab.active {
      background: var(--bg3);
      border-color: var(--border2);
      color: var(--text);
    }
    .tab.active::after {
      content: '';
      position: absolute; bottom: -1px; left: 0; right: 0; height: 1px;
      background: var(--bg3);
    }
    .tab-favicon { font-size: 12px; flex-shrink: 0; width: 14px; text-align: center; }
    .tab-title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .tab-close {
      opacity: 0; width: 16px; height: 16px; border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; background: transparent; border: none;
      color: var(--text2); cursor: pointer; flex-shrink: 0; padding: 0;
      transition: background .1s, opacity .1s;
    }
    .tab:hover .tab-close, .tab.active .tab-close { opacity: 1; }
    .tab-close:hover { background: rgba(255,95,109,.25); color: var(--danger); }

    #add-tab {
      width: 28px; height: 28px; border-radius: 6px; border: none;
      background: transparent; color: var(--text3); font-size: 16px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      margin-bottom: 4px; margin-left: 2px; transition: background .1s, color .1s;
    }
    #add-tab:hover { background: var(--bg4); color: var(--text); }

    /* ── NAV BAR ────────────────────────────── */
    #nav-bar {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 10px 8px;
    }

    .nav-btn {
      width: 30px; height: 30px; border-radius: var(--radius); border: none;
      background: transparent; color: var(--text2); font-size: 14px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background .1s, color .1s; flex-shrink: 0;
    }
    .nav-btn:hover { background: var(--bg4); color: var(--text); }
    .nav-btn:disabled { opacity: 0.25; cursor: default; pointer-events: none; }

    #url-wrap {
      flex: 1; display: flex; align-items: center;
      background: var(--bg); border: 1px solid var(--border2);
      border-radius: 30px; height: 34px; padding: 0 14px; gap: 8px;
      transition: border-color .2s, box-shadow .2s; cursor: text;
    }
    #url-wrap:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(91,143,255,.15);
    }
    #url-scheme {
      font-size: 11px; color: var(--success); flex-shrink: 0;
      font-family: var(--font-mono); letter-spacing: 0.05em;
    }
    #url-input {
      flex: 1; border: none; background: transparent;
      font-size: 12px; color: var(--text);
      font-family: var(--font-mono); outline: none; letter-spacing: 0.02em;
    }
    #url-input::placeholder { color: var(--text3); }
    #url-go {
      width: 22px; height: 22px; border-radius: 50%; border: none;
      background: transparent; color: var(--text3); font-size: 14px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background .1s, color .1s; padding: 0; flex-shrink: 0;
    }
    #url-go:hover { background: var(--bg4); color: var(--accent); }

    .ext-btn {
      width: 30px; height: 30px; border-radius: var(--radius); border: 1px solid transparent;
      background: transparent; color: var(--text2); font-size: 13px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background .1s, color .1s, border-color .1s;
    }
    .ext-btn:hover { background: var(--bg4); color: var(--text); border-color: var(--border2); }
    .ext-btn.starred { color: #f5c842; }

    /* ── CONTENT AREA ───────────────────────── */
    #content {
      flex: 1; position: relative; overflow: hidden;
      background: var(--bg3);
    }

    #proxy-frame { width: 100%; height: 100%; border: none; display: none; }

    /* ── LOADING BAR ────────────────────────── */
    #progress {
      position: absolute; top: 0; left: 0; right: 0; height: 2px; z-index: 100;
      background: transparent; pointer-events: none;
    }
    #progress-bar {
      height: 100%; width: 0; opacity: 0;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      transition: width 1.8s cubic-bezier(.4,0,.2,1), opacity .3s;
      border-radius: 1px;
      box-shadow: 0 0 8px var(--accent);
    }

    /* ── NEW TAB PAGE ───────────────────────── */
    #newtab {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; align-items: center;
      justify-content: flex-start; padding: 60px 24px 24px;
      overflow-y: auto; gap: 36px;
    }

    /* scanline overlay */
    #newtab::before {
      content: '';
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,.05) 2px,
        rgba(0,0,0,.05) 4px
      );
    }

    /* dot grid */
    #newtab::after {
      content: '';
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,.035) 1px, transparent 1px);
      background-size: 28px 28px;
    }

    .nt-section { position: relative; z-index: 1; width: 100%; max-width: 640px; }

    /* logo */
    #nt-logo {
      font-family: var(--font-logo);
      font-size: clamp(42px, 8vw, 72px);
      font-weight: 700;
      letter-spacing: -2px;
      color: var(--text);
      line-height: 1;
      text-align: center;
      position: relative; z-index: 1;
      animation: fadeUp .5s ease both;
    }
    #nt-logo .accent-a { color: var(--accent); }
    #nt-logo .accent-dot { color: var(--accent2); font-size: .5em; vertical-align: super; }
    #nt-tagline {
      text-align: center;
      font-size: 11px;
      color: var(--text3);
      letter-spacing: .2em;
      text-transform: uppercase;
      margin-top: 8px;
      animation: fadeUp .5s .05s ease both;
    }

    /* search bar */
    #nt-search-wrap {
      display: flex; align-items: center;
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: 40px;
      height: 48px; padding: 0 18px; gap: 12px;
      transition: border-color .2s, box-shadow .2s;
      animation: fadeUp .5s .1s ease both;
    }
    #nt-search-wrap:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(91,143,255,.15), 0 8px 32px rgba(0,0,0,.4);
    }
    #nt-search-icon { font-size: 14px; color: var(--text3); flex-shrink: 0; }
    #nt-search {
      flex: 1; border: none; background: transparent;
      font-size: 13px; color: var(--text);
      font-family: var(--font-mono); outline: none; letter-spacing: 0.02em;
    }
    #nt-search::placeholder { color: var(--text3); }
    #nt-search-btn {
      padding: 6px 16px; border-radius: 20px; border: 1px solid var(--border2);
      background: var(--bg4); color: var(--text2);
      font-size: 11px; font-family: var(--font-mono); cursor: pointer;
      letter-spacing: .06em; transition: background .15s, color .15s, border-color .15s;
    }
    #nt-search-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* shortcuts */
    #nt-shortcuts-label {
      font-size: 10px; color: var(--text3); letter-spacing: .15em;
      text-transform: uppercase; margin-bottom: 14px;
      animation: fadeUp .5s .15s ease both;
    }
    #nt-shortcuts {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      animation: fadeUp .5s .2s ease both;
    }
    .shortcut {
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      padding: 14px 8px 12px; border-radius: var(--radius-lg);
      border: 1px solid var(--border);
      background: var(--bg2);
      cursor: pointer;
      transition: background .15s, border-color .15s, transform .15s;
      text-decoration: none;
    }
    .shortcut:hover {
      background: var(--bg4); border-color: var(--border2);
      transform: translateY(-2px);
    }
    .sc-icon {
      width: 40px; height: 40px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; background: var(--bg3); border: 1px solid var(--border);
    }
    .sc-label {
      font-size: 10px; color: var(--text2); letter-spacing: .04em;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 68px;
      text-align: center;
    }

    /* recently closed */
    #nt-recent-label {
      font-size: 10px; color: var(--text3); letter-spacing: .15em;
      text-transform: uppercase; margin-bottom: 12px;
      animation: fadeUp .5s .25s ease both;
    }
    #nt-recent {
      display: flex; flex-direction: column; gap: 6px;
      animation: fadeUp .5s .3s ease both;
    }
    .recent-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--bg2); cursor: pointer;
      transition: background .12s, border-color .12s;
    }
    .recent-item:hover { background: var(--bg4); border-color: var(--border2); }
    .recent-fav { font-size: 14px; }
    .recent-url { flex: 1; font-size: 11px; color: var(--text2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .recent-time { font-size: 10px; color: var(--text3); flex-shrink: 0; }

    /* clock */
    #nt-clock {
      font-family: var(--font-logo);
      font-size: clamp(18px, 4vw, 28px);
      color: var(--text3);
      letter-spacing: .1em;
      text-align: center;
      animation: fadeUp .5s .35s ease both;
    }
    #nt-date {
      font-size: 11px; color: var(--text3); letter-spacing: .15em;
      text-align: center; margin-top: 4px;
      animation: fadeUp .5s .4s ease both;
    }

    /* ── CONTEXT MENU ───────────────────────── */
    #ctx-menu {
      position: fixed; z-index: 9999;
      background: var(--bg2); border: 1px solid var(--border2);
      border-radius: var(--radius-lg); padding: 6px;
      min-width: 160px; display: none;
      box-shadow: 0 16px 48px rgba(0,0,0,.6);
      font-size: 12px;
    }
    .ctx-item {
      padding: 7px 12px; border-radius: 6px; cursor: pointer;
      color: var(--text2); display: flex; align-items: center; gap: 8px;
      transition: background .1s, color .1s; letter-spacing: .03em;
    }
    .ctx-item:hover { background: var(--bg4); color: var(--text); }
    .ctx-sep { height: 1px; background: var(--border); margin: 4px 0; }

    /* ── OMNIBOX DROPDOWN ───────────────────── */
    #omni-drop {
      position: absolute; z-index: 9998;
      background: var(--bg2); border: 1px solid var(--border2);
      border-radius: var(--radius-lg); padding: 6px;
      min-width: 400px; max-width: 600px; display: none;
      box-shadow: 0 16px 48px rgba(0,0,0,.6);
      font-size: 12px; top: 86px; left: 50%; transform: translateX(-50%);
    }
    .omni-item {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 12px; border-radius: 6px; cursor: pointer;
      color: var(--text2); transition: background .1s, color .1s;
    }
    .omni-item:hover, .omni-item.selected { background: var(--bg4); color: var(--text); }
    .omni-icon { font-size: 13px; flex-shrink: 0; width: 16px; text-align: center; }
    .omni-text { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .omni-badge {
      font-size: 9px; padding: 2px 6px; border-radius: 4px;
      background: var(--bg4); color: var(--text3); letter-spacing: .06em;
      flex-shrink: 0;
    }

    /* ── ANIMATIONS ─────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── SCROLLBAR ──────────────────────────── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--border2); }
  </style>
</head>
<body>

<div id="browser">
  <!-- CHROME -->
  <div id="chrome">
    <!-- TAB STRIP -->
    <div id="tab-strip">
      <!-- tabs injected by JS -->
      <button id="add-tab" title="New tab" onclick="addTab()">+</button>
    </div>
    <!-- NAV BAR -->
    <div id="nav-bar">
      <button class="nav-btn" id="btn-back"   title="Back"    onclick="goBack()">&#8592;</button>
      <button class="nav-btn" id="btn-fwd"    title="Forward" onclick="goForward()">&#8594;</button>
      <button class="nav-btn" id="btn-reload" title="Reload"  onclick="reloadPage()">&#8635;</button>
      <button class="nav-btn" id="btn-home"   title="Home"    onclick="showNewTab()">&#8962;</button>

      <div id="url-wrap" onclick="focusUrl()">
        <span id="url-scheme">https://</span>
        <input id="url-input" type="text" placeholder="search or type a URL…"
          autocomplete="off" spellcheck="false"
          onfocus="onUrlFocus()"
          onblur="onUrlBlur()"
          oninput="onUrlInput(this.value)"
          onkeydown="onUrlKey(event)" />
        <button id="url-go" onclick="navigate(document.getElementById('url-input').value)">&#10230;</button>
      </div>

      <button class="ext-btn" id="btn-star"  title="Bookmark" onclick="toggleStar()">&#9734;</button>
      <button class="ext-btn" id="btn-ext"   title="Extensions">&#9783;</button>
      <button class="ext-btn" id="btn-menu"  title="Menu" onclick="showCtxMenu(event)">&#8942;</button>
    </div>
  </div>

  <!-- CONTENT -->
  <div id="content">
    <div id="progress"><div id="progress-bar"></div></div>
    <iframe id="proxy-frame" title="SPLASH Proxy" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
    <div id="newtab">
      <!-- clock -->
      <div class="nt-section" style="text-align:center">
        <div id="nt-clock">--:--:--</div>
        <div id="nt-date"></div>
      </div>

      <!-- logo -->
      <div class="nt-section" style="text-align:center">
        <div id="nt-logo">SPL<span class="accent-a">A</span>SH<span class="accent-dot">●</span></div>
        <div id="nt-tagline">web proxy · browser edition</div>
      </div>

      <!-- search -->
      <div class="nt-section">
        <div id="nt-search-wrap">
          <span id="nt-search-icon">⌕</span>
          <input id="nt-search" type="text" placeholder="search or enter a URL…"
            autocomplete="off" spellcheck="false"
            onkeydown="if(event.key==='Enter')navigate(this.value)" />
          <button id="nt-search-btn" onclick="navigate(document.getElementById('nt-search').value)">GO →</button>
        </div>
      </div>

      <!-- shortcuts -->
      <div class="nt-section">
        <div id="nt-shortcuts-label">Quick access</div>
        <div id="nt-shortcuts">
          <div class="shortcut" onclick="navigate('https://google.com')">
            <div class="sc-icon">🔍</div><div class="sc-label">Google</div>
          </div>
          <div class="shortcut" onclick="navigate('https://youtube.com')">
            <div class="sc-icon">▶️</div><div class="sc-label">YouTube</div>
          </div>
          <div class="shortcut" onclick="navigate('https://reddit.com')">
            <div class="sc-icon">👾</div><div class="sc-label">Reddit</div>
          </div>
          <div class="shortcut" onclick="navigate('https://github.com')">
            <div class="sc-icon">🐙</div><div class="sc-label">GitHub</div>
          </div>
          <div class="shortcut" onclick="navigate('https://twitter.com')">
            <div class="sc-icon">🐦</div><div class="sc-label">Twitter</div>
          </div>
          <div class="shortcut" onclick="navigate('https://discord.com')">
            <div class="sc-icon">💬</div><div class="sc-label">Discord</div>
          </div>
          <div class="shortcut" onclick="navigate('https://twitch.tv')">
            <div class="sc-icon">📡</div><div class="sc-label">Twitch</div>
          </div>
          <div class="shortcut" onclick="navigate('https://wikipedia.org')">
            <div class="sc-icon">📖</div><div class="sc-label">Wikipedia</div>
          </div>
        </div>
      </div>

      <!-- recently closed -->
      <div class="nt-section" id="nt-recent-section" style="display:none">
        <div id="nt-recent-label">Recently closed</div>
        <div id="nt-recent"></div>
      </div>
    </div><!-- /newtab -->
  </div><!-- /content -->
</div>

<!-- CONTEXT MENU -->
<div id="ctx-menu">
  <div class="ctx-item" onclick="addTab()"><span>+</span> New tab</div>
  <div class="ctx-item" onclick="navigate(prompt('Enter URL:') || '')"><span>↗</span> Open URL…</div>
  <div class="ctx-sep"></div>
  <div class="ctx-item" onclick="reloadPage()"><span>↺</span> Reload</div>
  <div class="ctx-item" onclick="(() => { const u = document.getElementById('url-input').value; if(u){ const a=document.createElement('a');a.href=u;a.download='';a.click(); } })()"><span>⬇</span> Save page</div>
  <div class="ctx-sep"></div>
  <div class="ctx-item" onclick="document.getElementById('ctx-menu').style.display='none'"><span>✕</span> Close</div>
</div>

<!-- OMNIBOX DROPDOWN -->
<div id="omni-drop"></div>

<script>
/* ── STATE ──────────────────────────────── */
let tabs = [mkTab()];
let active = 0;
let recentlyClosed = [];
let omniIdx = -1;

function mkTab(url, title){
  return { url: url||'', title: title||'New tab', favicon: '✦', hist: url?[url]:[], hidx: url?0:-1 };
}
function ct(){ return tabs[active]; }

/* ── CLOCK ──────────────────────────────── */
function updateClock(){
  const now = new Date();
  const hms = now.toLocaleTimeString('en-US',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'});
  const date = now.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
  const cl = document.getElementById('nt-clock');
  const dl = document.getElementById('nt-date');
  if(cl) cl.textContent = hms;
  if(dl) dl.textContent = date;
}
setInterval(updateClock,1000); updateClock();

/* ── TAB RENDER ─────────────────────────── */
function renderTabs(){
  const strip = document.getElementById('tab-strip');
  const addBtn = document.getElementById('add-tab');
  // remove old tabs
  strip.querySelectorAll('.tab').forEach(el=>el.remove());
  // insert new
  tabs.forEach((t,i) => {
    const d = document.createElement('div');
    d.className = 'tab' + (i===active?' active':'');
    d.innerHTML = `<span class="tab-favicon">${t.favicon}</span><span class="tab-title">${escHtml(t.title)}</span><button class="tab-close" title="Close tab">✕</button>`;
    d.onclick = () => { if(active!==i){ active=i; refreshUI(); } };
    d.querySelector('.tab-close').onclick = e => { e.stopPropagation(); closeTab(i); };
    strip.insertBefore(d, addBtn);
  });
  // nav state
  const t = ct();
  document.getElementById('btn-back').disabled = t.hidx <= 0;
  document.getElementById('btn-fwd').disabled  = t.hidx >= t.hist.length-1;
}

function refreshUI(){
  const t = ct();
  const urlInput = document.getElementById('url-input');
  urlInput.value = t.url;
  updateScheme(t.url);
  renderTabs();
  if(t.url){
    showFrame();
    document.getElementById('proxy-frame').src = proxyUrl(t.url);
  } else {
    showNewTabPage();
  }
}

function escHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

/* ── NAVIGATION ─────────────────────────── */
function normUrl(raw){
  raw = (raw||'').trim();
  if(!raw) return null;
  if(/^https?:\/\//i.test(raw)) return raw;
  if(/^localhost(:\d+)?(\/|$)/.test(raw)) return 'http://'+raw;
  if(/^(\d{1,3}\.){3}\d{1,3}/.test(raw)) return 'http://'+raw;
  if(/^[a-z0-9]([a-z0-9\-]*\.)+[a-z]{2,}(\/|$)/i.test(raw)) return 'https://'+raw;
  return 'https://www.google.com/search?q='+encodeURIComponent(raw);
}

function proxyUrl(url){
  /* ── SWAP THIS for your actual proxy encoding ──
     e.g. return __scramjet$config.prefix + encodeURIComponent(url);
     or   return '/uv/service/' + __uv$config.encodeUrl(url);
     For now we pass raw (works for same-origin / service worker setups) */
  return url;
}

function navigate(raw, pushHist=true){
  const url = normUrl(raw);
  if(!url) return;
  const t = ct();
  if(pushHist){
    t.hist = t.hist.slice(0, t.hidx+1);
    t.hist.push(url);
    t.hidx = t.hist.length-1;
  }
  t.url = url;
  document.getElementById('url-input').value = url;
  updateScheme(url);
  try{ const u = new URL(url); t.title = u.hostname; t.favicon='🌐'; }catch{}
  startLoad();
  showFrame();
  const frame = document.getElementById('proxy-frame');
  frame.onload = () => { stopLoad(); tryUpdateTitle(); };
  frame.onerror = () => stopLoad();
  frame.src = proxyUrl(url);
  renderTabs();
}

function goBack(){
  const t=ct(); if(t.hidx>0){ t.hidx--; navigate(t.hist[t.hidx], false); } }
function goForward(){
  const t=ct(); if(t.hidx<t.hist.length-1){ t.hidx++; navigate(t.hist[t.hidx], false); } }
function reloadPage(){
  const t=ct(); if(t.url){ startLoad(); document.getElementById('proxy-frame').src=proxyUrl(t.url); } }

function tryUpdateTitle(){
  try{
    const doc = document.getElementById('proxy-frame').contentDocument;
    if(doc && doc.title){ ct().title=doc.title; renderTabs(); }
  }catch{}
}

/* ── TAB MGMT ───────────────────────────── */
function addTab(url, title){
  tabs.push(mkTab(url,title)); active=tabs.length-1; refreshUI();
}
function closeTab(i){
  const t = tabs[i];
  if(t.url) recentlyClosed.unshift({url:t.url, title:t.title, time:'just now'});
  if(recentlyClosed.length>5) recentlyClosed.pop();
  updateRecentlyClosed();
  if(tabs.length===1){ tabs=[mkTab()]; active=0; refreshUI(); return; }
  tabs.splice(i,1);
  if(active>=tabs.length) active=tabs.length-1;
  refreshUI();
}
function updateRecentlyClosed(){
  const sec = document.getElementById('nt-recent-section');
  const list = document.getElementById('nt-recent');
  if(!recentlyClosed.length){ sec.style.display='none'; return; }
  sec.style.display='';
  list.innerHTML = recentlyClosed.map((r,i)=>`
    <div class="recent-item" onclick="addTab('${escHtml(r.url)}','${escHtml(r.title)}')">
      <span class="recent-fav">🌐</span>
      <span class="recent-url">${escHtml(r.url)}</span>
      <span class="recent-time">${r.time}</span>
    </div>`).join('');
}

/* ── FRAME / NEWTAB SWITCH ──────────────── */
function showFrame(){
  document.getElementById('proxy-frame').style.display='block';
  document.getElementById('newtab').style.display='none';
}
function showNewTabPage(){
  document.getElementById('proxy-frame').style.display='none';
  document.getElementById('newtab').style.display='flex';
  document.getElementById('nt-search').focus();
}
function showNewTab(){
  ct().url=''; ct().title='New tab'; ct().favicon='✦';
  document.getElementById('url-input').value='';
  updateScheme('');
  renderTabs(); showNewTabPage();
}

/* ── URL BAR ────────────────────────────── */
function focusUrl(){ document.getElementById('url-input').select(); }
function updateScheme(url){
  const s = document.getElementById('url-scheme');
  if(!url){ s.textContent=''; return; }
  try{
    const u=new URL(url);
    s.textContent = u.protocol+'//';
    s.style.color = u.protocol==='https:' ? 'var(--success)' : 'var(--danger)';
  }catch{ s.textContent=''; }
}
function onUrlFocus(){ const el=document.getElementById('url-input'); setTimeout(()=>el.select(),0); }
function onUrlBlur(){ hideOmni(); }
function onUrlInput(val){ buildOmni(val); updateScheme(val); }
function onUrlKey(e){
  const items = document.querySelectorAll('.omni-item');
  if(e.key==='ArrowDown'){ e.preventDefault(); omniIdx=Math.min(omniIdx+1,items.length-1); highlightOmni(); }
  else if(e.key==='ArrowUp'){ e.preventDefault(); omniIdx=Math.max(omniIdx-1,0); highlightOmni(); }
  else if(e.key==='Enter'){
    if(omniIdx>=0 && items[omniIdx]){
      items[omniIdx].click();
    } else {
      navigate(e.target.value);
    }
    hideOmni();
  } else if(e.key==='Escape'){ hideOmni(); e.target.blur(); }
}

/* ── OMNIBOX ────────────────────────────── */
const SUGGESTIONS = [
  {icon:'🔍', text:'google.com', badge:'site'},
  {icon:'▶️', text:'youtube.com', badge:'site'},
  {icon:'👾', text:'reddit.com', badge:'site'},
  {icon:'🐙', text:'github.com', badge:'site'},
  {icon:'🐦', text:'twitter.com', badge:'site'},
  {icon:'💬', text:'discord.com', badge:'site'},
];

function buildOmni(val){
  const drop = document.getElementById('omni-drop');
  if(!val){ hideOmni(); return; }
  omniIdx=-1;
  const matches = SUGGESTIONS.filter(s=>s.text.includes(val.toLowerCase()));
  const isUrl = /^https?:\/\/|\./.test(val);
  let html = '';
  if(isUrl) html += `<div class="omni-item" onclick="navigate('${escHtml(val)}')"><span class="omni-icon">🔗</span><span class="omni-text">${escHtml(val)}</span><span class="omni-badge">navigate</span></div>`;
  else html += `<div class="omni-item" onclick="navigate(${JSON.stringify(val)})"><span class="omni-icon">🔍</span><span class="omni-text">Search "${escHtml(val)}"</span><span class="omni-badge">google</span></div>`;
  matches.forEach(m=>{
    html+=`<div class="omni-item" onclick="navigate('https://${escHtml(m.text)}')"><span class="omni-icon">${m.icon}</span><span class="omni-text">${escHtml(m.text)}</span><span class="omni-badge">${m.badge}</span></div>`;
  });
  drop.innerHTML = html;
  drop.style.display='block';
}
function highlightOmni(){
  document.querySelectorAll('.omni-item').forEach((el,i)=>el.classList.toggle('selected',i===omniIdx));
}
function hideOmni(){ setTimeout(()=>{ document.getElementById('omni-drop').style.display='none'; },150); }

/* ── LOADING ────────────────────────────── */
let loadTimer;
function startLoad(){
  const bar = document.getElementById('progress-bar');
  clearTimeout(loadTimer);
  bar.style.transition='none'; bar.style.width='0'; bar.style.opacity='1';
  requestAnimationFrame(()=>{ bar.style.transition='width 2s cubic-bezier(.4,0,.2,1)'; bar.style.width='75%'; });
}
function stopLoad(){
  const bar = document.getElementById('progress-bar');
  bar.style.width='100%';
  loadTimer=setTimeout(()=>{ bar.style.opacity='0'; setTimeout(()=>{ bar.style.width='0'; },300); },400);
}

/* ── STAR / BOOKMARK ────────────────────── */
function toggleStar(){
  const btn = document.getElementById('btn-star');
  btn.classList.toggle('starred');
  btn.textContent = btn.classList.contains('starred') ? '★' : '☆';
}

/* ── CONTEXT MENU ───────────────────────── */
function showCtxMenu(e){
  const m=document.getElementById('ctx-menu');
  m.style.display='block';
  let x=e.clientX, y=e.clientY;
  if(x+170>window.innerWidth) x=window.innerWidth-175;
  if(y+200>window.innerHeight) y=window.innerHeight-210;
  m.style.left=x+'px'; m.style.top=y+'px';
  e.stopPropagation();
}
document.addEventListener('click',()=>{ document.getElementById('ctx-menu').style.display='none'; });

/* ── KEYBOARD SHORTCUTS ─────────────────── */
document.addEventListener('keydown', e => {
  if((e.ctrlKey||e.metaKey)){
    if(e.key==='t'){ e.preventDefault(); addTab(); }
    if(e.key==='w'){ e.preventDefault(); closeTab(active); }
    if(e.key==='l'){ e.preventDefault(); focusUrl(); }
    if(e.key==='r'){ e.preventDefault(); reloadPage(); }
    if(e.key==='Tab'){ e.preventDefault(); active=(active+1)%tabs.length; refreshUI(); }
  }
});

/* ── INIT ───────────────────────────────── */
renderTabs();
showNewTabPage();
</script>
