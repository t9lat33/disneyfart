<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPLASH T9</title>
    
    <link rel="stylesheet" href="/styles.css" />
    <script src="./index.config.js"></script>
    <script src="./surf/baremux/index.js"></script>
    <script src="./surf/scram/scramjet.all.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=DM+Mono&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --bg: #0d0d0f; --surface: #17171a; --border: #2a2a30; --accent: #00ff41; --text: #e8e8ed; --chrome-h: 84px; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { height: 100vh; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; overflow: hidden; }
        #chrome { position: fixed; top: 0; left: 0; right: 0; height: var(--chrome-h); background: var(--surface); border-bottom: 1px solid var(--border); display: flex; flex-direction: column; z-index: 100; }
        #tabrow { display: flex; align-items: center; height: 38px; padding: 0 8px; gap: 4px; }
        .tab { height: 28px; min-width: 140px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); display: flex; align-items: center; padding: 0 10px; border-radius: 6px; font-size: 12px; cursor: pointer; }
        .tab.active { background: var(--bg); border-color: var(--accent); }
        #toolbar { display: flex; align-items: center; height: 46px; padding: 0 10px; gap: 8px; }
        #urlbar { flex: 1; height: 32px; background: #000; border: 1px solid var(--border); border-radius: 8px; color: var(--accent); padding: 0 12px; font-family: 'DM Mono'; outline: none; }
        #content { position: fixed; top: var(--chrome-h); left: 0; right: 0; bottom: 0; background: #fff; }
        .viewframe { width: 100%; height: 100%; border: none; display: none; }
        .viewframe.active { display: block; }
    </style>
</head>
<body>

<div id="chrome">
    <div id="tabrow"><button onclick="newTab()" style="background:none; border:none; color:white; cursor:pointer;">+</button></div>
    <div id="toolbar">
        <div style="font-family:'DM Mono'; color:var(--accent)">SPLASH</div>
        <input type="text" id="urlbar" placeholder="Enter URL or Search">
    </div>
</div>
<div id="content"></div>

<script>
    let tabs = [];
    let activeId = null;
    let counter = 0;

    // 1. DYNAMIC CONFIG LOCATOR
    function getProxyConfig() {
        // We look for every possible name Scramjet uses
        return window.__scramjet$config || 
               window.__sj$config || 
               window.scramjetConfig ||
               (window.SPLASH_CONFIG && window.SPLASH_CONFIG.scramjet);
    }

    async function init() {
        const config = getProxyConfig();
        
        if (!config) {
            console.error("COULD NOT FIND CONFIG. Manually setting defaults.");
            // Fallback: If your index.config.js is broken, we try to guess the paths
            window.__scramjet$config = {
                prefix: '/search/',
                encodeUrl: (url) => btoa(url).replace(/\//g, '_').replace(/\+/g, '-').replace(/=/g, '')
            };
        }

        const activeConfig = getProxyConfig();

        // Register Service Worker
        if ("serviceWorker" in navigator) {
            await navigator.serviceWorker.register("./sw.js", { scope: activeConfig.prefix });
        }

        // Connect Baremux
        try {
            const conn = new BareMux.BareMuxConnection("/baremux/worker.js");
            const wisp = window.SPLASH_CONFIG?.wisp?.default || "wss://wisp.rhw.one/wisp/";
            await conn.setTransport("/libcurl/index.mjs", [{ websocket: wisp }]);
        } catch(e) { console.error("BareMux Fail:", e); }

        newTab();
    }

    function newTab() {
        const id = counter++;
        const tab = { id, url: "" };
        tabs.push(tab);

        const t = document.createElement("div");
        t.className = "tab"; t.id = `t-${id}`;
        t.innerHTML = `Tab ${id+1}`;
        t.onclick = () => switchTab(id);
        document.getElementById("tabrow").insertBefore(t, document.querySelector("#tabrow button"));

        const f = document.createElement("iframe");
        f.className = "viewframe"; f.id = `f-${id}`;
        document.getElementById("content").appendChild(f);

        switchTab(id);
    }

    function switchTab(id) {
        activeId = id;
        document.querySelectorAll(".tab, .viewframe").forEach(el => el.classList.remove("active"));
        document.getElementById(`t-${id}`).classList.add("active");
        document.getElementById(`f-${id}`).classList.add("active");
        document.getElementById("urlbar").value = tabs.find(t => t.id === id).url;
    }

    async function navigate(val) {
        let url = val.trim();
        if (!url.startsWith("http")) {
            url = url.includes(".") ? "https://" + url : "https://www.google.com/search?q=" + encodeURIComponent(url);
        }

        const config = getProxyConfig();
        const encoded = config.prefix + config.encodeUrl(url);
        
        tabs.find(t => t.id === activeId).url = url;
        document.getElementById(`f-${activeId}`).src = encoded;
    }

    document.getElementById("urlbar").onkeydown = (e) => { if(e.key === "Enter") navigate(e.target.value); };

    init();
</script>
</body>
</html>
