<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SPLASH | Poki</title>

    <script src="./index.config.js"></script>
    <script src="./surf/baremux/index.js"></script>
    <script src="./surf/scram/scramjet.all.js"></script>

    <style>
      :root {
        --bg: #000;
        --accent: #4c3ed8; /* Poki-inspired purple */
      }

      body, html {
        margin: 0;
        padding: 0;
        height: 100%;
        background: var(--bg);
        overflow: hidden;
        font-family: system-ui, -apple-system, sans-serif;
      }

      #app-container {
        display: flex;
        flex-direction: column;
        height: 100vh;
      }

      /* Minimal Header */
      header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 5px 15px;
        background: #111;
        border-bottom: 1px solid #222;
        height: 40px;
      }

      .logo {
        color: #fff;
        font-weight: bold;
        font-size: 0.9rem;
        letter-spacing: 1px;
      }

      .controls button {
        background: var(--accent);
        border: none;
        color: white;
        padding: 4px 12px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 0.8rem;
      }

      /* Viewport */
      #view {
        flex-grow: 1;
        position: relative;
      }

      iframe {
        width: 100%;
        height: 100%;
        border: none;
      }

      #status {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: var(--bg);
        color: #fff;
        z-index: 10;
      }

      .loader {
        width: 30px;
        height: 30px;
        border: 3px solid #333;
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-bottom: 15px;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="app-container">
      <header>
        <div class="logo">SPLASH // POKI</div>
        <div class="controls">
          <button onclick="location.reload()">Reload Proxy</button>
        </div>
      </header>

      <main id="view">
        <div id="status">
          <div class="loader"></div>
          <p>Initializing Tunnel...</p>
        </div>
        <iframe id="proxy-frame"></iframe>
      </main>
    </div>

    <script>
      document.addEventListener('DOMContentLoaded', async () => {
        const frame = document.getElementById('proxy-frame');
        const status = document.getElementById('status');
        const targetUrl = 'https://poki.com';

        // 1. Register Service Worker for the proxy
        if ('serviceWorker' in navigator) {
          try {
            await navigator.serviceWorker.register('./sw.js', {
              scope: __scramjet$config.prefix
            });
            
            // 2. Encode and Load Poki
            const encoded = __scramjet$config.encodeUrl(targetUrl);
            frame.src = __scramjet$config.prefix + encoded;

          } catch (err) {
            status.innerHTML = `<p style="color:red">Proxy Error: Check console</p>`;
            console.error(err);
          }
        }

        frame.onload = () => {
          // Add a slight delay to ensure content is ready
          setTimeout(() => {
            status.style.display = 'none';
          }, 500);
        };
      });
    </script>
  </body>
</html>
