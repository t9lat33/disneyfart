<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>T9 Chat + Voice</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#313338;--sidebar:#2b2d31;--text:#dbdee1;--muted:#949ba4;--accent:#5865f2;--green:#23a55a;--red:#f23f43;--hover:#35373c}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',sans-serif;display:flex;height:100vh;overflow:hidden}
#sidebar{width:240px;background:var(--sidebar);display:flex;flex-direction:column;flex-shrink:0;border-right:1px solid #1e1f22}
#sidebar h2{padding:16px;font-size:15px;color:#fff;border-bottom:1px solid #1e1f22;flex-shrink:0}
#room-list{flex:1;overflow-y:auto;padding:8px}
.room-btn{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:6px;cursor:pointer;color:var(--muted);margin:2px 0;transition:all 0.15s;border:none;background:none;width:100%;text-align:left;font-size:14px;font-family:inherit}
.room-btn:hover{background:var(--hover);color:var(--text)}
.room-btn.active{background:#404249;color:#fff}
.room-users{padding-left:32px;font-size:12px;color:var(--muted)}
.room-user{padding:2px 8px}
.room-user.speaking{color:var(--green)}
#voice-controls{padding:12px;border-top:1px solid #1e1f22;display:flex;gap:8px;align-items:center}
.vc-btn{width:40px;height:40px;border-radius:50%;border:none;background:var(--hover);color:var(--text);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center}
.vc-btn.muted{background:var(--red);color:#fff}
.vc-btn.leave{background:var(--red);color:#fff}
#main{flex:1;display:flex;flex-direction:column;min-width:0}
#messages{flex:1;overflow-y:auto;padding:16px}
.msg{padding:4px 0;display:flex;gap:12px}
.msg:hover{background:rgba(255,255,255,0.02)}
.msg-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#fff;flex-shrink:0}
.msg-body{flex:1}
.msg-header{display:flex;gap:8px;align-items:baseline;margin-bottom:2px}
.msg-name{font-weight:600;font-size:15px}
.msg-time{font-size:11px;color:var(--muted)}
.msg-text{font-size:15px;line-height:1.4;word-break:break-word}
.system-msg{text-align:center;color:var(--muted);font-size:13px;padding:4px 0}
#input-area{padding:0 16px 24px}
.input-box{display:flex;background:#383a40;border:1px solid #3f4147;border-radius:8px;padding:0 12px}
.input-box:focus-within{border-color:var(--accent)}
#msg-input{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-size:15px;padding:14px 0;font-family:inherit;resize:none}
#voice-overlay{display:none;position:fixed;bottom:0;left:240px;right:0;background:#1e1f22;border-top:1px solid #3f4147;padding:8px 16px;z-index:100}
#voice-overlay.active{display:flex;align-items:center;gap:12px}
#voice-participants{display:flex;gap:12px;flex:1;overflow-x:auto}
.vp{display:flex;flex-direction:column;align-items:center;gap:4px;min-width:50px}
.vp-avatar{width:36px;height:36px;border-radius:50%;background:var(--hover);border:2px solid transparent;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#fff}
.vp-avatar.speaking{border-color:var(--green)}
.vp-name{font-size:11px;color:var(--muted);max-width:60px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#online-count{padding:12px 16px;font-size:13px;color:var(--muted);border-bottom:1px solid #1e1f22;flex-shrink:0}
</style>
</head>
<body>
<div id="sidebar">
  <h2>🔊 T9 Voice Chat</h2>
  <div id="online-count">Online — 0</div>
  <div id="room-list"></div>
  <div id="voice-controls">
    <span style="font-size:13px;color:var(--muted);flex:1" id="vc-status">Not connected</span>
    <button class="vc-btn muted" id="mic-btn" onclick="toggleMic()" title="Mute">🎙</button>
    <button class="vc-btn leave" onclick="leaveVoice()" title="Leave">📞</button>
  </div>
</div>
<div id="main">
  <div id="messages"></div>
  <div id="input-area">
    <div class="input-box">
      <textarea id="msg-input" rows="1" placeholder="Type a message..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendText()}"></textarea>
    </div>
  </div>
</div>
<div id="voice-overlay">
  <div id="voice-participants"></div>
  <button class="vc-btn muted" onclick="toggleMic()">🎙</button>
  <button class="vc-btn leave" onclick="leaveVoice()">📞</button>
</div>

<script>
const WS_URL = `wss://${location.host}/ws`;
let ws, myId, myColor, myUsername, muted = false;
let currentVoiceRoom = null;
let localStream = null;
const peers = {};
const audioEls = {};
const voiceRoomUsers = {};
const ROOMS = ['general', 'chill', 'gaming', 'dev'];
const ICE = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

// ── Connect ──
function connect() {
  ws = new WebSocket(WS_URL);
  ws.onmessage = e => {
    const data = JSON.parse(e.data);
    
    if (data.type === 'init') {
      myId = data.userId;
      myColor = data.color;
      myUsername = `User${myId}`;
      data.history.forEach(addMessage);
      updateOnline(data.users, data.onlineCount);
    }
    else if (data.type === 'message') addMessage(data);
    else if (data.type === 'user_join') { addSystem(`${data.username} joined`); updateOnline(data.users, data.onlineCount); }
    else if (data.type === 'user_leave') { addSystem(`${data.username} left`); updateOnline(data.users, data.onlineCount); }
    else if (data.type === 'rename') { addSystem(`${data.oldName} → ${data.newName}`); updateOnline(data.users, data.onlineCount); }
    
    // Voice
    else if (data.type === 'voice_users') {
      data.users.forEach(u => { if (u.id !== 'v_' + myId) voiceRoomUsers[u.id] = u; });
      renderRooms(); renderVoiceOverlay();
      data.users.forEach(u => { if (u.id !== 'v_' + myId) callPeer(u.id); });
    }
    else if (data.type === 'voice_user_joined') {
      voiceRoomUsers[data.id] = { id: data.id, name: data.name };
      renderRooms(); renderVoiceOverlay();
      callPeer(data.id);
    }
    else if (data.type === 'voice_user_left') {
      delete voiceRoomUsers[data.id];
      if (peers[data.id]) { peers[data.id].close(); delete peers[data.id]; }
      if (audioEls[data.id]) { audioEls[data.id].remove(); delete audioEls[data.id]; }
      renderRooms(); renderVoiceOverlay();
    }
    else if (data.type === 'voice_offer') handleOffer(data.from, data.sdp);
    else if (data.type === 'voice_answer') { if (peers[data.from]) peers[data.from].setRemoteDescription(new RTCSessionDescription(data.sdp)).catch(()=>{}); }
    else if (data.type === 'voice_ice') { if (peers[data.from] && data.candidate) peers[data.from].addIceCandidate(new RTCIceCandidate(data.candidate)).catch(()=>{}); }
    else if (data.type === 'voice_speaking') {
      const av = document.querySelector(`[data-vid="${data.id}"] .vp-avatar`);
      if (av) av.classList.toggle('speaking', data.active);
    }
  };
  ws.onclose = () => setTimeout(connect, 2000);
}

function send(d) { if (ws?.readyState === 1) ws.send(JSON.stringify(d)); }

// ── Text Chat ──
function sendText() {
  const inp = document.getElementById('msg-input');
  const content = inp.value.trim();
  if (!content) return;
  inp.value = '';
  send({ type: 'message', content });
}

function addMessage(m) {
  const div = document.createElement('div');
  div.className = 'msg';
  const time = new Date(m.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  div.innerHTML = `<div class="msg-avatar" style="background:${m.color}">${(m.username||'?')[0].toUpperCase()}</div>
    <div class="msg-body"><div class="msg-header"><span class="msg-name" style="color:${m.color}">${esc(m.username)}</span><span class="msg-time">${time}</span></div>
    <div class="msg-text">${esc(m.content)}</div></div>`;
  document.getElementById('messages').appendChild(div);
  document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
}

function addSystem(text) {
  const div = document.createElement('div');
  div.className = 'system-msg';
  div.textContent = text;
  document.getElementById('messages').appendChild(div);
}

function updateOnline(users, count) {
  document.getElementById('online-count').textContent = `Online — ${count}`;
}

function esc(s) { const d = document.createElement('div'); d.textContent = s||''; return d.innerHTML; }

// ── Voice ──
async function joinVoice(room) {
  if (currentVoiceRoom === room) return;
  if (currentVoiceRoom) leaveVoice();
  currentVoiceRoom = room;
  
  try {
    localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    startSpeakingDetection(localStream);
  } catch(e) { alert('Mic needed'); currentVoiceRoom = null; return; }
  
  send({ type: 'voice_join', room });
  document.getElementById('vc-status').textContent = '#' + room;
  document.getElementById('voice-overlay').classList.add('active');
  renderRooms();
}

function leaveVoice() {
  if (!currentVoiceRoom) return;
  send({ type: 'voice_leave' });
  Object.keys(peers).forEach(id => { peers[id].close(); delete peers[id]; });
  Object.keys(audioEls).forEach(id => { audioEls[id].remove(); delete audioEls[id]; });
  Object.keys(voiceRoomUsers).forEach(id => delete voiceRoomUsers[id]);
  if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
  currentVoiceRoom = null;
  document.getElementById('vc-status').textContent = 'Not connected';
  document.getElementById('voice-overlay').classList.remove('active');
  renderRooms();
}

function toggleMic() {
  muted = !muted;
  if (localStream) localStream.getAudioTracks().forEach(t => t.enabled = !muted);
  document.getElementById('mic-btn').textContent = muted ? '🔇' : '🎙';
  document.getElementById('mic-btn').className = 'vc-btn' + (muted ? ' muted' : '');
}

// ── WebRTC ──
function makePc(id) {
  const pc = new RTCPeerConnection(ICE);
  if (localStream) localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
  pc.ontrack = e => {
    let a = audioEls[id];
    if (!a) { a = new Audio(); a.autoplay = true; audioEls[id] = a; }
    if (e.streams[0]) a.srcObject = e.streams[0];
  };
  pc.onicecandidate = e => { if (e.candidate) send({ type: 'voice_ice', candidate: e.candidate, to: id }); };
  peers[id] = pc;
  return pc;
}

async function callPeer(id) {
  if (peers[id]) return;
  const pc = makePc(id);
  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
  send({ type: 'voice_offer', sdp: pc.localDescription, to: id });
}

async function handleOffer(id, sdp) {
  if (peers[id]) { peers[id].close(); delete peers[id]; }
  const pc = makePc(id);
  await pc.setRemoteDescription(new RTCSessionDescription(sdp));
  const answer = await pc.createAnswer();
  await pc.setLocalDescription(answer);
  send({ type: 'voice_answer', sdp: pc.localDescription, to: id });
}

function startSpeakingDetection(stream) {
  try {
    const ctx = new AudioContext();
    const analyser = ctx.createAnalyser();
    analyser.fftSize = 512;
    ctx.createMediaStreamSource(stream).connect(analyser);
    const buf = new Uint8Array(analyser.frequencyBinCount);
    let wasSpeaking = false;
    function check() {
      analyser.getByteFrequencyData(buf);
      const speaking = (buf.reduce((a,b)=>a+b,0)/buf.length) > 15;
      if (speaking !== wasSpeaking) {
        wasSpeaking = speaking;
        send({ type: 'voice_speaking', active: speaking });
      }
      requestAnimationFrame(check);
    }
    check();
  } catch(e) {}
}

// ── UI ──
function renderRooms() {
  const el = document.getElementById('room-list');
  el.innerHTML = '';
  ROOMS.forEach(room => {
    const usersInRoom = Object.values(voiceRoomUsers).length;
    const btn = document.createElement('button');
    btn.className = 'room-btn' + (room === currentVoiceRoom ? ' active' : '');
    btn.innerHTML = `🔊 ${room}${usersInRoom ? ` (${usersInRoom})` : ''}`;
    btn.onclick = () => joinVoice(room);
    el.appendChild(btn);
  });
}

function renderVoiceOverlay() {
  const el = document.getElementById('voice-participants');
  el.innerHTML = '';
  // Self
  const me = document.createElement('div');
  me.className = 'vp';
  me.setAttribute('data-vid', 'v_' + myId);
  me.innerHTML = `<div class="vp-avatar" style="background:${myColor}">${myUsername[0].toUpperCase()}</div><div class="vp-name">You</div>`;
  el.appendChild(me);
  // Others
  Object.values(voiceRoomUsers).forEach(u => {
    const div = document.createElement('div');
    div.className = 'vp';
    div.setAttribute('data-vid', u.id);
    div.innerHTML = `<div class="vp-avatar">${u.name[0].toUpperCase()}</div><div class="vp-name">${u.name}</div>`;
    el.appendChild(div);
  });
}

// ── Start ──
connect();
renderRooms();
</script>
</body>
</html>
