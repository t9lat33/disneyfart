<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>T9 Global Chat</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --bg-primary:#1e1f22;
    --bg-secondary:#2b2d31;
    --bg-tertiary:#313338;
    --bg-modifier:#404249;
    --text-primary:#dbdee1;
    --text-secondary:#949ba4;
    --text-muted:#80848e;
    --accent:#5865f2;
    --accent-hover:#4752c4;
    --green:#23a559;
    --red:#f23f42;
    --border:#1e1f22;
    --sidebar-w:240px;
    --member-w:240px;
  }
  html,body{height:100%;overflow:hidden;font-family:'gg sans','Noto Sans',Whitney,'Helvetica Neue',Helvetica,Arial,sans-serif;background:var(--bg-primary);color:var(--text-primary)}
  a{color:var(--accent);text-decoration:none}

  /* LAYOUT */
  #app{display:flex;height:100vh}

  /* SIDEBAR */
  #sidebar{
    width:var(--sidebar-w);
    background:var(--bg-secondary);
    display:flex;flex-direction:column;
    flex-shrink:0;
    border-right:1px solid var(--border);
  }
  #server-header{
    padding:0 16px;
    height:48px;
    display:flex;align-items:center;
    font-weight:600;font-size:15px;
    border-bottom:1px solid rgba(0,0,0,.2);
    cursor:pointer;
    user-select:none;
    flex-shrink:0;
  }
  #server-header:hover{background:var(--bg-modifier)}
  #channels-section{flex:1;overflow-y:auto;padding:8px 0}
  .channel-category{
    padding:16px 8px 4px;
    font-size:11px;font-weight:700;
    color:var(--text-secondary);
    text-transform:uppercase;
    letter-spacing:.02em;
  }
  .channel-item{
    display:flex;align-items:center;gap:6px;
    padding:8px 8px 8px 16px;
    border-radius:4px;margin:1px 8px;
    cursor:pointer;color:var(--text-muted);
    font-size:15px;
    transition:background .1s,color .1s;
  }
  .channel-item:hover{background:var(--bg-modifier);color:var(--text-primary)}
  .channel-item.active{background:var(--bg-modifier);color:var(--text-primary)}
  .channel-item .ch-icon{font-size:18px;flex-shrink:0}
  #user-panel{
    background:var(--bg-primary);
    padding:8px;
    display:flex;align-items:center;gap:8px;
    flex-shrink:0;
  }
  #my-avatar{
    width:32px;height:32px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-weight:700;font-size:13px;flex-shrink:0;
    background:var(--accent);color:#fff;cursor:pointer;
  }
  #my-info{flex:1;min-width:0}
  #my-username{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer}
  #my-username:hover{text-decoration:underline}
  #my-tag{font-size:11px;color:var(--text-muted)}
  #user-actions{display:flex;gap:4px}
  .icon-btn{
    width:32px;height:32px;border-radius:4px;
    background:none;border:none;color:var(--text-muted);
    cursor:pointer;display:flex;align-items:center;justify-content:center;
    font-size:18px;transition:background .1s,color .1s;
  }
  .icon-btn:hover{background:var(--bg-modifier);color:var(--text-primary)}

  /* MAIN CHAT */
  #main{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--bg-tertiary)}
  #chat-header{
    height:48px;padding:0 16px;
    display:flex;align-items:center;gap:8px;
    border-bottom:1px solid rgba(0,0,0,.2);
    flex-shrink:0;
    box-shadow:0 1px 0 rgba(0,0,0,.2);
  }
  #chat-header .ch-icon{font-size:20px;color:var(--text-muted)}
  #chat-header .ch-name{font-weight:600;font-size:15px}
  .header-divider{width:1px;height:24px;background:var(--bg-modifier);margin:0 8px}
  #chat-header .ch-desc{font-size:13px;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

  #messages{
    flex:1;overflow-y:auto;
    padding:16px 0 8px;
    display:flex;flex-direction:column;
    gap:0;
  }
  #messages::-webkit-scrollbar{width:6px}
  #messages::-webkit-scrollbar-track{background:transparent}
  #messages::-webkit-scrollbar-thumb{background:var(--bg-primary);border-radius:3px}

  /* Welcome banner */
  #welcome{padding:16px 16px 0;margin-bottom:16px}
  #welcome .welcome-icon{
    width:68px;height:68px;border-radius:50%;
    background:var(--accent);
    display:flex;align-items:center;justify-content:center;
    font-size:32px;margin-bottom:12px;
  }
  #welcome h2{font-size:28px;font-weight:700;margin-bottom:4px}
  #welcome p{color:var(--text-secondary);font-size:15px}
  .welcome-divider{height:1px;background:rgba(255,255,255,.06);margin:16px 16px 8px}

  /* Messages */
  .msg-group{
    padding:2px 16px;
    display:flex;gap:16px;
    position:relative;
  }
  .msg-group:hover{background:rgba(0,0,0,.06)}
  .msg-group.first-in-group{margin-top:16px;padding-top:2px}
  .msg-avatar{
    width:40px;height:40px;border-radius:50%;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    font-weight:700;font-size:15px;cursor:pointer;
    margin-top:2px;
  }
  .msg-avatar.hidden{visibility:hidden}
  .msg-body{flex:1;min-width:0}
  .msg-header{display:flex;align-items:baseline;gap:8px;margin-bottom:2px}
  .msg-username{font-weight:600;font-size:15px;cursor:pointer}
  .msg-username:hover{text-decoration:underline}
  .msg-time{font-size:11px;color:var(--text-muted)}
  .msg-content{font-size:15px;line-height:1.375;word-break:break-word;color:var(--text-primary)}
  .msg-content a{color:#00a8fc}

  /* System messages */
  .sys-msg{
    display:flex;align-items:center;gap:8px;
    padding:4px 16px;font-size:13px;
    color:var(--text-muted);
  }
  .sys-msg svg{flex-shrink:0}

  /* Typing indicator */
  #typing-bar{
    height:24px;padding:0 16px;
    font-size:13px;color:var(--text-muted);
    display:flex;align-items:center;gap:4px;
    flex-shrink:0;
  }
  .typing-dots{display:flex;gap:3px;align-items:center}
  .typing-dot{
    width:4px;height:4px;border-radius:50%;
    background:var(--text-muted);
    animation:bounce .9s ease infinite;
  }
  .typing-dot:nth-child(2){animation-delay:.15s}
  .typing-dot:nth-child(3){animation-delay:.3s}
  @keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-4px)}}

  /* Input area */
  #input-area{
    padding:0 16px 24px;
    flex-shrink:0;
  }
  #input-box{
    background:var(--bg-modifier);
    border-radius:8px;
    display:flex;align-items:flex-end;gap:4px;
    padding:0 16px;
  }
  #msg-input{
    flex:1;background:none;border:none;outline:none;
    color:var(--text-primary);font-size:15px;
    padding:11px 0;resize:none;
    font-family:inherit;line-height:1.375;
    max-height:200px;
    overflow-y:auto;
  }
  #msg-input::placeholder{color:var(--text-muted)}
  #send-btn{
    background:none;border:none;color:var(--text-muted);
    cursor:pointer;padding:8px 0;
    font-size:20px;transition:color .1s;
    flex-shrink:0;
  }
  #send-btn:hover{color:var(--text-primary)}
  #send-btn.active{color:var(--accent)}

  /* MEMBER LIST */
  #member-list{
    width:var(--member-w);
    background:var(--bg-secondary);
    flex-shrink:0;
    overflow-y:auto;
    padding:16px 8px;
  }
  #member-list::-webkit-scrollbar{width:4px}
  #member-list::-webkit-scrollbar-thumb{background:var(--bg-primary);border-radius:2px}
  .member-category{
    font-size:11px;font-weight:700;
    color:var(--text-muted);
    text-transform:uppercase;letter-spacing:.02em;
    padding:16px 8px 4px;
  }
  .member-item{
    display:flex;align-items:center;gap:12px;
    padding:6px 8px;border-radius:4px;
    cursor:pointer;
    transition:background .1s;
  }
  .member-item:hover{background:var(--bg-modifier)}
  .member-avatar{
    width:32px;height:32px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-weight:700;font-size:12px;
    position:relative;flex-shrink:0;
  }
  .member-avatar::after{
    content:'';position:absolute;
    bottom:-1px;right:-1px;
    width:10px;height:10px;border-radius:50%;
    background:var(--green);
    border:2px solid var(--bg-secondary);
  }
  .member-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

  /* MODALS */
  .modal-overlay{
    position:fixed;inset:0;
    background:rgba(0,0,0,.7);
    display:flex;align-items:center;justify-content:center;
    z-index:100;
  }
  .modal{
    background:var(--bg-secondary);
    border-radius:8px;padding:24px;
    width:440px;max-width:calc(100vw - 32px);
  }
  .modal h2{font-size:20px;font-weight:700;margin-bottom:4px}
  .modal p{font-size:14px;color:var(--text-secondary);margin-bottom:20px}
  .modal input{
    width:100%;background:var(--bg-primary);
    border:1px solid rgba(0,0,0,.3);border-radius:4px;
    color:var(--text-primary);font-size:15px;
    padding:10px 12px;outline:none;
    font-family:inherit;margin-bottom:16px;
  }
  .modal input:focus{border-color:var(--accent)}
  .modal-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.02em;color:var(--text-secondary);margin-bottom:6px;display:block}
  .modal-btns{display:flex;justify-content:flex-end;gap:8px}
  .btn{
    padding:9px 20px;border-radius:4px;border:none;
    font-size:14px;font-weight:500;cursor:pointer;
    font-family:inherit;transition:background .1s;
  }
  .btn-ghost{background:none;color:var(--text-primary)}
  .btn-ghost:hover{text-decoration:underline}
  .btn-primary{background:var(--accent);color:#fff}
  .btn-primary:hover{background:var(--accent-hover)}

  /* Online pill */
  #online-pill{
    margin-left:auto;
    display:flex;align-items:center;gap:6px;
    font-size:13px;color:var(--text-muted);
  }
  .online-dot{width:8px;height:8px;border-radius:50%;background:var(--green)}

  /* Connection status */
  #conn-status{
    position:fixed;bottom:16px;left:50%;transform:translateX(-50%);
    background:var(--bg-secondary);color:var(--text-primary);
    padding:10px 20px;border-radius:8px;font-size:14px;
    box-shadow:0 4px 16px rgba(0,0,0,.4);
    z-index:50;transition:opacity .3s;
    display:none;
  }

  /* Mobile */
  @media(max-width:768px){
    #member-list{display:none}
    #sidebar{width:200px}
  }
  @media(max-width:500px){
    #sidebar{display:none}
    #chat-header .ch-desc{display:none}
  }
</style>
</head>
<body>

<div id="conn-status">🔄 Reconnecting...</div>

<div id="app">
  <!-- SIDEBAR -->
  <div id="sidebar">
    <div id="server-header">
      <span>T9 Global</span>
      <svg style="margin-left:auto" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M7 10l5 5 5-5z"/></svg>
    </div>
    <div id="channels-section">
      <div class="channel-category">Text Channels</div>
      <div class="channel-item active" id="ch-general">
        <span class="ch-icon">#</span>
        <span>general</span>
      </div>
    </div>
    <div id="user-panel">
      <div id="my-avatar">?</div>
      <div id="my-info">
        <div id="my-username">Connecting...</div>
        <div id="my-tag">Click to rename</div>
      </div>
      <div id="user-actions">
        <button class="icon-btn" id="rename-btn" title="Change username">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>
      </div>
    </div>
  </div>

  <!-- MAIN -->
  <div id="main">
    <div id="chat-header">
      <span class="ch-icon">#</span>
      <span class="ch-name">general</span>
      <div class="header-divider"></div>
      <span class="ch-desc">Global chat — say anything</span>
      <div id="online-pill">
        <div class="online-dot"></div>
        <span id="online-count">0 online</span>
      </div>
    </div>

    <div id="messages">
      <div id="welcome">
        <div class="welcome-icon">🌐</div>
        <h2>Welcome to #general</h2>
        <p>This is the beginning of the T9 Global chat. Say hi!</p>
      </div>
      <div class="welcome-divider"></div>
    </div>

    <div id="typing-bar"></div>

    <div id="input-area">
      <div id="input-box">
        <textarea id="msg-input" placeholder="Message #general" rows="1"></textarea>
        <button id="send-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
    </div>
  </div>

  <!-- MEMBER LIST -->
  <div id="member-list">
    <div class="member-category">Online — <span id="member-count">0</span></div>
    <div id="members"></div>
  </div>
</div>

<!-- RENAME MODAL -->
<div class="modal-overlay" id="rename-modal" style="display:none">
  <div class="modal">
    <h2>Change your username</h2>
    <p>How should others see you in chat?</p>
    <label class="modal-label">Username</label>
    <input type="text" id="rename-input" maxlength="32" autocomplete="off" spellcheck="false">
    <div class="modal-btns">
      <button class="btn btn-ghost" id="rename-cancel">Cancel</button>
      <button class="btn btn-primary" id="rename-confirm">Save</button>
    </div>
  </div>
</div>

<script>
// ── CONFIG ──────────────────────────────────────────────────────────────
// Auto-detect: if served from the same host, use ws(s):// with same host
const WS_URL = (() => {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  return `${proto}://${location.host}`;
})();

// ── STATE ────────────────────────────────────────────────────────────────
let ws = null;
let myId = null;
let myUsername = 'User';
let myColor = '#5865f2';
let typingTimeout = null;
let isTyping = false;
let reconnectTimer = null;
let reconnectDelay = 1000;
const typingUsers = new Map();

// ── ELEMENTS ─────────────────────────────────────────────────────────────
const messagesEl = document.getElementById('messages');
const msgInput = document.getElementById('msg-input');
const sendBtn = document.getElementById('send-btn');
const typingBar = document.getElementById('typing-bar');
const onlineCountEl = document.getElementById('online-count');
const memberCountEl = document.getElementById('member-count');
const membersEl = document.getElementById('members');
const myAvatarEl = document.getElementById('my-avatar');
const myUsernameEl = document.getElementById('my-username');
const renameModal = document.getElementById('rename-modal');
const renameInput = document.getElementById('rename-input');
const connStatus = document.getElementById('conn-status');

// ── UTILS ────────────────────────────────────────────────────────────────
function initials(name) {
  const parts = name.trim().split(/\s+/);
  if (parts.length >= 2) return (parts[0][0] + parts[1][0]).toUpperCase();
  return name.slice(0,2).toUpperCase();
}

function formatTime(ts) {
  const d = new Date(ts);
  return d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
}

function formatDate(ts) {
  const d = new Date(ts);
  const today = new Date();
  const yesterday = new Date(today);
  yesterday.setDate(today.getDate()-1);
  if (d.toDateString() === today.toDateString()) return 'Today at ' + formatTime(ts);
  if (d.toDateString() === yesterday.toDateString()) return 'Yesterday at ' + formatTime(ts);
  return d.toLocaleDateString([], {month:'short',day:'numeric'}) + ' at ' + formatTime(ts);
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// linkify URLs in message text
function linkify(text) {
  const escaped = escapeHtml(text);
  return escaped.replace(/(https?:\/\/[^\s<>]+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>');
}

// ── RENDER MESSAGES ───────────────────────────────────────────────────────
let lastAuthorId = null;
let lastTimestamp = 0;

function appendMessage(msg) {
  const isNewGroup = msg.userId !== lastAuthorId || (msg.timestamp - lastTimestamp) > 300000;
  lastAuthorId = msg.userId;
  lastTimestamp = msg.timestamp;

  const group = document.createElement('div');
  group.className = 'msg-group' + (isNewGroup ? ' first-in-group' : '');
  group.dataset.msgId = msg.id;

  const av = document.createElement('div');
  av.className = 'msg-avatar' + (isNewGroup ? '' : ' hidden');
  av.style.background = msg.color;
  av.style.color = '#fff';
  av.textContent = initials(msg.username);

  const body = document.createElement('div');
  body.className = 'msg-body';

  if (isNewGroup) {
    const header = document.createElement('div');
    header.className = 'msg-header';
    const uname = document.createElement('span');
    uname.className = 'msg-username';
    uname.style.color = msg.color;
    uname.textContent = msg.username;
    const time = document.createElement('span');
    time.className = 'msg-time';
    time.textContent = formatDate(msg.timestamp);
    time.title = new Date(msg.timestamp).toLocaleString();
    header.appendChild(uname);
    header.appendChild(time);
    body.appendChild(header);
  }

  const content = document.createElement('div');
  content.className = 'msg-content';
  content.innerHTML = linkify(msg.content);
  body.appendChild(content);

  group.appendChild(av);
  group.appendChild(body);
  messagesEl.appendChild(group);

  const atBottom = messagesEl.scrollHeight - messagesEl.scrollTop - messagesEl.clientHeight < 120;
  if (atBottom) messagesEl.scrollTop = messagesEl.scrollHeight;
}

function appendSysMsg(text, icon) {
  lastAuthorId = null;
  const el = document.createElement('div');
  el.className = 'sys-msg';
  el.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="${icon === 'join' ? '#23a559' : '#f23f42'}"><path d="${icon === 'join' ? 'M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z' : 'M15 12H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z'}"/></svg>${escapeHtml(text)}`;
  messagesEl.appendChild(el);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

// ── MEMBER LIST ──────────────────────────────────────────────────────────
function renderMembers(users) {
  memberCountEl.textContent = users.length;
  membersEl.innerHTML = '';
  users.forEach(u => {
    const item = document.createElement('div');
    item.className = 'member-item';
    item.innerHTML = `
      <div class="member-avatar" style="background:${u.color};color:#fff">${initials(u.username)}</div>
      <span class="member-name" style="color:${u.id === myId ? u.color : ''}">${escapeHtml(u.username)}${u.id === myId ? ' (you)' : ''}</span>`;
    membersEl.appendChild(item);
  });
}

// ── TYPING ────────────────────────────────────────────────────────────────
function renderTyping() {
  const others = [...typingUsers.values()].filter(u => u.id !== myId);
  if (!others.length) { typingBar.innerHTML = ''; return; }
  const names = others.map(u => `<strong style="color:${u.color}">${escapeHtml(u.username)}</strong>`);
  let text = '';
  if (others.length === 1) text = `${names[0]} is typing`;
  else if (others.length === 2) text = `${names[0]} and ${names[1]} are typing`;
  else text = `${names[0]} and ${others.length-1} others are typing`;
  typingBar.innerHTML = `<div class="typing-dots"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>&nbsp;${text}`;
}

// ── WEBSOCKET ─────────────────────────────────────────────────────────────
function connect() {
  ws = new WebSocket(WS_URL);

  ws.onopen = () => {
    reconnectDelay = 1000;
    connStatus.style.display = 'none';
    if (reconnectTimer) clearTimeout(reconnectTimer);
  };

  ws.onmessage = e => {
    let data;
    try { data = JSON.parse(e.data); } catch { return; }
    handle(data);
  };

  ws.onclose = () => {
    connStatus.textContent = `🔄 Reconnecting in ${reconnectDelay/1000}s...`;
    connStatus.style.display = 'block';
    reconnectTimer = setTimeout(() => {
      reconnectDelay = Math.min(reconnectDelay * 2, 30000);
      connect();
    }, reconnectDelay);
  };

  ws.onerror = () => ws.close();
}

function handle(data) {
  switch (data.type) {
    case 'init':
      myId = data.userId;
      myColor = data.color;
      myUsername = `User${myId}`;
      myAvatarEl.style.background = myColor;
      myAvatarEl.textContent = initials(myUsername);
      myUsernameEl.textContent = myUsername;
      onlineCountEl.textContent = data.onlineCount + ' online';
      renderMembers(data.users);
      data.history.forEach(m => appendMessage(m));
      break;

    case 'message':
      appendMessage(data);
      if (data.userId === myId) {
        typingUsers.delete(myId);
        renderTyping();
      }
      break;

    case 'user_join':
      onlineCountEl.textContent = data.onlineCount + ' online';
      renderMembers(data.users);
      if (data.userId !== myId) appendSysMsg(`${data.username} joined the chat.`, 'join');
      break;

    case 'user_leave':
      onlineCountEl.textContent = data.onlineCount + ' online';
      renderMembers(data.users);
      typingUsers.delete(data.userId);
      renderTyping();
      appendSysMsg(`${data.username} left the chat.`, 'leave');
      break;

    case 'rename':
      if (data.userId === myId) {
        myUsername = data.newName;
        myUsernameEl.textContent = myUsername;
        myAvatarEl.textContent = initials(myUsername);
      }
      renderMembers(data.users);
      appendSysMsg(`${data.oldName} → ${data.newName}`, 'join');
      break;

    case 'typing':
      if (data.isTyping) {
        typingUsers.set(data.userId, { id: data.userId, username: data.username, color: data.color || '#888' });
      } else {
        typingUsers.delete(data.userId);
      }
      renderTyping();
      break;
  }
}

function send(obj) {
  if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(obj));
}

// ── INPUT ─────────────────────────────────────────────────────────────────
msgInput.addEventListener('input', () => {
  const val = msgInput.value;
  sendBtn.classList.toggle('active', val.trim().length > 0);

  // auto-resize
  msgInput.style.height = 'auto';
  msgInput.style.height = Math.min(msgInput.scrollHeight, 200) + 'px';

  // typing indicator
  if (val && !isTyping) {
    isTyping = true;
    send({ type: 'typing', isTyping: true });
  }
  clearTimeout(typingTimeout);
  typingTimeout = setTimeout(() => {
    isTyping = false;
    send({ type: 'typing', isTyping: false });
  }, 2000);
});

msgInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

sendBtn.addEventListener('click', sendMessage);

function sendMessage() {
  const content = msgInput.value.trim();
  if (!content) return;
  send({ type: 'message', content });
  msgInput.value = '';
  msgInput.style.height = 'auto';
  sendBtn.classList.remove('active');
  clearTimeout(typingTimeout);
  isTyping = false;
  send({ type: 'typing', isTyping: false });
}

// ── RENAME ────────────────────────────────────────────────────────────────
function openRename() {
  renameInput.value = myUsername;
  renameModal.style.display = 'flex';
  requestAnimationFrame(() => { renameInput.focus(); renameInput.select(); });
}

function confirmRename() {
  const name = renameInput.value.trim();
  if (name && name !== myUsername) send({ type: 'set_username', username: name });
  renameModal.style.display = 'none';
}

document.getElementById('rename-btn').addEventListener('click', openRename);
document.getElementById('rename-cancel').addEventListener('click', () => renameModal.style.display = 'none');
document.getElementById('rename-confirm').addEventListener('click', confirmRename);
myUsernameEl.addEventListener('click', openRename);
myAvatarEl.addEventListener('click', openRename);

renameInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') confirmRename();
  if (e.key === 'Escape') renameModal.style.display = 'none';
});

renameModal.addEventListener('click', e => {
  if (e.target === renameModal) renameModal.style.display = 'none';
});

// ── BOOT ──────────────────────────────────────────────────────────────────
connect();
</script>
