<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>T9 Network</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg-base:#313338;--bg-mid:#2b2d31;--card:#2b2d31;--card-border:#1e1f22;--card-hover:#35373c;--channel-hover:#35373c;--accent:#5865f2;--green:#23a55a;--red:#f23f43;--text:#dbdee1;--text-muted:#949ba4;--text-faint:#6d6f78;--border:#3f4147;--r:1rem;--r-sm:0.5rem;--shadow:0 8px 32px rgba(0,0,0,0.4)}
html,body{height:100%;background:var(--bg-base);color:var(--text);font-family:'Segoe UI',sans-serif;overflow:hidden}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-thumb{background:#1a1b1e;border-radius:3px}
::-webkit-scrollbar-track{background:transparent}
#app{display:flex;height:100vh;overflow:hidden}
#server-rail{width:72px;background:#1e1f22;display:flex;flex-direction:column;align-items:center;padding:12px 0;gap:4px;flex-shrink:0;overflow-y:auto;overflow-x:hidden}
#channel-sidebar{width:240px;background:#2b2d31;border-right:1px solid #1e1f22;display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
#main-area{flex:1;display:flex;flex-direction:column;min-width:0;background:#313338;overflow:hidden}
#members-sidebar{width:240px;background:#2b2d31;border-left:1px solid #1e1f22;display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.server-item{position:relative;cursor:pointer;margin-bottom:4px;width:72px;display:flex;justify-content:center}
.server-pill{position:absolute;left:0;top:50%;transform:translateY(-50%);width:4px;border-radius:0 4px 4px 0;background:white;transition:all 0.2s;height:0}
.server-item:hover .server-pill{height:20px}
.server-item.active .server-pill{height:40px}
.server-icon{width:48px;height:48px;border-radius:50%;background:#313338;border:1px solid #1e1f22;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#3ba55c;cursor:pointer;transition:all 0.2s;overflow:hidden}
.server-icon img{width:100%;height:100%;object-fit:cover}
.server-icon:hover{color:white;background:#5865f2;border-radius:16px}
.server-item.active .server-icon{border-radius:16px;background:#5865f2;color:white}
.server-divider{width:32px;height:2px;background:#35373c;border-radius:1px;margin:4px 0}
.server-add-btn{width:48px;height:48px;border-radius:50%;background:#313338;border:1px solid #1e1f22;display:flex;align-items:center;justify-content:center;font-size:24px;color:#3ba55c;cursor:pointer;transition:all 0.2s}
.server-add-btn:hover{color:white;background:#3ba55c;border-radius:16px}
.sidebar-header{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #1e1f22;min-height:48px;cursor:pointer;flex-shrink:0}
.sidebar-header:hover{background:#35373c}
.sidebar-server-name{font-weight:600;font-size:15px;color:white;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.channel-sections{flex:1;overflow-y:auto;overflow-x:hidden;min-height:0}
.channel-cat-header{display:flex;align-items:center;gap:4px;padding:16px 16px 4px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-muted)}
.channel-item{display:flex;align-items:center;gap:6px;padding:6px 8px;margin:1px 8px;border-radius:var(--r-sm);cursor:pointer;color:var(--text-muted)}
.channel-item:hover{background:#35373c;color:var(--text)}
.channel-item.active{background:#404249;color:white}
.ch-hash{font-size:20px;font-weight:300;width:24px;text-align:center}
.ch-name{font-size:15px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ch-icon-btn{opacity:0;font-size:16px;cursor:pointer;padding:2px 6px;border-radius:4px;transition:opacity 0.15s}
.channel-cat-header:hover .ch-icon-btn{opacity:1}
.channel-item:hover .ch-icon-btn{opacity:1}
.dm-header-label{padding:16px 16px 4px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-muted);display:flex;align-items:center;justify-content:space-between}
.dm-item{display:flex;align-items:center;gap:10px;padding:6px 8px;margin:1px 8px;border-radius:var(--r-sm);cursor:pointer;color:var(--text-muted)}
.dm-item:hover{background:#35373c;color:var(--text)}
.dm-item.active{background:#404249;color:white}
.dm-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;color:white;flex-shrink:0;position:relative;overflow:hidden}
.dm-avatar img{width:100%;height:100%;object-fit:cover}
.dm-name{font-size:15px;font-weight:500;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.user-panel{display:flex;align-items:center;gap:8px;padding:8px 10px;background:#232428;border-top:1px solid #1e1f22;flex-shrink:0;cursor:pointer}
.up-avatar{width:32px;height:32px;border-radius:50%;background:var(--accent);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;color:white;overflow:hidden}
.up-avatar img{width:100%;height:100%;object-fit:cover}
.up-info{flex:1;min-width:0}
.up-name{font-size:13px;font-weight:600;color:white}
.up-tag{font-size:12px;color:var(--text-muted)}
.pro-tag{font-size:10px;font-weight:700;color:#faa61a;background:rgba(250,166,26,0.15);padding:1px 4px;border-radius:3px;margin-left:4px;vertical-align:middle;display:inline-block}
.user-id-tag{font-size:10px;color:var(--text-muted);background:rgba(255,255,255,0.05);padding:1px 4px;border-radius:3px;margin-left:4px;font-family:monospace;vertical-align:middle;display:inline-block}
#chat-header{display:flex;align-items:center;gap:8px;padding:0 16px;height:48px;border-bottom:1px solid #1e1f22;flex-shrink:0;background:#313338}
.chat-header-hash{font-size:24px;color:var(--text-muted)}
.chat-header-name{font-weight:600;font-size:16px;color:white}
.chat-header-actions{margin-left:auto;display:flex;gap:4px;align-items:center}
.header-btn{width:36px;height:36px;border-radius:var(--r-sm);border:none;background:transparent;color:var(--text-muted);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center}
.header-btn:hover{background:#35373c;color:var(--text)}
/* WS status pill */
#ws-status{font-size:11px;padding:3px 8px;border-radius:10px;font-weight:600;margin-right:4px}
#ws-status.connected{background:rgba(35,165,90,0.15);color:#23a55a}
#ws-status.disconnected{background:rgba(242,63,67,0.15);color:#f23f43}
#ws-status.connecting{background:rgba(250,166,26,0.15);color:#faa61a}
#messages{flex:1;overflow-y:auto;overflow-x:hidden;min-height:0}
#dm-messages{flex:1;overflow-y:auto;overflow-x:hidden;min-height:0}
.msg-group{padding:4px 16px;display:flex;gap:16px;position:relative}
.msg-group:hover{background:rgba(0,0,0,0.08)}
.msg-group:hover .msg-actions{display:flex}
.msg-avatar-col{width:40px;flex-shrink:0;padding-top:4px}
.msg-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:600;color:white;cursor:pointer;overflow:hidden}
.msg-avatar img{width:100%;height:100%;object-fit:cover}
.msg-content-col{flex:1;min-width:0;padding:4px 0}
.msg-header{display:flex;align-items:baseline;gap:6px;margin-bottom:2px;flex-wrap:wrap}
.msg-username{font-weight:600;font-size:16px;cursor:pointer}
.msg-username:hover{text-decoration:underline}
.msg-time{font-size:12px;color:var(--text-faint)}
.msg-body{font-size:16px;line-height:1.375;color:var(--text);word-break:break-word}
.msg-reply-preview{display:flex;align-items:center;gap:6px;margin-bottom:4px;padding:2px 8px;border-left:3px solid var(--text-muted);font-size:12px;color:var(--text-muted);cursor:pointer;border-radius:0 4px 4px 0;background:rgba(0,0,0,0.1);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.msg-gif{margin-top:4px;border-radius:4px;overflow:hidden;max-width:300px}
.msg-gif img{width:100%;display:block;border-radius:4px}
.msg-actions{display:none;position:absolute;right:16px;top:-20px;background:#2b2d31;border:1px solid #1e1f22;border-radius:var(--r-sm);box-shadow:var(--shadow);padding:4px;z-index:5;gap:2px}
.msg-action-btn{width:32px;height:32px;border:none;background:transparent;color:var(--text-muted);cursor:pointer;border-radius:var(--r-sm);font-size:16px;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
.msg-action-btn:hover{background:#35373c;color:var(--text)}
.welcome-hash{width:68px;height:68px;border-radius:50%;background:#41434a;display:flex;align-items:center;justify-content:center;font-size:36px;font-weight:300;color:white;margin-bottom:8px}
.welcome-title{font-size:32px;font-weight:700;color:white}
.welcome-sub{font-size:15px;color:var(--text-muted);line-height:1.5;margin-top:8px}
#input-area{padding:0 16px 24px;flex-shrink:0;position:relative}
.reply-bar{display:flex;align-items:center;gap:8px;background:#383a40;border:1px solid #1e1f22;border-radius:var(--r) var(--r) 0 0;padding:8px 12px;font-size:13px;color:var(--text-muted);margin-bottom:-2px}
.reply-bar .rb-close{margin-left:auto;cursor:pointer;color:var(--text-muted);font-size:16px;padding:2px 6px}
.input-box{display:flex;align-items:center;gap:8px;background:#383a40;border:1px solid #1e1f22;border-radius:var(--r);padding:0 16px}
.input-box:focus-within{border-color:#5865f2}
#msg-input,#dm-msg-input{flex:1;background:transparent;border:none;outline:none;color:#dbdee1;font-size:15px;font-family:inherit;resize:none;min-height:44px;padding:14px 0}
#msg-input::placeholder,#dm-msg-input::placeholder{color:var(--text-faint)}
.input-btn{width:36px;height:36px;border:none;background:transparent;color:var(--text-muted);cursor:pointer;border-radius:var(--r-sm);font-size:18px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.input-btn:hover{color:var(--text);background:rgba(255,255,255,0.06)}
#typing-bar{height:20px;padding:0 16px;font-size:12px;color:var(--text-muted);display:flex;align-items:center;gap:4px;flex-shrink:0}
.typing-dots span{display:inline-block;width:4px;height:4px;border-radius:50%;background:var(--text-muted);margin:0 1px;animation:tdot .9s ease infinite}
.typing-dots span:nth-child(2){animation-delay:.15s}
.typing-dots span:nth-child(3){animation-delay:.3s}
@keyframes tdot{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-4px)}}
.members-header{padding:16px 16px 8px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-muted);flex-shrink:0}
.members-list{flex:1;overflow-y:auto;overflow-x:hidden;min-height:0;padding:0 8px}
.member-item{display:flex;align-items:center;gap:10px;padding:6px 8px;border-radius:var(--r-sm);cursor:pointer;margin:1px 0}
.member-item:hover{background:#35373c}
.member-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;color:white;flex-shrink:0;position:relative;overflow:hidden}
.member-avatar img{width:100%;height:100%;object-fit:cover}
.member-status{position:absolute;bottom:-2px;right:-2px;width:10px;height:10px;border-radius:50%;border:3px solid #2b2d31;background:var(--green)}
.member-name{font-size:15px;font-weight:500;color:var(--text)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);display:none;align-items:center;justify-content:center;z-index:200}
.overlay.visible{display:flex}
.modal{background:#313338;border:1px solid #1e1f22;border-radius:var(--r);width:100%;max-width:440px;box-shadow:var(--shadow);animation:modalIn 0.2s ease;max-height:90vh;overflow-y:auto}
.modal.modal-lg{max-width:560px}
@keyframes modalIn{from{opacity:0;transform:scale(0.95) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal-header{padding:24px 24px 0;display:flex;align-items:flex-start;justify-content:space-between}
.modal-title{font-size:20px;font-weight:700;color:white}
.modal-close{width:36px;height:36px;border:none;background:transparent;color:var(--text-muted);cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;border-radius:var(--r-sm)}
.modal-close:hover{background:rgba(255,255,255,0.1)}
.modal-body{padding:20px 24px}
.modal-footer{padding:0 24px 24px;display:flex;gap:8px;justify-content:flex-end}
.field{margin-bottom:16px}
.field label{display:block;font-size:12px;font-weight:700;text-transform:uppercase;color:var(--text-muted);margin-bottom:8px}
.field input{width:100%;background:#1e1f22;border:1px solid #3f4147;border-radius:var(--r-sm);padding:10px 12px;color:var(--text);font-size:15px;outline:none;font-family:inherit}
.field input:focus{border-color:var(--accent)}
.btn{padding:10px 20px;border-radius:var(--r-sm);border:none;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-primary{background:var(--accent);color:white}
.btn-primary:hover{background:#4752c4}
.btn-ghost{background:transparent;color:var(--text-muted)}
.btn-ghost:hover{background:#35373c;color:var(--text)}
.btn-danger{background:var(--red);color:white}
.btn-danger:hover{background:#c0383b}
.hidden{display:none!important}
#dm-view{display:none;flex:1;flex-direction:column;min-width:0;min-height:0;overflow:hidden}
#dm-view.visible{display:flex}
#channel-view{display:flex;flex:1;flex-direction:column;min-width:0;min-height:0}
.dm-header-bar{display:flex;align-items:center;gap:10px;padding:0 16px;height:48px;border-bottom:1px solid #1e1f22;flex-shrink:0;background:#313338}
.dm-header-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;color:white;overflow:hidden}
.dm-header-avatar img{width:100%;height:100%;object-fit:cover}
.dm-header-name{font-weight:600;font-size:16px;color:white}
.dm-input-area{padding:0 16px 24px;flex-shrink:0;position:relative}
.id-chip{background:#1e1f22;border:1px solid #3f4147;border-radius:var(--r-sm);padding:10px 12px;font-family:monospace;font-size:13px;color:var(--text);display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:8px}
.copy-btn{font-size:12px;color:var(--accent);background:none;border:none;cursor:pointer;padding:4px 8px;border-radius:4px;font-weight:600}
.copy-btn:hover{background:rgba(88,101,242,0.15)}
.emoji-picker{position:absolute;bottom:70px;left:16px;background:#313338;border:1px solid #1e1f22;border-radius:var(--r);padding:8px;z-index:50;display:none;box-shadow:var(--shadow)}
.emoji-picker.visible{display:block}
.emoji-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:2px}
.emoji-btn{width:36px;height:36px;border:none;background:transparent;font-size:20px;cursor:pointer;border-radius:4px;display:flex;align-items:center;justify-content:center}
.emoji-btn:hover{background:rgba(88,101,242,0.2)}
.gif-picker{position:absolute;bottom:70px;left:16px;right:16px;max-height:320px;background:#313338;border:1px solid #1e1f22;border-radius:var(--r);box-shadow:var(--shadow);display:none;flex-direction:column;z-index:50;overflow:hidden}
.gif-picker.visible{display:flex}
.gif-search-bar{display:flex;align-items:center;gap:8px;padding:12px;border-bottom:1px solid #1e1f22;flex-shrink:0}
.gif-search-bar input{flex:1;background:#1e1f22;border:1px solid #3f4147;border-radius:var(--r-sm);padding:8px 12px;color:white;font-size:13px;outline:none;font-family:inherit}
.gif-tabs-bar{display:flex;gap:4px;padding:8px 12px 4px;flex-shrink:0}
.gif-tab{padding:4px 12px;border-radius:var(--r-sm);border:none;background:transparent;color:var(--text-muted);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all 0.15s}
.gif-tab:hover{color:var(--text);background:rgba(255,255,255,0.06)}
.gif-tab.active{color:var(--accent);background:rgba(88,101,242,0.12)}
.gif-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding:8px 12px;overflow-y:auto;flex:1;min-height:0}
.gif-cell{height:110px;border-radius:var(--r-sm);overflow:hidden;cursor:pointer;background:#1e1f22}
.gif-cell img{width:100%;height:100%;object-fit:cover;transition:transform 0.2s}
.gif-cell:hover img{transform:scale(1.05)}
.gif-empty{grid-column:1/-1;text-align:center;padding:30px;color:var(--text-muted);font-size:13px}
.icon-svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.avatar-upload{display:flex;flex-direction:column;align-items:center;gap:12px;margin-bottom:16px}
.avatar-large{width:80px;height:80px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;color:white;cursor:pointer;border:3px solid #3f4147;overflow:hidden;position:relative;transition:border-color 0.2s}
.avatar-large:hover{border-color:var(--accent)}
.avatar-large img{width:100%;height:100%;object-fit:cover}
.avatar-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity 0.2s;font-size:14px;font-weight:600}
.avatar-large:hover .avatar-overlay{opacity:1}
/* online count chip */
.online-chip{font-size:12px;color:var(--text-muted);display:flex;align-items:center;gap:4px}
.online-dot{width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block}
</style>
</head>
<body>
<div id="app">
  <div id="server-rail">
    <div class="server-item active" id="dm-server-btn" onclick="showDmView()">
      <div class="server-icon"><svg class="icon-svg" viewBox="0 0 24 24" style="width:24px;height:24px"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg></div>
    </div>
    <div class="server-divider"></div>
    <div id="server-list-rail"></div>
    <div class="server-divider"></div>
    <div class="server-add-btn" id="server-add-btn"><svg class="icon-svg" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></div>
  </div>
  <div id="channel-sidebar">
    <div class="sidebar-header" onclick="openServerSettings()"><span class="sidebar-server-name" id="sidebar-server-name">T9 Network</span><svg class="icon-svg" viewBox="0 0 24 24" style="width:16px;height:16px;color:var(--text-muted)"><polyline points="6 9 12 15 18 9"/></svg></div>
    <div class="channel-sections" id="channel-sections"></div>
    <div id="dm-sections" class="hidden" style="flex:1;overflow-y:auto;overflow-x:hidden;min-height:0">
      <div class="dm-header-label"><span>Direct Messages</span><span style="cursor:pointer;font-size:18px" onclick="openModal('new-dm-modal')"><svg class="icon-svg" viewBox="0 0 24 24" style="width:18px;height:18px"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></span></div>
      <div id="dm-list"></div>
    </div>
    <div class="user-panel" onclick="openModal('profile-modal')">
      <div class="up-avatar" id="up-avatar">?</div>
      <div class="up-info"><div class="up-name" id="up-name">Click to setup</div><div class="up-tag" id="up-tag"></div></div>
      <svg class="icon-svg" viewBox="0 0 24 24" style="width:18px;height:18px;color:var(--text-muted)"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
    </div>
  </div>
  <div id="main-area">
    <div id="channel-view">
      <div id="chat-header">

// ── STATE ──────────────────────────────────────────────────────────────────
let myProfile=null,currentServer=null,currentChannel=null,currentDmPartner=null

// ── WEBSOCKET ──────────────────────────────────────────────────────────────
let ws=null,wsReady=false,wsReconnectDelay=1000,wsReconnectTimer=null

function wsConnect(){
  setWsStatus('connecting')
  ws=new WebSocket(WS_URL)
  ws.onopen=()=>{
    wsReady=true;wsReconnectDelay=1000
    setWsStatus('connected')
    if(myProfile) ws.send(JSON.stringify({type:'set_username',username:myProfile.display_name||myProfile.username}))
  }
  ws.onmessage=e=>{
    let d;try{d=JSON.parse(e.data)}catch{return}
    handleWsMsg(d)
  }
  ws.onclose=()=>{
    wsReady=false;setWsStatus('disconnected')
    wsReconnectTimer=setTimeout(()=>{wsReconnectDelay=Math.min(wsReconnectDelay*2,30000);wsConnect()},wsReconnectDelay)
  }
  ws.onerror=()=>ws.close()
}

function wsSend(obj){if(ws&&wsReady)ws.send(JSON.stringify(obj))}

function setWsStatus(s){
  const el=document.getElementById('ws-status')
  el.className='';el.classList.add(s)
  el.textContent=s==='connected'?'● online':s==='connecting'?'● connecting':'● offline'
}

function handleWsMsg(d){
  switch(d.type){
    case 'init':
      document.getElementById('online-count').textContent=d.onlineCount
      renderWsMembers(d.users)
      // render history only if we're in channel view with no supabase msgs yet
      if(viewMode==='channel'&&currentChannel&&seenMessages.size===0){
        d.history.forEach(m=>{if(m.channelId===currentChannel?.id||!m.channelId)appendWsMsg(m)})
      }
      break
    case 'message':
      document.getElementById('online-count').textContent=d.onlineCount||document.getElementById('online-count').textContent
      if(viewMode==='channel'&&currentChannel) appendWsMsg(d)
      // stop showing user as typing
      typingUsers.delete(d.userId);renderTyping()
      break
    case 'user_join':case 'user_leave':
      document.getElementById('online-count').textContent=d.onlineCount
      renderWsMembers(d.users)
      break
    case 'rename':
      renderWsMembers(d.users)
      break
    case 'typing':
      if(d.isTyping) typingUsers.set(d.userId,{username:d.username,color:d.color||userColor(d.username)})
      else typingUsers.delete(d.userId)
      renderTyping()
      break
  }
}

  document.getElementById('member-count').textContent=users.length

  bar.innerHTML=`<div class="typing-dots"><span></span><span></span><span></span></div>&nbsp;${text}`
}

function appendWsMsg(m){
  const ms=document.getElementById('messages')
  const isGif=m.isGif||(m.content&&(m.content.includes('giphy.com')||m.content.includes('media.')))
  const color=m.color||userColor(m.username)
  const initials=(m.username||'?').slice(0,2).toUpperCase()

  div.innerHTML=`<div class="msg-avatar-col"><div class="msg-avatar" style="background:${color}">${initials}</div></div><div class="msg-content-col"><div class="msg-header"><span class="msg-username" style="color:${color}">${esc(m.username)}</span><span class="msg-time">${fmtTime(m.timestamp)}</span></div>${body}</div>`
  ms.appendChild(div)
  const atBottom=ms.scrollHeight-ms.scrollTop-ms.clientHeight<120
  if(atBottom)ms.scrollTop=ms.scrollHeight
}

function handleTyping(){
  if(!isTyping){isTyping=true;wsSend({type:'typing',isTyping:true})}
  clearTimeout(typingTimeout)
  typingTimeout=setTimeout(()=>{isTyping=false;wsSend({type:'typing',isTyping:false})},2000)
}

function linkify(s){return s.replace(/(https?:\/\/[^\s<>"]+)/g,'<a href="$1" target="_blank" rel="noopener" style="color:#00a8fc">$1</a>')}

// ── HELPERS ────────────────────────────────────────────────────────────────
function $(id){return document.getElementById(id)}
function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fmtTime(ts){if(!ts)return'';const d=new Date(ts);return d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}
function openModal(id){$(id).classList.add('visible');if(id==='profile-modal'&&myProfile){$('profile-username').value=myProfile.username||'';updateAvatarPreview(myProfile.avatar_url)}}
function closeModal(id){$(id).classList.remove('visible')}
function scrollBottom(el){if(el)el.scrollTop=el.scrollHeight}
function userColor(u){const c=['#5865f2','#57f287','#fee75c','#eb459e','#ed4245','#9b59b6','#3498db','#e67e22'];let h=0;for(let x of(u||''))h=x.charCodeAt(0)+((h<<5)-h);return c[Math.abs(h)%c.length]}
function genInvite(){const ch='ABCDEFGHJKLMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789';let r='';for(let i=0;i<8;i++)r+=ch[Math.floor(Math.random()*ch.length)];return r}
function isServerOwner(){return currentServer&&(currentServer.owner===myProfile?.username||currentServer.owner_id===MY_ID)}
function isProUser(uid){return PRO_USERS.has(uid)}
function buildAvatar(prof,fallback){if(prof?.avatar_url)return'<img src="'+esc(prof.avatar_url)+'" alt="">';const n=prof?.display_name||fallback||'?';return n[0].toUpperCase()}
function updateAvatarPreview(url){const el=$('profile-avatar-preview');if(url){el.innerHTML='<img src="'+esc(url)+'" alt=""><div class="avatar-overlay">Change</div>'}else{el.innerHTML='<span id="profile-avatar-initial">?</span><div class="avatar-overlay">Change</div>'}}
function previewAvatar(input){const file=input.files[0];if(!file)return;if(file.size>5*1024*1024){alert('Image must be under 5MB');return}pendingAvatar=file;const reader=new FileReader();reader.onload=function(e){$('profile-avatar-preview').innerHTML='<img src="'+e.target.result+'" alt=""><div class="avatar-overlay">Change</div>'};reader.readAsDataURL(file)}
async function uploadAvatar(file,username){const ext=file.name.split('.').pop();const path='avatars/'+username+'-'+Date.now()+'.'+ext;const{error}=await db.storage.from('avatars').upload(path,file,{upsert:true,cacheControl:'3600'});if(error){console.error('Upload error:',error);return null}const{data}=db.storage.from('avatars').getPublicUrl(path);return data?.publicUrl||null}
async function getProfile(u){if(!u)return null;if(profileCache.has(u))return profileCache.get(u);const{data}=await db.from('profiles').select('*').eq('username',u).single();if(data)profileCache.set(u,data);return data||null}

async function saveProfile(){
  const u=$('profile-username').value.trim();if(!u)return
  const btn=$('save-profile-btn');btn.disabled=true;btn.textContent='Saving...'

  if(ex){await db.from('profiles').update({display_name:u,avatar_url:avatarUrl}).eq('username',u);myProfile={...ex,display_name:u,avatar_url:avatarUrl}}
  else{const{data:np}=await db.from('profiles').insert([{username:u,user_id:MY_ID,display_name:u,avatar_url:avatarUrl,status:'online'}]).select().single();if(np)myProfile=np}

  wsSend({type:'set_username',username:u})

  currentServer=srv;currentChannel=null;viewMode='channel'

async function addMessage(m,sc=true){
  if(!m||seenMessages.has(m.id))return;seenMessages.add(m.id)
  const prof=await getProfile(m.username),dn=prof?.display_name||m.username||'?',av=buildAvatar(prof,m.username)
  const isGif=m.is_gif||(m.content&&(m.content.includes('giphy.com')||m.content.includes('media.')))
  let bodyContent=isGif?'<div class="msg-gif"><img src="'+esc(m.content)+'" alt="GIF"></div>':'<div class="msg-body">'+linkify(esc(m.content||''))+'</div>'
  let replyHtml='';if(m.reply_to_id)replyHtml='<div class="msg-reply-preview">↩ Replying to <strong>'+esc(m.reply_to_user||'')+'</strong></div>'
  const proBadge=prof&&isProUser(prof.user_id)?'<span class="pro-tag">PRO</span>':''
  const idTag=prof?'<span class="user-id-tag">'+esc(prof.user_id||'?')+'</span>':''
  const div=document.createElement('div');div.className='msg-group';div.id='msg-'+m.id
  div.innerHTML='<div class="msg-avatar-col"><div class="msg-avatar" style="background:'+(prof?.avatar_url?'transparent':userColor(m.username))+'">'+av+'</div></div><div class="msg-content-col">'+replyHtml+'<div class="msg-header"><span class="msg-username" style="color:'+userColor(m.username)+'">'+esc(dn)+proBadge+idTag+'</span><span class="msg-time">'+fmtTime(m.created_at)+'</span></div>'+bodyContent+'</div><div class="msg-actions"><button class="msg-action-btn" onclick="setReply(\''+m.id+'\',\''+esc(m.username)+'\')">↩</button>'+(m.username===myProfile?.username?'<button class="msg-action-btn" onclick="deleteMessage(\''+m.id+'\')" style="color:#f23f43">✕</button>':'')+'</div>'
  $('messages').appendChild(div);if(sc)scrollBottom($('messages'))
}

async function sendMessage(){
  if(!myProfile){openModal('profile-modal');return}
  if(!currentChannel)return
  const inp=$('msg-input'),cont=inp.value.trim();if(!cont)return
  inp.value='';inp.style.height='auto'
  clearTimeout(typingTimeout);isTyping=false;wsSend({type:'typing',isTyping:false})

  const payload={channel_id:currentChannel.id,username:myProfile.username,content:cont,is_gif:false}
  if(replyingTo){payload.reply_to_id=replyingTo.id;payload.reply_to_user=replyingTo.username}
  clearReply()

  // Save to Supabase
  const{data,error}=await db.from('channel_messages').insert([payload]).select().single()
  if(error){alert('Failed to send: '+error.message);return}
  if(data){
    await addMessage(data)
    // Broadcast via WS so others see it instantly
    wsSend({type:'message',content:cont,channelId:currentChannel.id,isGif:false})
  }
}

async function deleteMessage(id){await db.from('channel_messages').delete().eq('id',id);const el=document.getElementById('msg-'+id);if(el)el.remove()}
function setReply(id,username){replyingTo={id,username};$('reply-bar').classList.remove('hidden');$('reply-to-name').textContent=username;$('msg-input').focus()}
function clearReply(){replyingTo=null;$('reply-bar').classList.add('hidden')}

// ── DMs (Supabase only) ────────────────────────────────────────────────────
function showDmView(){
  viewMode='dm';currentServer=null;currentChannel=null
  $('channel-view').style.display='none';$('dm-view').classList.add('visible')
  $('channel-sections').classList.add('hidden');$('dm-sections').classList.remove('hidden')
  $('sidebar-server-name').textContent='Direct Messages';$('members-sidebar').style.display='none'
  document.querySelectorAll('.server-item').forEach(e=>e.classList.remove('active'));$('dm-server-btn').classList.add('active');renderDmList()
}

async function openDm(u){
  if(!myProfile||u===myProfile.username)return
  currentDmPartner=u;viewMode='dm';$('channel-view').style.display='none';$('dm-view').classList.add('visible')
  const prof=await getProfile(u),dn=prof?.display_name||u,av=buildAvatar(prof,u)
  $('dm-header-avatar').innerHTML=av;$('dm-header-avatar').style.background=prof?.avatar_url?'transparent':userColor(u)
  $('dm-header-name').innerHTML=dn+' <span class="user-id-tag">'+esc(prof?.user_id||'?')+'</span>';seenDmMessages.clear()
  const dm=$('dm-messages');dm.innerHTML='<div style="padding:24px 16px"><div class="welcome-hash" style="background:'+userColor(u)+'">'+dn[0]+'</div><div class="welcome-title">'+esc(dn)+'</div><div class="welcome-sub">Send a message to start the conversation!</div></div>'
  const me=myProfile.username
  const{data}=await db.from('dms').select('*').or('sender.eq.'+me+',recipient.eq.'+me).order('id',{ascending:true}).limit(100)
  if(data){const relevant=data.filter(m=>(m.sender===me&&m.recipient===u)||(m.sender===u&&m.recipient===me));for(const m of relevant)await addDmMessage(m,false);if(relevant.length)scrollBottom(dm)}
  if(!dmConversations.find(c=>c.partner===u))dmConversations.push({partner:u});renderDmList()
}

async function addDmMessage(m,sc=true){
  if(!m||seenDmMessages.has(m.id))return;seenDmMessages.add(m.id)
  const prof=await getProfile(m.sender),dn=prof?.display_name||m.sender,av=buildAvatar(prof,m.sender)
  const isGif=m.is_gif||(m.message&&(m.message.includes('giphy.com')||m.message.includes('media.')))
  let bodyContent=isGif?'<div class="msg-gif"><img src="'+esc(m.message)+'" alt="GIF"></div>':'<div class="msg-body">'+linkify(esc(m.message||''))+'</div>'
  const proBadge=prof&&isProUser(prof.user_id)?'<span class="pro-tag">PRO</span>':''
  const div=document.createElement('div');div.className='msg-group'
  div.innerHTML='<div class="msg-avatar-col"><div class="msg-avatar" style="background:'+(prof?.avatar_url?'transparent':userColor(m.sender))+'">'+av+'</div></div><div class="msg-content-col"><div class="msg-header"><span class="msg-username" style="color:'+userColor(m.sender)+'">'+esc(dn)+proBadge+'</span><span class="msg-time">'+fmtTime(m.created_at)+'</span></div>'+bodyContent+'</div>'
  $('dm-messages').appendChild(div);if(sc)scrollBottom($('dm-messages'))
}

async function sendDmMessage(){if(!myProfile||!currentDmPartner)return;const inp=$('dm-msg-input'),cont=inp.value.trim();if(!cont)return;inp.value='';inp.style.height='auto';const{data}=await db.from('dms').insert([{sender:myProfile.username,recipient:currentDmPartner,message:cont,is_gif:false}]).select().single();if(data)await addDmMessage(data)}

function renderDmList(){
  const list=$('dm-list');list.innerHTML=''
  dmConversations.forEach(c=>{const d=document.createElement('div');d.className='dm-item'+(currentDmPartner===c.partner?' active':'');d.onclick=()=>{showDmView();openDm(c.partner)};const prof=profileCache.get(c.partner),av=buildAvatar(prof,c.partner);d.innerHTML='<div class="dm-avatar" style="background:'+(prof?.avatar_url?'transparent':userColor(c.partner))+'">'+av+'</div><div class="dm-name">'+esc(prof?.display_name||c.partner)+'</div>';list.appendChild(d)})
}

async function searchUsers(q){
  const res=$('dm-user-results');res.innerHTML='';if(!q||q.length<2)return
  const{data}=await db.from('profiles').select('*').or('username.ilike.%'+q+'%,user_id.ilike.%'+q+'%').limit(10)
  if(!data||!data.length){res.innerHTML='<div style="padding:16px;color:var(--text-muted);text-align:center">No users found</div>';return}
  data.filter(p=>p.username!==myProfile?.username).forEach(p=>{const d=document.createElement('div');d.className='member-item';d.style.cursor='pointer';d.onclick=()=>{closeModal('new-dm-modal');showDmView();openDm(p.username)};const av=buildAvatar(p,p.username);d.innerHTML='<div class="member-avatar" style="background:'+(p.avatar_url?'transparent':userColor(p.username))+'">'+av+'</div><div class="member-name">'+esc(p.display_name||p.username)+' <span class="user-id-tag">'+esc(p.user_id||'?')+'</span></div>';res.appendChild(d)})
}

// ── SERVERS (create/join) ──────────────────────────────────────────────────
async function createServer(){
  if(!myProfile){openModal('profile-modal');return}
  const n=$('new-server-name').value.trim();if(!n)return;const ic=genInvite()
  const{data:srv}=await db.from('servers').insert([{name:n,owner:myProfile.username,invite_code:ic,owner_id:MY_ID}]).select().single()
  if(!srv)return;await db.from('server_members').insert([{server_id:srv.id,username:myProfile.username,role:'owner'}])
  servers.push(srv);renderServers();closeModal('create-server-modal');$('new-server-name').value='';alert('Server created! Invite code: '+ic);await selectServer(srv)
}

async function joinServer(){
  if(!myProfile){openModal('profile-modal');return}
  const code=$('join-invite-code').value.trim();if(!code)return
  const{data:srv}=await db.from('servers').select('*').eq('invite_code',code).single()
  if(!srv){alert('Server not found!');return}
  const{data:ex}=await db.from('server_members').select('*').eq('server_id',srv.id).eq('username',myProfile.username).single()
  if(ex){closeModal('join-server-modal');await selectServer(srv);return}
  await db.from('server_members').insert([{server_id:srv.id,username:myProfile.username,role:'member'}])
  if(!servers.find(s=>s.id===srv.id))servers.push(srv);renderServers();closeModal('join-server-modal');$('join-invite-code').value='';await selectServer(srv)
}

async function createChannel(){
  if(!currentServer||!isServerOwner()){alert('Only the server owner can create channels.');return}
  const n=$('new-channel-name').value.trim().replace(/\s+/g,'-').toLowerCase();if(!n)return
  const{data,error}=await db.from('channels').insert([{server_id:currentServer.id,name:n,position:channels.length,type:'text'}]).select().single()
  if(error){alert('Failed to create channel: '+error.message);return}
  if(data){channels.push(data);renderChannels();closeModal('add-channel-modal');$('new-channel-name').value='';await selectChannel(data)}
}

async function deleteChannel(id){
  if(!confirm('Delete this channel?'))return
  await db.from('channels').delete().eq('id',id)
  channels=channels.filter(c=>c.id!==id)
  if(currentChannel?.id===id){const first=channels.find(c=>!c.type||c.type==='text');if(first)await selectChannel(first);else{$('messages').innerHTML='';currentChannel=null}}
  renderChannels()
}

function openServerSettings(){
  if(!currentServer||viewMode==='dm')return
  const srv=currentServer,isOwner=isServerOwner();$('ss-title').textContent=srv.name+' Settings'
  let html='';if(isOwner)html+='<div class="field"><label>Server Icon URL</label><input id="ss-icon" placeholder="https://..." value="'+esc(srv.icon_url||'')+'"></div><div class="field"><label>Server Name</label><input id="ss-name" value="'+esc(srv.name||'')+'"></div>'
  html+='<div class="field"><label>Invite Code</label><div class="id-chip"><span>'+esc(srv.invite_code||'None')+'</span><button class="copy-btn" onclick="navigator.clipboard.writeText(\''+srv.invite_code+'\')">Copy</button></div></div>'
  $('ss-body').innerHTML=html;$('ss-footer').innerHTML=(isOwner?'<button class="btn btn-primary" onclick="saveServerSettings()">Save</button>':'')+'<button class="btn btn-ghost" onclick="closeModal(\'server-settings-modal\')">Close</button>';openModal('server-settings-modal')
}

async function saveServerSettings(){if(!isServerOwner())return;const name=$('ss-name')?.value.trim();if(!name)return;const icon=$('ss-icon')?.value.trim();const upd={name};if(icon!==undefined)upd.icon_url=icon;const{data}=await db.from('servers').update(upd).eq('id',currentServer.id).select().single();if(data){currentServer=data;servers=servers.map(s=>s.id===data.id?data:s);$('sidebar-server-name').textContent=name;renderServers()}closeModal('server-settings-modal')}

function toggleMembers(){membersVisible=!membersVisible;$('members-sidebar').style.display=membersVisible?'flex':'none'}

// ── EMOJI / GIF ────────────────────────────────────────────────────────────
function toggleEmojiPicker(forDm){emojiForDm=forDm;emojiOpen=!emojiOpen;const picker=forDm?$('dm-emoji-picker'):$('emoji-picker');if(gifOpen){$('gif-picker').classList.remove('visible');gifOpen=false}if(emojiOpen){picker.innerHTML='';const grid=document.createElement('div');grid.className='emoji-grid';const emojis=['😀','😂','❤️','🔥','👍','👀','😮','🎉','💀','😢','🤔','😍','🚀','⭐','✅','❌','💯','✨','👋','🎮','💪','🙏','🍕','🎵'];emojis.forEach(e=>{const btn=document.createElement('button');btn.className='emoji-btn';btn.textContent=e;btn.onclick=()=>insertEmoji(e);grid.appendChild(btn)});picker.appendChild(grid);picker.classList.add('visible')}else{picker.classList.remove('visible')}}
function insertEmoji(emoji){const inp=emojiForDm?$('dm-msg-input'):$('msg-input');const s=inp.selectionStart,e=inp.selectionEnd;inp.value=inp.value.slice(0,s)+emoji+inp.value.slice(e);inp.selectionStart=inp.selectionEnd=s+emoji.length;inp.focus();emojiOpen=false;(emojiForDm?$('dm-emoji-picker'):$('emoji-picker')).classList.remove('visible')}
function toggleGifPicker(){gifOpen=!gifOpen;if(emojiOpen){document.querySelectorAll('.emoji-picker').forEach(p=>p.classList.remove('visible'));emojiOpen=false}$('gif-picker').classList.toggle('visible',gifOpen);if(gifOpen&&$('gif-grid').children.length<=1)loadTrendingGifs()}
function switchGifTab(tab,btn){document.querySelectorAll('.gif-tab').forEach(t=>t.classList.remove('active'));btn.classList.add('active');if(tab==='trending')loadTrendingGifs();else loadGifSearch(tab)}
async function loadTrendingGifs(){$('gif-grid').innerHTML='<div class="gif-empty">Loading...</div>';try{const r=await fetch('https://api.giphy.com/v1/gifs/trending?api_key='+GIPHY_KEY+'&limit=18&rating=g');const j=await r.json();renderGifGrid(j.data||[])}catch(e){$('gif-grid').innerHTML='<div class="gif-empty">Failed to load GIFs</div>'}}
async function loadGifSearch(q){$('gif-grid').innerHTML='<div class="gif-empty">Searching...</div>';try{const r=await fetch('https://api.giphy.com/v1/gifs/search?api_key='+GIPHY_KEY+'&q='+encodeURIComponent(q)+'&limit=18&rating=g');const j=await r.json();renderGifGrid(j.data||[])}catch(e){$('gif-grid').innerHTML='<div class="gif-empty">Search failed</div>'}}
function renderGifGrid(gifs){const g=$('gif-grid');g.innerHTML='';if(!gifs.length){g.innerHTML='<div class="gif-empty">No GIFs found</div>';return}gifs.forEach(gf=>{const url=gf.images?.fixed_height?.url||gf.images?.fixed_height_downsampled?.url||gf.images?.downsized?.url;if(!url)return;const cell=document.createElement('div');cell.className='gif-cell';cell.onclick=()=>sendGif(url);cell.innerHTML='<img src="'+url+'" alt="GIF" loading="lazy">';g.appendChild(cell)})}
let gifDebounce;function debouncedGifSearch(q){clearTimeout(gifDebounce);gifDebounce=setTimeout(()=>{if(q.trim())loadGifSearch(q.trim());else loadTrendingGifs()},400)}
async function sendGif(url){if(!myProfile)return;toggleGifPicker();if(currentDmPartner&&viewMode==='dm'){const{data}=await db.from('dms').insert([{sender:myProfile.username,recipient:currentDmPartner,message:url,is_gif:true}]).select().single();if(data)await addDmMessage(data);return}if(!currentChannel)return;const payload={channel_id:currentChannel.id,username:myProfile.username,content:url,is_gif:true};if(replyingTo){payload.reply_to_id=replyingTo.id;payload.reply_to_user=replyingTo.username}clearReply();const{data}=await db.from('channel_messages').insert([payload]).select().single();if(data){await addMessage(data);wsSend({type:'message',content:url,channelId:currentChannel.id,isGif:true})}}

// ── SUPABASE REALTIME (DMs only now) ──────────────────────────────────────
db.channel('dms-ch').on('postgres_changes',{event:'INSERT',schema:'public',table:'dms'},async p=>{const m=p.new,me=myProfile?.username;if(!me)return;if(m.sender!==me&&m.recipient!==me)return;const partner=m.sender===me?m.recipient:m.sender;if(currentDmPartner===partner&&viewMode==='dm'&&m.sender!==me)await addDmMessage(m);if(!dmConversations.find(c=>c.partner===partner)){dmConversations.push({partner});if(viewMode==='dm')renderDmList()}}).subscribe()

function showContextMenu(e){e.preventDefault();const menu=document.createElement('div');menu.style.cssText='position:fixed;background:#111214;border-radius:4px;padding:6px;z-index:400;min-width:160px;box-shadow:0 8px 24px rgba(0,0,0,0.4)';menu.style.left=e.clientX+'px';menu.style.top=e.clientY+'px';menu.innerHTML='<div style="padding:8px 12px;cursor:pointer;color:#dbdee1;border-radius:4px" onmouseover="this.style.background=\'#5865f2\'" onmouseout="this.style.background=\'transparent\'" onclick="openModal(\'create-server-modal\');this.parentElement.remove()">Create Server</div><div style="padding:8px 12px;cursor:pointer;color:#dbdee1;border-radius:4px" onmouseover="this.style.background=\'#5865f2\'" onmouseout="this.style.background=\'transparent\'" onclick="openModal(\'join-server-modal\');this.parentElement.remove()">Join Server</div>';document.body.appendChild(menu);setTimeout(()=>document.addEventListener('click',()=>menu.remove(),{once:true}),50)}
$('server-add-btn').addEventListener('click',showContextMenu)
$('server-add-btn').addEventListener('contextmenu',showContextMenu)

document.addEventListener('click',e=>{if(!e.target.closest('.emoji-picker')&&!e.target.closest('.input-btn')){document.querySelectorAll('.emoji-picker').forEach(p=>p.classList.remove('visible'));emojiOpen=false}if(!e.target.closest('.gif-picker')&&!e.target.closest('.input-btn')){$('gif-picker').classList.remove('visible');gifOpen=false}})
$('gif-picker').addEventListener('click',e=>e.stopPropagation())
$('emoji-picker').addEventListener('click',e=>e.stopPropagation())
document.querySelectorAll('.overlay').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('visible')}))
