<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Ultimate Game Hub · ultra</title>
  <style>
    :root {
      --p: #8fdcff;
      --a2: #a78bfa;
      --bg: #0a0a0f;
      --sur: rgba(255, 255, 255, 0.05);
      --bor: rgba(255, 255, 255, 0.08);
      --mut: rgba(255, 255, 255, 0.5);
      --r: 10px;
      --card-min: 130px;
    }
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    html, body {
      height: 100%;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: #fff;
      overflow-x: hidden;
      scrollbar-width: thin;
      scrollbar-color: var(--p) #1a1a24;
      -webkit-tap-highlight-color: transparent;
    }
    body::-webkit-scrollbar { width: 4px; }
    body::-webkit-scrollbar-thumb { background: var(--p); border-radius: 3px; }

    /* Header section – compact & GPU-friendly */
    header {
      position: sticky;
      top: 0;
      z-index: 500;
      background: #0d0d14f2;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--bor);
      padding: 8px 12px;
      contain: layout style;
    }
    .hi {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    .logo {
      font-size: 18px;
      font-weight: 800;
      background: linear-gradient(135deg, var(--p), var(--a2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      white-space: nowrap;
      letter-spacing: -0.3px;
    }
    input, select {
      padding: 6px 10px;
      border: 1px solid var(--bor);
      border-radius: var(--r);
      background: #12121c;
      color: #fff;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }
    input {
      flex: 1;
      min-width: 140px;
    }
    input:focus {
      border-color: var(--p);
    }
    input::placeholder {
      color: var(--mut);
    }
    select option {
      background: #12121c;
    }
    #favBtn {
      padding: 6px 12px;
      border: 1px solid rgba(251, 191, 36, 0.5);
      border-radius: var(--r);
      background: rgba(251, 191, 36, 0.08);
      color: #fbbf24;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s;
    }
    .gc {
      color: var(--mut);
      font-size: 11px;
      white-space: nowrap;
      margin-left: auto;
    }

    /* Main layout with CSS containment */
    main {
      max-width: 1400px;
      margin: 0 auto;
      padding: 16px 12px 30px;
      contain: layout style;
    }
    .sec {
      margin-bottom: 24px;
    }
    .sh {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--bor);
    }
    .si {
      width: 26px;
      height: 26px;
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      background: var(--sur);
    }
    .st {
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: -0.2px;
    }
    .sct {
      margin-left: auto;
      color: var(--mut);
      font-size: 10px;
      background: var(--sur);
      padding: 2px 8px;
      border-radius: 20px;
    }

    /* CSS Grid – responsive with fixed minimum card size */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(var(--card-min), 1fr));
      gap: 8px;
    }
    .card {
      position: relative;
      aspect-ratio: 1 / 1;
      border-radius: var(--r);
      overflow: hidden;
      cursor: pointer;
      border: 1px solid var(--bor);
      background: #1a1a26;
      transition: transform 0.15s ease, border-color 0.15s, box-shadow 0.15s;
      will-change: transform;
      contain: layout style paint;
    }
    .card:hover {
      transform: translateY(-3px);
      border-color: var(--p);
      box-shadow: 0 8px 18px rgba(140, 220, 255, 0.12);
      z-index: 2;
    }
    .card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      background: #0f0f17;
      content-visibility: auto;
    }
    .ct {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 600;
      text-align: center;
      padding: 6px;
      opacity: 0;
      transition: opacity 0.18s;
      background: rgba(0, 0, 0, 0.78);
      backdrop-filter: blur(2px);
      z-index: 2;
      pointer-events: none;
    }
    .card:hover .ct {
      opacity: 1;
    }
    .cf {
      position: absolute;
      top: 5px;
      right: 5px;
      z-index: 5;
      background: rgba(0, 0, 0, 0.65);
      border: none;
      color: #ccc;
      font-size: 15px;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.15s, color 0.15s;
      line-height: 1;
      backdrop-filter: blur(4px);
    }
    .card:hover .cf, .cf.on {
      opacity: 1;
    }
    .cf.on {
      color: #fbbf24;
      text-shadow: 0 0 6px #fbbf24;
    }

    /* Badges */
    .sba {
      position: absolute;
      top: 5px;
      left: 5px;
      padding: 2px 6px;
      border-radius: 5px;
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      z-index: 3;
      backdrop-filter: blur(4px);
    }
    .bgn { background: rgba(140,220,255,0.2); color: #8fdcff; }
    .bgt { background: rgba(255,107,107,0.2); color: #ff6b6b; }
    .bgh { background: rgba(167,139,250,0.2); color: #a78bfa; }
    .bgno { background: rgba(74,222,128,0.2); color: #4ade80; }
    .bgs { background: rgba(251,191,36,0.2); color: #fbbf24; }

    .cn{color:#8fdcff}.ct2{color:#ff6b6b}.ch{color:#a78bfa}.cno{color:#4ade80}.cs{color:#fbbf24}
    .ibn{background:rgba(140,220,255,0.12)}.ibt{background:rgba(255,107,107,0.12)}.ibh{background:rgba(167,139,250,0.12)}.ibno{background:rgba(74,222,128,0.12)}.ibs{background:rgba(251,191,36,0.12)}

    /* Loading placeholder */
    .ld {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 24px;
      color: var(--mut);
      font-size: 13px;
      grid-column: 1 / -1;
    }
    .sp {
      width: 22px;
      height: 22px;
      border: 2px solid rgba(140,220,255,0.15);
      border-top-color: var(--p);
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Fullscreen overlay – optimized with GPU layer */
    #gameOverlay {
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 9999;
      display: none;
      flex-direction: column;
      will-change: transform;
      transform: translateZ(0);
    }
    #gameOverlay.active {
      display: flex;
    }
    #gameHeader {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 14px;
      background: #0d0d14;
      border-bottom: 1px solid var(--bor);
      flex-shrink: 0;
    }
    #gameTitle {
      font-size: 14px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-right: 10px;
    }
    #gameClose {
      background: rgba(255,107,107,0.2);
      border: 1px solid rgba(255,107,107,0.4);
      color: #ff6b6b;
      padding: 5px 12px;
      border-radius: var(--r);
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      transition: background 0.15s;
    }
    #gameFrame {
      flex: 1;
      width: 100%;
      height:100%;
      border: none;
      background: #000;
      display: block;
    }
    #gameLoader {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      pointer-events: none;
    }

    /* Favorites panel */
    #fp {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      z-index: 8000;
      display: none;
      align-items: flex-start;
      justify-content: flex-end;
    }
    .fd {
      width: min(360px, 100vw);
      height: 100%;
      background: #0d0d14;
      border-left: 1px solid var(--bor);
      display: flex;
      flex-direction: column;
      animation: sli 0.15s ease;
    }
    @keyframes sli { from { transform: translateX(100%); } to { transform: translateX(0); } }
    .fh {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px;
      border-bottom: 1px solid var(--bor);
    }
    .fl {
      overflow-y: auto;
      flex: 1;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .fi {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px;
      border-radius: 9px;
      background: var(--sur);
      border: 1px solid var(--bor);
      cursor: pointer;
    }
    .fi img { width: 40px; height: 40px; object-fit: cover; border-radius: 6px; }

    @media(max-width: 680px) {
      :root { --card-min: 100px; }
      input { order: 3; width: 100%; min-width: unset; }
    }
  </style>
</head>

      {name:"Football Legends",href:"/soccer.html",img:"football.png"},{name:"Short Life",href:"/shortlife.html",img:"shortlife.png"},{name:"Moto Maniac",href:"/manic.html",img:"manic.png"},{name:"Slope 2",href:"/slope2.html",img:"slope2.png"},{name:"Aqua Thrill",href:"/thrill.html",img:"thrill.png"},{name:"Short Ride",href:"/shortride.html",img:"shortlife.png"},{name:"Stair Race 3D",href:"/stair.html",img:"stair.png"},{name:"Vex 4",href:"/vex.html",img:"vex4.png"},{name:"Secrets of Hallowland",href:"/hallow.html",img:"https://i.ibb.co/dmBbf5s/Screenshot-2024-04-10-7-06-13-PM.png"},{name:"Tap Goal",href:"/tapgoal.html",img:"tap.webp"},{name:"Snow Rider",href:"/snowrider.html",img:"/img/snow.png"},{name:"Rocket Soccer",href:"/rocketsoccer.html",img:"img/soccer.png"},{name:"Superhot",href:"/superhot.html",img:"/img/superhot.png"},{name:"Funny Shooter 2",href:"/funnyshooter.html",img:"funny.png"},
      {name:"Ice Dodo",href:"/icedodo.html",img:"ice.jpg"},{name:"Eggy Car",href:"/eggy-car-main/eggy-car-main/frame.html",img:"eggy.jpg"},{name:"Hole.io",href:"/holeio.html",img:"holeio.png"},{name:"Drive Mad",href:"/dmad.html",img:"dmad.png"},{name:"CubeShot",href:"/cubeshot.html",img:"cubeshot.png"},{name:"1v1 LOL",href:"/1v1.html",img:"1v1.jpg"},{name:"BitLife",href:"/bitlifeService.html",img:"bitlife.png"},{name:"Jetpack Joyride",href:"/jet.html",img:"jet.png"},{name:"OvO",href:"/ovo.html",img:"ovo.png"},{name:"Granny",href:"/granny.html",img:"granny.png"},{name:"Grand Vegas",href:"/grandvegas.html",img:"grandvegas.png"},{name:"Polytrack",href:"/polytrack.html",img:"polytrack.png"},{name:"Subway Surfers",href:"/subwayhw.html",img:"subwayHW.png"},{name:"Basketball Legends",href:"/basket.html",img:"basketL.png"}
    ];

    const NOAH_TITLES = ["Alien Hominid","Customer Support","The Deadseat","Fireboy & Watergirl","Pizza Tower","Bloons TD 1","Bloons TD 2","Bloons TD 3","Bloons TD 4","Bloons TD 5","Geometry Dash","Friday Night Funkin","Plants vs Zombies","Subway Surfers","Temple Run 2","Happy Wheels","Granny","Slope","Cookie Clicker","FNAF","FNAF 2","FNAF 3","FNAF 4","Undertale","Deltarune","Binding of Isaac","Portal","Doom","Minecraft","Terraria","Earn to Die","Earn to Die 2","Bart Blast","Bendy and the Ink Machine","Gacha Life","Among Us","Yandere Simulator","Quake III","Angry Birds","Candy Crush","Flappy Bird","Super Mario 64","Half Life","Jetpack Joyride","Slime Rancher","Cup Head","Rocket League","Street Fighter II","Fallout","Hollow Knight","Celeste","Hotline Miami","Getting Over It","Doki Doki Literature Club","Baldi's Basics","Granny 3","Granny 2","Kindergarten","Kindergarten 2","Kindergarten 3","Raft","Slender","Buckshot Roulette","WebFishing","ULTRAKILL","That's Not My Neighbor"];

    const FK = 'ugh-favs-v1';
    let allGames = [];
    let favs = new Set();
    
    const $ = (id) => document.getElementById(id);
    const main = $('mainContent');
    const tt = $('tt');
    const gameOverlay = $('gameOverlay');
    const gameFrame = $('gameFrame');
    const gameTitle = $('gameTitle');
    const gameLoader = $('gameLoader');

    /* ---------- FAVORITES & UTILS ---------- */
    function loadFavs() {
      try { const r = localStorage.getItem(FK); if (r) favs = new Set(JSON.parse(r)); } catch {}
    }
    function saveFavs() {
      try { localStorage.setItem(FK, JSON.stringify([...favs])); } catch {}
    }
    function gk(g) { return g.source + ':' + g.id; }
    function isFav(g) { return favs.has(gk(g)); }

    /* ---------- RENDER ENGINE (static sections, minimal live updates) ---------- */
    function buildSections() {
      main.innerHTML = '';
      const sources = ['gnmath','t9','hydra','noah','seabean'];
      const labels = {gnmath:'GN-Math',t9:'T9',hydra:'Hydra',noah:"Noah's",seabean:'Sea Bean'};
      const icons = {gnmath:'🌐',t9:'🔥',hydra:'⚡',noah:'📚',seabean:'🌊'};
      
      sources.forEach(src => {
        const sec = document.createElement('div');
        sec.className = 'sec';
        sec.id = 'sec-' + src;
        sec.innerHTML = `<div class="sh"><div class="si ib${src.slice(0,2)}">${icons[src]}</div><span class="st c${src.slice(0,2)}">${labels[src]} Games</span><span class="sct" id="c-${src}">0</span></div><div id="cn-${src}" class="cards"></div>`;
        main.appendChild(sec);
      });
    }

    function renderCards(containerId, games) {
      const container = $(containerId);
      if (!container) return;
      container.innerHTML = '';
      if (!games.length) {
        container.innerHTML = '<div class="ld">No games</div>';
        return;
      }
      const fragment = document.createDocumentFragment();
      games.forEach(g => {
        const card = document.createElement('div');
        card.className = 'card';
        card.dataset.name = g.name.toLowerCase();
        card.dataset.source = g.source;
        card.dataset.gk = gk(g);
        const fav = isFav(g);
        const badgeClass = {gnmath:'bgn',t9:'bgt',hydra:'bgh',noah:'bgno',seabean:'bgs'}[g.source] || 'bgn';
        card.innerHTML = `<span class="sba ${badgeClass}">${g.source.substring(0,2).toUpperCase()}</span><img src="${g.cover||''}" alt="${g.name}" loading="lazy" onerror="this.style.display='none'"><div class="ct">${g.name}</div><button class="cf${fav?' on':''}">${fav?'★':'☆'}</button>`;
        
        card.querySelector('.cf').onclick = (e) => {
          e.stopPropagation();
          toggleFav(g, card);
        };
        card.onclick = () => openGame(g);
        card.onmouseenter = (e) => showTT(e, g.name);
        card.onmousemove = (e) => showTT(e, g.name);
        card.onmouseleave = () => hideTT();
        fragment.appendChild(card);
      });
      container.appendChild(fragment);
    }

    function toggleFav(g, card) {
      const k = gk(g);
      favs.has(k) ? favs.delete(k) : favs.add(k);
      saveFavs();
      const btn = card?.querySelector('.cf');
      if (btn) {
        btn.textContent = favs.has(k) ? '★' : '☆';
        btn.classList.toggle('on', favs.has(k));
      }
      $('fc2').textContent = favs.size;
    }

    function updateCounts() {
      let total = 0;
      ['gnmath','t9','hydra','noah','seabean'].forEach(s => {
        const n = allGames.filter(g => g.source === s).length;
        const el = $('c-' + s);
        if (el) el.textContent = n;
        total += n;
      });
      $('totalc').textContent = total + ' games';
    }

    /* ---------- FAST FILTER/SORT (CSS toggle) ---------- */
    function filterAll() {
      const query = ($('sb').value || '').toLowerCase();
      const sourceFilter = $('fs').value;
      const cards = document.querySelectorAll('.card');
      for (const card of cards) {
        const nameMatch = card.dataset.name.includes(query);
        const sourceMatch = sourceFilter === 'all' ? true : 
                           sourceFilter === 'favorites' ? favs.has(card.dataset.gk) : 
                           card.dataset.source === sourceFilter;
        card.style.display = (nameMatch && sourceMatch) ? '' : 'none';
      }
      // hide empty sections
      ['gnmath','t9','hydra','noah','seabean'].forEach(s => {
        const sec = document.getElementById('sec-' + s);
        if (!sec) return;
        const visibleCards = sec.querySelectorAll('.card[style*="display: none"]').length;
        const totalCards = sec.querySelectorAll('.card').length;
        sec.style.display = (visibleCards === totalCards && totalCards > 0) ? 'none' : '';
      });
    }

    function sortAll() {
      const by = $('so').value;
      ['cn-gnmath','cn-t9','cn-hydra','cn-noah','cn-seabean'].forEach(cid => {
        const container = $(cid);
        if (!container) return;
        const cards = [...container.querySelectorAll('.card')];
        cards.sort((a, b) => {
          const valA = by === 'name' ? a.dataset.name : a.dataset.source;
          const valB = by === 'name' ? b.dataset.name : b.dataset.source;
          return valA.localeCompare(valB);
        });
        cards.forEach(c => container.appendChild(c));
      });
    }

    /* ---------- GAME LAUNCHER (iframe with blob optimization) ---------- */
    function openGame(g) {
      if (g.ext || (g.url && g.url.startsWith('http') && !g.url.includes('jsdelivr') && !g.url.includes('githack'))) {
        window.open(g.url, '_blank');
        return;
      }
      gameOverlay.classList.add('active');
      gameTitle.textContent = g.name;
      gameLoader.style.display = 'flex';
      document.body.style.overflow = 'hidden';
      
      if (g.source === 't9') {
        gameFrame.src = g.url;
        return;
      }
      
      let urls = [g.url];
      if (g.source === 'hydra') {
        const file = g.url.split('gmes/').pop();
        urls = HB.map(b => b + 'gmes/' + file);
      }
      tryLoadGame(urls, 0, g.name);
    }

    async function tryLoadGame(urls, index, name) {
      if (index >= urls.length) {
        gameLoader.style.display = 'none';
        alert('Could not load ' + name);
        return;
      }
      try {
        const res = await fetch(urls[index]);
        if (!res.ok) throw new Error('status ' + res.status);
        const html = await res.text();
        const blob = new Blob([html], { type: 'text/html' });
        const blobUrl = URL.createObjectURL(blob);
        gameFrame._blobUrl = blobUrl;
        gameFrame.src = blobUrl;
      } catch (e) {
        tryLoadGame(urls, index + 1, name);
      }
    }

    function closeGame() {
      if (gameFrame._blobUrl) {
        URL.revokeObjectURL(gameFrame._blobUrl);
        delete gameFrame._blobUrl;
      }
      gameFrame.src = 'about:blank';
      gameOverlay.classList.remove('active');
      gameLoader.style.display = 'none';
      document.body.style.overflow = '';
    }

    gameFrame.addEventListener('load', () => { gameLoader.style.display = 'none'; });
    gameFrame.addEventListener('error', () => { gameLoader.style.display = 'none'; });
    $('gameClose').onclick = closeGame;
    document.addEventListener('keydown', e => { if (e.key === 'Escape' && gameOverlay.classList.contains('active')) closeGame(); });

    /* ---------- FAV PANEL ---------- */
    function renderFavPanel() {
      const list = $('fl');
      list.innerHTML = '';
      const favGames = allGames.filter(g => favs.has(gk(g)));
      if (!favGames.length) {
        list.innerHTML = '<div style="color:var(--mut);text-align:center;padding:24px;">No favorites</div>';
        return;
      }
      favGames.forEach(g => {
        const div = document.createElement('div');
        div.className = 'fi';
        div.innerHTML = `<img src="${g.cover||''}" alt="${g.name}" onerror="this.style.display='none'"><div style="flex:1"><div style="font-weight:600;font-size:13px">${g.name}</div><div style="font-size:10px;color:var(--mut)">${g.source}</div></div><button class="fr" style="background:none;border:none;color:var(--mut);font-size:16px;cursor:pointer;">✕</button>`;
        div.querySelector('.fr').onclick = (e) => {
          e.stopPropagation();
          favs.delete(gk(g));
          saveFavs();
          $('fc2').textContent = favs.size;
          renderFavPanel();
        };
        div.onclick = () => { closeFP(); openGame(g); };
        list.appendChild(div);
      });
    }

    function openFP() { $('fp').style.display = 'flex'; renderFavPanel(); document.body.style.overflow = 'hidden'; }
    function closeFP() { $('fp').style.display = 'none'; document.body.style.overflow = ''; }
    $('favBtn').onclick = openFP;
    $('closeFpBtn').onclick = closeFP;
    $('fp').addEventListener('click', (e) => { if (e.target === $('fp')) closeFP(); });

    /* ---------- TOOLTIP ---------- */
    function showTT(e, text) {
      tt.textContent = text;
      tt.style.opacity = '1';
      tt.style.left = Math.min(e.clientX + 14, window.innerWidth - 210) + 'px';
      tt.style.top = (e.clientY + 12) + 'px';
    }
    function hideTT() { tt.style.opacity = '0'; }

    /* ---------- DATA LOADERS (with requestIdleCallback for non‑critical) ---------- */
    async function loadGN() {
      const games = [];
      for (const src of GN_SOURCES) {
        try {
          let url = src.zonesurls[0];
          try { const sha = (await (await fetch(src.shaAPI + '?t=' + Date.now())).json())[0]?.sha; if (sha) url = src.shaFmt(sha); } catch {}
          const data = await (await fetch(url + '?t=' + Date.now())).json();
          data.forEach(z => games.push({ id: String(z.id), name: z.name, cover: (z.cover||'').replace('{COVER_URL}', src.coverURL).replace('{HTML_URL}', src.htmlURL), url: (z.url||'').replace('{COVER_URL}', src.coverURL).replace('{HTML_URL}', src.htmlURL), source: 'gnmath' }));
        } catch (e) { console.warn('GN source failed', e); }
      }
      return games;
    }

    async function loadHydra() {
      for (const base of HB) {
        try {
          const data = await (await fetch(base + 'gmes.json?t=' + Date.now())).json();
          if (!Array.isArray(data)) continue;
          const seen = new Set(), games = [];
          data.forEach(g => {
            const k = (g.file_name || '').toLowerCase().trim(); if (!k || seen.has(k)) return;
            seen.add(k);
            games.push({ id: k, name: g.title || g.file_name, cover: (g.thumb||'').replace(/^\//, '') ? HB[0] + g.thumb.replace(/^\//, '') : '', url: base + 'gmes/' + g.file_name, source: 'hydra' });
          });
          return games;
        } catch (e) {}
      }
      return [];
    }

    async function loadNoah() {
      const games = [];
      try {
        const data = await (await fetch(BESTSAB_API + '?t=' + Date.now())).json();
        data.forEach((g, i) => games.push({ id: 'bs' + i, name: g.name || '?', cover: (g.cover||'').replace('{COVER_URL}', BESTSAB_COVER).replace('{HTML_URL}', BESTSAB_HTML), url: (g.url||'').replace('{HTML_URL}', BESTSAB_HTML), source: 'noah' }));
      } catch (e) {}
      NOAH_TITLES.forEach((t, i) => games.push({ id: 'noah' + i, name: t, cover: `${NOAH_BASE}/images/${(i%400)+1}.jpg`, url: `${NOAH_BASE}/games/${(i%400)+1}.html`, source: 'noah' }));
      return games;
    }

    async function loadSea() {
      const games = [];
      try {
        const data = await (await fetch(SEA_JSON + '?t=' + Date.now())).json();
        data.forEach(e => {
          let name = e.name || ''; if (name.toLowerCase().startsWith('cl')) name = name.slice(2);
          let url = e.url || '', cover = e.cover || '';
          for (const [ph, v] of Object.entries(SEA_SRC)) { url = url.replace(ph, v); cover = cover.replace(ph, v); }
          games.push({ id: String(e.id || name), name, cover, url, source: 'seabean' });
        });
      } catch (e) {}
      return games;
    }

    function loadT9G() {
      return T9.map((g, i) => ({ id: 't9' + i, name: g.name, cover: g.img, url: g.href, source: 't9', ext: g.href.startsWith('http') }));
    }

    /* ---------- INIT (with idle callback for heavy rendering) ---------- */
    async function init() {
      loadFavs();
      $('fc2').textContent = favs.size;
      buildSections();

      const [gn, t9g, hy, no, sea] = await Promise.all([
        loadGN(), Promise.resolve(loadT9G()), loadHydra(), loadNoah(), loadSea()
      ]);
      allGames = [...gn, ...t9g, ...hy, ...no, ...sea];

      // Use requestIdleCallback to render cards in chunks if possible
      const renderAll = () => {
        renderCards('cn-gnmath', gn);
        renderCards('cn-t9', t9g);
        renderCards('cn-hydra', hy);
        renderCards('cn-noah', no);
        renderCards('cn-seabean', sea);
        updateCounts();
      };

      if (window.requestIdleCallback) {
        requestIdleCallback(renderAll, { timeout: 200 });
      } else {
        setTimeout(renderAll, 10);
      }
    }

    // Attach filter/sort listeners
    $('sb').addEventListener('input', filterAll);
    $('fs').addEventListener('change', filterAll);
    $('so').addEventListener('change', sortAll);

    init();
  })();
</script>
