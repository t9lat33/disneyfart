<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cloud Play — Krypton</title>
<style>
  :root{
    --bg:#0a0a0c;
    --panel:#141417;
    --panel-hover:#1a1a1e;
    --border:rgba(255,255,255,.08);
    --text:#f2f2f4;
    --sub:#8b8b93;
    --accent:#6ee787;
    --accent2:#ff5c5c;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    background:
      radial-gradient(circle at 20% 0%, rgba(110,231,135,.06), transparent 40%),
      radial-gradient(circle at 80% 100%, rgba(255,92,92,.05), transparent 40%),
      var(--bg);
    font-family:-apple-system,'Segoe UI',system-ui,sans-serif;
    color:var(--text);
    min-height:100vh;
    padding:48px 24px;
  }

  .grid{
    max-width:900px;
    margin:0 auto;
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(340px,1fr));
    gap:20px;
  }

  .card{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:16px;
    overflow:hidden;
    transition:border-color .2s ease, transform .2s ease, background .2s ease;
    position:relative;
  }
  .card:hover{
    background:var(--panel-hover);
    border-color:rgba(255,255,255,.16);
    transform:translateY(-3px);
  }

  .thumb{
    position:relative;
    width:100%;
    aspect-ratio:16/9;
    background:#000;
    overflow:hidden;
  }
  .thumb img{
    width:100%; height:100%;
    object-fit:cover;
    display:block;
    filter:saturate(1.05);
  }
  .thumb .fade{
    position:absolute; inset:0;
    background:linear-gradient(180deg, transparent 50%, rgba(20,20,23,.95) 100%);
    pointer-events:none;
  }
  .thumb .badge{
    position:absolute; top:12px; left:12px;
    font-size:10.5px; font-weight:700; letter-spacing:.06em;
    text-transform:uppercase;
    padding:4px 9px; border-radius:999px;
    background:rgba(0,0,0,.5);
    backdrop-filter:blur(6px);
    border:1px solid rgba(255,255,255,.12);
    display:flex; align-items:center; gap:5px;
  }
  .thumb .badge .dot{
    width:6px;height:6px;border-radius:50%;
    background:var(--accent);
    box-shadow:0 0 6px var(--accent);
  }

  .info{padding:16px 18px 18px;}
  .row-top{display:flex; align-items:baseline; justify-content:space-between; gap:10px;}
  .name{font-size:17px; font-weight:700; letter-spacing:-.01em;}
  .tagline{font-size:10.5px; color:var(--sub); text-transform:uppercase; letter-spacing:.08em; white-space:nowrap;}

  .desc{
    margin-top:7px;
    font-size:13px;
    line-height:1.5;
    color:var(--sub);
  }

  .tags{
    display:flex; gap:6px; margin-top:12px; flex-wrap:wrap;
  }
  .tags span{
    font-size:11px;
    color:var(--sub);
    background:rgba(255,255,255,.05);
    border:1px solid var(--border);
    padding:3px 8px;
    border-radius:6px;
  }

  .play-btn{
    margin-top:16px;
    width:100%;
    padding:11px;
    border:none;
    border-radius:10px;
    background:var(--text);
    color:#0a0a0c;
    font-size:13.5px;
    font-weight:700;
    cursor:pointer;
    display:flex; align-items:center; justify-content:center; gap:7px;
    transition:transform .1s ease, opacity .15s ease;
  }
  .play-btn:hover{opacity:.88;}
  .play-btn:active{transform:scale(.98);}
  .play-btn svg{width:12px;height:12px;fill:#0a0a0c;}

  /* ---- FULLSCREEN PLAYER OVERLAY ---- */
  .overlay{
    position:fixed; inset:0;
    background:#000;
    display:none;
    z-index:999;
  }
  .overlay.active{display:block;}
  .overlay iframe{
    width:100%; height:100%; border:0; display:block;
  }
  .overlay .close{
    position:absolute; top:14px; right:16px;
    width:36px;height:36px;
    background:rgba(20,20,20,.85);
    border:1px solid var(--border);
    border-radius:9px;
    color:var(--text);
    font-size:18px; line-height:1;
    cursor:pointer;
    z-index:2;
    backdrop-filter:blur(6px);
  }
  .overlay .close:hover{background:var(--accent2);}
  .overlay .loading{
    position:absolute; inset:0;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:12px; color:var(--sub); font-size:13px;
  }
  .overlay .loading .bar{
    width:200px;height:5px;background:#1c1c1f;border-radius:3px;overflow:hidden;
  }
  .overlay .loading .bar span{
    display:block;height:100%;width:35%;
    background:var(--accent);
    animation:load 1.1s ease-in-out infinite;
  }
  @keyframes load{
    0%{transform:translateX(-120%);}
    100%{transform:translateX(320%);}
  }
</style>
</head>
<body>

  <div class="grid">

    <div class="card">
      <div class="thumb">
        <img src="https://i.ytimg.com/vi/qNMfF9TYETM/maxresdefault.jpg" alt="Minecraft Java Edition" onerror="this.style.opacity=0">
        <div class="fade"></div>
      </div>
      <div class="info">
        <div class="row-top">
          <div class="name">Minecraft: Java Edition</div>
        </div>
        <p class="desc">The original block-building sandbox — full survival, creative.</p>
        <div class="tags"><span>Survival</span><span>Creative</span></div>
        <button class="play-btn" onclick="launchGame('minecraft')">
          <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
          Play
        </button>
      </div>
    </div>

    <div class="card">
      <div class="thumb">
        <img src="https://images-wixmp-ed30a86b8c4ca887773594c2.wixmp.com/f/e49dd163-8357-45d9-b447-2ebce7ac1693/d1g3qw1-6fa5f31e-5b0d-4462-bfa7-70f140041206.jpg/v1/fill/w_900,h_614,q_75,strp/grand_theft_auto_vice_city_by_thorcx_d1g3qw1-fullview.jpg?token=eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9.eyJzdWIiOiJ1cm46YXBwOjdlMGQxODg5ODIyNjQzNzNhNWYwZDQxNWVhMGQyNmUwIiwiaXNzIjoidXJuOmFwcDo3ZTBkMTg4OTgyMjY0MzczYTVmMGQ0MTVlYTBkMjZlMCIsIm9iaiI6W1t7ImhlaWdodCI6Ijw9NjE0IiwicGF0aCI6Ii9mL2U0OWRkMTYzLTgzNTctNDVkOS1iNDQ3LTJlYmNlN2FjMTY5My9kMWczcXcxLTZmYTVmMzFlLTViMGQtNDQ2Mi1iZmE3LTcwZjE0MDA0MTIwNi5qcGciLCJ3aWR0aCI6Ijw9OTAwIn1dXSwiYXVkIjpbInVybjpzZXJ2aWNlOmltYWdlLm9wZXJhdGlvbnMiXX0.Y1GU4FY5uN2yGfYs9GKaVgGx783jmSCY8zConzVcn8Q" alt="Grand Theft Auto: Vice City" onerror="this.style.opacity=0">
        <div class="fade"></div>
      </div>
      <div class="info">
        <div class="row-top">
          <div class="name">GTA: Vice City</div>
          <div class="tagline">Classic</div>
        </div>
        <p class="desc">Return to 1986 Vice City — open-world crime, chaos, and neon-soaked streets, running entirely in-browser.</p>
        <div class="tags"><span>Open World</span><span>Action</span><span>Single Player</span></div>
        <button class="play-btn" onclick="launchGame('vicecity')">
          <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
          Play
        </button>
      </div>
    </div>

  </div>

  <div class="overlay" id="overlay">
    <button class="close" onclick="closeGame()">✕</button>
    <div class="loading" id="loading">
      <div id="loadingText">Loading…</div>
      <div class="bar"><span></span></div>
    </div>
    <iframe id="gameFrame"
      allow="fullscreen; gamepad; autoplay; pointer-lock"
      allowfullscreen
      referrerpolicy="no-referrer"
      style="opacity:0"
    ></iframe>
  </div>

<script>
  const GAMES = {
    minecraft: { src: "mc.html", label: "Minecraft: Java Edition" },
    vicecity:  { src: "gtavc.html", label: "GTA: Vice City" }
  };

  function launchGame(key){
    const g = GAMES[key];
    const overlay = document.getElementById('overlay');
    const frame = document.getElementById('gameFrame');
    const loading = document.getElementById('loading');
    const loadingText = document.getElementById('loadingText');

    loadingText.textContent = `Loading ${g.label}…`;
    frame.style.opacity = 0;
    loading.style.display = 'flex';
    overlay.classList.add('active');
    document.body.style.overflow = 'hidden';

    frame.onload = () => {
      loading.style.display = 'none';
      frame.style.opacity = 1;
    };
    frame.src = g.src;
  }

  function closeGame(){
    const overlay = document.getElementById('overlay');
    const frame = document.getElementById('gameFrame');
    overlay.classList.remove('active');
    document.body.style.overflow = '';
    frame.src = '';
  }

  document.addEventListener('keydown', e => {
    if(e.key === 'Escape') closeGame();
  });
</script>

</body>
</html>
