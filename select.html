<!DOCTYPE html>
<html lang="en">
<head>
  <style>
    body {
      margin: 0;
      background-color: rgb(0, 119, 255);
    }

    .container {
      display: flex;
      flex-direction: column;  /* stacks h1 on top of images */
      justify-content: center;
      align-items: center;
      height: 100vh;
      gap: 20px;
    }

    img {
      width: 200px;
      height: 200px;
      object-fit: cover;
      border-radius: 15px;
    }
    
    h1{
        font-family: sans-serif;
        color:white;
    }

    .images {
      display: flex;
      gap: 20px;
    }
    #tooltip {
    position: fixed;
    background: rgba(0, 0, 0, 0.9);
    color: white;
    padding: 8px 15px;
    border-radius: 8px;
    font-size: 14px;
    font-family: sans-serif;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s ease;
    z-index: 10000;
    white-space: nowrap;
    border: 1px solid rgba(255, 255, 255, 0.2);
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
}

#tooltip.show {
    opacity: 1;
}
  </style>
</head>
<body>
  <div class="container">
    <h1>Select Game Archive</h1>
    <div class="images">
    <a href="test200.html">
      <img src="newlogo.png" alt="T9 g@mes">
      </a>
      <a href="gnmath.html">
      <img src="gn.png" alt="gn-math g@mes">
      </a>

      <a href="mastera.html">
      <img src="ugs.png" alt="master archive g@mes">
      </a>
    </div>
  </div>
  <script>
    const tooltip = document.getElementById('tooltip');
  const images = document.querySelectorAll('#imageContainer img');

  images.forEach(img => {
    img.addEventListener('mouseenter', function(e) {
      const gameName = this.getAttribute('alt');
      if (gameName) {
        tooltip.textContent = gameName;
        tooltip.classList.add('show');
      }
    });

    img.addEventListener('mousemove', function(e) {
      tooltip.style.left = e.pageX + 15 + 'px';
      tooltip.style.top = e.pageY + 15 + 'px';
    });

    img.addEventListener('mouseleave', function() {
      tooltip.classList.remove('show');
    });
  });
  </script>
</body>
</html>
