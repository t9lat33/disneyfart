<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T9 Tube</title>
    <style>
        * { box-sizing: border-box; }
        body { background: #0f0f0f; color: white; font-family: 'Roboto', 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .header { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; max-width: 1200px; margin-left: auto; margin-right: auto; }
        .logo { font-size: 24px; font-weight: bold; color: #ff0000; white-space: nowrap; }
        .search-container { display: flex; flex: 1; }
        .search-input { flex: 1; padding: 12px 20px; border-radius: 24px 0 0 24px; border: 1px solid #303030; background: #121212; color: white; outline: none; font-size: 16px; }
        .search-btn { padding: 12px 25px; border-radius: 0 24px 24px 0; border: 1px solid #303030; background: #303030; color: white; cursor: pointer; font-size: 16px; }
        .search-btn:hover { background: #404040; }
        
        .main-container { max-width: 1200px; margin: 0 auto; }
        
        .player-container { display: none; max-width: 1000px; margin: 0 auto; }
        .player-frame { width: 100%; aspect-ratio: 16 / 9; border: none; border-radius: 12px; background: #000; }
        .back-btn { background: #303030; color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; margin-bottom: 15px; font-size: 14px; }
        .back-btn:hover { background: #404040; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .video-card { cursor: pointer; transition: transform 0.2s; background: #181818; border-radius: 12px; overflow: hidden; }
        .video-card:hover { transform: scale(1.03); }
        .video-img { width: 100%; aspect-ratio: 16 / 9; background: #303030; }
        .video-img img { width: 100%; height: 100%; object-fit: cover; }
        .video-info { padding: 12px 15px; }
        .video-title { font-size: 14px; font-weight: 500; color: #f1f1f1; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        
        .spinner { border: 4px solid rgba(255, 255, 255, 0.1); border-top: 4px solid #ff0000; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 50px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">T9 Tube</div>
        <div class="search-container">
            <input type="text" class="search-input video-search" placeholder="Search T9 Tube...">
            <button class="search-btn" onclick="performSearch()">Search</button>
        </div>
    </div>

    <div class="main-container">
        <div class="player-container">
            <button class="back-btn" onclick="closePlayer()">← Back to T9 Tube</button>
            <iframe class="player-frame" src="" allowfullscreen></iframe>
        </div>

        <div class="grid video-grid"></div>
    </div>

    <script src="yt.js"></script>
</body>
</html>
