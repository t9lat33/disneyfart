<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>T9 Tube</title>
<link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f0f0f;--card:#181818;--accent:#f00;--text:#f1f1f1;--muted:#aaa;--hover:#272727;--input:#121212;--border:#303030}
html,body{height:100%}
body{background:var(--bg);color:var(--text);font-family:Roboto,Arial,sans-serif}

header{position:fixed;top:0;left:0;right:0;height:56px;z-index:100;display:flex;align-items:center;justify-content:space-between;background:var(--bg);padding:0 16px}
.logo{display:flex;align-items:center;gap:4px;cursor:pointer}
.logo svg{color:var(--accent);width:28px;height:28px}
.logo span{font-size:18px;font-weight:700;color:var(--text)}

.header-center{flex:1;display:flex;justify-content:center;max-width:600px;margin:0 20px}
.search-form{display:flex;width:100%}
.search-form input{flex:1;background:var(--input);border:1px solid var(--border);border-right:none;border-radius:20px 0 0 20px;padding:0 14px;height:38px;color:var(--text);font-size:15px;outline:none}
.search-form button{width:56px;background:#222;border:1px solid var(--border);border-radius:0 20px 20px 0;cursor:pointer;color:var(--text)}

.app{display:flex;padding-top:56px}
.main{flex:1;padding:20px;min-height:calc(100vh - 56px)}

#results{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px 12px}
.card{cursor:pointer;border-radius:10px;overflow:hidden}
.card:hover{background:var(--hover)}
.thumb{position:relative;aspect-ratio:16/9;background:#000;overflow:hidden;border-radius:10px}
.thumb img{width:100%;height:100%;object-fit:cover}
.duration{position:absolute;bottom:4px;right:4px;background:rgba(0,0,0,.85);color:#fff;font-size:11px;padding:2px 5px;border-radius:3px}
.info{display:flex;gap:10px;padding:10px 0}
.ch-avatar{width:32px;height:32px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,#5865f2,#f23f43);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#fff}
.title{font-size:14px;font-weight:500;color:var(--text);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.3;margin-bottom:3px}
.meta{font-size:12px;color:var(--muted)}
.status{padding:60px;text-align:center;color:var(--muted);grid-column:1/-1}

#player-view{display:none;padding-top:56px}
.player-layout{display:flex;gap:20px;padding:20px;max-width:1600px;margin:0 auto}
.player-main{flex:1;min-width:0;max-width:1100px}
#player-wrap{width:100%;background:#000;border-radius:12px;overflow:hidden}
#player-wrap video,#player-wrap iframe{width:100%;aspect-ratio:16/9;border:none}
.player-title{font-size:17px;font-weight:600;margin:12px 0 6px}
.player-meta{display:flex;align-items:center;gap:10px}
.channel-name{font-weight:600;font-size:13px}
.back-btn{display:flex;align-items:center;gap:5px;background:#272727;border:none;color:#fff;padding:7px 14px;border-radius:16px;cursor:pointer;font-size:13px;margin-bottom:12px}
.back-btn:hover{background:#3f3f3f}

.up-next{width:360px;flex-shrink:0}
.up-next-title{font-size:15px;font-weight:600;margin-bottom:10px}
.up-card{display:flex;gap:8px;margin-bottom:8px;cursor:pointer;padding:3px;border-radius:8px}
.up-card:hover{background:var(--hover)}
.up-thumb{position:relative;width:155px;flex-shrink:0;aspect-ratio:16/9;border-radius:8px;overflow:hidden;background:#000}
.up-thumb img{width:100%;height:100%;object-fit:cover}
.up-title{font-size:13px;font-weight:500;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.3}

@media(max-width:1000px){.player-layout{flex-direction:column}.up-next{width:100%}}
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="logo" onclick="goHome()">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19.615 3.184c-3.604-.246-11.631-.245-15.23 0-3.897.266-4.356 2.62-4.385 8.816.029 6.185.484 8.549 4.385 8.816 3.6.245 11.626.246 15.23 0 3.897-.266 4.356-2.62 4.385-8.816-.029-6.185-.484-8.549-4.385-8.816zm-10.615 12.816v-8l8 3.993-8 4.007z"/></svg>
      <span>T9 Tube</span>
    </div>
  </div>
  <div class="header-center">
    <form class="search-form" onsubmit="event.preventDefault();search()">
      <input id="q" type="text" placeholder="Search">
      <button type="submit">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
    </form>
  </div>
</header>

<div class="app">
  <main class="main" id="main">
    <div id="results"><div class="status">Search for videos above</div></div>
  </main>
</div>

<div id="player-view">
  <div class="player-layout">
    <div class="player-main">
      <button class="back-btn" onclick="goHome()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Back
      </button>
      <div id="player-wrap"><video id="player" controls playsinline></video></div>
      <div class="player-title" id="player-title"></div>
      <div class="player-meta">
        <div class="ch-avatar" id="player-avatar">?</div>
        <div class="channel-name" id="player-channel"></div>
        <span class="meta" id="player-views"></span>
      </div>
    </div>
    <div class="up-next">
      <div class="up-next-title">Up next</div>
      <div id="up-next-list"></div>
    </div>
  </div>
</div>

<script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script>
// Kill any service workers that might block requests
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations().then(r => r.forEach(reg => reg.unregister()));
}

// YOUR VPS PROXY - All requests go through YOUR server, NO CORS!
const PROXY = '/proxy.php?url=';

// APIs that work well
const PIPED_APIS = [
  'https://pipedapi.moomoo.me',
  'https://pipedapi.adminforge.de',
  'https://pipedapi-libre.kavin.rocks',
  'https://api.piped.projectsegfault.com',
  'https://pipedapi.palveluntarjoaja.eu',
  'https://pipedapi.garudalinux.org',
  'https://pipedapi.mha.fi',
  'https://pipedapi.drgns.space',
  'https://pipedapi.syncpundit.io',
  'https://pipedapi.leptons.xyz',
  'https://pipedapi.cobalt.rocks',
  'https://pipedapi.astral.cam',
];

const INVIDIOUS_APIS = [
  'https://inv.nadeko.net/api/v1',
  'https://iv.ggtyler.dev/api/v1',
  'https://invidious.fdn.fr/api/v1',
  'https://invidious.private.coffee/api/v1',
  'https://vid.puffyan.us/api/v1',
  'https://invidious.jing.rocks/api/v1',
  'https://invidious.darkness.service/api/v1',
  'https://invidious.perennialte.ch/api/v1',
  'https://inv.tux.pizza/api/v1',
  'https://invidious.tiekoetter.com/api/v1',
  'https://yewtu.be/api/v1',
  'https://invidious.projectsegfau.lt/api/v1',
];

let currentVideos = [];
let player = null;
const videoCache = new Map();

async function fetchViaProxy(url) {
  const r = await fetch(PROXY + encodeURIComponent(url), { signal: AbortSignal.timeout(10000) });
  if (!r.ok) throw new Error('Proxy error ' + r.status);
  return r.json();
}

async function raceFirst(path, isPiped = true) {
  const apis = isPiped ? PIPED_APIS : INVIDIOUS_APIS;
  
  // Race all APIs through proxy
  const promises = apis.map(async (api) => {
    try {
      const data = await fetchViaProxy(api + path);
      if (data && (Array.isArray(data) ? data.length > 0 : data.title || data.items)) {
        return data;
      }
      return null;
    } catch(e) { return null; }
  });

  // Wait for first successful response
  return new Promise((resolve, reject) => {
    let settled = false;
    let completed = 0;
    
    promises.forEach(p => {
      p.then(data => {
        if (!settled && data) {
          settled = true;
          resolve(data);
        }
        completed++;
        if (completed >= promises.length && !settled) {
          reject(new Error('All APIs failed'));
        }
      });
    });
  });
}

function extractVideoId(url) {
  if (!url) return null;
  const m = url.match(/[?&]v=([a-zA-Z0-9_-]{11})/);
  if (m) return m[1];
  if (/^[a-zA-Z0-9_-]{11}$/.test(url)) return url;
  return null;
}

async function search() {
  const q = document.getElementById('q').value.trim();
  if (!q) return;
  
  document.getElementById('results').innerHTML = '<div class="status">Searching...</div>';

  try {
    // Try Piped first
    const data = await raceFirst(`/search?q=${encodeURIComponent(q)}&filter=videos`, true);
    if (data && data.items) {
      const videos = data.items.map(item => ({
        videoId: extractVideoId(item.url),
        title: item.title,
        author: item.uploaderName,
        lengthSeconds: item.duration,
        viewCount: item.views,
        thumbnail: item.thumbnail
      })).filter(v => v.videoId);
      
      currentVideos = videos;
      cacheVids(videos);
      render(videos);
      return;
    }
  } catch(e) {}

  try {
    // Fallback to Invidious
    const data = await raceFirst(`/search?q=${encodeURIComponent(q)}&type=video&maxResults=24`, false);
    const videos = (data || []).map(item => ({
      videoId: item.videoId,
      title: item.title,
      author: item.author,
      lengthSeconds: item.lengthSeconds,
      viewCount: item.viewCount,
      thumbnail: `https://i.ytimg.com/vi/${item.videoId}/hqdefault.jpg`
    })).filter(v => v.videoId);
    
    currentVideos = videos;
    cacheVids(videos);
    render(videos);
  } catch(e) {
    document.getElementById('results').innerHTML = '<div class="status">Search failed. Try again.</div>';
  }
}

function render(data) {
  const el = document.getElementById('results');
  if (!data.length) { el.innerHTML = '<div class="status">No results</div>'; return; }
  
  el.innerHTML = data.map(v => `
    <div class="card" onclick="playVideoById('${esc(v.videoId)}')">
      <div class="thumb">
        <img src="${v.thumbnail || 'https://i.ytimg.com/vi/'+v.videoId+'/hqdefault.jpg'}" loading="lazy" onerror="this.src='https://i.ytimg.com/vi/${v.videoId}/mqdefault.jpg'">
        ${v.lengthSeconds ? `<span class="duration">${fmt(v.lengthSeconds)}</span>` : ''}
      </div>
      <div class="info">
        <div class="ch-avatar">${esc((v.author||'?')[0].toUpperCase())}</div>
        <div>
          <div class="title">${esc(v.title)}</div>
          <div class="meta">${esc(v.author)} &bull; ${fmtViews(v.viewCount)}</div>
        </div>
      </div>
    </div>
  `).join('');
}

function playVideoById(id) {
  const v = videoCache.get(id);
  if (v) playVideo(v);
  else fetchAndPlay(id);
}

async function fetchAndPlay(videoId) {
  try {
    // Get video info from Piped
    const data = await raceFirst(`/streams/${videoId}`, true);
    if (data && data.title) {
      const video = {
        videoId,
        title: data.title,
        author: data.uploader,
        viewCount: data.views,
        _streamUrl: (data.videoStreams || []).filter(s => !s.videoOnly && s.url).sort((a,b) => (b.height||0)-(a.height||0))[0]?.url,
        _hlsUrl: data.hls,
        _related: data.relatedStreams || []
      };
      cacheVids([video]);
      playVideo(video);
      return;
    }
  } catch(e) {}

  // YouTube embed fallback
  showEmbed(videoId);
}

async function playVideo(video) {
  cacheVids([video]);
  
  document.querySelector('.app').style.display = 'none';
  document.getElementById('player-view').style.display = 'block';
  window.scrollTo({top:0, behavior:'smooth'});

  document.getElementById('player-title').textContent = video.title || '';
  document.getElementById('player-channel').textContent = video.author || '';
  document.getElementById('player-avatar').textContent = (video.author||'?')[0].toUpperCase();
  document.getElementById('player-views').textContent = fmtViews(video.viewCount) || '';

  renderUpNext(video.videoId);

  const wrap = document.getElementById('player-wrap');
  if (window.hlsInstance) { window.hlsInstance.destroy(); window.hlsInstance = null; }

  let streamUrl = video._streamUrl || video._hlsUrl;
  const isHLS = streamUrl && (streamUrl.includes('.m3u8') || streamUrl.includes('manifest'));

  if (streamUrl) {
    // Ensure video element exists
    if (!wrap.querySelector('video')) {
      wrap.innerHTML = '<video id="player" controls playsinline></video>';
      if (player) player.destroy();
      player = new Plyr('#player', { controls: ['play-large','play','progress','current-time','mute','volume','settings','pip','fullscreen'], settings: ['quality','speed'] });
    }
    
    const videoEl = wrap.querySelector('video');
    
    if (isHLS && Hls.isSupported()) {
      window.hlsInstance = new Hls({ maxBufferLength: 30, startLevel: -1, capLevelToPlayerSize: false });
      window.hlsInstance.loadSource(streamUrl);
      window.hlsInstance.attachMedia(videoEl);
      window.hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
        let best = 0;
        window.hlsInstance.levels.forEach((l, i) => { if (l.height >= 720) best = i; });
        window.hlsInstance.currentLevel = best;
        videoEl.play().catch(()=>{});
      });
    } else {
      videoEl.src = streamUrl;
      if (player) player.source = { type: 'video', sources: [{ src: streamUrl, type: 'video/mp4' }] };
      videoEl.play().catch(()=>{});
    }
  } else {
    showEmbed(video.videoId);
  }
}

function showEmbed(videoId) {
  document.getElementById('player-wrap').innerHTML = 
    `<iframe width="100%" style="aspect-ratio:16/9" src="https://www.youtube.com/embed/${videoId}?autoplay=1&vq=hd720" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
  document.getElementById('player-title').textContent = 'Playing via YouTube embed';
}

async function renderUpNext(currentId) {
  const wrap = document.getElementById('up-next-list');
  wrap.innerHTML = '<div class="status">Loading...</div>';
  
  // Try related from cache
  const cached = videoCache.get(currentId);
  if (cached?._related?.length) {
    const related = cached._related.map(item => ({
      videoId: extractVideoId(item.url),
      title: item.title,
      author: item.uploaderName,
      lengthSeconds: item.duration,
      viewCount: item.views,
      thumbnail: item.thumbnail
    })).filter(v => v.videoId && v.videoId !== currentId).slice(0, 8);
    
    if (related.length) {
      cacheVids(related);
      renderUpList(related);
      return;
    }
  }
  
  // Search fallback
  try {
    const data = await raceFirst('/search?q=trending&filter=videos', true);
    if (data?.items) {
      const vids = data.items.map(item => ({
        videoId: extractVideoId(item.url),
        title: item.title,
        author: item.uploaderName,
        lengthSeconds: item.duration,
        viewCount: item.views,
        thumbnail: item.thumbnail
      })).filter(v => v.videoId && v.videoId !== currentId).slice(0, 6);
      
      cacheVids(vids);
      renderUpList(vids);
    }
  } catch(e) {
    wrap.innerHTML = '<div class="status">No suggestions</div>';
  }
}

function renderUpList(vids) {
  document.getElementById('up-next-list').innerHTML = vids.map(v => `
    <div class="up-card" onclick="playVideoById('${esc(v.videoId)}')">
      <div class="up-thumb">
        <img src="${v.thumbnail || 'https://i.ytimg.com/vi/'+v.videoId+'/hqdefault.jpg'}" loading="lazy">
        ${v.lengthSeconds ? `<span class="duration">${fmt(v.lengthSeconds)}</span>` : ''}
      </div>
      <div>
        <div class="up-title">${esc(v.title)}</div>
        <div class="up-meta">${esc(v.author)}</div>
      </div>
    </div>
  `).join('');
}

function goHome() {
  document.getElementById('player-view').style.display = 'none';
  document.querySelector('.app').style.display = 'flex';
}

function cacheVids(list) { (list||[]).forEach(v => { if(v?.videoId) videoCache.set(v.videoId, v); }); }

document.addEventListener('DOMContentLoaded', () => {
  player = new Plyr('#player', {
    controls: ['play-large','play','progress','current-time','mute','volume','settings','pip','fullscreen'],
    settings: ['quality','speed'],
    speed: { selected: 1, options: [0.5,0.75,1,1.25,1.5,2] }
  });
});

function fmt(s) {
  if (!s) return '';
  const h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sec = Math.floor(s%60);
  return h ? `${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}` : `${m}:${String(sec).padStart(2,'0')}`;
}
function fmtViews(v) {
  if (!v) return '';
  if (v>=1e9) return (v/1e9).toFixed(1)+'B views';
  if (v>=1e6) return (v/1e6).toFixed(1)+'M views';
  if (v>=1e3) return (v/1e3).toFixed(1)+'K views';
  return v+' views';
}
function esc(s) { const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }
</script>
</body>
</html>
