<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>T9 Tube</title>
<link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0f0f0f;
  --card:#181818;
  --sidebar:#0f0f0f;
  --header:#0f0f0f;
  --accent:#f00;
  --text:#f1f1f1;
  --muted:#aaa;
  --hover:#272727;
  --input:#121212;
  --border:#303030;
  --chip-bg:#272727;
  --chip-active:#f1f1f1;
}
html,body{height:100%}
body{background:var(--bg);color:var(--text);font-family:Roboto,Arial,'Segoe UI',sans-serif;overflow-x:hidden}

/* ===== HEADER ===== */
header{
  position:fixed;top:0;left:0;right:0;height:56px;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  background:var(--header);padding:0 16px;border-bottom:1px solid transparent;
}
.header-left{display:flex;align-items:center;gap:16px;min-width:160px}
.menu-btn{background:none;border:none;cursor:pointer;padding:8px;border-radius:50%;display:flex;color:var(--text)}
.menu-btn:hover{background:var(--hover)}
.logo{display:flex;align-items:center;gap:4px;cursor:pointer;user-select:none}
.logo svg{color:var(--accent);width:30px;height:30px}
.logo span{font-size:20px;font-weight:600;letter-spacing:-0.5px;color:var(--text)}
.logo span b{font-weight:700}

.header-center{flex:1;display:flex;justify-content:center;max-width:720px;margin:0 40px}
.search-form{display:flex;width:100%;max-width:640px}
.search-form input{
  flex:1;background:var(--input);border:1px solid var(--border);border-right:none;
  border-radius:20px 0 0 20px;padding:0 16px;height:40px;color:var(--text);font-size:16px;outline:none;
}
.search-form input:focus{border-color:#1c62b9}
.search-form button{
  width:64px;background:#222222;border:1px solid var(--border);border-radius:0 20px 20px 0;
  cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text);
}
.search-form button:hover{background:#3f3f3f}

.header-right{display:flex;align-items:center;gap:8px;min-width:160px;justify-content:flex-end}
.icon-btn{background:none;border:none;color:var(--text);cursor:pointer;padding:8px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.icon-btn:hover{background:var(--hover)}
.avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#f23f43,#5865f2);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;cursor:pointer}

/* ===== SIDEBAR ===== */
.sidebar{
  position:fixed;top:56px;left:0;bottom:0;width:240px;background:var(--sidebar);
  overflow-y:auto;padding:12px 0;z-index:90;transition:transform .2s ease;
}
.sidebar.collapsed{width:72px}
.sidebar.collapsed .sec-label, .sidebar.collapsed .nav-item span{display:none}
.sidebar.collapsed .nav-item{flex-direction:column;gap:2px;padding:14px 0;border-radius:8px;margin:0 4px}
.sidebar.collapsed .nav-item svg{width:24px;height:24px}
.sidebar.collapsed .nav-item .mini-label{display:block;font-size:10px}
.nav-item .mini-label{display:none}

.nav-section{padding:0 0 8px 0;border-bottom:1px solid var(--border);margin-bottom:8px}
.nav-section:last-child{border-bottom:none}
.nav-item{
  display:flex;align-items:center;gap:24px;padding:0 24px;height:40px;cursor:pointer;
  color:var(--text);font-size:14px;border-radius:0 20px 20px 0;
}
.sidebar.collapsed .nav-item{border-radius:8px}
.nav-item:hover{background:var(--hover)}
.nav-item.active{background:var(--hover);font-weight:600}
.nav-item.active svg{color:var(--text)}
.nav-item svg{flex-shrink:0;width:24px;height:24px;color:var(--text)}
.sec-label{font-size:16px;font-weight:600;padding:8px 24px;color:var(--text)}

/* ===== MAIN LAYOUT ===== */
.app{display:flex;padding-top:56px}
.main{flex:1;margin-left:240px;padding:24px;transition:margin .2s ease;min-height:calc(100vh - 56px)}
.main.expanded{margin-left:72px}

/* ===== CHIPS (categories) ===== */
.chips{display:flex;gap:12px;margin-bottom:24px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{
  flex-shrink:0;background:var(--chip-bg);color:var(--text);border:none;border-radius:8px;
  padding:7px 12px;font-size:14px;font-weight:500;cursor:pointer;white-space:nowrap;
}
.chip:hover{background:#3f3f3f}
.chip.active{background:var(--chip-active);color:#0f0f0f}

/* ===== GRID ===== */
#results{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:28px 16px}
.card{cursor:pointer;border-radius:0}
.thumb{position:relative;aspect-ratio:16/9;background:#000;overflow:hidden;border-radius:12px}
.thumb img{width:100%;height:100%;object-fit:cover;transition:transform .2s}
.card:hover .thumb img{transform:scale(1.02)}
.duration{position:absolute;bottom:6px;right:6px;background:rgba(0,0,0,.8);color:#fff;font-size:12px;font-weight:500;padding:2px 4px;border-radius:4px}
.fyp-badge{position:absolute;top:6px;left:6px;background:rgba(0,0,0,.75);color:#fff;font-size:10px;font-weight:600;padding:3px 6px;border-radius:4px;display:flex;align-items:center;gap:4px}
.fyp-badge svg{width:10px;height:10px}
.info{display:flex;gap:12px;padding:12px 0 0}
.ch-avatar{width:36px;height:36px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,#5865f2,#f23f43);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#fff}
.info-text{min-width:0}
.title{font-size:15px;font-weight:500;color:var(--text);margin-bottom:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.35}
.meta{font-size:13px;color:var(--muted);line-height:1.4}
.status{padding:60px 20px;text-align:center;color:var(--muted);grid-column:1/-1;font-size:16px}

.section-title{display:flex;align-items:center;gap:8px;font-size:18px;font-weight:600;margin:0 0 16px;color:var(--text)}
.section-title svg{width:20px;height:20px;color:var(--accent)}
.section-sub{color:var(--muted);font-size:13px;font-weight:400;margin-left:4px}

/* ===== PLAYER VIEW ===== */
#player-view{display:none;padding-top:56px}
.player-layout{display:flex;gap:24px;padding:24px;max-width:1800px;margin:0 auto;align-items:flex-start}
.player-main{flex:1;min-width:0;max-width:1280px}
#player-wrap{width:100%;background:#000;border-radius:12px;overflow:hidden}
#player-wrap video{width:100%;display:block;aspect-ratio:16/9}
.player-title{font-size:18px;font-weight:600;margin:14px 0 8px;line-height:1.3}
.player-meta-row{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;padding-bottom:14px;border-bottom:1px solid var(--border);margin-bottom:16px}
.channel-row{display:flex;align-items:center;gap:12px}
.channel-name{font-weight:600;font-size:14px}
.channel-sub{font-size:12px;color:var(--muted)}
.back-btn{display:flex;align-items:center;gap:6px;background:var(--chip-bg);border:none;color:var(--text);padding:8px 16px;border-radius:18px;cursor:pointer;font-size:14px;font-weight:500;margin-bottom:16px}
.back-btn:hover{background:#3f3f3f}
.subscribe-btn{background:#f1f1f1;color:#0f0f0f;border:none;padding:9px 16px;border-radius:18px;font-weight:600;font-size:14px;cursor:pointer}
.action-pills{display:flex;gap:8px}
.pill{display:flex;align-items:center;gap:6px;background:var(--chip-bg);border:none;color:var(--text);padding:9px 14px;border-radius:18px;cursor:pointer;font-size:14px;font-weight:500}
.pill:hover{background:#3f3f3f}
.player-desc{background:var(--card);border-radius:12px;padding:12px 16px;font-size:14px;color:var(--text);line-height:1.5}

.up-next{width:402px;flex-shrink:0}
.up-next-title{font-size:16px;font-weight:600;margin-bottom:12px}
.up-card{display:flex;gap:8px;margin-bottom:10px;cursor:pointer;border-radius:8px;padding:4px;}
.up-card:hover{background:var(--hover)}
.up-thumb{position:relative;width:168px;flex-shrink:0;aspect-ratio:16/9;border-radius:8px;overflow:hidden;background:#000}
.up-thumb img{width:100%;height:100%;object-fit:cover}
.up-info{min-width:0}
.up-title{font-size:14px;font-weight:500;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.3;margin-bottom:4px}
.up-meta{font-size:12px;color:var(--muted)}

@media (max-width:1100px){
  .player-layout{flex-direction:column}
  .up-next{width:100%}
}
@media (max-width:900px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .main{margin-left:0}
  .main.expanded{margin-left:0}
  .header-center{margin:0 12px}
  .logo span{display:none}
}

:root{--plyr-color-main:#f00;--plyr-video-background:#000}
</style>

<script>
const APIS = [
  'https://inv.nadeko.net/api/v1',
  'https://invidious.nerdvpn.de/api/v1',
  'https://invidious.privacyredirect.com/api/v1',
  'https://iv.melmac.space/api/v1',
  'https://invidious.io.lol/api/v1',
  'https://invidious.incogniweb.net/api/v1',
  'https://yt.artemislena.eu/api/v1',
  'https://invidious.jing.rocks/api/v1',
  'https://invidious.f5.si/api/v1',
  'https://invidious.protokolla.fi/api/v1',
  'https://yewtu.be/api/v1',
  'https://invidious.tiekoetter.com/api/v1',
  'https://inv.tux.pizza/api/v1',
  'https://invidious.darkness.service/api/v1',
  'https://invidious.einfachzocken.eu/api/v1',
  'https://iv.ggtyler.dev/api/v1',
  'https://invidious.projectsegfau.lt/api/v1',
  'https://inv.in.projectsegfau.lt/api/v1',
  'https://invidious.fdn.fr/api/v1',
  'https://invidious.perennialte.ch/api/v1',
  'https://invidious.qwik.space/api/v1',
  'https://invidious.dhusch.de/api/v1',
  'https://inv.vern.cc/api/v1',
  'https://invidious.0011.lt/api/v1',
  'https://invidious.adminforge.de/api/v1',
];

let apiIdx = 0;
let currentVideos = [];
let player = null;
let currentView = 'home';

/* ===== VIDEO CACHE ===== */
const videoCache = new Map();
function cacheVideos(list){
  (list||[]).forEach(v=>{ if(v && v.videoId) videoCache.set(v.videoId, v); });
}

/* Race all APIs in parallel */
function raceApis(pathFn, {timeout=7000, startIdx=0}={}){
  return new Promise((resolve, reject)=>{
    let settled = false;
    let remaining = APIS.length;
    let lastErr = null;
    for(let i=0;i<APIS.length;i++){
      const api = APIS[(startIdx + i) % APIS.length];
      const controller = new AbortController();
      const t = setTimeout(()=>controller.abort(), timeout);
      fetch(api + pathFn, {signal: controller.signal})
        .then(r=>{ clearTimeout(t); if(!r.ok) throw new Error('bad status'); return r.json(); })
        .then(data=>{ if(!settled){ settled = true; resolve({data, api}); } })
        .catch(err=>{ lastErr = err; })
        .finally(()=>{
          remaining--;
          if(remaining===0 && !settled){ reject(lastErr || new Error('all apis failed')); }
        });
    }
  });
}

/* ===== PERSISTENCE ===== */
const STORE_KEY = 't9tube_data_v1';
function loadStore(){
  try{
    return JSON.parse(localStorage.getItem(STORE_KEY)) || {searches:[], watched:[], topicScores:{}};
  }catch(e){ return {searches:[], watched:[], topicScores:{}}; }
}
function saveStore(s){ localStorage.setItem(STORE_KEY, JSON.stringify(s)); }
let store = loadStore();

const STOPWORDS = new Set(['the','a','an','and','or','of','to','in','on','for','with','is','are','vs','full','official','video','new','best','how','what','why','2023','2024','2025','2026','ep','episode']);
function extractTopics(text){
  return (text||'').toLowerCase()
    .replace(/[^\w\s]/g,' ')
    .split(/\s+/)
    .filter(w => w.length>2 && !STOPWORDS.has(w));
}
function bumpTopics(words, weight){
  words.forEach(w=>{
    store.topicScores[w] = (store.topicScores[w]||0) + weight;
  });
}
function recordSearch(q){
  store.searches.unshift({q, t:Date.now()});
  store.searches = store.searches.slice(0,50);
  bumpTopics(extractTopics(q), 3);
  saveStore(store);
  renderTrendingTopics();
}
function recordWatch(video){
  store.watched.unshift({
    videoId:video.videoId, title:video.title, author:video.author,
    thumb:`https://i.ytimg.com/vi/${video.videoId}/hqdefault.jpg`, t:Date.now()
  });
  store.watched = store.watched.slice(0,100);
  bumpTopics(extractTopics(video.title), 2);
  bumpTopics(extractTopics(video.author), 1);
  saveStore(store);
  renderTrendingTopics();
}
function clearHistory(){
  if(!confirm('Clear your watch & search history? This resets your For You page.')) return;
  store = {searches:[], watched:[], topicScores:{}};
  saveStore(store);
  renderTrendingTopics();
  if(currentView==='fyp') renderFYP();
  if(currentView==='history') renderHistory();
}
function topTopics(n=8){
  return Object.entries(store.topicScores).sort((a,b)=>b[1]-a[1]).slice(0,n).map(e=>e[0]);
}
function renderTrendingTopics(){
  const sec = document.getElementById('trending-topics-section');
  const wrap = document.getElementById('trending-topics');
  const topics = topTopics(6);
  if(!topics.length){ sec.style.display='none'; return; }
  sec.style.display='block';
  wrap.innerHTML = topics.map(t=>`<div class="nav-item" onclick="quickSearch('${escAttr(t)}')" style="font-size:13px;color:var(--muted)">
    <svg viewBox="0 0 24 24" fill="currentColor" style="width:18px;height:18px"><path d="M3.5 18.49l6-6.01 4 4L22 6.92l-1.41-1.41-7.09 7.97-4-4L2 16.99z"/></svg>
    <span>${esc(t)}</span>
  </div>`).join('');
}
function quickSearch(t){
  document.getElementById('q').value = t;
  setView('home');
  search();
}

/* ===== VIEW SWITCHING ===== */
function toggleSidebar(){
  document.getElementById('sidebar').classList.toggle('collapsed');
  document.getElementById('main').classList.toggle('expanded');
}
function setView(view){
  currentView = view;
  document.querySelectorAll('.nav-item[data-view]').forEach(n=>n.classList.toggle('active', n.dataset.view===view));
  document.getElementById('player-view').style.display='none';
  document.getElementById('home-view').style.display='block';
  document.querySelector('.app').style.display='flex';

  const chips = document.getElementById('chips');
  const results = document.getElementById('results');

  if(view==='home'){
    chips.style.display='flex';
    renderChips();
    if(!currentVideos.length) showDefaultHome();
  } else if(view==='fyp'){
    chips.style.display='none';
    renderFYP();
  } else if(view==='history'){
    chips.style.display='none';
    renderHistory();
  } else if(view==='subs'){
    chips.style.display='none';
    results.innerHTML = `<div class="status">Subscribe to channels to see them here.<br><span style="font-size:13px">(This is a lightweight demo — subscriptions aren't wired to a backend.)</span></div>`;
  }
}
function goHome(){ setView('home'); }

/* ===== DEFAULT CHIPS ===== */
const DEFAULT_CHIPS = ['All','Music','Gaming','News','Live','Coding','Movies','Podcasts','Sports','Tech'];
function renderChips(){
  const el = document.getElementById('chips');
  el.innerHTML = DEFAULT_CHIPS.map((c,i)=>`<button class="chip ${i===0?'active':''}" onclick="chipClick(this,'${escAttr(c)}')">${esc(c)}</button>`).join('');
}
function chipClick(btn, label){
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
  btn.classList.add('active');
  if(label==='All'){ showDefaultHome(); return; }
  document.getElementById('q').value = label;
  search();
}

function showDefaultHome(){
  const el = document.getElementById('results');
  const topics = topTopics(3);
  if(topics.length){
    el.innerHTML = `<div class="status">Search something above, or check your <b style="color:var(--text)">For You</b> page in the sidebar — it's already picking up on: ${topics.map(esc).join(', ')}</div>`;
  } else {
    el.innerHTML = `<div class="status">Search for videos above to get started. Your <b style="color:var(--text)">For You</b> page will build itself as you go.</div>`;
  }
}

/* ===== SEARCH ===== */
async function search() {
  const q = document.getElementById('q').value.trim();
  if (!q) return;
  setView('home');
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
  recordSearch(q);

  const el = document.getElementById('results');
  el.innerHTML = '<div class="status">Searching…</div>';

  try{
    const {data} = await raceApis(`/search?q=${encodeURIComponent(q)}&type=video&maxResults=24`, {startIdx: apiIdx});
    cacheVideos(data);
    currentVideos = data;
    renderResults(data, {title:`Results for "${q}"`});
  }catch(e){
    el.innerHTML = '<div class="status">All search APIs failed. Try again.</div>';
  }
}

function renderResults(data, opts={}) {
  const el = document.getElementById('results');
  if (!data || !data.length) { el.innerHTML = '<div class="status">No results.</div>'; return; }
  cacheVideos(data);

  let header = '';
  if(opts.title){
    header = `<div class="section-title" style="grid-column:1/-1">${opts.icon||''}${esc(opts.title)}${opts.sub?`<span class="section-sub">${esc(opts.sub)}</span>`:''}</div>`;
  }

  el.innerHTML = header + data.map((v) => `
    <div class="card" data-id="${escAttr(v.videoId)}" onclick="playVideoById('${escAttr(v.videoId)}')">
      <div class="thumb">
        <img src="https://i.ytimg.com/vi/${v.videoId}/hqdefault.jpg" loading="lazy">
        ${v.lengthSeconds ? `<span class="duration">${fmt(v.lengthSeconds)}</span>` : ''}
        ${v._fyp ? `<span class="fyp-badge"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M13 2.05v3.03c3.39.49 6 3.39 6 6.92 0 .9-.18 1.75-.48 2.54l2.6 1.53c.56-1.24.88-2.62.88-4.07 0-5.18-3.95-9.45-9-9.95zM12 19c-3.87 0-7-3.13-7-7 0-3.53 2.61-6.43 6-6.92V2.05c-5.06.5-9 4.76-9 9.95 0 5.52 4.47 10 9.99 10 3.31 0 6.24-1.61 8.06-4.09l-2.6-1.53C17.15 17.81 14.75 19 12 19z"/></svg>${esc(v._fypReason||'For You')}</span>` : ''}
      </div>
      <div class="info">
        <div class="ch-avatar">${esc((v.author||'?').charAt(0).toUpperCase())}</div>
        <div class="info-text">
          <div class="title">${esc(v.title)}</div>
          <div class="meta">${esc(v.author)}</div>
          <div class="meta">${fmtViews(v.viewCount)}${v.publishedText?` • ${esc(v.publishedText)}`:''}</div>
        </div>
      </div>
    </div>
  `).join('');
}

function playVideoById(id){
  const video = videoCache.get(id);
  if(video) playVideo(video);
  else console.warn('video not found in cache:', id);
}

/* ===== FOR YOU PAGE ===== */
async function renderFYP(){
  const el = document.getElementById('results');
  document.getElementById('chips').style.display='none';
  const topics = topTopics(6);

  if(!topics.length){
    el.innerHTML = `<div class="status">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="currentColor" style="color:var(--muted);margin-bottom:12px"><path d="M13 2.05v3.03c3.39.49 6 3.39 6 6.92 0 .9-.18 1.75-.48 2.54l2.6 1.53c.56-1.24.88-2.62.88-4.07 0-5.18-3.95-9.45-9-9.95zM12 19c-3.87 0-7-3.13-7-7 0-3.53 2.61-6.43 6-6.92V2.05c-5.06.5-9 4.76-9 9.95 0 5.52 4.47 10 9.99 10 3.31 0 6.24-1.61 8.06-4.09l-2.6-1.53C17.15 17.81 14.75 19 12 19z"/></svg><br>
      Nothing here yet. Search and watch a few videos — your For You page builds from what you look up and watch.
    </div>`;
    return;
  }

  el.innerHTML = '<div class="status">Building your feed…</div>';

  const picksPerTopic = topics.length <= 3 ? 6 : topics.length <= 5 ? 4 : 3;
  let combined = [];

  for(const topic of topics){
    const vids = await fetchSearch(topic, picksPerTopic);
    vids.forEach(v=>{ v._fyp = true; v._fypReason = `Because you searched "${topic}"`; });
    combined = combined.concat(vids);
  }

  const seen = new Set();
  combined = combined.filter(v=>{
    if(!v.videoId || seen.has(v.videoId)) return false;
    seen.add(v.videoId);
    return true;
  });
  combined = shuffle(combined);

  cacheVideos(combined);
  currentVideos = combined;
  if(!combined.length){
    el.innerHTML = '<div class="status">Could not load your feed right now. Try again in a moment.</div>';
    return;
  }
  renderResults(combined, {
    title:'For You',
    sub:`based on: ${topics.join(', ')}`,
    icon:`<svg viewBox="0 0 24 24" fill="currentColor"><path d="M13 2.05v3.03c3.39.49 6 3.39 6 6.92 0 .9-.18 1.75-.48 2.54l2.6 1.53c.56-1.24.88-2.62.88-4.07 0-5.18-3.95-9.45-9-9.95zM12 19c-3.87 0-7-3.13-7-7 0-3.53 2.61-6.43 6-6.92V2.05c-5.06.5-9 4.76-9 9.95 0 5.52 4.47 10 9.99 10 3.31 0 6.24-1.61 8.06-4.09l-2.6-1.53C17.15 17.81 14.75 19 12 19z"/></svg>`
  });
}

async function fetchSearch(q, max){
  try{
    const {data} = await raceApis(`/search?q=${encodeURIComponent(q)}&type=video&maxResults=${max}`, {startIdx: apiIdx});
    return (data||[]).slice(0,max);
  }catch(e){
    return [];
  }
}
function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

/* ===== HISTORY VIEW ===== */

  const el = document.getElementById('results');
  if(!store.watched.length){
    el.innerHTML = '<div class="status">No watch history yet.</div>';
    return;
  }
  // Cache history items
  cacheVideos(store.watched.map(w=>({videoId:w.videoId, title:w.title, author:w.author})));
  
  el.innerHTML = `<div class="section-title" style="grid-column:1/-1">Watch history</div>` +
    store.watched.map((v) => `
    <div class="card" data-id="${escAttr(v.videoId)}" onclick="playVideoById('${escAttr(v.videoId)}')">
      <div class="thumb">
        <img src="${v.thumb}" loading="lazy">
      </div>
      <div class="info">
        <div class="ch-avatar">${esc((v.author||'?').charAt(0).toUpperCase())}</div>
        <div class="info-text">
          <div class="title">${esc(v.title)}</div>
          <div class="meta">${esc(v.author)}</div>
        </div>

}

/* ===== PLAYER ===== */
document.addEventListener('DOMContentLoaded', () => {
  player = new Plyr('#player', {
    controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'captions', 'settings', 'pip', 'airplay', 'fullscreen'],
    settings: ['quality', 'speed'],

      default: 720,
      options: [4320, 2160, 1440, 1080, 720, 480, 360, 240]
    },

  });
  renderTrendingTopics();
  setView('home');
});

async function playVideo(video) {
  const videoId = video.videoId, title = video.title;
  recordWatch(video);

  document.querySelector('.app').style.display='none';
  document.getElementById('player-view').style.display='block';
  window.scrollTo({top:0, behavior:'smooth'});

  document.getElementById('player-title').textContent = title;
  document.getElementById('player-channel').textContent = video.author || '';
  document.getElementById('player-avatar').textContent = (video.author||'?').charAt(0).toUpperCase();
  document.getElementById('player-views').textContent = fmtViews(video.viewCount) || '';
  document.getElementById('player-desc').textContent = video.description || 'No description available.';

  renderUpNext(videoId);

  const videoElement = document.getElementById('player');

  if (window.hlsInstance) { window.hlsInstance.destroy(); window.hlsInstance = null; }
  if (player) { player.source = { type: 'video', sources: [] }; }

  // Try to get the best quality video
  for (let i = 0; i < APIS.length; i++) {
    const api = APIS[(apiIdx + i) % APIS.length];
    try {
      const r = await fetch(`${api}/videos/${videoId}`, {signal: AbortSignal.timeout(8000)});
      if (!r.ok) continue;
      const videoData = await r.json();

      let streamUrl = null;
      
      // First priority: HLS stream (usually best quality with adaptive bitrate)
      if (videoData.hlsUrl) {
        streamUrl = videoData.hlsUrl;
      } 
      // Second priority: Combined video+audio streams (formatStreams)
      else if (videoData.formatStreams && videoData.formatStreams.length > 0) {
        const sorted = videoData.formatStreams
          .filter(s => s.url && s.type && s.type.startsWith('video/'))
          .sort((a, b) => {
            // Sort by quality (higher is better)
            const qualityA = parseInt(a.quality) || 0;
            const qualityB = parseInt(b.quality) || 0;
            // Prefer MP4 over WebM for compatibility
            if (qualityA === qualityB) {
              return (a.container === 'mp4' ? -1 : 1);
            }
            return qualityB - qualityA;
          });
        if (sorted.length) streamUrl = sorted[0].url;
      } 
      // Third priority: Separate video streams (adaptiveFormats) - highest quality
      else if (videoData.adaptiveFormats && videoData.adaptiveFormats.length > 0) {
        const sorted = videoData.adaptiveFormats
          .filter(s => s.url && s.type && s.type.startsWith('video/') && !s.type.includes('audio'))
          .sort((a, b) => {
            const qualityA = parseInt(a.qualityLabel) || 0;
            const qualityB = parseInt(b.qualityLabel) || 0;
            if (qualityA === qualityB) {
              return (a.container === 'mp4' ? -1 : 1);
            }
            return qualityB - qualityA;
          });
        if (sorted.length) streamUrl = sorted[0].url;
      }

      if (streamUrl) {
        console.log('Playing stream:', streamUrl);
        
        if (streamUrl.includes('.m3u8') || streamUrl.includes('manifest')) {
          // HLS stream - use hls.js for best quality adaptive streaming
          if (Hls.isSupported()) {
            window.hlsInstance = new Hls({
              maxBufferLength: 30,
              maxMaxBufferLength: 600,
              maxBufferSize: 60 * 1000 * 1000,
              maxBufferHole: 0.5,
              lowLatencyMode: true,
              backBufferLength: 90,
              enableWorker: true,
              startLevel: -1, // Auto quality selection
              capLevelToPlayerSize: true,
              autoStartLoad: true,
              manifestLoadingTimeOut: 10000,
              manifestLoadingMaxRetry: 4,
              levelLoadingTimeOut: 10000,
              levelLoadingMaxRetry: 4,
              fragLoadingTimeOut: 20000,
              fragLoadingMaxRetry: 6
            });
            
            window.hlsInstance.loadSource(streamUrl);
            window.hlsInstance.attachMedia(videoElement);
            
            window.hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
              console.log('HLS manifest loaded, levels:', window.hlsInstance.levels.length);
              // Update Plyr source
              if (player) {
                const levels = window.hlsInstance.levels.map((level, index) => ({
                  src: streamUrl,
                  type: 'application/x-mpegURL',
                  size: index
                }));
                player.source = {
                  type: 'video',
                  sources: [{
                    src: streamUrl,
                    type: 'application/x-mpegURL'
                  }]
                };
              }
              videoElement.play().catch(() => {});
            });
            
            window.hlsInstance.on(Hls.Events.ERROR, (event, data) => {
              console.error('HLS error:', data);
            });
          } else if (videoElement.canPlayType('application/vnd.apple.mpegurl')) {
            // Native HLS support (Safari)
            videoElement.src = streamUrl;
            if (player) {
              player.source = {
                type: 'video',
                sources: [{
                  src: streamUrl,
                  type: 'application/x-mpegURL'
                }]
              };
            }
            videoElement.play().catch(() => {});
          }
        } else {
          // Regular MP4 stream
          const sourceType = streamUrl.includes('.webm') ? 'video/webm' : 'video/mp4';
          if (player) {
            player.source = {
              type: 'video',
              sources: [{
                src: streamUrl,
                type: sourceType
              }]
            };
          } else {
            videoElement.src = streamUrl;
          }
          videoElement.play().catch(() => {});
        }
        apiIdx = (apiIdx + i) % APIS.length;
        return;
      }
    } catch(e) {
      console.error('Failed to fetch video info:', e);
    }
  }
  alert('Could not load video. Try another source or refresh.');
}

async function renderUpNext(currentId){
  const wrap = document.getElementById('up-next-list');
  wrap.innerHTML = '<div class="status" style="padding:20px 0">Loading…</div>';
  
  const topics = topTopics(3);
  const seed = topics.length ? topics[Math.floor(Math.random()*topics.length)] : (currentVideos[0]?.author || 'trending');
  const vids = await fetchSearch(seed, 10);
  const filtered = vids.filter(v => v.videoId !== currentId).slice(0, 8);
  
  if(!filtered.length){ 
    wrap.innerHTML = '<div class="status" style="padding:20px 0">No suggestions available.</div>'; 
    return; 
  }
  
  // Cache the up-next videos and store them in currentVideos for easy access
  cacheVideos(filtered);
  currentVideos = filtered;
  
  wrap.innerHTML = filtered.map((v) => `
    <div class="up-card" data-id="${escAttr(v.videoId)}" onclick="playVideoById('${escAttr(v.videoId)}')">
      <div class="up-thumb">
        <img src="https://i.ytimg.com/vi/${v.videoId}/hqdefault.jpg" loading="lazy">
        ${v.lengthSeconds ? `<span class="duration">${fmt(v.lengthSeconds)}</span>` : ''}
      </div>
      <div class="up-info">
        <div class="up-title">${esc(v.title)}</div>
        <div class="up-meta">${esc(v.author)}</div>
        <div class="up-meta">${fmtViews(v.viewCount)}</div>
      </div>
    </div>
  `).join('');
}

/* ===== UTILS ===== */
function fmt(s) {
  if (!s) return '';
  const h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sec = s%60;
  return h ? `${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}` : `${m}:${String(sec).padStart(2,'0')}`;
}
function fmtViews(v) {
  if (!v) return '';
  if (v>=1e6) return (v/1e6).toFixed(1)+'M views';
  if (v>=1e3) return (v/1e3).toFixed(1)+'K views';
  return v+' views';
}
function esc(s) { const d=document.createElement('div');d.textContent=s||'';return d.innerHTML; }
function escAttr(s){ return (s||'').replace(/'/g,"\\'").replace(/"/g,'&quot;'); }
