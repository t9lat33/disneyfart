      <meta charset="utf-8"/>
      <link rel="icon" href="/favicon.ico"/>
      <meta name="viewport" content="width=device-width,initial-scale=1"/>
      <meta name="theme-color" content="#000000"/>
      <meta name="description" content="A PlayStation2 emulator for web browsers"/>
      <link rel="apple-touch-icon" href="/logo192.png"/>
      <link rel="manifest" href="/manifest.json"/>
      <title>Play!.js</title>
      <script defer="defer" src="static/js/main.fb6e8aea.js"></script>
      <link href="static/css/main.5a525eca.css" rel="stylesheet">
      <style>
         * { margin: 0; padding: 0; box-sizing: border-box; }
         html, body { width: 100vw; height: 100vh; overflow: hidden; background: #000; }
         .global-row, .global-column { display: contents; }
         .global-column:last-child { display: none; }
         #outputCanvas {
            position: fixed !important;
            top: 50% !important;
            left: 50% !important;
            transform: translate(-50%, -50%) !important;
            width: min(100vw, calc(100vh * 4 / 3)) !important;
            height: min(100vh, calc(100vw * 3 / 4)) !important;
            z-index: 1;
            image-rendering: auto;
         }
         #root, #root * {
            position: fixed !important;
            overflow: hidden !important;
            width: 0 !important;
            height: 0 !important;
            opacity: 0 !important;
            pointer-events: none !important;
         }
         #autoload-overlay {
            position: fixed;
            inset: 0;
            z-index: 999;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-family: system-ui, sans-serif;
            font-size: 1.2rem;
         }
         #autoload-overlay .progress {
            text-align: center;
         }
         #autoload-overlay .bar-track {
            width: 300px;
            height: 4px;
            background: #222;
            border-radius: 2px;
            margin-top: 12px;
         }
         #autoload-overlay .bar-fill {
            height: 100%;
            background: #fff;
            border-radius: 2px;
            width: 0%;
            transition: width 0.2s;
         }
      </style>
   </head>
   <body>
      <div id="autoload-overlay">
         <div class="progress">
            <div id="autoload-status">loading gtasan.ISO... DISCOVERED BY BOG, TRUFFLED.LOL</div>
            <div class="bar-track"><div class="bar-fill" id="autoload-bar"></div></div>
         </div>
      </div>
      <noscript>You need to enable JavaScript to run this app.</noscript>
      <div class="global-row">
         <div class="global-column">
            <div>
               <canvas id="outputCanvas" width="640" height="480" tabindex="-1"/>
            </div>
            <div id="root"></div>
         </div>
         <div class="global-column">
         </div>
      </div>
      <script>
         (function() {
            let overlay = document.getElementById('autoload-overlay')
            let status = document.getElementById('autoload-status')
            let bar = document.getElementById('autoload-bar')
            async function autoload() {
               try {
                  let res = await fetch('gtasan.ISO')
                  if (!res.ok) throw new Error('failed to fetch gtasan.ISO (' + res.status + ')')
                  let total = parseInt(res.headers.get('content-length') || '0')
                  let loaded = 0
                  let chunks = []
                  let reader = res.body.getReader()
                  while (true) {
                     let { done, value } = await reader.read()
                     if (done) break
                     chunks.push(value)
                     loaded += value.length
                     if (total > 0) {
                        let pct = Math.round((loaded / total) * 100)
                        bar.style.width = pct + '%'
                        status.textContent = 'loading gtasan.iso... ' + pct + '%'
                     }
                  }
                  let blob = new Blob(chunks)
                  let file = new File([blob], 'gtasan.ISO', { type: 'application/octet-stream' })
                  status.textContent = 'waiting for emulator...'
                  bar.style.width = '100%'
                  let input = await waitForInput()
                  let dt = new DataTransfer()
                  dt.items.add(file)
                  input.files = dt.files
                  input.dispatchEvent(new Event('change', { bubbles: true }))
                  overlay.style.opacity = '0'
                  overlay.style.transition = 'opacity 0.4s'
                  setTimeout(() => overlay.remove(), 500)
               } catch (e) {
                  status.textContent = e.message
                  console.error(e)
               }
            }
            function waitForInput() {
               return new Promise(resolve => {
                  let check = setInterval(() => {
                     let input = document.querySelector('input[type="file"]')
                     if (input) {
                        clearInterval(check)
                        resolve(input)
                     }
                  }, 100)
               })
            }
            autoload()
         })()
      </script>
   </body>
</html>
