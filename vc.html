<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>T9 Voice Chat</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #1a1a2e;
  color: #cdd6f4;
  font-family: 'Segoe UI', sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
  gap: 20px;
}
h1 { font-size: 1.1rem; color: #89b4fa; letter-spacing: .05em; }
input {
  background: #202036;
  border: 1px solid rgba(255,255,255,.1);
  border-radius: 8px;
  color: #cdd6f4;
  padding: 8px 14px;
  font-size: .9rem;
  outline: none;
  width: 160px;
}
button {
  background: #202036;
  border: 1px solid rgba(255,255,255,.1);
  border-radius: 8px;
  color: #cdd6f4;
  padding: 8px 18px;
  font-size: .9rem;
  cursor: pointer;
}
button:hover { background: #2a2a48; }
#status { font-size: .8rem; color: #6c7086; }
</style>
</head>
<body>
<h1>T9 Voice Chat</h1>
<div style="display:flex;gap:8px">
  <input id="room" placeholder="Room" value="vc1" />
  <button onclick="join()">Join</button>
  <button onclick="leave()">Leave</button>
  <button onclick="toggleMic()" id="mic">Mute</button>
</div>
<div id="status">Not connected</div>

<script>
const SIGNAL = `wss://${location.host}/signal/`;
const ICE = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };
const myId = Math.random().toString(36).slice(2, 8);
let ws, stream, muted = false;
const peers = {};

function log(s) { document.getElementById('status').textContent = s; }
function send(msg) { ws.send(JSON.stringify({ ...msg, from: myId, room: document.getElementById('room').value })); }

async function join() {
  stream = await navigator.mediaDevices.getUserMedia({ audio: true }).catch(() => { log('Mic denied'); return null; });
  if (!stream) return;
  ws = new WebSocket(SIGNAL);
  ws.onopen = () => { send({ type: 'join' }); log('Connected'); };
  ws.onmessage = async ({ data }) => {
    const msg = JSON.parse(data);
    if (msg.from === myId) return;
    const id = msg.from;
    if (msg.type === 'join') await call(id);
    if (msg.type === 'offer') await answer(id, msg.sdp);
    if (msg.type === 'answer') await peers[id]?.setRemoteDescription(msg.sdp);
    if (msg.type === 'ice') await peers[id]?.addIceCandidate(msg.candidate).catch(() => {});
  };
  ws.onclose = () => log('Disconnected');
}

function makePc(id) {
  const pc = new RTCPeerConnection(ICE);
  stream.getTracks().forEach(t => pc.addTrack(t, stream));
  pc.ontrack = e => { const a = new Audio(); a.srcObject = e.streams[0]; a.play(); };
  pc.onicecandidate = e => { if (e.candidate) send({ type: 'ice', candidate: e.candidate }); };
  peers[id] = pc;
  return pc;
}

async function call(id) {
  const pc = makePc(id);
  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
  send({ type: 'offer', sdp: pc.localDescription });
}

async function answer(id, sdp) {
  const pc = makePc(id);
  await pc.setRemoteDescription(sdp);
  const ans = await pc.createAnswer();
  await pc.setLocalDescription(ans);
  send({ type: 'answer', sdp: pc.localDescription });
}

function leave() {
  Object.values(peers).forEach(pc => pc.close());
  stream?.getTracks().forEach(t => t.stop());
  ws?.close();
  log('Not connected');
}

function toggleMic() {
  muted = !muted;
  stream?.getAudioTracks().forEach(t => t.enabled = !muted);
  document.getElementById('mic').textContent = muted ? 'Unmute' : 'Mute';
}
</script>
</body>
</html>
