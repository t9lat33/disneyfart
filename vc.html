<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>T9 Voice</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #1a1a2e;
  --sidebar: #16213e;
  --panel: #0f3460;
  --card: #202036;
  --border: rgba(255,255,255,0.07);
  --text: #dcddde;
  --muted: #72767d;
  --green: #3ba55c;
  --red: #ed4245;
  --blue: #5865f2;
  --speaking: #3ba55c;
}
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Segoe UI', sans-serif;
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* ── Sidebar ── */
#sidebar {
  width: 240px;
  background: var(--sidebar);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  border-right: 1px solid var(--border);
}
#server-name {
  padding: 16px;
  font-weight: 700;
  font-size: .95rem;
  border-bottom: 1px solid var(--border);
  color: #fff;
  letter-spacing: .02em;
}
#channels-label {
  padding: 16px 16px 6px;
  font-size: .68rem;
  font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: .08em;
}
.channel {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 12px;
  margin: 1px 8px;
  border-radius: 6px;
  cursor: pointer;
  color: var(--muted);
  font-size: .9rem;
  transition: background .1s, color .1s;
  user-select: none;
}
.channel:hover { background: rgba(255,255,255,.06); color: var(--text); }
.channel.active { background: rgba(255,255,255,.1); color: #fff; }
.channel-icon { font-size: 1rem; flex-shrink: 0; }
.channel-members-count {
  margin-left: auto;
  font-size: .72rem;
  color: var(--muted);
}

/* member list under channel when active */
.channel-member-list { padding: 2px 0 4px 36px; }
.channel-member-item {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: .82rem;
  color: var(--muted);
  transition: color .1s;
}
.channel-member-item.speaking { color: var(--speaking); }

/* ── User panel bottom ── */
#user-panel {
  margin-top: auto;
  padding: 10px 12px;
  background: rgba(0,0,0,.2);
  display: flex;
  align-items: center;
  gap: 8px;
  border-top: 1px solid var(--border);
}
.avatar {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: var(--blue);
  display: flex; align-items: center; justify-content: center;
  font-size: .8rem;
  font-weight: 700;
  color: #fff;
  flex-shrink: 0;
  position: relative;
}
.avatar .status-dot {
  position: absolute;
  bottom: -1px; right: -1px;
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--green);
  border: 2px solid var(--sidebar);
}
.avatar .status-dot.muted { background: var(--red); }
#my-name-display { font-size: .85rem; font-weight: 600; color: #fff; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
#my-tag { font-size: .7rem; color: var(--muted); }
.panel-btn {
  background: none;
  border: none;
  color: var(--muted);
  cursor: pointer;
  padding: 4px;
  border-radius: 4px;
  font-size: 1.1rem;
  line-height: 1;
  transition: color .1s, background .1s;
}
.panel-btn:hover { color: var(--text); background: rgba(255,255,255,.08); }
.panel-btn.active { color: var(--red); }

/* ── Main ── */
#main {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 24px;
  padding: 40px;
}

/* login screen */
#login-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  width: 100%;
  max-width: 340px;
}
#login-screen h2 { font-size: 1.4rem; color: #fff; }
#login-screen p { font-size: .88rem; color: var(--muted); text-align: center; }
input.t9-input {
  width: 100%;
  background: rgba(0,0,0,.3);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: #fff;
  padding: 10px 14px;
  font-size: .95rem;
  outline: none;
  transition: border-color .15s;
}
input.t9-input:focus { border-color: var(--blue); }
button.t9-btn {
  width: 100%;
  background: var(--blue);
  border: none;
  border-radius: 4px;
  color: #fff;
  padding: 11px;
  font-size: .95rem;
  font-weight: 600;
  cursor: pointer;
  transition: filter .15s;
}
button.t9-btn:hover { filter: brightness(1.1); }

/* in-call view */
#call-screen {
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 20px;
  width: 100%;
}
#call-title { font-size: 1rem; color: var(--muted); }
#call-channel { font-size: 1.5rem; color: #fff; font-weight: 700; }
#participants {
  display: flex;
  flex-wrap: wrap;
  gap: 16px;
  justify-content: center;
  max-width: 700px;
}
.participant {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  width: 100px;
}
.participant .av {
  width: 72px; height: 72px;
  border-radius: 50%;
  background: var(--card);
  border: 3px solid transparent;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.6rem;
  font-weight: 700;
  color: #fff;
  transition: border-color .15s;
  position: relative;
}
.participant .av.speaking { border-color: var(--speaking); }
.participant .av .mute-icon {
  position: absolute;
  bottom: 2px; right: 2px;
  background: var(--red);
  border-radius: 50%;
  width: 20px; height: 20px;
  display: none;
  align-items: center; justify-content: center;
  font-size: .6rem;
}
.participant .av .mute-icon.visible { display: flex; }
.participant .pname { font-size: .8rem; color: var(--text); text-align: center; max-width: 100px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

#call-controls { display: flex; gap: 12px; margin-top: 8px; }
.ctrl-btn {
  width: 52px; height: 52px;
  border-radius: 50%;
  border: none;
  background: var(--card);
  color: var(--text);
  font-size: 1.3rem;
  cursor: pointer;
  transition: background .15s, color .15s;
  display: flex; align-items: center; justify-content: center;
}
.ctrl-btn:hover { background: rgba(255,255,255,.12); }
.ctrl-btn.danger { background: var(--red); color: #fff; }
.ctrl-btn.danger:hover { filter: brightness(1.15); }
.ctrl-btn.muted-btn { background: var(--red); color: #fff; }
</style>
</head>
<body>

<!-- Sidebar -->
<div id="sidebar">
  <div id="server-name">🎙 T9 Voice</div>
  <div id="channels-label">Voice Channels</div>
  <div id="channel-list"></div>
  <div id="user-panel" style="display:none">
    <div class="avatar" id="my-avatar">
      <span id="my-initial">?</span>
      <div class="status-dot" id="my-dot"></div>
    </div>
    <div style="flex:1;min-width:0">
      <div id="my-name-display"></div>
      <div id="my-tag">T9OS</div>
    </div>
    <button class="panel-btn" id="mic-panel-btn" title="Mute" onclick="toggleMic()">🎙</button>
    <button class="panel-btn" title="Disconnect" onclick="leaveChannel()">🔌</button>
  </div>
</div>

<!-- Main -->
<div id="main">
  <!-- Login -->
  <div id="login-screen">
    <h2>T9 Voice Chat</h2>
    <p>Enter your name to get started</p>
    <input class="t9-input" id="name-input" placeholder="Your name" maxlength="24" />
    <button class="t9-btn" onclick="setName()">Continue</button>
  </div>

  <!-- Call view -->
  <div id="call-screen">
    <div id="call-title">Voice Connected —</div>
    <div id="call-channel">#general</div>
    <div id="participants"></div>
    <div id="call-controls">
      <button class="ctrl-btn" id="mute-btn" title="Mute" onclick="toggleMic()">🎙</button>
      <button class="ctrl-btn danger" title="Disconnect" onclick="leaveChannel()">📞</button>
    </div>
  </div>
</div>

<script>
const ROOMS = ['general', 'chill', 'gaming', 'dev'];
// Determine WebSocket URL based on current page protocol
const wsProtocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
const SIGNAL = `${wsProtocol}//${location.hostname}:3001/`;
const ICE = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

let myName = '', myId = Math.random().toString(36).slice(2, 8);
let ws, stream, muted = false;
let currentRoom = null;
const peers = {}; // id -> RTCPeerConnection
const users = {}; // id -> { name, speaking, room }
const audioEls = {};

// ── speaking detection ──
let analyser, speakTimer;
function detectSpeaking(audioStream) {
  try {
    const ctx = new AudioContext();
    const src = ctx.createMediaStreamSource(audioStream);
    analyser = ctx.createAnalyser();
    analyser.fftSize = 512;
    src.connect(analyser);
    const buf = new Uint8Array(analyser.frequencyBinCount);
    let wasSpeaking = false;
    function check() {
      if (!analyser) return;
      analyser.getByteFrequencyData(buf);
      const vol = buf.reduce((a, b) => a + b, 0) / buf.length;
      const speaking = vol > 15;
      if (speaking !== wasSpeaking) {
        wasSpeaking = speaking;
        send({ type: 'speaking', active: speaking });
        setSpeakingUI(myId, speaking);
      }
      speakTimer = requestAnimationFrame(check);
    }
    check();
  } catch(e) {
    console.log('Speaking detection not available:', e);
  }
}

// ── UI ──
function renderAll() {
  renderChannels();
  renderParticipants();
}

function renderChannels() {
  const el = document.getElementById('channel-list');
  if (!el) return;
  el.innerHTML = '';
  ROOMS.forEach(room => {
    const members = Object.values(users).filter(u => u.room === room);
    const div = document.createElement('div');
    div.className = 'channel' + (room === currentRoom ? ' active' : '');
    div.innerHTML = `<span class="channel-icon">🔊</span><span>${room}</span><span class="channel-members-count">${members.length || ''}</span>`;
    div.onclick = () => joinChannel(room);
    el.appendChild(div);

    if (members.length > 0) {
      const ml = document.createElement('div');
      ml.className = 'channel-member-list';
      members.forEach(u => {
        const mi = document.createElement('div');
        mi.className = 'channel-member-item' + (u.speaking ? ' speaking' : '');
        mi.id = `sidebar-${u.id}`;
        mi.textContent = u.name;
        ml.appendChild(mi);
      });
      el.appendChild(ml);
    }
  });
}

function renderParticipants() {
  const el = document.getElementById('participants');
  if (!el) return;
  el.innerHTML = '';
  // me first
  addParticipantCard(myId, myName, muted, false);
  // others in current room
  Object.values(users).forEach(u => {
    if (u.room === currentRoom) {
      addParticipantCard(u.id, u.name, u.muted || false, u.speaking || false);
    }
  });
}

function addParticipantCard(id, name, isMuted, isSpeaking) {
  const el = document.getElementById('participants');
  if (!el) return;
  // Remove existing card for this id
  const existing = document.getElementById(`participant-${id}`);
  if (existing) existing.remove();
  
  const div = document.createElement('div');
  div.className = 'participant';
  div.id = `participant-${id}`;
  const initial = (name || '?').charAt(0).toUpperCase();
  div.innerHTML = `
    <div class="av${isSpeaking ? ' speaking' : ''}" id="av-${id}">
      ${initial}
      <div class="mute-icon${isMuted ? ' visible' : ''}" id="mute-icon-${id}">🔇</div>
    </div>
    <div class="pname">${name || 'Unknown'}</div>`;
  el.appendChild(div);
}

function setSpeakingUI(id, active) {
  const av = document.getElementById(`av-${id}`);
  if (av) av.classList.toggle('speaking', active);
  const sb = document.getElementById(`sidebar-${id}`);
  if (sb) sb.classList.toggle('speaking', active);
  if (users[id]) users[id].speaking = active;
}

function updateMuteUI(id, isMuted) {
  const muteIcon = document.getElementById(`mute-icon-${id}`);
  if (muteIcon) muteIcon.classList.toggle('visible', isMuted);
}

// ── Auth ──
function setName() {
  const val = document.getElementById('name-input').value.trim();
  if (!val) return;
  myName = val;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('my-name-display').textContent = myName;
  document.getElementById('my-initial').textContent = myName.charAt(0).toUpperCase();
  document.getElementById('user-panel').style.display = 'flex';
  connectWS();
  renderChannels();
}

// ── WebSocket ──
let reconnectTimer = null;

function connectWS() {
  if (ws && ws.readyState === WebSocket.OPEN) return;
  
  console.log('Connecting to signaling server...');
  ws = new WebSocket(SIGNAL);
  
  ws.onopen = () => {
    console.log('WebSocket connected');
    if (reconnectTimer) {
      clearTimeout(reconnectTimer);
      reconnectTimer = null;
    }
    // Re-join room if we were in one
    if (currentRoom && stream) {
      send({ type: 'join', name: myName, id: myId, room: currentRoom });
    }
  };
  
  ws.onmessage = async ({ data }) => {
    try {
      const msg = JSON.parse(data);
      console.log('Received:', msg.type, msg);
      
      if (msg.type === 'room-users') {
        // Clear existing users in this room and repopulate
        Object.keys(users).forEach(id => {
          if (users[id].room === currentRoom) delete users[id];
        });
        if (msg.users) {
          msg.users.forEach(u => {
            if (u.id !== myId) {
              users[u.id] = { id: u.id, name: u.name, room: currentRoom, speaking: false, muted: false };
            }
          });
        }
        renderAll();
        // Call every existing peer in the room
        if (msg.users) {
          for (const u of msg.users) {
            if (u.id !== myId && !peers[u.id]) {
              console.log('Calling existing peer:', u.id);
              await callPeer(u.id);
            }
          }
        }
      }
      else if (msg.type === 'user-joined') {
        console.log('User joined:', msg.id, msg.name);
        users[msg.id] = { id: msg.id, name: msg.name, room: currentRoom, speaking: false, muted: false };
        renderAll();
        // Call the new peer
        if (!peers[msg.id]) {
          await callPeer(msg.id);
        }
      }
      else if (msg.type === 'user-left') {
        console.log('User left:', msg.id);
        // Remove user
        delete users[msg.id];
        // Close peer connection
        if (peers[msg.id]) {
          peers[msg.id].close();
          delete peers[msg.id];
        }
        // Remove audio element
        if (audioEls[msg.id]) {
          audioEls[msg.id].remove();
          delete audioEls[msg.id];
        }
        // Remove participant card
        const card = document.getElementById(`participant-${msg.id}`);
        if (card) card.remove();
        renderChannels();
      }
      else if (msg.type === 'offer') {
        console.log('Received offer from:', msg.id);
        await handleOffer(msg.id, msg.sdp);
      }
      else if (msg.type === 'answer') {
        console.log('Received answer from:', msg.id);
        if (peers[msg.id] && msg.sdp) {
          await peers[msg.id].setRemoteDescription(new RTCSessionDescription(msg.sdp)).catch(e => console.error('setRemoteDescription error:', e));
        }
      }
      else if (msg.type === 'ice') {
        if (peers[msg.id] && msg.candidate) {
          await peers[msg.id].addIceCandidate(new RTCIceCandidate(msg.candidate)).catch(e => console.error('addIceCandidate error:', e));
        }
      }
      else if (msg.type === 'speaking') {
        setSpeakingUI(msg.id, msg.active);
      }
    } catch(e) {
      console.error('Message handling error:', e);
    }
  };
  
  ws.onclose = (e) => {
    console.log('WebSocket closed, reconnecting in 2s...', e.code, e.reason);
    reconnectTimer = setTimeout(connectWS, 2000);
  };
  
  ws.onerror = (e) => {
    console.error('WebSocket error:', e);
  };
}

function send(msg) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    const payload = { 
      ...msg, 
      id: myId, 
      name: myName,
      room: currentRoom 
    };
    ws.send(JSON.stringify(payload));
  } else {
    console.warn('WebSocket not connected, cannot send:', msg.type);
  }
}

// ── Channel join/leave ──
async function joinChannel(room) {
  if (currentRoom === room) return; // Already in this room
  if (currentRoom) await leaveChannel(true);
  
  currentRoom = room;

  try {
    stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    console.log('Got microphone stream');
  } catch(e) {
    alert('Mic access denied or not available');
    console.error('getUserMedia error:', e);
    currentRoom = null;
    return;
  }
  
  detectSpeaking(stream);

  send({ type: 'join', name: myName, id: myId, room: currentRoom });

  document.getElementById('call-channel').textContent = '#' + room;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('call-screen').style.display = 'flex';
  renderAll();
}

async function leaveChannel(silent = false) {
  if (!currentRoom) return;
  
  console.log('Leaving channel:', currentRoom);
  
  if (!silent) send({ type: 'leave' });
  
  if (speakTimer) {
    cancelAnimationFrame(speakTimer);
    speakTimer = null;
  }
  if (analyser) {
    analyser = null;
  }
  
  // Close all peer connections
  Object.keys(peers).forEach(id => { 
    peers[id].close(); 
    delete peers[id]; 
  });
  
  // Remove all audio elements
  Object.keys(audioEls).forEach(id => { 
    audioEls[id].remove(); 
    delete audioEls[id]; 
  });
  
  // Clear users
  Object.keys(users).forEach(id => delete users[id]);
  
  // Stop microphone
  if (stream) {
    stream.getTracks().forEach(t => t.stop());
    stream = null;
  }
  
  currentRoom = null;
  document.getElementById('call-screen').style.display = 'none';
  renderChannels();
}

// ── WebRTC ──
function makePc(id) {
  const pc = new RTCPeerConnection(ICE);
  
  pc.oniceconnectionstatechange = () => {
    console.log(`ICE connection state with ${id}:`, pc.iceConnectionState);
  };
  
  pc.onsignalingstatechange = () => {
    console.log(`Signaling state with ${id}:`, pc.signalingState);
  };
  
  // Add local stream tracks
  if (stream) {
    stream.getTracks().forEach(t => {
      pc.addTrack(t, stream);
      console.log(`Added track to peer ${id}:`, t.kind);
    });
  }
  
  pc.ontrack = (e) => {
    console.log(`Received track from ${id}:`, e.track.kind);
    let a = audioEls[id];
    if (!a) { 
      a = new Audio(); 
      a.autoplay = true; 
      a.controls = false;
      audioEls[id] = a; 
      document.body.appendChild(a);
      console.log(`Created audio element for ${id}`);
    }
    if (e.streams && e.streams[0]) {
      a.srcObject = e.streams[0];
    }
  };
  
  pc.onicecandidate = (e) => { 
    if (e.candidate) {
      console.log(`Sending ICE candidate to ${id}`);
      send({ type: 'ice', candidate: e.candidate, to: id }); 
    }
  };
  
  peers[id] = pc;
  return pc;
}

async function callPeer(id) {
  if (peers[id]) {
    console.log('Already have peer connection for:', id);
    return;
  }
  
  console.log('Creating offer for:', id);
  try {
    const pc = makePc(id);
    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    send({ type: 'offer', sdp: pc.localDescription, to: id });
  } catch(e) {
    console.error('callPeer error:', e);
  }
}

async function handleOffer(id, sdp) {
  console.log('Handling offer from:', id);
  try {
    // Close existing connection if any
    if (peers[id]) {
      peers[id].close();
      delete peers[id];
    }
    
    const pc = makePc(id);
    await pc.setRemoteDescription(new RTCSessionDescription(sdp));
    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);
    send({ type: 'answer', sdp: pc.localDescription, to: id });
  } catch(e) {
    console.error('handleOffer error:', e);
  }
}

// ── Mic toggle ──
function toggleMic() {
  muted = !muted;
  if (stream) {
    stream.getAudioTracks().forEach(t => t.enabled = !muted);
  }
  document.getElementById('mute-btn').className = 'ctrl-btn' + (muted ? ' muted-btn' : '');
  document.getElementById('mute-btn').textContent = muted ? '🔇' : '🎙';
  document.getElementById('mic-panel-btn').textContent = muted ? '🔇' : '🎙';
  document.getElementById('my-dot').className = 'status-dot' + (muted ? ' muted' : '');
  updateMuteUI(myId, muted);
}

document.getElementById('name-input').addEventListener('keydown', e => { if (e.key === 'Enter') setName(); });
</script>
</body>
</html>
