<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeForce NOW - Scramjet</title>
    
    <!-- Same scripts as T9 Browser -->
    <script src="./ghost.js"></script>
    <script src="/uv/uv.bundle.js"></script>
    <script src="/uv/uv.config.js"></script>
    <link rel="stylesheet" href="/styles.css" />
    <script src="./index.config.js"></script>
    <script src="./surf/baremux/index.js"></script>
    <script src="./surf/scram/scramjet.all.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Outfit', sans-serif;
            background: #07070e;
            height: 100vh;
            overflow: hidden;
        }
        
        #proxy-frame {
            position: absolute;
            inset: 0;
            border: none;
            width: 100%;
            height: 100%;
        }
        
        #loading {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            pointer-events: none;
            z-index: 200;
        }
        
        #loading-bar {
            height: 100%;
            width: 0;
            opacity: 0;
            background: linear-gradient(90deg, #8b8fff, #c07ef8, #8b8fff);
            background-size: 200% 100%;
            border-radius: 999px;
            transition: opacity 0.3s;
        }
        
        #loading-bar.active {
            opacity: 1;
            animation: loadingAnim 1.8s ease infinite;
        }
        
        @keyframes loadingAnim {
            0%   { width: 0%; background-position: 0% 0%; }
            60%  { width: 80%; background-position: 100% 0%; }
            100% { width: 80%; background-position: 0% 0%; }
        }
        
        #status {
            position: fixed;
            bottom: 16px;
            right: 16px;
            z-index: 100;
            color: rgba(255,255,255,0.4);
            font-size: 11px;
            font-family: 'JetBrains Mono', monospace;
            background: rgba(10,10,20,0.7);
            padding: 6px 12px;
            border-radius: 20px;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.08);
            pointer-events: none;
        }
        
        #controls {
            position: fixed;
            bottom: 16px;
            left: 16px;
            z-index: 100;
            display: flex;
            gap: 8px;
            opacity: 0.3;
            transition: opacity 0.2s;
        }
        
        #controls:hover {
            opacity: 1;
        }
        
        .ctrl-btn {
            padding: 6px 12px;
            background: rgba(10,10,20,0.8);
            color: #9090b0;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            cursor: pointer;
            font-size: 11px;
            font-family: 'JetBrains Mono', monospace;
            backdrop-filter: blur(8px);
            transition: all 0.15s;
        }
        
        .ctrl-btn:hover {
            background: rgba(139,143,255,0.15);
            color: #eeeef6;
            border-color: rgba(139,143,255,0.3);
        }
    </style>
</head>
<body>
    <iframe id="proxy-frame" title="GeForce NOW"
        sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-pointer-lock allow-modals"></iframe>
    
    <div id="loading">
        <div id="loading-bar"></div>
    </div>
    
    <div id="status">Scramjet • GeForce NOW</div>
    
    <div id="controls">
        <button class="ctrl-btn" onclick="reloadPage()">⟲ Reload</button>
        <button class="ctrl-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>
    </div>

    <script>
        // Configuration
        const TARGET_URL = 'https://play.geforcenow.com/mall/#/layout/games';
        let loadingTimer = null;
        
        const frame = document.getElementById('proxy-frame');
        const loadingBar = document.getElementById('loading-bar');
        const status = document.getElementById('status');
        
        // Progress bar functions (same as T9)
        function startProgress() {
            clearTimeout(loadingTimer);
            loadingBar.style.transition = 'none';
            loadingBar.style.width = '0';
            loadingBar.style.opacity = '1';
            loadingBar.classList.add('active');
        }
        
        function stopProgress() {
            loadingBar.classList.remove('active');
            loadingBar.style.transition = 'width .2s ease';
            loadingBar.style.width = '100%';
            loadingTimer = setTimeout(() => {
                loadingBar.style.opacity = '0';
                loadingBar.style.width = '0';
            }, 350);
        }
        
        // Load with Scramjet - EXACT SAME PATTERN AS T9 BROWSER
        function loadWithScramjet(url) {
            startProgress();
            status.textContent = 'Scramjet • Loading...';
            
            // This is the exact pattern from your T9 Browser
            if (typeof openInFrame === 'function') {
                openInFrame(url);
                if (typeof setHashFromUrl === 'function') {
                    setHashFromUrl(url);
                }
            } else {
                const iv = setInterval(() => {
                    if (typeof openInFrame === 'function') {
                        clearInterval(iv);
                        openInFrame(url);
                        if (typeof setHashFromUrl === 'function') {
                            setHashFromUrl(url);
                        }
                    }
                }, 100);
            }
            
            frame.onload = () => {
                stopProgress();
                status.textContent = 'Scramjet • GeForce NOW';
            };
            
            frame.onerror = () => {
                stopProgress();
                status.textContent = 'Scramjet • Error';
            };
            
            // Safety timeout
            setTimeout(() => {
                if (loadingBar.classList.contains('active')) {
                    stopProgress();
                    status.textContent = 'Scramjet • GeForce NOW';
                }
            }, 10000);
        }
        
        // Handle hash changes for navigation (same as T9)
        window.addEventListener('hashchange', () => {
            const token = window.location.hash.replace(/^#/, '');
            if (!token) return;
            
            try {
                if (typeof decodeTarget === 'function') {
                    const url = decodeTarget(token);
                    if (url) {
                        status.textContent = 'Scramjet • ' + new URL(url).hostname;
                    }
                }
            } catch (e) {
                console.error('Hash decode error:', e);
            }
        });
        
        // Sync URL from frame (same as T9's _browserSyncUrl)
        window._browserSyncUrl = function(url) {
            if (url) {
                status.textContent = 'Scramjet • ' + new URL(url).hostname;
            }
        };
        
        // Global functions
        window.reloadPage = function() {
            loadWithScramjet(TARGET_URL);
        };
        
        window.toggleFullscreen = function() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        };
        
        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.key === 'F5' || (e.ctrlKey && e.key === 'r')) {
                e.preventDefault();
                reloadPage();
            }
            if (e.key === 'F11') {
                e.preventDefault();
                toggleFullscreen();
            }
        });
        
        // Override setLocationLabel if it exists (same pattern as T9)
        window.addEventListener('load', () => {
            const orig = window.setLocationLabel;
            if (typeof orig === 'function') {
                window.setLocationLabel = function(val) {
                    orig(val);
                    if (typeof window._browserSyncUrl === 'function') {
                        window._browserSyncUrl(val);
                    }
                };
            }
            
            // Check for hash on load
            const hash = window.location.hash.replace(/^#/, '');
            if (hash && typeof decodeTarget === 'function') {
                try {
                    const url = decodeTarget(hash);
                    if (url) {
                        window._browserSyncUrl(url);
                    }
                } catch (e) {}
            }
        });
        
        // Start loading
        loadWithScramjet(TARGET_URL);
    </script>
</body>
</html>
