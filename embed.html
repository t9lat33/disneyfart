<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Loading...</title>

<script src="/scram/scramjet.all.js"></script>
<script src="/register-sw.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000}

#loading{
position:fixed;inset:0;
display:flex;align-items:center;justify-content:center;
flex-direction:column;gap:20px;
background:#000;z-index:9999;
}

.bar{
width:300px;height:8px;
background:#222;border-radius:999px;
overflow:hidden;
}

.fill{
height:100%;width:0%;
background:#fff;
transition:0.3s;
}

#error{
display:none;
position:fixed;inset:0;
align-items:center;justify-content:center;
background:#000;color:#e55;
font-family:sans-serif;
text-align:center;padding:20px;
}
</style>
</head>

<body>

<div id="loading">
<div class="bar"><div class="fill" id="fill"></div></div>
<span style="color:#888;font-family:sans-serif">Loading...</span>
</div>

<div id="error"></div>

<script>
const fill = document.getElementById("fill");

function progress(v){
    fill.style.width = v + "%";
}

(async () => {
    try {
        const targetUrl = new URLSearchParams(location.search).get("url");
        if (!targetUrl) throw new Error("No URL provided");

        progress(20);

        // Set tab title + favicon
        try {
            const u = new URL(targetUrl);
            document.title = u.hostname;

            let icon = document.querySelector("link[rel='icon']");
            if (!icon) {
                icon = document.createElement("link");
                icon.rel = "icon";
                document.head.appendChild(icon);
            }
            icon.href = `https://www.google.com/s2/favicons?domain=${u.hostname}&sz=64`;
        } catch {}

        progress(40);

        // Init Scramjet ONLY (no BareMux)
        const { ScramjetController } = $scramjetLoadController();

        const ctrl = new ScramjetController({
            files: {
                wasm: "/scram/scramjet.wasm.wasm",
                all: "/scram/scramjet.all.js",
                sync: "/scram/scramjet.sync.js",
            },
        });

        await ctrl.init();
        progress(70);

        await registerSW();
        progress(85);

        const frame = ctrl.createFrame();
        frame.frame.style.cssText =
            "position:fixed;inset:0;width:100%;height:100%;border:none;";
        document.body.appendChild(frame.frame);

        frame.frame.onload = () => {
            progress(100);
            setTimeout(() => {
                document.getElementById("loading").style.display = "none";
            }, 200);

            try {
                const t = frame.frame.contentDocument?.title;
                if (t) document.title = t;
            } catch {}
        };

        // 🔥 IMPORTANT FIX
        frame.go("/scramjet/" + encodeURIComponent(targetUrl));

    } catch (err) {
        document.getElementById("loading").style.display = "none";
        const e = document.getElementById("error");
        e.style.display = "flex";
        e.textContent = "Error: " + err.message;
    }
})();
</script>

</body>
</html>
