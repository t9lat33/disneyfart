<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0f0f10">
<title>Crunchyroll — Anime, Movies & TV Shows</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Lato:wght@400;700;900&display=swap" rel="stylesheet">
<style>
/* ============================================================
   DESIGN TOKENS — Authentic Crunchyroll
============================================================ */
:root{
  --bg:#0f0f10;
  --bg-2:#161618;
  --bg-3:#1d1d20;
  --bg-4:#26262a;
  --surface:#1a1a1d;
  --border:#2a2a2e;
  --border-2:#3a3a40;
  --text:#f5f5f7;
  --text-2:#c7c7cc;
  --text-3:#8e8e93;
  --text-4:#5a5a60;
  --brand:#F47521;
  --brand-2:#ff8a3d;
  --brand-3:#ff6b1a;
  --brand-dim:rgba(244,117,33,.16);
  --brand-glow:rgba(244,117,33,.35);
  --success:#34d399;
  --danger:#ef4444;
  --info:#60a5fa;
  --gold:#fbbf24;
  --radius-sm:6px;
  --radius:10px;
  --radius-lg:14px;
  --radius-xl:20px;
  --shadow-1:0 1px 2px rgba(0,0,0,.4);
  --shadow-2:0 4px 16px rgba(0,0,0,.45);
  --shadow-3:0 10px 30px rgba(0,0,0,.55);
  --shadow-brand:0 8px 30px rgba(244,117,33,.35);
  --nav-h:68px;
  --max-w:1600px;
  --ease:cubic-bezier(.4,0,.2,1);
  --ease-out:cubic-bezier(.16,1,.3,1);
  --ease-spring:cubic-bezier(.34,1.56,.64,1);
}

*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:'Inter','Lato',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:var(--bg);
  color:var(--text);
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
  min-height:100vh;
}
body.no-scroll{overflow:hidden}
img{display:block;max-width:100%;-webkit-user-drag:none;user-select:none}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
a{color:inherit;text-decoration:none}
input,select{font-family:inherit}
::selection{background:var(--brand);color:#fff}

/* Scrollbar */
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-track{background:var(--bg-2)}
::-webkit-scrollbar-thumb{background:var(--border-2);border-radius:6px;border:2px solid var(--bg-2)}
::-webkit-scrollbar-thumb:hover{background:#4a4a52}

/* ============================================================
   NAVBAR — Authentic Crunchyroll-style
============================================================ */
.navbar{
  position:fixed;top:0;left:0;right:0;height:var(--nav-h);z-index:1000;
  background:linear-gradient(180deg,rgba(15,15,16,.98) 0%,rgba(15,15,16,.85) 100%);
  backdrop-filter:blur(20px) saturate(160%);
  -webkit-backdrop-filter:blur(20px) saturate(160%);
  border-bottom:1px solid rgba(255,255,255,.05);
  transition:background .3s var(--ease),border-color .3s var(--ease);
}
.navbar.scrolled{
  background:rgba(15,15,16,.99);
  border-bottom-color:rgba(255,255,255,.08);
  box-shadow:0 4px 20px rgba(0,0,0,.5);
}
.nav-inner{
  max-width:var(--max-w);height:100%;margin:0 auto;padding:0 32px;
  display:flex;align-items:center;gap:24px;
}
.nav-logo{
  display:flex;align-items:center;gap:10px;font-weight:900;font-size:24px;
  letter-spacing:-.8px;flex-shrink:0;
}
.nav-logo .logo-mark{
  width:36px;height:36px;border-radius:50%;
  background:var(--brand);
  display:grid;place-items:center;
  box-shadow:0 4px 14px var(--brand-glow);
  position:relative;
}
.nav-logo .logo-mark svg{width:20px;height:20px;fill:#fff}
.nav-logo .logo-text{
  background:linear-gradient(90deg,#fff 0%,#fff 50%,var(--brand-2) 100%);
  -webkit-background-clip:text;background-clip:text;color:transparent;
  font-family:'Lato',sans-serif;font-weight:900;
}
.nav-links{display:flex;align-items:center;gap:2px;flex:1;margin-left:12px}
.nav-link{
  padding:10px 16px;border-radius:8px;font-size:14px;font-weight:700;
  color:var(--text-2);transition:all .2s var(--ease);position:relative;
  white-space:nowrap;letter-spacing:.2px;
}
.nav-link:hover{color:var(--text);background:rgba(255,255,255,.06)}
.nav-link.active{color:var(--brand)}
.nav-link.active::after{
  content:'';position:absolute;bottom:-6px;left:16px;right:16px;height:3px;
  background:var(--brand);border-radius:2px;
}

/* TV/Movies toggle in nav */
.nav-toggle{
  display:flex;align-items:center;background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.07);border-radius:24px;padding:3px;
  margin:0 4px;
}
.nav-toggle button{
  padding:6px 14px;font-size:13px;font-weight:700;color:var(--text-3);
  border-radius:20px;transition:all .2s var(--ease);letter-spacing:.3px;
}
.nav-toggle button.active{
  background:var(--brand);color:#fff;box-shadow:0 2px 8px var(--brand-glow);
}

.nav-search{
  display:flex;align-items:center;background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.07);border-radius:24px;
  padding:9px 16px;gap:8px;width:260px;transition:all .25s var(--ease);
}
.nav-search:focus-within{
  background:rgba(255,255,255,.1);border-color:var(--brand);
  width:320px;box-shadow:0 0 0 3px var(--brand-dim);
}
.nav-search svg{width:16px;height:16px;color:var(--text-3);flex-shrink:0}
.nav-search input{
  background:none;border:none;outline:none;color:var(--text);font-size:13px;
  width:100%;font-weight:500;
}
.nav-search input::placeholder{color:var(--text-3)}
.nav-actions{display:flex;align-items:center;gap:8px;flex-shrink:0}
.icon-btn{
  width:40px;height:40px;border-radius:10px;display:grid;place-items:center;
  color:var(--text-2);transition:all .2s var(--ease);position:relative;
}
.icon-btn:hover{background:rgba(255,255,255,.08);color:var(--text)}
.icon-btn svg{width:20px;height:20px}
.icon-btn .badge{
  position:absolute;top:6px;right:6px;min-width:16px;height:16px;
  background:var(--brand);border-radius:8px;font-size:10px;font-weight:700;
  display:grid;place-items:center;padding:0 4px;color:#fff;
  border:2px solid var(--bg);
}
.avatar-btn{
  width:40px;height:40px;border-radius:50%;overflow:hidden;
  border:2px solid transparent;transition:all .2s var(--ease);
  background:linear-gradient(135deg,#fbbf24,#f47521);
  display:grid;place-items:center;font-weight:800;color:#fff;font-size:15px;
}
.avatar-btn:hover{border-color:var(--brand);transform:scale(1.05)}

/* Dropdown */
.dropdown{
  position:absolute;top:calc(100% + 8px);right:0;min-width:240px;
  background:var(--bg-3);border:1px solid var(--border);border-radius:14px;
  box-shadow:var(--shadow-3);padding:8px;opacity:0;visibility:hidden;
  transform:translateY(-8px) scale(.97);transform-origin:top right;
  transition:all .2s var(--ease-out);z-index:100;
}
.dropdown.open{opacity:1;visibility:visible;transform:translateY(0) scale(1)}
.dropdown-header{
  padding:12px 12px 8px;border-bottom:1px solid var(--border);margin-bottom:6px;
}
.dropdown-header .name{font-weight:700;font-size:14px}
.dropdown-header .email{font-size:12px;color:var(--text-3);margin-top:2px}
.dropdown-item{
  display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:8px;
  font-size:14px;color:var(--text-2);transition:all .15s var(--ease);width:100%;
  text-align:left;
}
.dropdown-item:hover{background:rgba(255,255,255,.06);color:var(--text)}
.dropdown-item svg{width:18px;height:18px;flex-shrink:0;color:var(--text-3)}
.dropdown-item:hover svg{color:var(--brand)}
.dropdown-divider{height:1px;background:var(--border);margin:6px 0}
.dropdown-item.danger{color:var(--danger)}
.dropdown-item.danger:hover{background:rgba(239,68,68,.1)}
.dropdown-item.danger svg{color:var(--danger)}

/* Notifications panel */
.notif-panel{
  position:fixed;top:calc(var(--nav-h) + 8px);right:16px;width:360px;max-width:calc(100vw - 32px);
  background:var(--bg-3);border:1px solid var(--border);border-radius:14px;
  box-shadow:var(--shadow-3);z-index:999;opacity:0;visibility:hidden;
  transform:translateY(-8px);transition:all .2s var(--ease-out);
  max-height:70vh;overflow:hidden;display:flex;flex-direction:column;
}
.notif-panel.open{opacity:1;visibility:visible;transform:translateY(0)}
.notif-header{
  padding:16px;border-bottom:1px solid var(--border);display:flex;
  justify-content:space-between;align-items:center;
}
.notif-header h3{font-size:15px;font-weight:800}
.notif-header button{font-size:12px;color:var(--brand);font-weight:700}
.notif-list{overflow-y:auto;padding:6px}
.notif-item{
  display:flex;gap:12px;padding:10px;border-radius:10px;transition:background .15s;
  cursor:pointer;
}
.notif-item:hover{background:rgba(255,255,255,.04)}
.notif-icon{
  width:38px;height:38px;border-radius:10px;display:grid;place-items:center;
  background:var(--brand-dim);color:var(--brand);flex-shrink:0;
}
.notif-icon svg{width:18px;height:18px}
.notif-content{flex:1;min-width:0}
.notif-content .title{font-size:13px;font-weight:700;margin-bottom:2px}
.notif-content .desc{font-size:12px;color:var(--text-3);line-height:1.4}
.notif-content .time{font-size:11px;color:var(--text-4);margin-top:4px}

/* ============================================================
   LAYOUT
============================================================ */
.page{padding-top:var(--nav-h);min-height:100vh}
.container{max-width:var(--max-w);margin:0 auto;padding:0 32px}
.page-header{
  padding:48px 32px 24px;max-width:var(--max-w);margin:0 auto;
}
.page-header h1{font-size:42px;font-weight:900;letter-spacing:-1.5px;margin-bottom:8px;font-family:'Lato',sans-serif}
.page-header .subtitle{color:var(--text-3);font-size:15px}

/* ============================================================
   HERO — Big bold Crunchyroll-style
============================================================ */
.hero{
  position:relative;height:min(90vh,780px);min-height:540px;
  overflow:hidden;background:var(--bg);
}
.hero-slide{
  position:absolute;inset:0;opacity:0;transition:opacity 1.1s var(--ease-out);
  background-size:cover;background-position:center top;
}
.hero-slide.active{opacity:1}
.hero-slide::before{
  content:'';position:absolute;inset:0;
  background:
    linear-gradient(90deg,rgba(15,15,16,.95) 0%,rgba(15,15,16,.65) 40%,rgba(15,15,16,.2) 70%,rgba(15,15,16,.5) 100%),
    linear-gradient(180deg,rgba(15,15,16,.5) 0%,rgba(15,15,16,0) 30%,rgba(15,15,16,.4) 70%,rgba(15,15,16,1) 100%);
}
.hero-content{
  position:absolute;left:0;right:0;bottom:0;top:0;
  display:flex;flex-direction:column;justify-content:flex-end;
  padding:0 32px 90px;max-width:var(--max-w);margin:0 auto;
}
.hero-inner{max-width:680px}
.hero-badge{
  display:inline-flex;align-items:center;gap:6px;padding:6px 14px;
  background:var(--brand);color:#fff;border-radius:20px;font-size:11px;
  font-weight:800;letter-spacing:1.4px;text-transform:uppercase;margin-bottom:20px;
  box-shadow:0 4px 14px var(--brand-glow);
}
.hero-title{
  font-size:clamp(40px,6vw,76px);font-weight:900;line-height:1;
  letter-spacing:-2.5px;margin-bottom:18px;
  text-shadow:0 4px 30px rgba(0,0,0,.8);
  font-family:'Lato',sans-serif;
}
.hero-meta{
  display:flex;flex-wrap:wrap;align-items:center;gap:14px;margin-bottom:18px;
  font-size:14px;color:var(--text-2);font-weight:600;
}
.hero-meta .meta-item{display:flex;align-items:center;gap:6px}
.hero-meta .meta-item svg{width:16px;height:16px;color:var(--brand)}
.hero-meta .rating{color:var(--gold);font-weight:800}
.hero-meta .dot{width:3px;height:3px;border-radius:50%;background:var(--text-3)}
.hero-genres{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:24px}
.hero-genres span{
  padding:6px 14px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.12);
  border-radius:20px;font-size:12px;font-weight:700;backdrop-filter:blur(10px);
}
.hero-synopsis{
  font-size:16px;line-height:1.6;color:var(--text-2);margin-bottom:30px;
  max-width:580px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;
  overflow:hidden;text-shadow:0 2px 10px rgba(0,0,0,.5);
}
.hero-actions{display:flex;gap:12px;flex-wrap:wrap}
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:15px 30px;border-radius:8px;font-size:15px;font-weight:800;
  transition:all .2s var(--ease);white-space:nowrap;border:none;cursor:pointer;
  letter-spacing:.3px;
}
.btn svg{width:18px;height:18px}
.btn-primary{
  background:var(--brand);color:#fff;
  box-shadow:0 4px 14px var(--brand-glow);
}
.btn-primary:hover{background:var(--brand-2);transform:translateY(-2px);box-shadow:0 10px 24px var(--brand-glow)}
.btn-secondary{
  background:rgba(255,255,255,.12);color:var(--text);backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,.15);
}
.btn-secondary:hover{background:rgba(255,255,255,.2);transform:translateY(-2px)}
.btn-ghost{background:transparent;color:var(--text-2)}
.btn-ghost:hover{background:rgba(255,255,255,.06);color:var(--text)}

/* Hero indicators */
.hero-indicators{
  position:absolute;bottom:36px;right:32px;display:flex;gap:8px;z-index:5;
}
.hero-indicator{
  width:32px;height:3px;background:rgba(255,255,255,.25);border-radius:2px;
  cursor:pointer;transition:all .3s var(--ease);position:relative;overflow:hidden;
}
.hero-indicator.active{background:var(--brand);width:52px}
.hero-indicator::after{
  content:'';position:absolute;inset:0;background:var(--brand);
  transform:translateX(-100%);transition:transform .1s linear;
}
.hero-indicator.active::after{transform:translateX(0);transition:transform 7s linear}
.hero-arrows{position:absolute;bottom:36px;left:32px;display:flex;gap:8px;z-index:5}
.hero-arrow{
  width:44px;height:44px;border-radius:50%;background:rgba(0,0,0,.5);
  backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.15);
  display:grid;place-items:center;color:#fff;transition:all .2s var(--ease);
}
.hero-arrow:hover{background:var(--brand);border-color:var(--brand);transform:scale(1.08)}
.hero-arrow svg{width:18px;height:18px}

/* ============================================================
   CATEGORY TABS — TV Shows / Movies toggle
============================================================ */
.cat-tabs-wrap{
  max-width:var(--max-w);margin:32px auto 0;padding:0 32px;
}
.cat-tabs{
  display:inline-flex;background:var(--bg-2);border:1px solid var(--border);
  border-radius:14px;padding:5px;gap:4px;
}
.cat-tab{
  padding:12px 28px;border-radius:10px;font-size:15px;font-weight:800;
  color:var(--text-3);transition:all .25s var(--ease);letter-spacing:.3px;
  display:flex;align-items:center;gap:8px;
}
.cat-tab svg{width:18px;height:18px}
.cat-tab:hover{color:var(--text)}
.cat-tab.active{
  background:linear-gradient(135deg,var(--brand) 0%,var(--brand-3) 100%);
  color:#fff;box-shadow:0 4px 14px var(--brand-glow);
}

/* ============================================================
   CONTENT ROWS
============================================================ */
.content-row{padding:24px 0;position:relative}
.content-row:first-child{padding-top:32px}
.row-header{
  display:flex;align-items:flex-end;justify-content:space-between;
  padding:0 32px;margin-bottom:16px;max-width:var(--max-w);
  margin-left:auto;margin-right:auto;
}
.row-title{
  font-size:24px;font-weight:900;letter-spacing:-.5px;
  display:flex;align-items:center;gap:10px;font-family:'Lato',sans-serif;
}
.row-title .new-pill{
  background:var(--brand);color:#fff;font-size:10px;font-weight:800;
  padding:3px 8px;border-radius:4px;letter-spacing:.8px;text-transform:uppercase;
}
.row-link{
  font-size:13px;color:var(--text-3);font-weight:700;
  display:flex;align-items:center;gap:4px;transition:color .2s;
  text-transform:uppercase;letter-spacing:.5px;
}
.row-link:hover{color:var(--brand)}
.row-link svg{width:14px;height:14px}

.row-wrapper{position:relative}
.row-scroll{
  display:flex;gap:14px;overflow-x:auto;scroll-behavior:smooth;
  padding:0 32px 12px;scrollbar-width:none;-ms-overflow-style:none;
  max-width:var(--max-w);margin:0 auto;
}
.row-scroll::-webkit-scrollbar{display:none}
.row-arrow{
  position:absolute;top:50%;transform:translateY(-50%);
  width:48px;height:72px;background:linear-gradient(90deg,rgba(15,15,16,.95),rgba(15,15,16,.7));
  border-radius:8px;display:grid;place-items:center;color:#fff;z-index:10;
  opacity:0;transition:all .25s var(--ease);border:1px solid rgba(255,255,255,.05);
}
.content-row:hover .row-arrow{opacity:1}
.row-arrow:hover{background:var(--brand);border-color:var(--brand)}
.row-arrow.left{left:0;border-radius:0 8px 8px 0}
.row-arrow.right{right:0;border-radius:8px 0 0 8px;background:linear-gradient(270deg,rgba(15,15,16,.95),rgba(15,15,16,.7))}
.row-arrow svg{width:24px;height:24px}
.row-arrow.disabled{opacity:0 !important;pointer-events:none}

/* ============================================================
   ANIME CARD — Crunchyroll-style
============================================================ */
.card{
  flex:0 0 auto;width:210px;position:relative;cursor:pointer;
  transition:transform .35s var(--ease-out);
}
.card:hover{transform:translateY(-8px)}
.card-poster{
  position:relative;width:100%;aspect-ratio:2/3;border-radius:10px;
  overflow:hidden;background:var(--bg-3);
  box-shadow:0 4px 14px rgba(0,0,0,.4);
  transition:all .35s var(--ease-out);
}
.card:hover .card-poster{
  box-shadow:0 16px 36px rgba(0,0,0,.7),0 0 0 2px var(--brand);
  transform:scale(1.04);
}
.card-poster img{width:100%;height:100%;object-fit:cover;transition:transform .5s var(--ease-out)}
.card:hover .card-poster img{transform:scale(1.08)}
.card-overlay{
  position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,0) 30%,rgba(0,0,0,.85) 100%);
  opacity:0;transition:opacity .3s var(--ease);display:flex;flex-direction:column;
  justify-content:flex-end;padding:12px;
}
.card:hover .card-overlay{opacity:1}
.card-play{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(.6);
  width:58px;height:58px;border-radius:50%;background:var(--brand);
  display:grid;place-items:center;opacity:0;transition:all .3s var(--ease-spring);
  box-shadow:0 8px 24px var(--brand-glow);
}
.card:hover .card-play{opacity:1;transform:translate(-50%,-50%) scale(1)}
.card-play svg{width:24px;height:24px;fill:#fff;margin-left:2px}
.card-badges{
  position:absolute;top:8px;left:8px;right:8px;display:flex;gap:6px;
  justify-content:space-between;pointer-events:none;
}
.card-badge{
  padding:3px 8px;border-radius:4px;font-size:10px;font-weight:800;
  letter-spacing:.5px;backdrop-filter:blur(10px);
}
.card-badge.rating{background:rgba(0,0,0,.8);color:var(--gold);display:flex;align-items:center;gap:3px}
.card-badge.rating svg{width:11px;height:11px;fill:var(--gold)}
.card-badge.new-ep{background:var(--brand);color:#fff}
.card-badge.trending{background:linear-gradient(135deg,#f43f5e,#ec4899);color:#fff}
.card-badge.recently{background:rgba(52,211,153,.85);color:#064e3b}
.card-badge.type{background:rgba(0,0,0,.8);color:var(--text-2)}
.card-info{padding-top:10px}
.card-title{
  font-size:14px;font-weight:700;line-height:1.3;color:var(--text);
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
  letter-spacing:-.2px;
}
.card-meta{
  display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text-3);
  margin-top:5px;font-weight:600;
}
.card-meta .lang{
  padding:1px 5px;border-radius:3px;background:var(--bg-4);font-size:9px;
  font-weight:800;letter-spacing:.5px;
}
.card-meta .lang.sub{color:var(--info)}
.card-meta .lang.dub{color:var(--success)}
.card-progress{
  position:absolute;bottom:0;left:0;right:0;height:3px;background:rgba(0,0,0,.5);
}
.card-progress-bar{height:100%;background:var(--brand);border-radius:0 2px 2px 0}

/* Continue watching card (wider) */
.card-continue{width:340px}
.card-continue .card-poster{aspect-ratio:16/9}

<script>
/* ============================================================
   APP STATE & ROUTING
============================================================ */
const API_BASE = 'https://api.jikan.moe/v4';

// ============================================================
// PLAYER SOURCES — Multiple providers, vidify (videasy) is DEFAULT for movies
// ============================================================
const VIDIFY_PARAMS = 'autoplay=false&poster=true&chromecast=true&servericon=false&setting=true&pip=true&download=true&font=Roboto&fontcolor=0080ff&fontsize=20&opacity=0.5&primarycolor=0080ff&secondarycolor=0066cc&iconcolor=ffffff';

const PLAYER_SOURCES = {
  // Vidify — DEFAULT for both TV & Movies (uses player.vidify.top/embed/...)
  vidify: {
    name: 'Vidify',
    tag: 'HD',
    tv: (tmdbId, season, episode) => `https://player.vidify.top/embed/tv/${tmdbId}/${season}/${episode}?${VIDIFY_PARAMS}`,
    movie: (tmdbId) => `https://player.vidify.top/embed/movie/${tmdbId}?${VIDIFY_PARAMS}`,
    isDefault: true,
    supportsMovies: true,
    supportsTV: true,
  },
  vidsrc: {
    name: 'VidSrc',
    tag: 'HD',
    tv: (tmdbId, season, episode) => `https://vidsrc.xyz/embed/tv/${tmdbId}/${season}/${episode}`,
    movie: (tmdbId) => `https://vidsrc.xyz/embed/movie/${tmdbId}`,
    isDefault: false,
    supportsMovies: true,
    supportsTV: true,
  },
  superembed: {
    name: 'SuperEmbed',
    tag: '4K',
    tv: (tmdbId, season, episode) => `https://multiembed.mov/?video_id=${tmdbId}&s=${season}&e=${episode}&tmdb=1`,
    movie: (tmdbId) => `https://multiembed.mov/?video_id=${tmdbId}&tmdb=1`,
    isDefault: false,
    supportsMovies: true,
    supportsTV: true,
  },
  twoembed: {
    name: '2Embed',
    tag: 'HD',
    tv: (tmdbId, season, episode) => `https://www.2embed.cc/embedtv/${tmdbId}&s=${season}&e=${episode}`,
    movie: (tmdbId) => `https://www.2embed.cc/embed/${tmdbId}`,
    isDefault: false,
    supportsMovies: true,
    supportsTV: true,
  },
};

// Default source per content type — movies default to vidify (Videasy)
const DEFAULT_MOVIE_SOURCE = 'vidify';
const DEFAULT_TV_SOURCE = 'vidify';

const state = {
  currentRoute: '/',
  heroAnime: [],
  currentHeroIdx: 0,
  heroTimer: null,
  watchlist: JSON.parse(localStorage.getItem('cs_watchlist') || '[]'),
  favorites: JSON.parse(localStorage.getItem('cs_favorites') || '[]'),
  history: JSON.parse(localStorage.getItem('cs_history') || '[]'),
  continueWatching: JSON.parse(localStorage.getItem('cs_continue') || '[]'),
  notifications: JSON.parse(localStorage.getItem('cs_notifs') || '[]'),
  currentAnime: null,
  currentEpisodes: [],
  currentEpisode: 1,
  currentTmdbId: null,
  currentTmdbInfo: null,
  currentSource: localStorage.getItem('cs_source') || null,
  autoPlay: localStorage.getItem('cs_autoplay') !== 'false',
  theaterMode: false,
  cache: new Map(),
  tmdbCache: new Map(),
  homeCategory: localStorage.getItem('cs_homecat') || 'all',
};

function saveState() {
  localStorage.setItem('cs_watchlist', JSON.stringify(state.watchlist));
  localStorage.setItem('cs_favorites', JSON.stringify(state.favorites));
  localStorage.setItem('cs_history', JSON.stringify(state.history));
  localStorage.setItem('cs_continue', JSON.stringify(state.continueWatching));
  localStorage.setItem('cs_notifs', JSON.stringify(state.notifications));
  localStorage.setItem('cs_autoplay', state.autoPlay);
  localStorage.setItem('cs_source', state.currentSource || '');
  localStorage.setItem('cs_homecat', state.homeCategory);
}

// ============================================================
// JIKAN RATE-LIMITED API (max ~3 req/s via serialized queue)
// ============================================================
const _jikanQueue = [];
let   _jikanBusy  = false;
const JIKAN_GAP   = 380;

async function _jikanDrain() {
  if (_jikanBusy || !_jikanQueue.length) return;
  _jikanBusy = true;
  while (_jikanQueue.length) {
    const task = _jikanQueue.shift();
    try { task.resolve(await _jikanFetch(task.url, task.ttl)); }
    catch(e) { task.reject(e); }
    if (_jikanQueue.length) await new Promise(r => setTimeout(r, JIKAN_GAP));
  }
  _jikanBusy = false;
}

async function _jikanFetch(url, ttl, tries = 3) {
  const hit = state.cache.get(url);
  if (hit && Date.now() - hit.ts < ttl) return hit.data;
  for (let i = 0; i < tries; i++) {
    try {
      const res = await fetch(url);
      if (res.status === 429) {
        await new Promise(r => setTimeout(r, 1600 * (i + 1)));
        continue;
      }
      if (!res.ok) throw new Error('Jikan ' + res.status);
      const json = await res.json();
      state.cache.set(url, { ts: Date.now(), data: json });
      return json;
    } catch(e) {
      if (i === tries - 1) return { data: null, error: e.message };
      await new Promise(r => setTimeout(r, 600));
    }
  }
  return { data: null, error: 'max retries' };
}

function api(path, cacheTtl = 5 * 60 * 1000) {
  const url = API_BASE + path;
  const hit = state.cache.get(url);
  if (hit && Date.now() - hit.ts < cacheTtl) return Promise.resolve(hit.data);
  return new Promise((resolve, reject) => {
    _jikanQueue.push({ url, ttl: cacheTtl, resolve, reject });
    _jikanDrain();
  });
}

// ============================================================
// TMDB ID LOOKUP via Videasy's own TMDB proxy
// ============================================================

// NEW: Search TMDB by title when MAL ID lookup fails
async function searchTmdbByTitle(title, isMovie = false) {
  try {
    const type = isMovie ? 'movie' : 'tv';
    const res = await fetch(
      `https://db.videasy.to/3/search/${type}?query=${encodeURIComponent(title)}&page=1`,
      { headers: { Accept: 'application/json' } }
    );
    if (res.ok) {
      const json = await res.json();
      const results = json?.results || [];
      if (results.length) {
        const lowerTitle = title.toLowerCase().replace(/[^\w\s]/g, '');
        // Try exact or close match first
        const exact = results.find(r => {
          const name = (r.name || r.title || '').toLowerCase().replace(/[^\w\s]/g, '');
          return name === lowerTitle || name.includes(lowerTitle) || lowerTitle.includes(name);
        });
        const hit = exact || results[0];
        return { id: hit.id, isMovie };
      }
    }
  } catch (e) {}
  return null;
}

async function fetchTmdbId(malId, isMovieExpected = false) {
  // Cache key includes the expected type so a movie lookup and a TV lookup
  // for the same MAL ID don't pollute each other.
  const cacheKey = 'tmdb:' + malId + (isMovieExpected ? ':movie' : ':tv');
  if (state.tmdbCache.has(cacheKey)) {
    const cached = state.tmdbCache.get(cacheKey);
    // Allow retrying if previously null
    if (cached !== undefined && cached !== null) return cached;
  }

  // 1. Try MAL ID lookup via find API
  for (let i = 0; i < 3; i++) {
    try {
      const res = await fetch(
        'https://db.videasy.to/3/find/' + parseInt(malId) + '?external_source=mal_id',
        { headers: { Accept: 'application/json' } }
      );
      if (res.status === 429) {
        await new Promise(r => setTimeout(r, 2000 * (i + 1)));
        continue;
      }
      if (res.ok) {
        const j = await res.json();
        const tv  = j?.tv_results?.[0];
        const mov = j?.movie_results?.[0];

        // Pick the right result based on what we're looking for.
        let hit, isMovie;
        if (isMovieExpected) {
          hit = mov || tv;                 // movie first, fall back to tv
          isMovie = !!mov;
        } else {
          hit = tv || mov;                 // tv first, fall back to movie
          isMovie = !tv && !!mov;
        }

        if (hit?.id) {
          const info = { id: hit.id, isMovie };
          state.tmdbCache.set(cacheKey, info);
          return info;
        }
      }
      break;
    } catch(e) {
      if (i < 2) await new Promise(r => setTimeout(r, 1000));
    }
  }

  // 2. FALLBACK: search by title using current anime data
  if (state.currentAnime) {
    const titles = [
      state.currentAnime.title_english,
      state.currentAnime.title,
      state.currentAnime.title_japanese
    ].filter(Boolean);
    
    for (const title of titles) {
      if (!title) continue;
      const result = await searchTmdbByTitle(title, isMovieExpected);
      if (result) {
        state.tmdbCache.set(cacheKey, result);
        return result;
      }
    }
  }

  state.tmdbCache.set(cacheKey, null);
  return null;
}

// Build player URL from selected source (defaults to vidify for movies, vidify for TV)
function buildPlayerUrl(tmdbInfo, episode = 1, season = 1, sourceKey = null) {
  if (!tmdbInfo?.id) return null;
  const isMovie = tmdbInfo.isMovie;
  // Determine which source to use
  let sourceKeyFinal = sourceKey || state.currentSource;
  if (!sourceKeyFinal || !PLAYER_SOURCES[sourceKeyFinal]) {
    sourceKeyFinal = isMovie ? DEFAULT_MOVIE_SOURCE : DEFAULT_TV_SOURCE;
  }
  const src = PLAYER_SOURCES[sourceKeyFinal];
  if (!src) return null;
  if (isMovie) return src.movie(tmdbInfo.id);
  return src.tv(tmdbInfo.id, season, episode);
}

// ============================================================
// UTILITY
// ============================================================
const $ = (sel, parent = document) => parent.querySelector(sel);
const $$ = (sel, parent = document) => Array.from(parent.querySelectorAll(sel));

function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function fmtScore(s) { return s ? s.toFixed(1) : 'N/A'; }
function fmtEpisodes(n) { return n ? `${n} ep` : 'Ongoing'; }

// High-quality image helper — prefers largest available
function bestImage(anime) {
  if (!anime?.images?.jpg) return '';
  return anime.images.jpg.large_image_url
      || anime.images.jpg.image_url
      || anime.images.webp?.large_image_url
      || anime.images.webp?.image_url
      || '';
}

function toast(msg) {
  const c = $('#toastContainer');
  const t = document.createElement('div');
  t.className = 'toast';
  t.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg><span>${escapeHtml(msg)}</span>`;
  c.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, 2400);
}

function isInWatchlist(id) { return state.watchlist.some(a => a.mal_id === id); }
function isFavorite(id) { return state.favorites.some(a => a.mal_id === id); }
function getContinueItem(id) { return state.continueWatching.find(a => a.mal_id === id); }

function toggleWatchlist(anime) {
  const idx = state.watchlist.findIndex(a => a.mal_id === anime.mal_id);
  if (idx >= 0) {
    state.watchlist.splice(idx, 1);
    toast('Removed from Watchlist');
  } else {
    state.watchlist.push({
      mal_id: anime.mal_id, title: anime.title_english || anime.title,
      images: anime.images, score: anime.score, episodes: anime.episodes,
      year: anime.year, type: anime.type, genres: anime.genres,
      addedAt: Date.now()
    });
    toast('Added to Watchlist');
  }
  saveState();
  return idx < 0;
}

function toggleFavorite(anime) {
  const idx = state.favorites.findIndex(a => a.mal_id === anime.mal_id);
  if (idx >= 0) {
    state.favorites.splice(idx, 1);
    toast('Removed from Favorites');
  } else {
    state.favorites.push({
      mal_id: anime.mal_id, title: anime.title_english || anime.title,
      images: anime.images, score: anime.score, episodes: anime.episodes,
      addedAt: Date.now()
    });
    toast('Added to Favorites');
  }
  saveState();
  return idx < 0;
}

function addToContinue(anime, episode) {
  const idx = state.continueWatching.findIndex(a => a.mal_id === anime.mal_id);
  if (idx >= 0) state.continueWatching.splice(idx, 1);
  state.continueWatching.unshift({
    mal_id: anime.mal_id,
    title: anime.title_english || anime.title,
    images: anime.images,
    score: anime.score,
    episodes: anime.episodes,
    currentEpisode: episode,
    progress: 0,
    updatedAt: Date.now()
  });
  if (state.continueWatching.length > 20) state.continueWatching.pop();
  saveState();
}

function addToHistory(anime, episode) {
  const idx = state.history.findIndex(a => a.mal_id === anime.mal_id);
  if (idx >= 0) state.history.splice(idx, 1);
  state.history.unshift({
    mal_id: anime.mal_id,
    title: anime.title_english || anime.title,
    images: anime.images,
    episode,
    watchedAt: Date.now()
  });
  if (state.history.length > 50) state.history.pop();
  saveState();
}

// ============================================================
// CARD COMPONENT
// ============================================================
function cardHTML(anime, opts = {}) {
  const title = anime.title_english || anime.title;
  const img = bestImage(anime);
  const score = anime.score || 0;
  const episodes = anime.episodes || anime.airing;
  const year = anime.year || (anime.aired?.from ? new Date(anime.aired.from).getFullYear() : '');
  const type = anime.type || 'TV';
  const isContinue = opts.continue;
  const continueItem = getContinueItem(anime.mal_id);
  const progress = continueItem?.progress || 0;

  const isNew = anime.status === 'Currently Airing' || (anime.airing && Date.now() - new Date(anime.aired?.from || 0).getTime() < 365 * 86400000);
  const typeBadge = type !== 'TV' ? `<div class="card-badge type">${escapeHtml(type)}</div>` : '';

  if (isContinue) {
    return `
      <div class="card card-continue" data-id="${anime.mal_id}">
        <div class="card-poster">
          ${img ? `<img src="${img}" alt="${escapeHtml(title)}" loading="lazy">` : ''}
          <div class="card-overlay">
            <div class="ep-info">EP ${continueItem?.currentEpisode || 1} • Continue</div>
            <div class="ep-title">${escapeHtml(title)}</div>
          </div>
          <div class="card-play"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
          <div class="card-progress"><div class="card-progress-bar" style="width:${progress}%"></div></div>
        </div>
        <div class="card-continue-info">
          <div class="title">${escapeHtml(title)}</div>
          <div class="meta">Episode ${continueItem?.currentEpisode || 1} of ${episodes || '?'}</div>
        </div>
      </div>`;
  }

  return `
    <div class="card" data-id="${anime.mal_id}">
      <div class="card-poster">
        ${img ? `<img src="${img}" alt="${escapeHtml(title)}" loading="lazy">` : ''}
        <div class="card-overlay">

function rowHTML(title, animeList, opts = {}) {
  const id = `row-${Math.random().toString(36).slice(2, 9)}`;
  const cards = animeList.length ? animeList.map(a => cardHTML(a, opts)).join('')
    : skeletonRowHTML(10);
  const showNewPill = opts.newPill ? '<span class="new-pill">NEW</span>' : '';
  return `
    <section class="content-row" id="${id}" data-row-title="${escapeHtml(title)}">
      <div class="row-header">
        <h2 class="row-title">${showNewPill}${escapeHtml(title)}</h2>
        ${opts.viewAll ? `<a href="${opts.viewAll}" class="row-link">View All <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></a>` : ''}
      </div>
      <div class="row-wrapper">
        <button class="row-arrow left" aria-label="Scroll left"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg></button>
        <div class="row-scroll">${cards}</div>
        <button class="row-arrow right" aria-label="Scroll right"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg></button>
      </div>
    </section>`;
}

function attachRowHandlers(section) {
  const scroll = $('.row-scroll', section);
  const leftBtn = $('.row-arrow.left', section);
  const rightBtn = $('.row-arrow.right', section);
  if (!scroll) return;

  const updateArrows = () => {
    const maxScroll = scroll.scrollWidth - scroll.clientWidth - 2;
    if (scroll.scrollLeft <= 2) leftBtn.classList.add('disabled');
    else leftBtn.classList.remove('disabled');
    if (scroll.scrollLeft >= maxScroll) rightBtn.classList.add('disabled');
    else rightBtn.classList.remove('disabled');
  };
  updateArrows();
  scroll.addEventListener('scroll', updateArrows, { passive: true });

  const scrollBy = (dir) => scroll.scrollBy({ left: dir * scroll.clientWidth * 0.85, behavior: 'smooth' });
  leftBtn.addEventListener('click', () => scrollBy(-1));
  rightBtn.addEventListener('click', () => scrollBy(1));

  $$('.card', scroll).forEach(card => {
    card.addEventListener('click', () => {
      const id = parseInt(card.dataset.id);
      location.hash = `#/anime/${id}`;
    });
  });
}

function renderHero(animeList) {
  state.heroAnime = animeList;
  state.currentHeroIdx = 0;
  const hero = $('#hero');
  if (!hero) return;

  const indicators = $('#heroIndicators');
  const slidesHtml = animeList.map((a, i) => heroHTML(a)).join('');
  indicators.insertAdjacentHTML('beforebegin', slidesHtml);

  if (indicators) {
    indicators.innerHTML = animeList.map((_, i) => `<div class="hero-indicator ${i === 0 ? 'active' : ''}" data-idx="${i}"></div>`).join('');
    $$('.hero-indicator', indicators).forEach(d => {
      d.addEventListener('click', () => switchHero(parseInt(d.dataset.idx)));
    });
  }

  showHeroSlide(0);
  startHeroRotation();

  $$('.hero-actions button', hero).forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const action = btn.dataset.action;
      const id = parseInt(btn.dataset.id);
      const anime = animeList.find(a => a.mal_id === id);
      if (!anime) return;
      if (action === 'watch') {
        addToHistory(anime, 1);
        location.hash = `#/watch/${id}/1`;
      } else if (action === 'watchlist') {
        const added = toggleWatchlist(anime);
        btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="${added ? 'M9 11l3 3L22 4' : 'M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z'}"/></svg> ${added ? 'In Watchlist' : 'Add To Watchlist'}`;
      } else if (action === 'details') {
        location.hash = `#/anime/${id}`;
      }
    });
  });
}

function showHeroSlide(idx) {
  $$('.hero-slide').forEach((s, i) => s.classList.toggle('active', i === idx));
  $$('.hero-indicator').forEach((d, i) => d.classList.toggle('active', i === idx));
  state.currentHeroIdx = idx;
}

function switchHero(idx) {
  if (!state.heroAnime.length) return;
  const next = (idx + state.heroAnime.length) % state.heroAnime.length;
  showHeroSlide(next);
  restartHeroRotation();
}

function startHeroRotation() {
  clearInterval(state.heroTimer);
  state.heroTimer = setInterval(() => {
    switchHero(state.currentHeroIdx + 1);
  }, 7000);
}
function restartHeroRotation() { startHeroRotation(); }

async function buildHomeRows(category) {
  const rowsContainer = $('#homeRows');
  if (!rowsContainer) return;
  rowsContainer.innerHTML = '';

  if (state.continueWatching.length) {
    rowsContainer.insertAdjacentHTML('beforeend', rowHTML('Continue Watching', state.continueWatching, { continue: true }));
  }
  if (state.history.length) {
    rowsContainer.insertAdjacentHTML('beforeend', rowHTML('Recently Watched', state.history, {}));
  }

  // Choose hero + rows based on category
  let heroEndpoint, rowDefs;
  if (category === 'tv') {
    heroEndpoint = '/top/anime?type=tv&filter=airing&limit=20';
    rowDefs = [
      ['Trending TV Shows', '/top/anime?type=tv&filter=airing&limit=20'],
      ['Most Popular Shows', '/top/anime?type=tv&filter=bypopularity&limit=20'],
      ['New Episodes', null, { newPill: true }],
      ['Simulcasts', '/top/anime?type=tv&filter=airing&limit=20&page=2'],
      ['Top Rated Shows', '/top/anime?type=tv&limit=20'],
      ['Action', '/anime?type=tv&genres=1&order_by=score&sort=desc&limit=20&min_score=7'],
      ['Fantasy', '/anime?type=tv&genres=10&order_by=score&sort=desc&limit=20&min_score=7'],
      ['Romance', '/anime?type=tv&genres=22&order_by=score&sort=desc&limit=20&min_score=7'],
      ['Comedy', '/anime?type=tv&genres=4&order_by=score&sort=desc&limit=20&min_score=7'],
    ];
  } else if (category === 'movie') {
    heroEndpoint = '/top/anime?type=movie&filter=bypopularity&limit=20';
    rowDefs = [
      ['Trending Movies', '/top/anime?type=movie&filter=bypopularity&limit=20'],
      ['Top Anime Movies', '/top/anime?type=movie&limit=20'],
      ['Action Movies', '/anime?type=movie&genres=1&order_by=score&sort=desc&limit=20&min_score=7'],
      ['Fantasy Movies', '/anime?type=movie&genres=10&order_by=score&sort=desc&limit=20&min_score=7'],
      ['Drama Movies', '/anime?type=movie&genres=8&order_by=score&sort=desc&limit=20&min_score=7'],
      ['Adventure Movies', '/anime?type=movie&genres=2&order_by=score&sort=desc&limit=20&min_score=7'],
      ['Romance Movies', '/anime?type=movie&genres=22&order_by=score&sort=desc&limit=20&min_score=7'],
      ['Studio Ghibli', '/anime?q=ghibli&order_by=score&sort=desc&limit=20'],
    ];
  } else {
    heroEndpoint = '/top/anime?filter=airing&limit=20';
    rowDefs = [
      ['Trending Now', '/top/anime?filter=airing&limit=20'],
      ['Most Popular', '/top/anime?filter=bypopularity&limit=20'],
      ['New Episodes', null, { newPill: true }],
      ['Simulcasts', '/top/anime?filter=airing&limit=20&page=2'],
      ['Top Rated', '/top/anime?limit=20'],
      ['Action', '/anime?genres=1&order_by=score&sort=desc&limit=20&min_score=7'],
      ['Fantasy', '/anime?genres=10&order_by=score&sort=desc&limit=20&min_score=7'],
      ['Romance', '/anime?genres=22&order_by=score&sort=desc&limit=20&min_score=7'],
      ['Comedy', '/anime?genres=4&order_by=score&sort=desc&limit=20&min_score=7'],
      ['Movies', '/top/anime?type=movie&limit=20'],
    ];
  }

  // Add row scaffolds
  rowDefs.forEach(([title, _path, opts]) => {
    rowsContainer.insertAdjacentHTML('beforeend', rowHTML(title, [], opts || {}));
  });

  // Recommended row at end
  rowsContainer.insertAdjacentHTML('beforeend', rowHTML('Recommended For You', [], {}));

  $$('.content-row', rowsContainer).forEach(attachRowHandlers);

  // Hero
  let top = null;
  try {
    top = await api(heroEndpoint);
    if (top.data) {
      const heroPicks = top.data.slice(0, 5);
      renderHero(heroPicks);
    }
  } catch (e) { console.warn('hero load failed', e); }

  // Sequential row fills
  for (const [title, path, opts] of rowDefs) {
    if (title === 'New Episodes' && !path) {
      try {
        const now = new Date();
        const season = ['winter','spring','summer','fall'][Math.floor(now.getMonth()/3)];
        const year = now.getFullYear();
        await fillRow(rowsContainer, 'New Episodes', `/seasons/${year}/${season}?limit=20`, { newPill: true });
      } catch(e){}
    } else if (path) {
      await fillRow(rowsContainer, title, path, opts || {});
    }
  }

  // Recommendations
  const recSource = state.favorites.length ? state.favorites : (top?.data || []).slice(5, 15);
  if (recSource.length) {
    const first = recSource[0];
    try {
      const recs = await api(`/anime/${first.mal_id}/recommendations`);
      if (recs.data) {
        const recList = recs.data.slice(0, 20).map(r => r.entry);
        fillRowWithData(rowsContainer, 'Recommended For You', recList);
      }
    } catch(e){}
  }
}

async function fillRow(container, title, path, opts = {}) {
  try {
    const res = await api(path);
    if (res.data) fillRowWithData(container, title, res.data, opts);
  } catch(e){ console.warn('row failed', title, e); }
}

function fillRowWithData(container, title, data, opts = {}) {
  const rows = $$('.content-row', container);
  for (const row of rows) {
    const t = $('.row-title', row);
    if (t && t.textContent.trim().replace('NEW', '').trim() === title && data.length) {
      const scroll = $('.row-scroll', row);
      scroll.innerHTML = data.map(a => cardHTML(a, opts)).join('');
      attachRowHandlers(row);
      break;
    }
  }
}

            obs.disconnect();
            sentinel.remove();
            currentPage++;

          }
        });
        obs.observe(sentinel);
      }
    }
  }

  $$('.filter-chip', filters).forEach(c => {
    c.addEventListener('click', async () => {
      $$('.filter-chip', filters).forEach(x => x.classList.remove('active'));

        currentType = '';
        if (c.dataset.genre === '') {

          currentGenre = '';
          currentType = '';
        }
      }
      currentPage = 1;
      grid.innerHTML = Array.from({length: 12}).map(() => `
        <div class="skeleton-card" style="width:100%">
          <div class="skeleton-poster"></div>
          <div class="skeleton-line"></div>
        </div>`).join('');
      await loadPage(currentGenre, currentType, 1);
    });
  });

  await loadPage('', '', 1);
}

    return;
  }
  const anime = res.data;
  state.currentAnime = anime;

  const title = anime.title_english || anime.title;
  const img = bestImage(anime);
  const bg = bestImage(anime);
  const score = anime.score || 0;
  const episodes = anime.episodes || 'Ongoing';
  const year = anime.year || (anime.aired?.from ? new Date(anime.aired.from).getFullYear() : '');
  const genres = (anime.genres || []).map(g => `<span>${escapeHtml(g.name)}</span>`).join('');
  const synopsis = (anime.synopsis || '').replace(/\[Written by.*\]/, '').trim();

  const isFav = isFavorite(anime.mal_id);
  const studios = (anime.studios || []).map(s => s.name).join(', ') || 'Unknown';
  const source = anime.source || 'Unknown';
  const ratingStr = anime.rating || 'N/A';
  const status = anime.status || 'Unknown';
  const duration = anime.duration || 'N/A';
  const isMovie = (anime.type === 'Movie' || anime.type === 'movie');

  app.innerHTML = `

        ${bg ? `<img src="${bg}" alt="${escapeHtml(title)}">` : ''}

              ${inList ? 'In Watchlist' : 'Add to Watchlist'}
            </button>

              <div class="ep-num">EP ${epNum}</div>
            </div>
            <div class="ep-info-block">
              <div class="ep-title">Episode ${epNum}: ${escapeHtml(ep.title || '')}</div>
              <div class="ep-desc">${escapeHtml(ep.synopsis || 'No description available.')}</div>
              <div class="ep-meta">
                <span>Aired: ${ep.aired ? new Date(ep.aired).toLocaleDateString() : 'TBA'}</span>
                ${ep.filler ? '<span style="color:var(--gold)">• Filler</span>' : ''}
                ${ep.recap ? '<span style="color:var(--info)">• Recap</span>' : ''}
              </div>
            </div>
            <button class="ep-play-btn"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></button>
          </div>`;
        }).join('');

        $$('.episode-item', $('#episodeList')).forEach(item => {
          item.addEventListener('click', () => {
            const epNum = parseInt(item.dataset.epnum);
            addToHistory(anime, epNum);
            location.hash = `#/watch/${id}/${epNum}`;
          });
        });
      } else {
        $('#episodeList').innerHTML = `
          <div class="episode-item">
            <div class="ep-thumb"><div class="ep-num">EP 1</div></div>
            <div class="ep-info-block">
              <div class="ep-title">Episode 1</div>
              <div class="ep-desc">Episode list unavailable. Click to start watching.</div>
            </div>
            <button class="ep-play-btn"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></button>
          </div>`;
        $$('.episode-item', $('#episodeList')).forEach(item => {
          item.addEventListener('click', () => {
            addToHistory(anime, 1);
            location.hash = `#/watch/${id}/1`;
          });
        });
      }
    } catch(e) { console.warn('episodes', e); }
  }

  try {
    const charRes = await api(`/anime/${id}/characters`);
    if (charRes.data) {
      const chars = charRes.data.filter(c => c.role === 'Main').slice(0, 6);
      const allChars = (chars.length ? chars : charRes.data.slice(0, 6));
      $('#castGrid').innerHTML = allChars.map(c => {
        const char = c.character;
        const va = c.voice_actors?.find(v => v.language === 'Japanese') || c.voice_actors?.[0];
        return `
          <div class="cast-card">
            <div class="cast-photo">${char.images?.jpg?.image_url ? `<img src="${char.images.jpg.image_url}" alt="${escapeHtml(char.name)}">` : ''}</div>
            <div class="cast-name">${escapeHtml(char.name)}</div>
            <div class="cast-role">${escapeHtml(va?.person?.name || c.role)}</div>
          </div>`;
      }).join('');
    }
  } catch(e) {}

  try {
    const recRes = await api(`/anime/${id}/recommendations`);
    if (recRes.data) {
      const recs = recRes.data.slice(0, 12).map(r => r.entry);
      $('#recGrid').innerHTML = recs.map(a => cardHTML(a)).join('');
      $$('.card', $('#recGrid')).forEach(c => c.addEventListener('click', () => location.hash = `#/anime/${c.dataset.id}`));
    }
  } catch(e) {}

  try {
    const relRes = await api(`/anime/${id}/relations`);
    if (relRes.data) {
      const related = relRes.data.filter(r => ['Side story','Sequel','Prequel','Alternative'].includes(r.relation)).map(r => r.entry).filter(e => e.type === 'anime');
      if (related.length) {
        const similarData = related.map(r => ({
          mal_id: r.mal_id, title: r.name, title_english: r.name,
          images: { jpg: { large_image_url: '', image_url: '' } },
          score: 0, episodes: 0, year: '', type: 'anime'
        }));
        $('#similarGrid').innerHTML = similarData.map(a => cardHTML(a)).join('');
        $$('.card', $('#similarGrid')).forEach(c => c.addEventListener('click', () => location.hash = `#/anime/${c.dataset.id}`));
      } else {
        $('#similarGrid').innerHTML = '<div style="padding:20px;color:var(--text-3)">No similar anime found.</div>';
      }
    }
  } catch(e) {}

  const comments = [
    { name: 'OtakuKing', time: '2 hours ago', text: 'This anime is an absolute masterpiece. The animation quality is incredible!', likes: 24 },
    { name: 'SakuraFan', time: '5 hours ago', text: 'Just finished rewatching this for the third time. Still gives me chills every episode.', likes: 18 },
    { name: 'WeebMaster', time: '1 day ago', text: "The character development in this series is unmatched. Highly recommend to anyone who hasn't seen it yet.", likes: 12 },
  ];
  $('#commentList').innerHTML = comments.map(c => `
    <div class="comment-item">
      <div class="avatar">${c.name[0]}</div>
      <div class="comment-body">
        <div class="head"><span class="name">${escapeHtml(c.name)}</span><span class="time">${c.time}</span></div>
        <div class="text">${escapeHtml(c.text)}</div>
        <div class="actions">
          <button><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3zM7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"/></svg>${c.likes}</button>
          <button><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>Reply</button>
        </div>
      </div>
    </div>`).join('');

  $('#postComment').addEventListener('click', () => {
    const text = $('#commentText').value.trim();
    if (!text) return;
    const html = `
      <div class="comment-item fade-in">
        <div class="avatar">A</div>
        <div class="comment-body">
          <div class="head"><span class="name">You</span><span class="time">Just now</span></div>
          <div class="text">${escapeHtml(text)}</div>
          <div class="actions">
            <button><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3z"/></svg>0</button>
            <button><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>Reply</button>
          </div>
        </div>
      </div>`;
    $('#commentList').insertAdjacentHTML('afterbegin', html);
    $('#commentText').value = '';
    toast('Comment posted');
  });

  window.scrollTo({ top: 0, behavior: 'instant' });
}

// ============================================================
// WATCH PAGE — with multiple source picker, vidify default for movies
// ============================================================
async function renderWatch(id, episode) {
  const app = $('#app');
  app.innerHTML = `<div class="watch-page"><div style="padding:200px 0;text-align:center;color:var(--text-3)">Loading player...</div></div>`;

  const res = await api(`/anime/${id}/full`);
  if (!res.data) {
    app.innerHTML = '<div class="empty-state"><h3>Anime not found</h3></div>';
    return;
  }
  const anime = res.data;
  state.currentAnime = anime;
  state.currentEpisode = parseInt(episode) || 1;

  const title = anime.title_english || anime.title;
  const img = bestImage(anime);
  const isMovie = (anime.type === 'Movie' || anime.type === 'movie');

  // Fetch TMDB ID — tell the lookup whether we expect a movie so it picks
  // the right result type from TMDB's find API.
  const tmdbInfo = await fetchTmdbId(anime.mal_id, isMovie);
  state.currentTmdbId = tmdbInfo?.id || null;
  state.currentTmdbInfo = tmdbInfo;

  // Determine default source based on content type
  const defaultSourceKey = isMovie ? DEFAULT_MOVIE_SOURCE : DEFAULT_TV_SOURCE;
  if (!state.currentSource) state.currentSource = defaultSourceKey;

  const playerUrl = buildPlayerUrl(tmdbInfo, state.currentEpisode, 1, state.currentSource);

  // Build source selector buttons
  const sourceButtonsHtml = Object.entries(PLAYER_SOURCES).map(([key, src]) => {
    const isDefault = key === defaultSourceKey;
    return `<button class="source-btn ${state.currentSource === key ? 'active' : ''}" data-source="${key}" ${isDefault ? 'data-default="1"' : ''}>
      ${escapeHtml(src.name)}<span class="src-tag">${escapeHtml(src.tag)}</span>${isDefault ? '<span class="src-tag" style="background:var(--brand);color:#fff">DEFAULT</span>' : ''}
    </button>`;
  }).join('');

  const playerIframeHtml = playerUrl
    ? `<iframe class="player-iframe" id="playerFrame" src="${playerUrl}" allowfullscreen allow="autoplay; fullscreen; encrypted-media; picture-in-picture" referrerpolicy="origin"></iframe>`
    : `<div id="playerErrorOverlay" style="position:absolute;inset:0;display:grid;place-items:center;background:var(--bg-2);color:var(--text-3);text-align:center;padding:32px;">
         <div>
           <div style="font-size:48px;margin-bottom:12px;opacity:.4;">🎬</div>
           <div style="font-size:16px;font-weight:700;color:var(--text-2);margin-bottom:6px;">No streaming source found</div>
           <div style="font-size:13px;max-width:400px;margin-bottom:16px;">We couldn't find a TMDB match for this title automatically. Try clicking "Retry Lookup" or switch to another source.</div>
           <button class="btn btn-primary" id="retryLookup" style="padding:10px 20px;font-size:13px;">
             <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px;display:inline-block;vertical-align:middle;margin-right:6px;"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
             Retry Lookup
           </button>
         </div>
       </div>`;

  app.innerHTML = `
    <div class="watch-page page-transition">
      <div class="watch-container">
        <div class="watch-layout">
          <div>
            <div class="player-wrapper" id="playerWrapper">
              <div class="player-loading" id="playerLoading"><div class="spinner"></div></div>
              ${playerIframeHtml}
              <div class="player-settings">
                <div class="auto-play-toggle ${state.autoPlay ? 'on' : ''}" id="autoPlayToggle" title="Auto-play next episode">
                  <span>Auto-Play</span>
                  <div class="switch"></div>
                </div>
                <button class="setting-btn" id="theaterBtn" title="Theater Mode (T)">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="6" width="20" height="12" rx="2"/></svg>
                </button>
                <button class="setting-btn" id="fullscreenBtn" title="Fullscreen (F)">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
                </button>
              </div>
              <div class="next-ep-banner" id="nextEpBanner">
                <div class="info">
                  <div class="label">Next Episode</div>
                  <div class="title" id="nextEpTitle">Episode ${state.currentEpisode + 1}</div>
                </div>
                <button id="playNextBtn">Play Next</button>
              </div>
            </div>

            <div class="source-selector">
              <span class="label">Streaming Source:</span>
              ${sourceButtonsHtml}
            </div>

            <div class="watch-info">
              <h1>${escapeHtml(title)}</h1>
              <div class="ep-title">${isMovie ? 'Full Movie • HD' : 'Episode ' + state.currentEpisode + ' • ' + escapeHtml(anime.title_japanese || '')}</div>
              <div class="ep-desc">${escapeHtml((anime.synopsis || '').replace(/\[Written by.*\]/, '').trim().slice(0, 280))}...</div>
              <div class="watch-actions">
                <button class="action-btn ${isInWatchlist(anime.mal_id) ? 'active' : ''}" id="watchlistAction">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
                  ${isInWatchlist(anime.mal_id) ? 'In Watchlist' : 'Add to Watchlist'}
                </button>
                <button class="action-btn ${isFavorite(anime.mal_id) ? 'active' : ''}" id="favoriteAction">
                  <svg viewBox="0 0 24 24" fill="${isFavorite(anime.mal_id) ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
                  ${isFavorite(anime.mal_id) ? 'Favorited' : 'Favorite'}
                </button>
                <button class="action-btn" id="shareAction">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
                  Share
                </button>
                ${!isMovie ? `
                  <button class="action-btn" id="prevEpBtn" ${state.currentEpisode <= 1 ? 'disabled style="opacity:.4"' : ''}>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
                    Previous
                  </button>
                  <button class="action-btn" id="nextEpBtn">
                    Next Episode
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
                  </button>
                ` : ''}
              </div>
            </div>
          </div>
          ${!isMovie ? `
            <aside class="watch-sidebar">
              <div class="sidebar-header">
                <h3>Episodes</h3>
                <div class="sidebar-toggle">
                  <button class="active" id="subToggle">SUB</button>
                  <button id="dubToggle">DUB</button>
                </div>
              </div>
              <div class="ep-list" id="epList">
                <div style="padding:40px;text-align:center;color:var(--text-3)">Loading...</div>
              </div>
            </aside>
          ` : `
            <aside class="watch-sidebar">
              <div class="sidebar-header">
                <h3>Movie Info</h3>
              </div>
              <div style="padding:18px;">
                <div style="margin-bottom:14px;">
                  <div style="font-size:11px;color:var(--text-3);text-transform:uppercase;letter-spacing:.6px;font-weight:800;margin-bottom:4px;">Type</div>
                  <div style="font-size:14px;font-weight:700;">${escapeHtml(anime.type || 'Movie')}</div>
                </div>
                <div style="margin-bottom:14px;">
                  <div style="font-size:11px;color:var(--text-3);text-transform:uppercase;letter-spacing:.6px;font-weight:800;margin-bottom:4px;">Duration</div>
                  <div style="font-size:14px;font-weight:700;">${escapeHtml(anime.duration || 'N/A')}</div>
                </div>
                <div style="margin-bottom:14px;">
                  <div style="font-size:11px;color:var(--text-3);text-transform:uppercase;letter-spacing:.6px;font-weight:800;margin-bottom:4px;">Released</div>
                  <div style="font-size:14px;font-weight:700;">${escapeHtml(anime.aired?.string || anime.year || 'N/A')}</div>
                </div>
                <div style="margin-bottom:14px;">
                  <div style="font-size:11px;color:var(--text-3);text-transform:uppercase;letter-spacing:.6px;font-weight:800;margin-bottom:4px;">Studio</div>
                  <div style="font-size:14px;font-weight:700;">${escapeHtml((anime.studios || []).map(s=>s.name).join(', ') || 'Unknown')}</div>
                </div>
                <div style="margin-bottom:14px;">
                  <div style="font-size:11px;color:var(--text-3);text-transform:uppercase;letter-spacing:.6px;font-weight:800;margin-bottom:4px;">Score</div>
                  <div style="font-size:14px;font-weight:700;color:var(--gold);">★ ${anime.score ? anime.score.toFixed(1) : 'N/A'}</div>
                </div>
                <div>
                  <div style="font-size:11px;color:var(--text-3);text-transform:uppercase;letter-spacing:.6px;font-weight:800;margin-bottom:4px;">Genres</div>
                  <div style="font-size:13px;font-weight:600;color:var(--text-2);">${escapeHtml((anime.genres || []).map(g=>g.name).join(', ') || 'N/A')}</div>
                </div>
              </div>
            </aside>
          `}
        </div>
      </div>
    </div>`;

  $('#playerFrame')?.addEventListener('load', () => {
    setTimeout(() => $('#playerLoading')?.remove(), 800);
  });
  setTimeout(() => $('#playerLoading')?.remove(), 4000);

  // Source selector handlers
  $$('.source-btn', app).forEach(btn => {
    btn.addEventListener('click', () => {
      const sourceKey = btn.dataset.source;
      state.currentSource = sourceKey;
      saveState();
      $$('.source-btn', app).forEach(b => b.classList.toggle('active', b === btn));
      const newUrl = buildPlayerUrl(tmdbInfo, state.currentEpisode, 1, sourceKey);
      const frame = $('#playerFrame');
      if (frame && newUrl) {
        frame.src = newUrl;
        toast(`Switched to ${PLAYER_SOURCES[sourceKey].name}`);
      } else if (!newUrl) {
        toast('Source unavailable for this title');
      }
    });
  });

  // NEW: Retry lookup handler
  $('#retryLookup')?.addEventListener('click', async () => {
    const cacheKey = 'tmdb:' + anime.mal_id + (isMovie ? ':movie' : ':tv');
    state.tmdbCache.delete(cacheKey);
    toast('Searching database...');
    const newTmdbInfo = await fetchTmdbId(anime.mal_id, isMovie);
    if (newTmdbInfo?.id) {
      state.currentTmdbInfo = newTmdbInfo;
      state.currentTmdbId = newTmdbInfo.id;
      const newUrl = buildPlayerUrl(newTmdbInfo, state.currentEpisode, 1, state.currentSource);
      if (newUrl) {
        const wrapper = $('#playerWrapper');
        const errorDiv = $('#playerErrorOverlay');
        if (errorDiv) {
          errorDiv.remove();
          const iframe = document.createElement('iframe');
          iframe.className = 'player-iframe';
          iframe.id = 'playerFrame';
          iframe.src = newUrl;
          iframe.setAttribute('allowfullscreen', '');
          iframe.setAttribute('allow', 'autoplay; fullscreen; encrypted-media; picture-in-picture');
          iframe.setAttribute('referrerpolicy', 'origin');
          wrapper.appendChild(iframe);
          toast('Source found! Loading player...');
        }
      } else {
        toast('Found TMDB entry but no player URL');
      }
    } else {
      toast('Still not found. Try again later.');
    }
  });

  $('#autoPlayToggle').addEventListener('click', () => {
    state.autoPlay = !state.autoPlay;
    $('#autoPlayToggle').classList.toggle('on', state.autoPlay);
    saveState();
    toast(state.autoPlay ? 'Auto-play enabled' : 'Auto-play disabled');
  });

  $('#theaterBtn').addEventListener('click', toggleTheater);
  $('#fullscreenBtn').addEventListener('click', toggleFullscreen);

  $('#watchlistAction').addEventListener('click', () => {
    const added = toggleWatchlist(anime);
    $('#watchlistAction').classList.toggle('active', added);
    $('#watchlistAction').innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg> ${added ? 'In Watchlist' : 'Add to Watchlist'}`;
  });
  $('#favoriteAction').addEventListener('click', () => {
    const added = toggleFavorite(anime);
    $('#favoriteAction').classList.toggle('active', added);
    $('#favoriteAction').innerHTML = `<svg viewBox="0 0 24 24" fill="${added ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg> ${added ? 'Favorited' : 'Favorite'}`;
  });
  $('#shareAction').addEventListener('click', () => {
    navigator.clipboard?.writeText(location.href);
    toast('Link copied');
  });

  if (!isMovie) {
    $('#prevEpBtn')?.addEventListener('click', () => {
      if (state.currentEpisode > 1) {
        location.hash = `#/watch/${id}/${state.currentEpisode - 1}`;
      }
    });
    $('#nextEpBtn')?.addEventListener('click', () => playNext());
    $('#playNextBtn').addEventListener('click', () => playNext());

    // SUB/DUB toggle
    $('#subToggle').addEventListener('click', () => {
      $('#subToggle').classList.add('active');
      $('#dubToggle').classList.remove('active');
      toast('Switched to SUB');
    });
    $('#dubToggle').addEventListener('click', () => {
      $('#dubToggle').classList.add('active');
      $('#subToggle').classList.remove('active');
      toast('Switched to DUB');
    });

    // Load episodes list
    try {
      const epRes = await api(`/anime/${id}/episodes`);
      let episodes = epRes.data || [];
      if (!episodes.length && anime.episodes) {
        episodes = Array.from({length: anime.episodes}, (_, i) => ({ mal_id: i + 1, title: `Episode ${i + 1}` }));
      } else if (!episodes.length) {
        episodes = Array.from({length: 12}, (_, i) => ({ mal_id: i + 1, title: `Episode ${i + 1}` }));
      }

      // FIX: Use index+1 for episode numbers instead of ep.mal_id
      $('#epList').innerHTML = episodes.map((ep, idx) => {
        const epNum = idx + 1;
        return `
        <div class="ep-list-item ${epNum === state.currentEpisode ? 'active' : ''}" data-ep="${epNum}">
          <div class="num">${epNum}</div>
          <div class="ep-info">
            <div class="title">${escapeHtml(ep.title || `Episode ${epNum}`)}</div>
            <div class="meta">${ep.aired ? new Date(ep.aired).toLocaleDateString() : ''}</div>
          </div>
          <div class="play-icon"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
        </div>`;
      }).join('');

      $$('.ep-list-item', $('#epList')).forEach(item => {
        item.addEventListener('click', () => {
          const epNum = parseInt(item.dataset.ep);
          location.hash = `#/watch/${id}/${epNum}`;
        });
      });

      const active = $('.ep-list-item.active', $('#epList'));
      if (active) active.scrollIntoView({ block: 'center' });

      if (state.autoPlay) {
        setTimeout(() => {
          const banner = $('#nextEpBanner');
          if (banner) banner.classList.add('show');
          setTimeout(() => {
            if ($('#nextEpBanner')?.classList.contains('show')) playNext();
          }, 8000);
        }, 5 * 60 * 1000);
      }
    } catch(e) { console.warn('episodes', e); }
  }

  addToContinue(anime, state.currentEpisode);
  addToHistory(anime, state.currentEpisode);

  window.scrollTo({ top: 0, behavior: 'instant' });
}

function playNext() {
  if (!state.currentAnime) return;
  const nextEp = state.currentEpisode + 1;
  location.hash = `#/watch/${state.currentAnime.mal_id}/${nextEp}`;
}

function toggleTheater() {
  const wrapper = $('#playerWrapper');
  if (!wrapper) return;
  state.theaterMode = !state.theaterMode;
  if (state.theaterMode) {
    wrapper.style.cssText = 'position:fixed;top:50px;left:0;right:0;z-index:999;max-width:100%;border-radius:0;aspect-ratio:16/9';
    document.body.classList.add('no-scroll');
    toast('Theater mode — press T to exit');
  } else {
    wrapper.style.cssText = '';
    document.body.classList.remove('no-scroll');
  }
}

function toggleFullscreen() {
  const wrapper = $('#playerWrapper');
  if (!wrapper) return;
  if (!document.fullscreenElement) {
    wrapper.requestFullscreen?.();
  } else {
    document.exitFullscreen?.();
  }
}

// ============================================================
// ROUTER
// ============================================================
function parseRoute() {
  return location.hash.slice(1) || '/';
}

function route() {
  const r = parseRoute();
  state.currentRoute = r;
  clearInterval(state.heroTimer);

  $$('.nav-link').forEach(l => l.classList.toggle('active', l.dataset.route === r.split('/').slice(0,2).join('/')));
  $$('.mobile-nav-item').forEach(l => l.classList.toggle('active', l.dataset.route === r.split('/').slice(0,2).join('/')));

  $('#userDropdown').classList.remove('open');
  $('#notifPanel').classList.remove('open');

  if (r === '/' || r === '') renderHome();
  else if (r === '/browse') renderBrowse();
  else if (r === '/shows') renderShows();
  else if (r === '/movies') renderMovies();
  else if (r === '/new') renderNew();
  else if (r === '/popular') renderPopular();
  else if (r === '/games') renderGames();
  else if (r === '/news') renderNews();
  else if (r === '/watchlist') renderWatchlist();
  else if (r.startsWith('/search')) {
    const q = new URLSearchParams(r.split('?')[1] || '').get('q') || '';
    renderSearch(q);
  }
  else if (r.startsWith('/anime/')) {
    const id = r.split('/')[2];
    renderDetail(id);
  }
  else if (r.startsWith('/watch/')) {
    const parts = r.split('/');
    renderWatch(parts[2], parts[3] || 1);
  }
  else if (r === '/profile') renderWatchlist();
  else renderHome();
}

window.addEventListener('hashchange', route);

// ============================================================
// NAVBAR / DROPDOWN / SEARCH
// ============================================================
function initNavbar() {
  window.addEventListener('scroll', () => {
    $('#navbar').classList.toggle('scrolled', window.scrollY > 20);
  }, { passive: true });

  $('#avatarBtn').addEventListener('click', (e) => {
    e.stopPropagation();
    $('#userDropdown').classList.toggle('open');
    $('#notifPanel').classList.remove('open');
  });

  $('#notifBtn').addEventListener('click', (e) => {
    e.stopPropagation();
    $('#notifPanel').classList.toggle('open');
    $('#userDropdown').classList.remove('open');
  });

  document.addEventListener('click', (e) => {
    if (!e.target.closest('#userDropdown') && !e.target.closest('#avatarBtn')) {
      $('#userDropdown').classList.remove('open');
    }
    if (!e.target.closest('#notifPanel') && !e.target.closest('#notifBtn')) {
      $('#notifPanel').classList.remove('open');
    }
  });

  $$('.dropdown-item').forEach(item => {
    item.addEventListener('click', () => {
      const action = item.dataset.action;
      $('#userDropdown').classList.remove('open');
      if (action === 'watchlist') location.hash = '#/watchlist';
      else if (action === 'history') location.hash = '#/watchlist';
      else if (action === 'profile') location.hash = '#/profile';
      else if (action === 'settings') toast('Settings panel coming soon');
      else if (action === 'help') toast('Help center coming soon');
      else if (action === 'logout') toast('Signed out (demo only)');
    });
  });

  $('#watchlistBtn').addEventListener('click', () => location.hash = '#/watchlist');

  let searchTimer;
  const handleSearch = (val) => {
    clearTimeout(searchTimer);
    if (!val.trim()) return;
    searchTimer = setTimeout(() => {
      location.hash = `#/search?q=${encodeURIComponent(val.trim())}`;
    }, 600);
  };

  $('#searchInput').addEventListener('input', (e) => handleSearch(e.target.value));
  $('#mobileSearchInput').addEventListener('input', (e) => handleSearch(e.target.value));
  $('#searchInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') handleSearch(e.target.value);
  });
}

function initNotifications() {
  const defaultNotifs = [
    { icon: 'play', title: 'New Episode Available', desc: 'Jujutsu Kaisen Season 2 — Episode 23 is now streaming', time: '2m ago' },
    { icon: 'star', title: 'Trending Now', desc: 'One Piece is #1 this week on T9 Anime', time: '1h ago' },
    { icon: 'heart', title: 'In Your Watchlist', desc: 'Demon Slayer: Swordsmith Village Arc added new episodes', time: '3h ago' },
  ];
  if (!state.notifications.length) {
    state.notifications = defaultNotifs;
    saveState();
  }

  const list = $('#notifList');
  list.innerHTML = state.notifications.map(n => `
    <div class="notif-item">
      <div class="notif-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          ${n.icon === 'play' ? '<path d="M8 5v14l11-7z"/>' : n.icon === 'star' ? '<path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01z"/>' : '<path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>'}
        </svg>
      </div>
      <div class="notif-content">
        <div class="title">${escapeHtml(n.title)}</div>
        <div class="desc">${escapeHtml(n.desc)}</div>
        <div class="time">${escapeHtml(n.time)}</div>
      </div>
    </div>`).join('');

  $('#clearNotif').addEventListener('click', () => {
    state.notifications = [];
    saveState();
    list.innerHTML = '<div style="padding:40px;text-align:center;color:var(--text-3)">No new notifications</div>';
    $('#notifBadge').style.display = 'none';
    toast('All marked as read');
  });
}

// ============================================================
// KEYBOARD SHORTCUTS
// ============================================================
function initKeyboard() {
  let hintTimer;
  document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

    if (e.ctrlKey && e.key === '/') {
      e.preventDefault();
      $('#shortcutHint').classList.add('show');
      clearTimeout(hintTimer);
      hintTimer = setTimeout(() => $('#shortcutHint').classList.remove('show'), 4000);
      return;
    }

    if (!state.currentRoute.startsWith('/watch')) return;

    switch(e.key.toLowerCase()) {
      case ' ':
        e.preventDefault();
        toast('Use player controls for play/pause');
        break;
      case 'f':
        toggleFullscreen();
        break;
      case 't':
        toggleTheater();
        break;
      case 'n':
        playNext();
        break;
    }
  });
}

// ============================================================
// INIT
// ============================================================
async function init() {
  initNavbar();
  initNotifications();
  initKeyboard();
  route();

  setTimeout(() => $('#fullLoader').classList.add('hide'), 600);

  // Background TMDB cache warm-up (low priority, non-blocking)
  setTimeout(async () => {
    try {
      const top = await api('/top/anime?filter=bypopularity&limit=8');
      if (top.data) {
        for (const a of top.data) {
          await fetchTmdbId(a.mal_id, false).catch(() => {});
          await new Promise(r => setTimeout(r, 600));
        }
      }
    } catch(e) {}
  }, 8000);
}

init();
</script>
