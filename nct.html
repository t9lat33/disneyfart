    <style>
        :root {
            --primary: #8fdcff;
            --primary-hover: #6ecfff;
            --text: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.7);
            --bg: transparent;
            --surface: rgba(0, 0, 0, 0.3);
            --surface-hover: rgba(0, 0, 0, 0.5);
            --border: rgba(255, 255, 255, 0.15);
            --radius: 15px;
            --radius-lg: 100px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body { height: 100%; overflow-x: hidden; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif;
            line-height: 1.6;
            background-image: url("space2.png");
            background-repeat: no-repeat;
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            color: var(--text);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body::-webkit-scrollbar { width: 0; height: 0; }

        header {
            position: fixed;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            width: 90%;
            max-width: 800px;
            background: transparent;
            backdrop-filter: none;
            box-shadow: none;
            padding: 0;
        }

        .header-content {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 0;
        }

        .search-container {
            display: flex;
            flex: 1;
            gap: 10px;
            align-items: center;
        }

        #searchBar {
            flex: 1;
            padding: 10px 20px;
            border: 2px solid rgba(255, 255, 255, 0.15);
            border-radius: 15px;
            background: rgba(0, 0, 0, 0.3);
            color: white;
            font-size: 15px;
            outline: none;
            transition: all 0.2s ease;
            text-align: center;
        }

        #searchBar::placeholder { color: rgba(255, 255, 255, 0.5); }

        #searchBar:focus {
            border-color: #8fdcff;
            box-shadow: 0 0 18px rgba(140, 220, 255, 0.45);
        }

        #sortOptions, #filterOptions {
            padding: 10px 15px;
            border: 2px solid rgba(255, 255, 255, 0.15);
            border-radius: 15px;
            background: rgba(0, 0, 0, 0.3);
            color: white;
            font-size: 14px;
            cursor: pointer;
            outline: none;
            transition: all 0.2s ease;
            backdrop-filter: blur(10px);
            min-width: 100px;
        }

        #sortOptions:hover, #filterOptions:hover {
            border-color: #8fdcff;
            box-shadow: 0 0 18px rgba(140, 220, 255, 0.45);
        }

        #sortOptions option, #filterOptions option {
            background: rgba(0, 0, 0, 0.9);
            color: white;
        }

        main {
            margin: 0 auto;
            padding: 80px 20px 100px;
            max-width: 1400px;
        }

        details { margin-bottom: 20px; }

        summary {
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            color: white;
            padding: 10px 0;
            outline: none;
            list-style: none;
        }

        summary::-webkit-details-marker { display: none; }

        hr { border: none; border-top: 1px solid rgba(255, 255, 255, 0.1); margin: 20px 0; }

        #container, #featuredZones {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 25px;
            margin-top: 15px;
        }

        .zone-item {
            background: transparent;
            border: none;
            border-radius: 100px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            box-shadow: none;
        }

        .zone-item:hover { transform: translateY(-3px); }

        .zone-item img {
            width: 200px;
            height: 200px;
            object-fit: cover;
            border-radius: 100px;
            display: block;
            background: rgba(0, 0, 0, 0.3);
            transition: all 0.2s ease;
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        .zone-item:hover img {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border-radius: 50px;
            opacity: 0.8;
        }

        #zoneViewer {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 10000;
            display: none;
            flex-direction: column;
            animation: slideInUp 0.3s ease;
        }

        @keyframes slideInUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .zone-header {
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(20px);
            color: white;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            min-height: 56px;
            flex-shrink: 0;
        }

        .zone-title {
            flex: 1;
            min-width: 0;
            display: flex;
            align-items: center;
            gap: 10px;
            overflow: hidden;
        }

        #zoneName {
            font-size: 1.1rem;
            font-weight: 700;
            margin: 0;
            color: white;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        #zoneId, #zoneSource { display: none; }

        #zoneAuthor {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            transition: all 0.2s ease;
            white-space: nowrap;
            flex-shrink: 0;
        }

        #zoneAuthor:hover { color: #8fdcff; text-decoration: underline; }

        .zone-controls { display: flex; gap: 8px; flex-shrink: 0; }

        .zone-controls button {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 8px 16px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.2s ease;
            backdrop-filter: blur(10px);
            white-space: nowrap;
        }

        .zone-controls button:hover {
            background: rgba(140, 220, 255, 0.2);
            border-color: #8fdcff;
            transform: translateY(-1px);
        }

        #zoneFrame {
            flex-grow: 1;
            border: none;
            width: 100%;
            background: black;
        }

        #popupOverlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 20000;
            padding: 20px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .popup {
            background: rgba(0, 0, 0, 0.9);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 520px;
            max-height: 80vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: slideInScale 0.3s ease;

        @keyframes slideInScale {
            from { transform: scale(0.9) translateY(20px); opacity: 0; }
            to { transform: scale(1) translateY(0); opacity: 1; }
        }

        .popup-header {
            background: rgba(140, 220, 255, 0.1);
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        #popupTitle {
            margin: 0;
            font-size: 1.25rem;

            color: #8fdcff;

            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            padding: 0;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #popupClose:hover { background: rgba(255, 255, 255, 0.2); transform: scale(1.1); }

        #popupBody { padding: 20px; overflow-y: auto; color: white; }

        #popupBody input[type="text"],
        #popupBody input[type="file"] {
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            font-size: 15px;
            transition: all 0.2s ease;
            outline: none;
        }

        #popupBody input[type="text"]:focus {
            border-color: #8fdcff;
            box-shadow: 0 0 15px rgba(140, 220, 255, 0.3);
        }

        footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.5);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 15px;
            z-index: 100;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .footer-links a {
            color: #8fdcff;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s ease;
            padding: 8px 16px;
            border-radius: 15px;
            background: rgba(140, 220, 255, 0.1);
            border: 1px solid rgba(140, 220, 255, 0.2);
        }

        .footer-links a:hover {
            background: rgba(140, 220, 255, 0.2);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(140, 220, 255, 0.2);
        }

        .footer-credit {
            color: rgba(255,255,255,0.5);
            font-size: 11px;
            font-family: 'Courier New', Courier, monospace;
        }

        .info-button {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            cursor: pointer;
            padding: 6px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            transition: all 0.2s ease;
            color: white;
            flex-shrink: 0;
        }

        .info-button:hover { background: rgba(140, 220, 255, 0.2); transform: scale(1.1); }

        #tooltip {
            position: fixed;
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 8px 15px;
            border-radius: 8px;
            font-size: 14px;
            font-family: sans-serif;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s ease;
            z-index: 100000;
            white-space: nowrap;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        #tooltip.show { opacity: 1; }

        .loading-spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 3px solid rgba(140, 220, 255, 0.3);
            border-top-color: #8fdcff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 40px auto;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .zone-loading {
            position: absolute;
            inset: 56px 0 0 0;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 15px;
            z-index: 10;
            background: #000;
        }

        .zone-loading p {
            color: rgba(255,255,255,0.6);
            font-size: 14px;
        }

        @media (max-width: 768px) {
            .header-content { flex-direction: column; gap: 10px; }
            .search-container { width: 100%; flex-wrap: wrap; }
            #searchBar { width: 100%; }
            #sortOptions, #filterOptions { flex: 1; }
            main { padding: 100px 15px 120px; }
            #container, #featuredZones { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 20px; }
            .zone-item img { width: 150px; height: 150px; }
            .zone-header { padding: 10px 15px; }
            #zoneName { font-size: 1rem; }
            .zone-controls button { padding: 6px 12px; font-size: 12px; }
        }

        @media (max-width: 480px) {
            #container, #featuredZones { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 15px; }
            .zone-item img { width: 120px; height: 120px; }
            .zone-controls { flex-wrap: wrap; gap: 5px; }
            .zone-controls button { padding: 5px 10px; font-size: 11px; border-radius: 8px; }
            .zone-title { gap: 6px; }
        }

<body>
    <span id="tooltip"></span>

    <header>
        <div class="header-content">
            <div class="search-container">
                <input type="text" id="searchBar" placeholder="Search games..." oninput="filterZones()">
                <select id="sortOptions" onchange="sortZones()">
                    <option value="name">Name</option>
                    <option value="id">ID (Date)</option>
                    <option value="popular">Popular</option>
                </select>
                <select id="filterOptions" onchange="filterZones2()">
                    <option value="none">(SELECT TAG)</option>
                </select>
            </div>
        </div>
    </header>

    <main>
        <br>
        <details id="featuredZonesWrapper" open>
            <summary id="allZonesSummary" style="cursor: pointer;">Featured Games</summary>
            <div id="featuredZones" class="zone-container"></div>
        </details>
        <br><hr><br>
        <br>
        <details id="allZonesWrapper" open>
            <summary id="allSummary" style="cursor: pointer;">All Games</summary>
            <div id="container">Loading...</div>
        </details>
    </main>

    <div id="zoneViewer">
        <div class="zone-header">
            <div class="zone-title">
                <h2 id="zoneName">Game</h2>
                <button class="info-button" onclick="showZoneInfo()" title="Game Information">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

                <span id="zoneId" style="display: none;"></span>
                <span id="zoneSource" style="display: none;"></span>
                <span id="zoneAuthor">by Author</span>
            </div>
            <div class="zone-controls">
                <button onclick="reloadZone()" title="Reload">Reload</button>
                <button onclick="fullscreenZone()">Fullscreen</button>
                <button onclick="aboutBlank()">New Tab</button>
                <button onclick="closeZone()">Close</button>
            </div>
        </div>
        <div id="zoneLoading" class="zone-loading" style="display: none;">
            <div class="loading-spinner"></div>
            <p>Loading game...</p>
        </div>
        <iframe id="zoneFrame" sandbox="allow-scripts allow-same-origin allow-pointer-lock allow-fullscreen"></iframe>
    </div>

    <div id="popupOverlay">
        <div class="popup">
            <div class="popup-header">
                <h3 id="popupTitle">Title</h3>
                <button id="popupClose" onclick="closePopup()">&times;</button>
            </div>
            <div id="popupBody">Content will be here</div>
        </div>
    </div>

    <footer>
        <div class="footer-links">
            <span class="footer-credit">Games provided by Noah's Calculus Tutoring and Genizy</span>
            <a href="javascript:saveData()">Export Data</a>
            <a href="#" onclick="document.getElementById('importData').click(); return false;">Import Data</a>
            <input type="file" id="importData" style="display: none;" onchange="loadData(event)">
        </div>
    </footer>

    <script>
        // ============================================
        // CINE-PLAY GAME LOADER
        // Games execute properly in sandboxed iframe

        const container = document.getElementById('container');
        const zoneViewer = document.getElementById('zoneViewer');
        const zoneFrame = document.getElementById('zoneFrame');
        const zoneLoading = document.getElementById('zoneLoading');
        const searchBar = document.getElementById('searchBar');

        // ============================================

        let zones = [];
        let currentZone = null;
        const featuredContainer = document.getElementById('featuredZones');

        // ============================================
        // FETCH FROM BESTSABPLAYEROX API
        // ============================================
        async function fetchBestSabGames() {
            try {
                const response = await fetch(BESTSAB_API + "?t=" + Date.now());
                const data = await response.json();
                return data.map((g, idx) => ({
                    id: 10000 + idx,
                    name: g.name || "Unknown Game",
                    url: (g.url || "").replace("{HTML_URL}", BESTSAB_HTML),
                    cover: (g.cover || "").replace("{COVER_URL}", BESTSAB_COVER).replace("{HTML_URL}", BESTSAB_HTML),
                    author: "bestsabplayerox",
                    special: Array.isArray(g.special) ? g.special : ["HTML5"],
                    featured: idx < 8,
                    _source: "bestsabplayerox"
                }));
            } catch (error) {
                console.error("Error fetching bestsabplayerox games:", error);
                return [];
            }
        }

        // ============================================
        // CREATE NOAH ZONES
        // ============================================
        function createNoahZones() {
            return NOAH_GAME_TITLES.map((title, idx) => ({
                id: idx + 1,
                name: title,
                url: `${NOAH_BASE}/games/${Math.floor(Math.random() * 400) + 1}.html`,
                cover: `${NOAH_BASE}/images/${Math.floor(Math.random() * 400) + 1}.jpg`,
                author: "Noah's Calculus Tutoring",
                special: ["Classic", "Arcade"],
                featured: idx < 12,
                _source: "noah"
            }));
        }

        // ============================================
        // LOAD ALL GAMES FROM BOTH SOURCES
        // ============================================
        async function listZones() {
            container.innerHTML = '<div style="text-align:center; padding:40px;"><div class="loading-spinner"></div><p style="color:rgba(255,255,255,0.6); margin-top:15px;">Loading games from Cine-Play sources...</p></div>';

            try {
                const bestSabGames = await fetchBestSabGames();
                const noahZones = createNoahZones();

                zones = [...bestSabGames, ...noahZones];

                // Remove duplicates by name
                const seen = new Set();
                zones = zones.filter(z => {
                    const key = (z.name || "").toLowerCase().trim();
                    if (seen.has(key)) return false;
                    seen.add(key);
                    return true;
                });

                sortZones();

                // Build tag filter
                let alltags = [];
                for (const obj of zones) {
                    if (Array.isArray(obj.special)) alltags.push(...obj.special);
                }
                alltags = [...new Set(alltags)];
                const filteroption = document.getElementById("filterOptions");
                while (filteroption.children.length > 1) filteroption.removeChild(filteroption.lastElementChild);
                for (const tag of alltags) {
                    const opt = document.createElement("option");
                    opt.value = tag;
                    opt.textContent = tag.charAt(0).toUpperCase() + tag.slice(1);
                    filteroption.appendChild(opt);
                }

            } catch (error) {
                console.error(error);
                container.innerHTML = `Error loading zones: ${error.message}`;
                zones = createNoahZones();
                sortZones();
            }
        }

        function resolveCover(zone) {
            return zone.cover || "";
        }

        function resolveURL(zone) {
            return zone.url || "";

        function sortZones() {
            const sortBy = sortOptions.value;
            if (sortBy === 'name') {
                zones.sort((a, b) => (a.name || "").localeCompare(b.name || ""));
            } else if (sortBy === 'id') {
                zones.sort((a, b) => (a.id || 0) - (b.id || 0));
            } else if (sortBy === 'popular') {
                zones.sort((a, b) => (b._loadCount || 0) - (a._loadCount || 0));
            }

            const featured = zones.filter(z => z.featured).slice(0, 16);
            displayFeaturedZones(featured);
            displayZones(zones);
        }

        function makeZoneItem(file) {
            const zoneItem = document.createElement("div");
            zoneItem.className = "zone-item";
            zoneItem.onclick = () => openZone(file);

            const img = document.createElement("img");
            img.dataset.src = resolveCover(file);
            img.alt = file.name;
            img.loading = "lazy";
            img.className = "lazy-zone-img";
            img.onerror = function() {
                // Fallback: generate a colored placeholder with game initial
                this.onerror = null;
                const canvas = document.createElement('canvas');
                canvas.width = 200;
                canvas.height = 200;
                const ctx = canvas.getContext('2d');
                // Random hue based on game name
                const hue = file.name.split('').reduce((a,c) => a + c.charCodeAt(0), 0) % 360;
                ctx.fillStyle = `hsl(${hue}, 50%, 30%)`;
                ctx.fillRect(0, 0, 200, 200);
                ctx.fillStyle = 'rgba(255,255,255,0.8)';
                ctx.font = 'bold 80px sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText((file.name || '?')[0].toUpperCase(), 100, 100);
                this.src = canvas.toDataURL();
            };

            img.addEventListener('mouseenter', e => {
                tooltip.textContent = file.name;
                tooltip.classList.add('show');
            });
            img.addEventListener('mousemove', e => {
                tooltip.style.left = e.clientX + 15 + 'px';
                tooltip.style.top = e.clientY + 15 + 'px';
            });
            img.addEventListener('mouseleave', () => tooltip.classList.remove('show'));

            zoneItem.appendChild(img);
            return zoneItem;
        }

        function attachLazyObserver(selector) {
            const lazyImages = document.querySelectorAll(selector + ' img.lazy-zone-img');
            const observer = new IntersectionObserver((entries, obs) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const img = entry.target;
                        img.src = img.dataset.src;
                        img.classList.remove("lazy-zone-img");
                        obs.unobserve(img);
                    }
                });
            }, { rootMargin: "100px", threshold: 0.1 });
            lazyImages.forEach(img => observer.observe(img));
        }

        // ============================================
        // OPEN / CLOSE / RELOAD ZONE - EXECUTES GAMES
        // ============================================
        function openZone(file) {
            if (!file || !file.url) {
                alert("No game URL found");
                return;
            }

            // Track load count for popularity sort
            file._loadCount = (file._loadCount || 0) + 1;
            currentZone = file;

            const url = resolveURL(file);

            // Show viewer
            document.getElementById('zoneName').textContent = file.name;
            document.getElementById('zoneId').textContent = file.id;
            document.getElementById('zoneSource').textContent = file._source;
            document.getElementById('zoneAuthor').textContent = "by " + (file.author || "Cine-Play Collection");
            zoneViewer.style.display = "flex";
            zoneLoading.style.display = "flex";

            // Use a Blob URL approach for games that need same-origin execution
            // OR direct src for cross-origin games
            loadGameInIframe(url, file);

            // Update URL
            const u = new URL(window.location);
            u.searchParams.set('id', file.id);
            u.searchParams.set('src', file._source);
            history.pushState(null, '', u.toString());
        }

        async function loadGameInIframe(url, file) {
            zoneLoading.style.display = "flex";
            zoneFrame.style.display = "none";

            try {
                // Try to fetch and create a blob URL so the game executes
                // with proper same-origin context for its assets
                const response = await fetch(url + "?t=" + Date.now());

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const contentType = response.headers.get('content-type') || '';

                if (contentType.includes('application/json')) {
                    // BestSab format: JSON with HTML content
                    const data = await response.json();

                    let htmlContent = '';
                    if (data.html) {
                        htmlContent = data.html;
                    } else if (data.content) {
                        htmlContent = data.content;
                    } else if (data.url) {
                        // Redirect to another URL
                        zoneFrame.src = data.url;
                        zoneFrame.onload = () => {
                            zoneLoading.style.display = "none";
                            zoneFrame.style.display = "block";
                        };
                        return;
                    } else {
                        // Try to stringify the whole object as HTML
                        htmlContent = JSON.stringify(data);
                    }

                    // Fix relative URLs in the HTML content
                    htmlContent = fixRelativeUrls(htmlContent, url);

                    // Write to iframe
                    const blob = new Blob([htmlContent], { type: 'text/html' });
                    const blobUrl = URL.createObjectURL(blob);
                    zoneFrame.src = blobUrl;

                    // Clean up blob URL after load (iframe will keep the content)
                    zoneFrame.onload = () => {
                        zoneLoading.style.display = "none";
                        zoneFrame.style.display = "block";
                        setTimeout(() => URL.revokeObjectURL(blobUrl), 5000);
                    };
                    zoneFrame.onerror = () => {
                        // Fallback: try direct src
                        zoneFrame.src = url;
                        zoneLoading.style.display = "none";
                        zoneFrame.style.display = "block";
                    };

                } else {
                    // Direct HTML file - fetch and execute as blob
                    const htmlText = await response.text();

                    // Fix relative URLs in the HTML
                    const fixedHtml = fixRelativeUrls(htmlText, url);

                    const blob = new Blob([fixedHtml], { type: 'text/html' });
                    const blobUrl = URL.createObjectURL(blob);
                    zoneFrame.src = blobUrl;

                    zoneFrame.onload = () => {
                        zoneLoading.style.display = "none";
                        zoneFrame.style.display = "block";
                        setTimeout(() => URL.revokeObjectURL(blobUrl), 5000);
                    };
                    zoneFrame.onerror = () => {
                        // Final fallback: direct src
                        zoneFrame.src = url;
                        zoneLoading.style.display = "none";
                        zoneFrame.style.display = "block";
                    };
                }
            } catch (error) {
                console.error("Failed to load game:", error);
                // Fallback: direct iframe src (works for many CDN-hosted games)
                zoneFrame.src = url;
                zoneLoading.style.display = "none";
                zoneFrame.style.display = "block";
            }
        }

        // Fix relative URLs in HTML content so assets load correctly
        function fixRelativeUrls(html, baseUrl) {
            try {
                const base = new URL(baseUrl);
                const basePath = base.href.substring(0, base.href.lastIndexOf('/') + 1);

                // Fix href="/..." and src="/..." (absolute paths)
                html = html.replace(/(href|src)=["']\/([^"']*)["']/gi, `$1="${base.origin}/$2"`);

                // Fix href="..." and src="..." without protocol or leading /
                html = html.replace(/(href|src)=["']((?!https?:\/\/)(?!\/\/)(?!data:)(?!#))([^"']*)["']/gi, `$1="${basePath}$3"`);

                // Fix url(...) in CSS
                html = html.replace(/url\(["']?((?!https?:\/\/)(?!\/\/)(?!data:))([^"')]+)["']?\)/gi, `url("${basePath}$2")`);

                // Inject a base tag if not present
                if (!html.includes('<base')) {
                    html = html.replace(/<head>/i, `<head><base href="${basePath}">`);
                }

                return html;
            } catch {
                return html;
            }
        }

        // ============================================
        // DATA EXPORT / IMPORT
        // ============================================
        function sanitizeData(obj, maxStringLen = 1000, maxArrayLen = 10000) {
            if (typeof obj === 'string') return obj.length > maxStringLen ? obj.slice(0, maxStringLen) + '...[truncated]' : obj;
            if (obj instanceof Uint8Array) return obj.length > maxArrayLen ? `[Uint8Array too large (${obj.length} bytes), truncated]` : obj;
            if (Array.isArray(obj)) return obj.map(item => sanitizeData(item, maxStringLen, maxArrayLen));
            if (obj && typeof obj === 'object') {
                const newObj = {};
                for (const key in obj) { if (obj.hasOwnProperty(key)) newObj[key] = sanitizeData(obj[key], maxStringLen, maxArrayLen); }
                return newObj;
            }
            return obj;
        }

        async function saveData() {
            alert("This might take a while, don't touch anything other than this OK button");
            const result = {};
            result.cookies = document.cookie;
            result.localStorage = {...localStorage};
            result.sessionStorage = {...sessionStorage};
            result.indexedDB = {};
            try {
                const dbs = await indexedDB.databases();
                for (const dbInfo of dbs) {
                    if (!dbInfo.name) continue;
                    result.indexedDB[dbInfo.name] = {};
                    await new Promise((resolve, reject) => {
                        const openRequest = indexedDB.open(dbInfo.name, dbInfo.version);
                        openRequest.onerror = () => reject(openRequest.error);
                        openRequest.onsuccess = () => {
                            const db = openRequest.result;
                            const storeNames = Array.from(db.objectStoreNames);
                            if (storeNames.length === 0) { resolve(); return; }
                            const transaction = db.transaction(storeNames, "readonly");
                            const storePromises = [];
                            for (const storeName of storeNames) {
                                result.indexedDB[dbInfo.name][storeName] = [];
                                const store = transaction.objectStore(storeName);
                                const getAllRequest = store.getAll();
                                const p = new Promise((res, rej) => {
                                    getAllRequest.onsuccess = () => {
                                        result.indexedDB[dbInfo.name][storeName] = sanitizeData(getAllRequest.result, 1000, 100);
                                        res();
                                    };
                                    getAllRequest.onerror = () => rej(getAllRequest.error);
                                });
                                storePromises.push(p);
                            }
                            Promise.all(storePromises).then(() => resolve());
                        };
                    });
                }
            } catch(e) { console.log('indexedDB export skipped:', e); }

            result.caches = {};
            try {
                const cacheNames = await caches.keys();
                for (const cacheName of cacheNames) {
                    const cache = await caches.open(cacheName);
                    const requests = await cache.keys();
                    result.caches[cacheName] = [];
                    for (const req of requests) {
                        const response = await cache.match(req);
                        if (!response) continue;
                        const cloned = response.clone();
                        const contentType = cloned.headers.get('content-type') || '';
                        let body;
                        try {
                            if (contentType.includes('application/json')) body = await cloned.json();
                            else if (contentType.includes('text') || contentType.includes('javascript')) body = await cloned.text();
                            else { const buffer = await cloned.arrayBuffer(); body = btoa(String.fromCharCode(...new Uint8Array(buffer))); }
                        } catch { body = '[Unable to read body]'; }
                        result.caches[cacheName].push({ url: req.url, body, contentType });
                    }
                }
            } catch(e) { console.log('Cache export skipped:', e); }

            alert("Done, wait for the download to come");
            const link = document.createElement("a");
            link.href = URL.createObjectURL(new Blob([JSON.stringify(result)], { type: "application/octet-stream" }));
            link.download = `cineplay-backup-${Date.now()}.json`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        async function loadData(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async function (e) {
                try {
                    const data = JSON.parse(e.target.result);
                    if (data.cookies) data.cookies.split(';').forEach(cookie => { if(cookie.trim()) document.cookie = cookie.trim(); });
                    if (data.localStorage) for (const key in data.localStorage) localStorage.setItem(key, data.localStorage[key]);
                    if (data.sessionStorage) for (const key in data.sessionStorage) sessionStorage.setItem(key, data.sessionStorage[key]);
                    if (data.indexedDB) {
                        for (const dbName in data.indexedDB) {
                            const stores = data.indexedDB[dbName];
                            await new Promise((resolve, reject) => {
                                const request = indexedDB.open(dbName, 1);
                                request.onupgradeneeded = e => {
                                    const db = e.target.result;
                                    for (const storeName in stores) {
                                        if (!db.objectStoreNames.contains(storeName)) db.createObjectStore(storeName, { keyPath: 'id', autoIncrement: true });
                                    }
                                };
                                request.onsuccess = e => {
                                    const db = e.target.result;
                                    const transaction = db.transaction(Object.keys(stores), 'readwrite');
                                    transaction.onerror = () => {};
                                    let pendingStores = Object.keys(stores).length;
                                    if (pendingStores === 0) { resolve(); return; }
                                    for (const storeName in stores) {
                                        const objectStore = transaction.objectStore(storeName);
                                        objectStore.clear().onsuccess = () => {
                                            for (const item of stores[storeName]) {
                                                try { objectStore.put(item); } catch(e) {}
                                            }
                                            if (--pendingStores === 0) resolve();
                                        };
                                    }
                                };
                                request.onerror = () => resolve();
                            });
                        }
                    }
                    if (data.caches) {
                        for (const cacheName in data.caches) {
                            try {
                                const cache = await caches.open(cacheName);
                                await cache.keys().then(keys => Promise.all(keys.map(k => cache.delete(k))));
                                for (const entry of data.caches[cacheName]) {
                                    let responseBody;
                                    if (entry.contentType.includes('application/json')) responseBody = JSON.stringify(entry.body);
                                    else if (entry.contentType.includes('text') || entry.contentType.includes('javascript')) responseBody = entry.body;
                                    else {
                                        const binaryStr = atob(entry.body);
                                        const bytes = new Uint8Array(binaryStr.length);
                                        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);
                                        responseBody = bytes.buffer;
                                    }
                                    await cache.put(entry.url, new Response(responseBody, { headers: new Headers({ 'content-type': entry.contentType }) }));
                                }
                            } catch(e) {}
                        }
                    }
                    alert("Data loaded successfully!");
                } catch(err) {
                    alert("Error loading data: " + err.message);
                }
            };
            alert("This might take a while, don't touch anything other than this OK button");
            reader.readAsText(file);
        }

        // ============================================
        // SECURITY: Block school filter domains
        // ============================================
        const schoolList = ["deledao", "goguardian", "lightspeed", "linewize", "securly", ".edu/"];
        function isBlockedDomain(url) {
            try {
                const domain = new URL(url, location.origin).hostname + "/";
                return schoolList.some(s => domain.includes(s));
            } catch { return false; }
        }
        const originalFetch = window.fetch;
        window.fetch = function (url, options) {
            if (isBlockedDomain(url)) { console.warn('Blocked request to', url); return Promise.reject(new Error("Blocked")); }
            return originalFetch.apply(this, arguments);
        };
        const originalOpen = XMLHttpRequest.prototype.open;
        XMLHttpRequest.prototype.open = function (method, url) {
            if (isBlockedDomain(url)) { console.warn('Blocked XHR to', url); return; }
            return originalOpen.apply(this, arguments);
        };
