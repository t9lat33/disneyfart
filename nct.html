            "Fear Assessment", "Roulette Hero", "Road of Fury", "Shift at Midnight", "Baby Sniper", "Endoparasitic",
            "Brotato", "TileTopia", "Needy Streamer Overload", "Deltatraveler"
        ];

        let zones = [];
        let popularityData = {};
        const featuredContainer = document.getElementById('featuredZones');

        // ============================================
        // FETCH FROM BESTSABPLAYEROX API
        // ============================================
        async function fetchBestSabGames() {
            try {
                const response = await fetch(BESTSAB_API + "?t=" + Date.now());
                const data = await response.json();
                return data.map((g, idx) => ({
                    id: 10000 + idx,
                    name: g.name || "Unknown Game",
                    url: (g.url || "").replace("{HTML_URL}", BESTSAB_HTML),
                    cover: (g.cover || "").replace("{COVER_URL}", BESTSAB_COVER).replace("{HTML_URL}", BESTSAB_HTML),
                    author: "bestsabplayerox",
                    special: g.special || [],
                    featured: idx < 8,
                    _source: "bestsabplayerox"
                }));
            } catch (error) {
                console.error("Error fetching bestsabplayerox games:", error);
                return [];
            }
        }

        // ============================================
        // CREATE NOAH ZONES
        // ============================================
        function createNoahZones() {
            return NOAH_GAME_TITLES.map((title, idx) => ({
                id: idx + 1,
                name: title,
                url: `${NOAH_BASE}/games/${Math.floor(Math.random() * 400) + 1}.html`,
                cover: `${NOAH_BASE}/images/${Math.floor(Math.random() * 400) + 1}.jpg`,
                author: "Noah's Calculus Tutoring",
                special: ["Classic", "Arcade"],
                featured: idx < 12,
                _source: "noah"
            }));
        }

        // ============================================
        // LOAD ALL GAMES FROM BOTH SOURCES
        // ============================================
        async function listZones() {
            container.innerHTML = "Loading games from Cine-Play sources (bestsabplayerox + Noah's 200+ collection)...";
            
            try {
                const bestSabGames = await fetchBestSabGames();
                const noahZones = createNoahZones();
                
                zones = [...bestSabGames, ...noahZones];
                
                // Remove duplicates by name
                const seen = new Set();
                zones = zones.filter(z => {
                    const key = (z.name || "").toLowerCase().trim();
                    if (seen.has(key)) return false;
                    seen.add(key);
                    return true;
                });
                
                sortZones();
                
                // Build tag filter
                let alltags = [];
                for (const obj of zones) {
                    if (Array.isArray(obj.special)) alltags.push(...obj.special);
                }
                alltags = [...new Set(alltags)];
                const filteroption = document.getElementById("filterOptions");
                while (filteroption.children.length > 1) filteroption.removeChild(filteroption.lastElementChild);
                for (const tag of alltags) {
                    const opt = document.createElement("option");
                    opt.value = tag;
                    opt.textContent = tag.charAt(0).toUpperCase() + tag.slice(1);
                    filteroption.appendChild(opt);
                }
                
            } catch (error) {
                console.error(error);
                container.innerHTML = `Error loading zones: ${error}`;
                zones = createNoahZones();
                sortZones();
            }
        }

        function resolveCover(zone) {
            return zone.cover || "";
        }

        function resolveURL(zone) {
            return zone.url || "";
        }

        function sortZones() {
            const sortBy = sortOptions.value;
            if (sortBy === 'name') {
                zones.sort((a, b) => (a.name || "").localeCompare(b.name || ""));
            } else if (sortBy === 'id') {
                zones.sort((a, b) => (a.id || 0) - (b.id || 0));
            } else if (sortBy === 'popular') {
                zones.sort((a, b) => ((popularityData[b._source]?.[b.id]) || 0) - ((popularityData[a._source]?.[a.id]) || 0));
            }
            
            const featured = zones.filter(z => z.featured).slice(0, 16);
            displayFeaturedZones(featured);
            displayZones(zones);
        }

        function makeZoneItem(file) {
            const zoneItem = document.createElement("div");
            zoneItem.className = "zone-item";
            zoneItem.onclick = () => openZone(file);

            const img = document.createElement("img");
            img.dataset.src = resolveCover(file);
            img.alt = file.name;
            img.loading = "lazy";
            img.className = "lazy-zone-img";

            img.addEventListener('mouseenter', e => {
                tooltip.textContent = file.name;
                tooltip.classList.add('show');
            });
            img.addEventListener('mousemove', e => {
                tooltip.style.left = e.clientX + 15 + 'px';
                tooltip.style.top = e.clientY + 15 + 'px';
            });
            img.addEventListener('mouseleave', () => tooltip.classList.remove('show'));

            zoneItem.appendChild(img);
            return zoneItem;
        }

        function attachLazyObserver(selector) {
            const lazyImages = document.querySelectorAll(selector + ' img.lazy-zone-img');
            const observer = new IntersectionObserver((entries, obs) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const img = entry.target;
                        img.src = img.dataset.src;
                        img.classList.remove("lazy-zone-img");
                        obs.unobserve(img);
                    }
                });
            }, { rootMargin: "100px", threshold: 0.1 });
            lazyImages.forEach(img => observer.observe(img));
        }

        function displayFeaturedZones(featuredZones) {
            featuredContainer.innerHTML = "";
            featuredZones.forEach(file => featuredContainer.appendChild(makeZoneItem(file)));
            if (!featuredZones.length) {
                featuredContainer.innerHTML = "No featured games found.";
            } else {
                document.getElementById("allZonesSummary").textContent = `Featured Games (${featuredZones.length})`;
            }
            attachLazyObserver('#featuredZones');
        }

        function displayZones(list) {
            container.innerHTML = "";
            list.forEach(file => container.appendChild(makeZoneItem(file)));
            if (!list.length) {
                container.textContent = "No games found.";
            } else {
                document.getElementById("allSummary").textContent = `All Games (${list.length})`;
            }
            attachLazyObserver('#container');
        }

        function filterZones2() {
            const query = filterOptions.value;
            if (query === "none") {
                displayZones(zones);
            } else {
                const filtered = zones.filter(z => z.special?.includes(query));
                if (query.length) document.getElementById("featuredZonesWrapper").removeAttribute("open");
                displayZones(filtered);
            }
        }

        function filterZones() {
            const query = searchBar.value.toLowerCase();
            const filtered = zones.filter(z => (z.name || "").toLowerCase().includes(query));
            if (query.length) document.getElementById("featuredZonesWrapper").removeAttribute("open");
            displayZones(filtered);
        }

        // ============================================
        // OPEN / CLOSE ZONE
        // ============================================
        function openZone(file) {
            if (file.url && file.url.startsWith("http") && !file.url.includes("{") && !file.url.includes("}")) {
                window.open(file.url, "_blank");
                return;
            }
            const url = resolveURL(file);
            if (!url) {
                alert("No game URL found");
                return;
            }
            
            fetch(url + "?t=" + Date.now())
                .then(r => r.text())
                .then(html => {
                    if (zoneFrame.contentDocument === null) {
                        zoneFrame = document.createElement("iframe");
                        zoneFrame.id = "zoneFrame";
                        zoneViewer.appendChild(zoneFrame);
                    }
                    zoneFrame.contentDocument.open();
                    zoneFrame.contentDocument.write(html);
                    zoneFrame.contentDocument.close();
                    document.getElementById('zoneName').textContent = file.name;
                    document.getElementById('zoneId').textContent = file.id;
                    document.getElementById('zoneSource').textContent = file._source;
                    document.getElementById('zoneAuthor').textContent = "by " + (file.author || "Cine-Play Collection");
                    zoneViewer.style.display = "flex";
                    const u = new URL(window.location);
                    u.searchParams.set('id', file.id);
                    u.searchParams.set('src', file._source);
                    history.pushState(null, '', u.toString());
                })
                .catch(error => {
                    console.error("Failed to load zone:", error);
                    if (confirm("Game couldn't load. Open in new tab?")) {
                        window.open(url, "_blank");
                    }
                });
        }

        function aboutBlank() {
            const id = document.getElementById('zoneId').textContent;
            const key = document.getElementById('zoneSource').textContent;
            const zone = zones.find(z => z.id + '' === id && z._source === key);
            if (zone && zone.url) {
                window.open(zone.url, "_blank");
            }
        }

        function closeZone() {
            zoneViewer.style.display = "none";
            if (zoneFrame.parentNode) zoneViewer.removeChild(zoneFrame);
            const u = new URL(window.location);
            u.searchParams.delete('id');
            u.searchParams.delete('src');
            history.pushState(null, '', u.toString());
        }

        function downloadZone() {
            const id = document.getElementById('zoneId').textContent;
            const key = document.getElementById('zoneSource').textContent;
            const zone = zones.find(z => z.id + '' === id && z._source === key);
            if (zone && zone.url) {
                fetch(zone.url)
                    .then(r => r.text())
                    .then(text => {
                        const blob = new Blob([text], { type: "text/html" });
                        const url = URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = zone.name + ".html";
                        document.body.appendChild(a);
                        a.click();
                        document.body.removeChild(a);
                        URL.revokeObjectURL(url);
                    });
            }
        }

        // ============================================
        // DATA EXPORT / IMPORT
        // ============================================
        function sanitizeData(obj, maxStringLen = 1000, maxArrayLen = 10000) {
            if (typeof obj === 'string') return obj.length > maxStringLen ? obj.slice(0, maxStringLen) + '...[truncated]' : obj;
            if (obj instanceof Uint8Array) return obj.length > maxArrayLen ? `[Uint8Array too large (${obj.length} bytes), truncated]` : obj;
            if (Array.isArray(obj)) return obj.map(item => sanitizeData(item, maxStringLen, maxArrayLen));
            if (obj && typeof obj === 'object') {
                const newObj = {};
                for (const key in obj) { if (obj.hasOwnProperty(key)) newObj[key] = sanitizeData(obj[key], maxStringLen, maxArrayLen); }
                return newObj;
            }
            return obj;
        }

        async function saveData() {
            alert("This might take a while, dont touch anything other than this OK button");
            const result = {};
            result.cookies = document.cookie;
            result.localStorage = {...localStorage};
            result.sessionStorage = {...sessionStorage};
            result.indexedDB = {};
            const dbs = await indexedDB.databases();
            for (const dbInfo of dbs) {
                if (!dbInfo.name) continue;
                result.indexedDB[dbInfo.name] = {};
                await new Promise((resolve, reject) => {
                    const openRequest = indexedDB.open(dbInfo.name, dbInfo.version);
                    openRequest.onerror = () => reject(openRequest.error);
                    openRequest.onsuccess = () => {
                        const db = openRequest.result;
                        const storeNames = Array.from(db.objectStoreNames);
                        if (storeNames.length === 0) { resolve(); return; }
                        const transaction = db.transaction(storeNames, "readonly");
                        const storePromises = [];
                        for (const storeName of storeNames) {
                            result.indexedDB[dbInfo.name][storeName] = [];
                            const store = transaction.objectStore(storeName);
                            const getAllRequest = store.getAll();
                            const p = new Promise((res, rej) => {
                                getAllRequest.onsuccess = () => {
                                    result.indexedDB[dbInfo.name][storeName] = sanitizeData(getAllRequest.result, 1000, 100);
                                    res();
                                };
                                getAllRequest.onerror = () => rej(getAllRequest.error);
                            });
                            storePromises.push(p);
                        }
                        Promise.all(storePromises).then(() => resolve());
                    };
                });
            }
            result.caches = {};
            const cacheNames = await caches.keys();
            for (const cacheName of cacheNames) {
                const cache = await caches.open(cacheName);
                const requests = await cache.keys();
                result.caches[cacheName] = [];
                for (const req of requests) {
                    const response = await cache.match(req);
                    if (!response) continue;
                    const cloned = response.clone();
                    const contentType = cloned.headers.get('content-type') || '';
                    let body;
                    try {
                        if (contentType.includes('application/json')) body = await cloned.json();
                        else if (contentType.includes('text') || contentType.includes('javascript')) body = await cloned.text();
                        else { const buffer = await cloned.arrayBuffer(); body = btoa(String.fromCharCode(...new Uint8Array(buffer))); }
                    } catch { body = '[Unable to read body]'; }
                    result.caches[cacheName].push({ url: req.url, body, contentType });
                }
            }
            alert("Done, wait for the download to come");
            const link = document.createElement("a");
            link.href = URL.createObjectURL(new Blob([JSON.stringify(result)], { type: "application/octet-stream" }));
            link.download = `${Date.now()}.data`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        async function loadData(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async function (e) {
                const data = JSON.parse(e.target.result);
                if (data.cookies) data.cookies.split(';').forEach(cookie => { document.cookie = cookie.trim(); });
                if (data.localStorage) for (const key in data.localStorage) localStorage.setItem(key, data.localStorage[key]);
                if (data.sessionStorage) for (const key in data.sessionStorage) sessionStorage.setItem(key, data.sessionStorage[key]);
                if (data.indexedDB) {
                    for (const dbName in data.indexedDB) {
                        const stores = data.indexedDB[dbName];
                        await new Promise((resolve, reject) => {
                            const request = indexedDB.open(dbName, 1);
                            request.onupgradeneeded = e => {
                                const db = e.target.result;
                                for (const storeName in stores) {
                                    if (!db.objectStoreNames.contains(storeName)) db.createObjectStore(storeName, { keyPath: 'id', autoIncrement: true });
                                }
                            };
                            request.onsuccess = e => {
                                const db = e.target.result;
                                const transaction = db.transaction(Object.keys(stores), 'readwrite');
                                transaction.onerror = () => reject(transaction.error);
                                let pendingStores = Object.keys(stores).length;
                                for (const storeName in stores) {
                                    const objectStore = transaction.objectStore(storeName);
                                    objectStore.clear().onsuccess = () => {
                                        for (const item of stores[storeName]) objectStore.put(item);
                                        if (--pendingStores === 0) resolve();
                                    };
                                }
                            };
                            request.onerror = () => reject(request.error);
                        });
                    }
                }
                if (data.caches) {
                    for (const cacheName in data.caches) {
                        const cache = await caches.open(cacheName);
                        await cache.keys().then(keys => Promise.all(keys.map(k => cache.delete(k))));
                        for (const entry of data.caches[cacheName]) {
                            let responseBody;
                            if (entry.contentType.includes('application/json')) responseBody = JSON.stringify(entry.body);
                            else if (entry.contentType.includes('text') || entry.contentType.includes('javascript')) responseBody = entry.body;
                            else {
                                const binaryStr = atob(entry.body);
                                const bytes = new Uint8Array(binaryStr.length);
                                for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);
                                responseBody = bytes.buffer;
                            }
                            await cache.put(entry.url, new Response(responseBody, { headers: new Headers({ 'content-type': entry.contentType }) }));
                        }
                    }
                }
                alert("Data loaded");
            };
            alert("This might take a while, dont touch anything other than this OK button");
            reader.readAsText(file);
        }

        // Block school filters
        const schoolList = ["deledao", "goguardian", "lightspeed", "linewize", "securly", ".edu/"];
        function isBlockedDomain(url) {
            try {
                const domain = new URL(url, location.origin).hostname + "/";
                return schoolList.some(s => domain.includes(s));
            } catch { return false; }
        }
        const originalFetch = window.fetch;
        window.fetch = function (url, options) {
            if (isBlockedDomain(url)) { console.warn('lam'); return Promise.reject(new Error("lam")); }
            return originalFetch.apply(this, arguments);
        };
        const originalOpen = XMLHttpRequest.prototype.open;
        XMLHttpRequest.prototype.open = function (method, url) {
            if (isBlockedDomain(url)) { console.warn('lam'); return; }
            return originalOpen.apply(this, arguments);
        };
        HTMLCanvasElement.prototype.toDataURL = function (...args) { return ""; };

        listZones();
    </script>
