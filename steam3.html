<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:#1b2838}
body{font-family:'Motiva Sans','Noto Sans',Arial,sans-serif;color:#c6d4df;display:flex;flex-direction:column}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(102,192,244,.3);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:rgba(102,192,244,.5)}

nav{background:#171a21;flex-shrink:0;display:flex;flex-direction:column}
.nav-top{display:flex;align-items:center;padding:8px 16px;gap:16px}
.nav-logo{font-family:'Motiva Sans',sans-serif;font-size:22px;font-weight:700;color:#fff;letter-spacing:1px;cursor:pointer}
.nav-logo span{color:#66c0f4}
.nav-links{display:flex;gap:2px}
.nav-link{padding:7px 14px;font-size:13px;color:#b8b6b4;cursor:pointer;text-transform:uppercase;border-radius:2px;transition:all .15s}
.nav-link:hover{color:#fff;background:rgba(255,255,255,.05)}
.nav-link.active{color:#fff;background:rgba(255,255,255,.08)}
.nav-search-wrap{position:relative;margin-left:auto}
.nav-search{background:#316282;border:1px solid rgba(0,0,0,.3);padding:6px 12px 6px 32px;color:#fff;font-size:13px;outline:none;width:200px;border-radius:3px;transition:all .2s}
.nav-search::placeholder{color:#8091a2;font-style:italic}
.nav-search:focus{background:#fff;color:#000;width:240px}
.nav-search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#8091a2;pointer-events:none;font-size:13px}

.app{display:flex;flex:1;overflow:hidden}

aside{width:280px;flex-shrink:0;background:linear-gradient(to bottom,#1a2530,#16202d);display:flex;flex-direction:column;overflow:hidden;border-right:1px solid rgba(255,255,255,.04)}
.sidebar-header{padding:12px 14px 8px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;border-bottom:1px solid rgba(255,255,255,.05)}
.sidebar-header-title{font-size:10px;color:#5a6a7a;text-transform:uppercase;letter-spacing:1.5px;font-weight:700}
.sidebar-header-actions{display:flex;align-items:center;gap:6px}
.library-count{font-size:9px;color:#66c0f4;background:rgba(102,192,244,.15);padding:2px 8px;border-radius:10px;font-weight:700}
.clear-lib-btn{font-size:8px;color:#c94444;cursor:pointer;background:rgba(255,255,255,.03);border:1px solid rgba(255,100,100,.15);padding:2px 6px;border-radius:2px;transition:all .15s}
.clear-lib-btn:hover{background:rgba(255,100,100,.12);color:#ff5555}

#libraryList{flex:1;overflow-y:auto;overflow-x:hidden;padding:6px 0}
.lib-item{display:flex;align-items:center;gap:10px;padding:7px 10px;cursor:pointer;transition:all .1s;margin:1px 6px;border-radius:3px;position:relative;min-height:48px}
.lib-item:hover{background:rgba(255,255,255,.04)}
.lib-item:active{background:rgba(102,192,244,.08)}
.lib-item-img{width:70px;height:40px;object-fit:cover;border-radius:3px;background:#0d1b2a;flex-shrink:0;opacity:0;transition:opacity .3s}
.lib-item-img.loaded{opacity:1}
.lib-item-placeholder{width:70px;height:40px;background:rgba(255,255,255,.03);border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px}
.lib-item-info{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px}
.lib-item-name{font-size:12px;color:#c7d5e0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500}
.lib-item-source{font-size:9px;color:#5a6a7a;display:flex;align-items:center;gap:4px}
.lib-src-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.lib-src-dot.ckv{background:#f4a336}
.lib-src-dot.gnmath{background:#4af49a}
.lib-src-dot.lumin{background:#e8d44d}
.lib-src-dot.ugs{background:#b48bff}
.lib-item-play{width:28px;height:28px;border-radius:50%;background:rgba(121,153,5,.25);border:none;color:#a4d007;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;opacity:0;transition:all .15s}
.lib-item:hover .lib-item-play{opacity:1}
.lib-item-play:hover{background:rgba(121,153,5,.5);color:#d2efa9;transform:scale(1.1)}
.lib-empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px 16px;text-align:center;color:#4a5a6a;font-size:11px;line-height:1.6;height:100%}
.lib-empty-icon{font-size:36px;margin-bottom:10px;opacity:.4}

main{flex:1;overflow-y:auto;background:#1b2838}

/* Provider selector */
.provider-bar{padding:12px 20px;background:#16202d;display:flex;align-items:center;gap:12px;border-bottom:1px solid rgba(255,255,255,.05);flex-wrap:wrap}
.provider-label{font-size:11px;color:#8f98a0;text-transform:uppercase;letter-spacing:1px}
.provider-btn{padding:6px 14px;font-size:11px;cursor:pointer;border-radius:3px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:#8f98a0;transition:all .15s;display:flex;align-items:center;gap:6px}
.provider-btn:hover{color:#fff;background:rgba(255,255,255,.08)}
.provider-btn.active{border-color:#66c0f4;color:#66c0f4;background:rgba(102,192,244,.1)}
.provider-dot{width:8px;height:8px;border-radius:50%}
.provider-dot.ckv{background:#f4a336}
.provider-dot.gnmath{background:#4af49a}
.provider-dot.lumin{background:#e8d44d}
.provider-dot.ugs{background:#b48bff}

.game-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px;padding:14px 20px 20px}

.game-card{background:#16202d;overflow:hidden;cursor:pointer;border-radius:3px;transition:all .2s;border:1px solid rgba(255,255,255,.04);position:relative}
.game-card:hover{border-color:rgba(102,192,244,.3);transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.4)}
.game-card.owned::after{content:'IN LIBRARY';position:absolute;top:5px;right:5px;background:rgba(102,192,244,.2);color:#66c0f4;font-size:7px;padding:2px 5px;font-weight:700;border-radius:2px;z-index:1;pointer-events:none}
.card-thumb-wrap{width:100%;aspect-ratio:460/215;overflow:hidden;background:#0d1b2a;position:relative;display:flex;align-items:center;justify-content:center}
.card-thumb-wrap img{width:100%;height:100%;object-fit:cover;display:block;opacity:0;transition:opacity .3s}
.card-thumb-wrap img.loaded{opacity:1}
.card-info{padding:9px 11px}
.card-name{font-size:12px;color:#c7d5e0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px}
.card-meta{font-size:9px;color:#8f98a0}
.card-footer{padding:7px 11px;display:flex;gap:5px;align-items:center;background:rgba(0,0,0,.15)}
.card-add{flex:1;background:linear-gradient(to bottom,rgba(102,192,244,.2),rgba(102,192,244,.1));border:1px solid rgba(102,192,244,.3);color:#66c0f4;padding:4px;font-size:10px;cursor:pointer;border-radius:2px;transition:all .15s;text-align:center;font-family:'Motiva Sans',sans-serif}
.card-add:hover{background:linear-gradient(to bottom,rgba(102,192,244,.35),rgba(102,192,244,.2));color:#fff}
.card-add.owned{background:linear-gradient(to bottom,rgba(74,244,154,.15),rgba(74,244,154,.08));border-color:rgba(74,244,154,.3);color:#4af49a}
.card-src{padding:2px 6px;font-size:7px;font-weight:700;border-radius:2px;letter-spacing:.5px}
.src-ckv{background:rgba(244,163,54,.15);color:#f4a336;border:1px solid rgba(244,163,54,.3)}
.src-gnmath{background:rgba(74,244,154,.15);color:#4af49a;border:1px solid rgba(74,244,154,.3)}
.src-lumin{background:rgba(232,212,77,.15);color:#e8d44d;border:1px solid rgba(232,212,77,.3)}
.src-ugs{background:rgba(180,139,255,.15);color:#b48bff;border:1px solid rgba(180,139,255,.3)}

.status-msg{display:flex;flex-direction:column;align-items:center;padding:30px;color:#8f98a0;gap:10px;font-size:12px;grid-column:1/-1}
.spinner{width:24px;height:24px;border:3px solid rgba(255,255,255,.1);border-top-color:#66c0f4;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

#zoneFrame{display:none;position:fixed;top:0;left:0;width:100%;height:100%;border:none;z-index:9999;background:#000}
.game-frame-close{position:fixed;top:12px;right:12px;z-index:10000;background:rgba(0,0,0,.7);border:1px solid rgba(255,255,255,.2);color:#fff;padding:8px 16px;font-size:12px;cursor:pointer;border-radius:4px;display:none}
.game-frame-close:hover{background:rgba(200,60,60,.7)}
.game-frame-fs{position:fixed;top:12px;right:80px;z-index:10000;background:rgba(0,0,0,.7);border:1px solid rgba(255,255,255,.2);color:#fff;padding:8px 16px;font-size:12px;cursor:pointer;border-radius:4px;display:none}
.game-frame-fs:hover{background:rgba(255,255,255,.15)}

#downloadOverlay{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:9600;display:none;align-items:center;justify-content:center}
.download-modal{background:#1b2838;border:1px solid rgba(102,192,244,.3);width:100%;max-width:400px;text-align:center;padding:30px;border-radius:4px}
.download-modal h2{font-family:'Motiva Sans',sans-serif;font-size:20px;color:#fff;margin-bottom:6px}
.dl-game-name{color:#66c0f4;font-size:14px;margin-bottom:12px}
.dl-status{font-size:11px;color:#8f98a0;margin-bottom:10px}
.dl-progress-wrap{background:rgba(0,0,0,.4);height:4px;margin:0 20px 14px;border-radius:2px;overflow:hidden}
.dl-progress-bar{height:100%;background:linear-gradient(to right,#66c0f4,#a4d007);width:0%;transition:width .06s linear}
.dl-cancel{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.15);color:#c7d5e0;padding:7px 18px;font-size:11px;cursor:pointer;border-radius:2px}

#infoOverlay{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:9500;display:none;align-items:center;justify-content:center}
.info-modal{background:#1b2838;border:1px solid rgba(255,255,255,.1);width:100%;max-width:440px;border-radius:4px}
.info-header{padding:14px 18px;background:rgba(0,0,0,.2);display:flex;gap:12px;align-items:center}
.info-cover{width:100px;height:50px;object-fit:cover;background:#0d1b2a;border-radius:2px}
.info-title{font-family:'Motiva Sans',sans-serif;font-size:18px;color:#fff}
.info-body{padding:14px 18px;display:flex;flex-direction:column;gap:8px}
.info-row{display:flex;justify-content:space-between;font-size:11px;padding-bottom:6px;border-bottom:1px solid rgba(255,255,255,.03)}
.info-row label{color:#8f98a0;text-transform:uppercase;font-size:9px}
.info-row span{color:#c7d5e0}
.info-footer{padding:10px 18px;background:rgba(0,0,0,.15);display:flex;gap:6px;justify-content:flex-end}
.info-play-btn{background:linear-gradient(to bottom,#799905,#536904);border:none;color:#d2efa9;padding:7px 20px;font-family:'Motiva Sans',sans-serif;font-size:13px;cursor:pointer;border-radius:2px;text-transform:uppercase}
.info-play-btn:hover{background:linear-gradient(to bottom,#8eb80a,#5f7a04);color:#fff}
.info-add-btn{background:rgba(102,192,244,.15);border:1px solid rgba(102,192,244,.3);color:#66c0f4;padding:7px 16px;font-size:11px;cursor:pointer;border-radius:2px}
.info-close-btn{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:#c7d5e0;padding:7px 14px;font-size:11px;cursor:pointer;border-radius:2px}

@media(max-width:768px){
  aside{width:220px}.game-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;padding:10px 14px 16px}
}
</style>
</head>
<body>

<nav>

let allGames = [];

let cardObserver = null;
let luminReady = false;
let currentGame = null;
let currentTab = 'store';
let cBlob = null;

// Library management
const LIBRARY_KEY = 'krypton_library_games';
function getLibrary(){try{return JSON.parse(localStorage.getItem(LIBRARY_KEY)||'[]');}catch(e){return[];}}
function saveLibrary(lib){localStorage.setItem(LIBRARY_KEY,JSON.stringify(lib));}
function isOwned(gameId){return getLibrary().some(g=>g.id===gameId);}
function addToLibrary(game){const lib=getLibrary();if(!lib.some(g=>g.id===game.id)){lib.push({...game,added:Date.now()});saveLibrary(lib);}}
function clearLibrary(){if(confirm('Remove all games from library?')){saveLibrary([]);renderSidebarLibrary();renderLibrary();}}

function gameId(game,provider){
  const name = (game.name||'').toLowerCase().replace(/[^a-z0-9]/g,'');
  return `${provider}_${name}`;
}

// Intersection Observer for lazy loading images
function initObserver(){
  cardObserver = new IntersectionObserver((entries)=>{
    entries.forEach(entry=>{
      const card = entry.target;
      const img = card.querySelector('img[data-src]');
      if(!img || img.classList.contains('loaded')){cardObserver.unobserve(card);return;}
      if(entry.isIntersecting){
        img.src = img.dataset.src;
        img.onload = ()=>img.classList.add('loaded');
        img.onerror = ()=>img.classList.add('loaded');
        cardObserver.unobserve(card);
      }
    });
  },{rootMargin:'300px 0px',threshold:0});
}

// UGS Games Fetcher
async function fetchUGSGames(){
  try{
    const games = UGS_GAMES_DATA.map(g => {
      // Transform 'ugs/filename.html' to 'ugs/ugs/filename.html'
      const transformedUrl = g.file.replace('ugs/', 'ugs/ugs/');
      return {
        name: g.title,
        icon: '', // No icons provided in the data
        url: transformedUrl,
        provider: 'ugs'
      };
    });
    
    localStorage.setItem('krypton_games_list_ugs', JSON.stringify(games));
    return games;
  }catch(error){
    console.error('Failed to load UGS games:', error);
    const cached = localStorage.getItem('krypton_games_list_ugs');
    return cached ? JSON.parse(cached) : [];
  }
}

// LuminSDK Games
async function fetchLuminGames(){
  try{
    if(!luminReady){
      await Lumin.init({
        headless:true,
        onReady:()=>console.log('Lumin ready'),
        onError:(err)=>console.log('Lumin error',err)
      });
      luminReady = true;
    }
    const result = await Lumin.getGames({limit:999});
    const games = result.games.map(g=>({
      name: g.name,
      icon: '',
      image_token: g.image_token,
      url: g.id,
      provider: 'lumin'
    }));
    
    // Load images
    for(const game of games){
      try{
        const url = await Lumin.getImageUrl(game.image_token);
        game.icon = url;
      }catch(e){}
    }
    
    localStorage.setItem('krypton_games_list_lumin',JSON.stringify(games));
    return games;
  }catch(error){
    console.error('Failed to load Lumin games:',error);
    const cached = localStorage.getItem('krypton_games_list_lumin');
    return cached ? JSON.parse(cached) : [];
  }
}

// Chicken Kings Vault Games
async function fetchCKVGames(){
  try{
    const iconMap = {};
    try{
      const iconRes = await fetch(`${CKV_ICONS_URL}/games.json?t=${Date.now()}`);
      const iconJson = await iconRes.json();
      iconJson.forEach(g=>{
        const key = g.name.toLowerCase().replace(/[^a-z0-9]/g,'');
        iconMap[key] = `${CKV_ICONS_URL}/gameimages/${g.img}`;
      });
    }catch(e){console.log('Could not load CKV icon map');}
    
    const apiUrl = `https://api.github.com/repos/carbonicality/ChickenKingsVault/contents/gamefiles/`;
    const res = await fetch(apiUrl);
    const json = await res.json();
    let htmlFiles = json.filter(f=>f.type==='file'&&f.name.endsWith('.html')&&f.name!=='index.html');
    
    const prettyFiles = htmlFiles.filter(f=>/[A-Z\s]/.test(f.name));
    if(prettyFiles.length > 0) htmlFiles = prettyFiles;
    
    const games = htmlFiles.map(f=>{
      const normKey = f.name.replace('.html','').toLowerCase().replace(/[^a-z0-9]/g,'');
      const icon = iconMap[normKey]||'';
      return {
        name: f.name.replace('.html',''),
        icon: icon,
        url: `${CKV_URL}/gamefiles/${f.name}`,
        provider: 'ckv'
      };
    });
    
    localStorage.setItem('krypton_games_list_ckv',JSON.stringify(games));
    return games;
  }catch(error){
    console.error('Failed to load CKV games:',error);
    const cached = localStorage.getItem('krypton_games_list_ckv');
    return cached ? JSON.parse(cached) : [];
  }
}

// GN Math Games (with Source 1 and Source 2 backup)
async function fetchGnMathGames(){
  const sources = [
    {covers: GNMATH_COVERS_1, html: GNMATH_HTML_1, list: GNMATH_LIST_1},
    {covers: GNMATH_COVERS_2, html: GNMATH_HTML_2, list: GNMATH_LIST_2}
  ];
  
  let allGnMathGames = [];
  
  for(const source of sources){
    try{
      const res = await fetch(source.list);
      if(!res.ok) continue;
      const data = await res.json();
      
      const games = data.map(zone => ({
        name: zone.name || zone.title || zone.file_name || 'Unknown Game',
        icon: zone.cover 
          ? zone.cover
              .replace('{COVER_URL}', source.covers)
              .replace('{HTML_URL}', source.html)
          : '',
        url: zone.url 
          ? zone.url
              .replace('{HTML_URL}', source.html)
              .replace('{COVER_URL}', source.covers)
          : '',
        provider: 'gnmath',
        file_name: zone.file_name || ''
      }));
      
      allGnMathGames.push(...games);
    }catch(e){
      console.log(`Failed to load GN Math from ${source.list}:`, e);
    }
  }
  
  // Remove duplicates by name
  const seen = new Set();
  allGnMathGames = allGnMathGames.filter(g => {
    const key = g.name.toLowerCase().trim();
    if(!key || seen.has(key)) return false;
    seen.add(key);
    return true;
  });
  
  if(allGnMathGames.length > 0){
    localStorage.setItem('krypton_games_list_gnmath',JSON.stringify(allGnMathGames));
    return allGnMathGames;
  }
  
  // Fallback to cache
  const cached = localStorage.getItem('krypton_games_list_gnmath');
  return cached ? JSON.parse(cached) : [];
}

// SWITCH PROVIDER
// ============================================================
async function switchProvider(provider){
  currentProvider = provider;
  localStorage.setItem('krypton_provider',provider);
  
  document.querySelectorAll('.provider-btn').forEach(btn=>{
    btn.classList.toggle('active',btn.dataset.provider===provider);
  });
  
  document.getElementById('gameGrid').innerHTML = '<div class="status-msg"><div class="spinner"></div><span>Loading games…</span></div>';
  
  if(provider==='ckv') allGames = await fetchCKVGames();
  else if(provider==='gnmath') allGames = await fetchGnMathGames();
  else if(provider==='lumin') allGames = await fetchLuminGames();
  else if(provider==='ugs') allGames = await fetchUGSGames();
  else allGames = [];
  
  filteredGames = [...allGames];
  renderGames();
  updateGameCount();
}

function updateGameCount(){
  const count = filteredGames.length;
  document.getElementById('totalGamesCounter').textContent = count + ' Games';
}

// ============================================================
// RENDER GAMES
// ============================================================
function genFallback(name){
  const initials = (name||'??').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  return `<div style="width:100%;height:100%;background:linear-gradient(180deg,#60a5fa,#93c5fd);display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:800;color:white;text-shadow:0 2px 4px rgba(0,0,0,0.3)">${initials}</div>`;
}

function renderGames(){
  const grid = document.getElementById('gameGrid');
  grid.innerHTML = '';
  
  if(!filteredGames.length){
    grid.innerHTML = '<div class="status-msg">No games found</div>';
    return;
  }
  
  const srcClass = {'ckv':'src-ckv','gnmath':'src-gnmath','lumin':'src-lumin','ugs':'src-ugs'}[currentProvider]||'src-ckv';
  const srcLabel = {'ckv':'CKV','gnmath':'GNMATH','lumin':'LUMIN','ugs':'UGS'}[currentProvider]||'CKV';
  
  filteredGames.forEach(game=>{
    const gid = gameId(game,currentProvider);
    const owned = isOwned(gid);
    const esc = s=>String(s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;');
    
    const card = document.createElement('div');
    card.className = `game-card${owned?' owned':''}`;
    card.innerHTML = `
      <div class="card-thumb-wrap">
        ${game.icon?`<img data-src="${esc(game.icon)}" alt="">`:`<div style="width:100%;height:100%">${genFallback(game.name)}</div>`}
      </div>
      <div class="card-info">
        <div class="card-name">${esc(game.name)}</div>
        <div class="card-meta">${esc(currentProvider.toUpperCase())}</div>
      </div>
      <div class="card-footer">
        <button class="card-add${owned?' owned':''}">${owned?'✓ In Library':'+ Add to Library'}</button>
        <span class="card-src ${srcClass}">${srcLabel}</span>
      </div>`;
    
    card.querySelector('.card-add').addEventListener('click',e=>{
      e.stopPropagation();
      if(isOwned(gid)) openGame(game);
      else openDownloadModal(game);
    });
    
    card.addEventListener('click',()=>{
      if(isOwned(gid)) openGame(game);
      else openDownloadModal(game);
    });
    
    grid.appendChild(card);
    
    const wrap = card.querySelector('.card-thumb-wrap');
    if(wrap&&wrap.querySelector('img[data-src]')) cardObserver.observe(wrap);
  });
  
  updateOwnedBadges();
}

function updateOwnedBadges(){
  const ownedIds = new Set(getLibrary().map(g=>g.id));
  document.querySelectorAll('#gameGrid .game-card').forEach(card=>{
    const btn = card.querySelector('.card-add');
    const cardName = card.querySelector('.card-name')?.textContent||'';
    const gid = gameId({name:cardName},currentProvider);
    const owned = ownedIds.has(gid);
    if(btn){
      btn.classList.toggle('owned',owned);
      btn.textContent = owned?'✓ In Library':'+ Add to Library';
    }
    card.classList.toggle('owned',owned);
  });
}

// ============================================================
// OPEN GAME
// ============================================================
async function openGame(game){
  currentGame = game;
  
  if(currentProvider==='lumin'){
    try{
      Lumin.loadGame(game.url);
      return;
    }catch(e){
      alert('Failed to load Lumin game');
      return;
    }
  }
  
  try{
    const res = await fetch(game.url);
    const html = await res.text();
    const frame = document.getElementById('zoneFrame');
    frame.style.display = 'block';
    frame.contentDocument.open();
    frame.contentDocument.write(html);
    frame.contentDocument.close();
    
    document.getElementById('closeGameBtn').style.display = 'block';
    document.getElementById('fsBtn').style.display = 'block';
    document.getElementById('storeContent').style.display = 'none';
    document.getElementById('libraryContent').style.display = 'none';
    
  }catch(err){
    console.error('Error opening game:',err);
    const frame = document.getElementById('zoneFrame');
    frame.src = game.url;
    frame.style.display = 'block';
    document.getElementById('closeGameBtn').style.display = 'block';
    document.getElementById('fsBtn').style.display = 'block';
    document.getElementById('storeContent').style.display = 'none';
    document.getElementById('libraryContent').style.display = 'none';
  }
}

function closeGame(){
  const frame = document.getElementById('zoneFrame');
  frame.style.display = 'none';
  frame.src = 'about:blank';
  if(cBlob){URL.revokeObjectURL(cBlob);cBlob=null;}
  document.getElementById('closeGameBtn').style.display = 'none';
  document.getElementById('fsBtn').style.display = 'none';
  document.getElementById('storeContent').style.display = '';
  if(currentTab==='library') document.getElementById('libraryContent').style.display = '';
}

function toggleFullscreen(){
  const frame = document.getElementById('zoneFrame');
  if(!document.fullscreenElement){
    frame.requestFullscreen?.()||frame.webkitRequestFullscreen?.();
  }else{
    document.exitFullscreen?.();
  }
}

// ============================================================
// DOWNLOAD MODAL
// ============================================================
let downloadTimer = null;
function openDownloadModal(game){
  const gid = gameId(game,currentProvider);
  if(isOwned(gid)){openGame(game);return;}
  
  document.getElementById('dlGameName').textContent = game.name;
  document.getElementById('dlStatus').textContent = 'Downloading...';
  document.getElementById('dlProgressBar').style.width = '0%';
  document.getElementById('downloadOverlay').style.display = 'flex';
  
  if(downloadTimer)clearInterval(downloadTimer);
  let p = 0;
  downloadTimer = setInterval(()=>{
    p += Math.random()*22+5;
    if(p>=100){
      p=100;
      document.getElementById('dlProgressBar').style.width='100%';
      clearInterval(downloadTimer);
      downloadTimer=null;
      document.getElementById('dlStatus').textContent='Added!';
      setTimeout(()=>{
        addToLibrary({
          id: gameId(game,currentProvider),
          name: game.name,
          provider: currentProvider,
          cover: game.icon||'',
          url: game.url,
          file_name: game.file_name||''
        });
        closeDownloadModal();
        renderSidebarLibrary();
        renderGames();
      },500);
    }else{
      document.getElementById('dlProgressBar').style.width=p+'%';
      document.getElementById('dlStatus').textContent='Downloading... '+Math.floor(p)+'%';
    }
  },150);
}

function closeDownloadModal(){
  document.getElementById('downloadOverlay').style.display='none';
  if(downloadTimer){clearInterval(downloadTimer);downloadTimer=null;}
}

// ============================================================
// SIDEBAR LIBRARY
// ============================================================
function renderSidebarLibrary(){
  const lib = getLibrary();
  document.getElementById('libraryCount').textContent = lib.length;
  const list = document.getElementById('libraryList');
  
  if(!lib.length){
    list.innerHTML = `<div class="lib-empty-state"><div class="lib-empty-icon">🎮</div><div>Your library is empty<br>Browse the store and add games!</div></div>`;
    return;
  }
  
  let html = '';
  for(const g of lib){
    const esc = s=>String(s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;');
    const dotClass = {'ckv':'ckv','gnmath':'gnmath','lumin':'lumin','ugs':'ugs'}[g.provider]||'ckv';
    html += `<div class="lib-item" onclick="playLibraryGame('${esc(g.id)}')" title="${esc(g.name)}">
      ${g.cover?`<img class="lib-item-img" data-src="${esc(g.cover)}" alt="">`:`<div class="lib-item-placeholder">🎮</div>`}
      <div class="lib-item-info">
        <div class="lib-item-name">${esc(g.name)}</div>
        <div class="lib-item-source"><span class="lib-src-dot ${dotClass}"></span>${esc((g.provider||'').toUpperCase())}</div>
      </div>
      <button class="lib-item-play" onclick="event.stopPropagation();playLibraryGame('${esc(g.id)}')">▶</button>
    </div>`;
  }
  list.innerHTML = html;
  
  const sideObserver = new IntersectionObserver((entries)=>{
    entries.forEach(entry=>{
      if(!entry.isIntersecting)return;
      const img = entry.target;
      if(img.dataset.src){img.src=img.dataset.src;img.onload=()=>img.classList.add('loaded');img.onerror=()=>img.classList.add('loaded');delete img.dataset.src;}
      sideObserver.unobserve(img);
    });
  },{rootMargin:'200px'});
  
  list.querySelectorAll('img.lib-item-img[data-src]').forEach(img=>sideObserver.observe(img));
}

function playLibraryGame(id){
  const g = getLibrary().find(g=>g.id===id);
  if(!g)return;
  
  // Switch to the game's provider
  if(currentProvider !== g.provider){
    document.querySelectorAll('.provider-btn').forEach(btn=>{
      btn.classList.toggle('active',btn.dataset.provider===g.provider);
    });
    currentProvider = g.provider;
  }
  
  currentGame = {name:g.name,url:g.url,provider:g.provider,icon:g.cover,file_name:g.file_name};
  openGame(currentGame);
}

// ============================================================
// TABS & SEARCH
// ============================================================
function switchTab(tab){
  currentTab = tab;
  document.querySelectorAll('.nav-link').forEach(t=>t.classList.toggle('active',t.dataset.tab===tab));
  document.getElementById('storeContent').style.display = tab==='store'?'':'none';
  document.getElementById('libraryContent').style.display = tab==='library'?'':'none';
  if(tab==='library') renderLibrary();
}

function renderLibrary(){
  const lib = getLibrary();
  document.getElementById('libraryContentCount').textContent = lib.length;
  const grid = document.getElementById('libraryGrid');
  
  if(!lib.length){
    grid.innerHTML = '<div class="status-msg">No games in your library yet.</div>';
    return;
  }
  
  let html = '';
  for(const g of lib){
    const e = s=>String(s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;');
    html += `<div class="game-card owned" onclick="playLibraryGame('${e(g.id)}')">
      <div class="card-thumb-wrap">${g.cover?`<img data-src="${e(g.cover)}" alt="">`:''}</div>
      <div class="card-info"><div class="card-name">${e(g.name)}</div><div class="card-meta">${e((g.provider||'').toUpperCase())}</div></div>
      <div class="card-footer"><button class="card-add owned">▶ Play</button></div>
    </div>`;
  }
  grid.innerHTML = html;
  grid.querySelectorAll('.card-thumb-wrap').forEach(w=>{
    if(w.querySelector('img[data-src]'))cardObserver.observe(w);
  });
}

document.getElementById('searchInput').addEventListener('input',e=>{
  const q = e.target.value.toLowerCase().trim();
  if(!q) filteredGames = [...allGames];
  else filteredGames = allGames.filter(g=>g.name.toLowerCase().includes(q));
  renderGames();
  updateGameCount();
});
// ============================================================
// INIT
// ============================================================
async function init(){
  initObserver();
  renderSidebarLibrary();
  
  // Load initial provider
  switchProvider(currentProvider);
  
  document.addEventListener('keydown',e=>{
    if(e.key==='Escape'){closeGame();closeDownloadModal();}
  });
}

init();
</script>
</body>
