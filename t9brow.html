<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Orion | Browser</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0c;
      --surface0: #111115;
      --surface1: #1b1b21;
      --surface2: #24242d;
      --border: #2d2d38;
      --text: #f0f0f5;
      --text2: #9898b0;
      --text3: #5e5e72;
      --accent: #b3a0ff;
      --accent-soft: rgba(179, 160, 255, 0.12);
      --accent-glow: rgba(179, 160, 255, 0.25);
      --green: #66d9a0;
      --red: #ff6b7c;
      --radius-lg: 16px;
      --radius-md: 10px;
      --radius-sm: 7px;
      --font: 'Inter', system-ui, -apple-system, sans-serif;
      --transition: 0.25s cubic-bezier(0.23, 1, 0.32, 1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      user-select: none;
      -webkit-font-smoothing: antialiased;
    }

    #chrome {
      display: flex;
      flex-direction: column;
      height: 100%;
      width: 100%;
    }

    /* ── TAB BAR ── */
    #tabbar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px 0 12px;
      background: var(--bg);
      height: 48px;
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
      scrollbar-width: none;
    }
    #tabbar::-webkit-scrollbar { display: none; }

    .tab {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      background: var(--surface1);
      border: 1px solid transparent;
      border-radius: var(--radius-md) var(--radius-md) 0 0;
      padding: 0 14px;
      height: 38px;
      min-width: 140px;
      max-width: 190px;
      cursor: pointer;
      transition: all var(--transition);
      font-weight: 500;
      font-size: 0.8rem;
      color: var(--text2);
      flex-shrink: 0;
    }
    .tab:hover { background: var(--surface2); }
    .tab.active {
      background: var(--surface0);
      border-color: var(--border);
      color: var(--text);
      box-shadow: 0 -4px 8px rgba(0,0,0,0.4);
    }
    .tab .favicon {
      width: 15px; height: 15px;
      border-radius: 4px;
      object-fit: contain;
      display: none;
    }
    .tab .title {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
      font-weight: 500;
    }
    .tab .close {
      width: 20px; height: 20px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 5px;
      font-size: 14px;
      color: var(--text3);
      transition: all 0.15s;
    }
    .tab .close:hover { background: rgba(255,107,124,0.15); color: var(--red); }

    #new-tab-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text2);
      width: 34px; height: 34px;
      border-radius: var(--radius-md);
      font-size: 20px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: all var(--transition);
      margin-bottom: 2px;
      flex-shrink: 0;
    }
    #new-tab-btn:hover { background: var(--surface2); color: white; border-color: var(--accent); }

    /* ── NAVIGATION ── */
    #navbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      background: var(--surface0);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(12px);
    }
    .nav-btn {
      width: 36px; height: 36px;
      border-radius: var(--radius-sm);
      border: none;
      background: transparent;
      color: var(--text2);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: all var(--transition);
    }
    .nav-btn:hover:not(:disabled) { background: var(--surface2); color: white; }
    .nav-btn:disabled { opacity: 0.35; cursor: default; }

    #url-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      background: var(--surface1);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 0 14px;
      height: 42px;
      transition: all var(--transition);
      gap: 10px;
    }
    #url-wrap:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px var(--accent-soft);
    }
    #lock-icon {
      font-size: 14px;
      color: var(--text3);
      flex-shrink: 0;
    }
    #url-input {
      flex: 1;
      background: transparent;
      border: none;
      font-family: var(--font);
      font-weight: 500;
      font-size: 0.9rem;
      color: var(--text);
      outline: none;
    }
    #url-input::placeholder { color: var(--text3); }
    #go-btn {
      color: var(--text2);
      font-weight: 600;
      font-size: 1.2rem;
      cursor: pointer;
      transition: color 0.2s;
    }
    #go-btn:hover { color: var(--accent); }

    /* ── CONTENT ── */
    #content {
      flex: 1;
      position: relative;
      background: var(--bg);
      overflow: hidden;
    }
    .frame-wrap {
      position: absolute;
      inset: 0;
      display: none;
      background: #0b0b0e;
    }
    .frame-wrap.active { display: block; }
    iframe {
      width: 100%; height: 100%;
      border: none;
      background: #ffffff;
    }

    /* MODERN NEW TAB */
    .newtab-page {
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 32px;
      background: radial-gradient(circle at 30% 30%, #1a1a25, var(--bg));
    }
    .logo {
      font-size: 3.5rem;
      font-weight: 700;
      letter-spacing: -2px;
      background: linear-gradient(135deg, #d9d0ff, #b3a0ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .search-box {
      background: var(--surface0);
      border: 1px solid var(--border);
      border-radius: 60px;
      padding: 6px 6px 6px 22px;
      display: flex;
      align-items: center;
      width: min(540px, 85vw);
      backdrop-filter: blur(20px);
      transition: all var(--transition);
    }
    .search-box:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 20px var(--accent-glow);
    }
    .search-box input {
      flex: 1;
      background: transparent;
      border: none;
      padding: 12px 0;
      font-size: 1rem;
      font-weight: 500;
      color: var(--text);
      outline: none;
    }
    .quick-links {
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .quick-link {
      background: var(--surface1);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 16px 18px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: all var(--transition);
    }
    .quick-link:hover {
      background: var(--surface2);
      border-color: var(--accent);
      transform: translateY(-3px);
      box-shadow: 0 12px 24px rgba(0,0,0,0.5);
    }
    .quick-link img { width: 28px; height: 28px; border-radius: 6px; }
    .quick-link span { font-size: 0.75rem; font-weight: 500; color: var(--text2); }

    .blocked-page {
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      text-align: center;
      padding: 30px;
      background: var(--bg);
    }
    .blocked-page h2 { font-weight: 600; font-size: 1.8rem; }
    .blocked-page p { color: var(--text2); max-width: 400px; }
    .blocked-url {
      background: var(--surface1);
      padding: 10px 18px;
      border-radius: 40px;
      font-family: monospace;
      color: var(--accent);
      font-size: 0.8rem;
    }
    .open-btn {
      background: white;
      color: black;
      border: none;
      padding: 12px 28px;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .open-btn:hover { background: var(--accent); color: black; }

    #loading-bar {
      position: fixed;
      top: 0; left: 0;
      height: 3px;
      width: 0%;
      background: var(--accent);
      z-index: 9999;
      box-shadow: 0 0 12px var(--accent);
      transition: width 0.4s ease;
      opacity: 0;
    }
    #loading-bar.active { opacity: 1; }
  </style>
</head>
<body>
<div id="loading-bar"></div>

<div id="chrome">
  <div id="tabbar">
    <button id="new-tab-btn">+</button>
  </div>

  <div id="navbar">
    <button class="nav-btn" id="btn-back" disabled>‹</button>
    <button class="nav-btn" id="btn-forward" disabled>›</button>
    <button class="nav-btn" id="btn-refresh">↻</button>
    <div id="url-wrap">
      <span id="lock-icon">🔒</span>
      <input id="url-input" type="text" placeholder="Search or enter URL" autocomplete="off" spellcheck="false" />
      <span id="go-btn">→</span>
    </div>
    <button class="nav-btn" id="btn-home">⌂</button>
  </div>

  <div id="content"></div>
</div>

<!-- Required UV scripts -->
<script src="/uv/uv.bundle.js"></script>
<script src="/uv/uv.config.js"></script>
<script src="/baremux/index.js"></script>

<script>
  (function() {
    // ── UV PROXY SETUP ──
    const uvConfig = {
      prefix: '/uv/service/',
      bare: '/bare/',
      encodeUrl: Ultraviolet ? Ultraviolet.codec.xor.encode : (url) => url,
      decodeUrl: Ultraviolet ? Ultraviolet.codec.xor.decode : (url) => url,
    };

    let tabs = [];
    let activeTabId = null;
    let tabCounter = 0;

    const HOME = 'newtab';
    const SEARCH_ENGINE = 'https://www.google.com/search?q=';

    const QUICK_LINKS = [
      { label: 'Google', url: 'https://www.google.com', icon: 'https://www.google.com/favicon.ico' },
      { label: 'YouTube', url: 'https://www.youtube.com', icon: 'https://www.youtube.com/favicon.ico' },
      { label: 'Wikipedia', url: 'https://en.wikipedia.org', icon: 'https://en.wikipedia.org/favicon.ico' },
      { label: 'GitHub', url: 'https://github.com', icon: 'https://github.com/favicon.ico' },
    ];

    // ── UTILS ──
    const $ = (sel) => document.querySelector(sel);
    const $$ = (sel) => document.querySelectorAll(sel);

    function normalizeUrl(raw) {
      raw = raw.trim();
      if (!raw || raw === HOME) return HOME;
      if (/^https?:\/\//i.test(raw)) return raw;
      if (/^[\w\-]+(\.[\w\-]+)+/.test(raw) && !raw.includes(' ')) return 'https://' + raw;
      return SEARCH_ENGINE + encodeURIComponent(raw);
    }

    function getDomain(url) {
      try { return new URL(url).hostname; } catch { return ''; }
    }

    // Load bar
    const loadBar = $('#loading-bar');
    function startLoading() {
      loadBar.style.width = '0%';
      loadBar.classList.add('active');
      requestAnimationFrame(() => {
        loadBar.style.width = '70%';
      });
      setTimeout(() => { if (loadBar.classList.contains('active')) loadBar.style.width = '90%'; }, 1200);
    }
    function stopLoading() {
      loadBar.style.width = '100%';
      setTimeout(() => {
        loadBar.classList.remove('active');
        loadBar.style.width = '0%';
      }, 350);
    }

    // ── TAB STATE ──
    function createTab(url = HOME) {
      const id = ++tabCounter;
      const tab = { id, url, title: 'New Tab', favicon: null, history: [], historyPos: -1 };
      tabs.push(tab);

      // Tab UI
      const tabEl = document.createElement('div');
      tabEl.className = 'tab';
      tabEl.dataset.id = id;
      tabEl.innerHTML = `
        <img class="favicon" src="" alt="" />
        <span class="title">New Tab</span>
        <span class="close" data-close="${id}">✕</span>
      `;
      tabEl.addEventListener('click', (e) => {
        if (e.target.classList.contains('close')) {
          closeTab(id);
          return;
        }
        switchTab(id);
      });
      $('#new-tab-btn').before(tabEl);

      // Content container
      const wrap = document.createElement('div');
      wrap.className = 'frame-wrap';
      wrap.dataset.id = id;
      $('#content').appendChild(wrap);

      switchTab(id);
      navigateTo(url, id);
      return id;
    }

    function closeTab(id) {
      if (tabs.length <= 1) { createTab(); }
      const idx = tabs.findIndex(t => t.id === id);
      tabs = tabs.filter(t => t.id !== id);
      document.querySelector(`.tab[data-id="${id}"]`)?.remove();
      document.querySelector(`.frame-wrap[data-id="${id}"]`)?.remove();

      if (activeTabId === id) {
        const newTab = tabs[Math.min(idx, tabs.length - 1)];
        if (newTab) switchTab(newTab.id);
      }
    }

    function switchTab(id) {
      activeTabId = id;
      $$('.tab').forEach(el => el.classList.toggle('active', +el.dataset.id === id));
      $$('.frame-wrap').forEach(el => el.classList.toggle('active', +el.dataset.id === id));
      const tab = tabs.find(t => t.id === id);
      if (tab) updateNavFromTab(tab);
    }

    function getActiveTab() { return tabs.find(t => t.id === activeTabId); }
    function getTab(id) { return tabs.find(t => t.id === id); }

    // ── NAVIGATION WITH UV ──
    function navigateTo(rawUrl, tabId) {
      const tab = tabId ? getTab(tabId) : getActiveTab();
      if (!tab) return;
      const url = normalizeUrl(rawUrl);
      tab.url = url;

      // History update
      if (!tab.history.length || tab.history[tab.historyPos] !== url) {
        tab.history = tab.history.slice(0, tab.historyPos + 1);
        tab.history.push(url);
        tab.historyPos = tab.history.length - 1;
      }

      renderContent(tab.id);
      if (tab.id === activeTabId) updateNavFromTab(tab);
    }

    function renderContent(tabId) {
      const tab = getTab(tabId);
      const wrap = document.querySelector(`.frame-wrap[data-id="${tabId}"]`);
      if (!wrap || !tab) return;
      wrap.innerHTML = '';

      if (tab.url === HOME) {
        wrap.appendChild(buildNewTabPage());
        updateTabLabel(tabId, 'New Tab', null);
        stopLoading();
        return;
      }

      startLoading();

      // Use UV proxy if available
      const proxiedUrl = (typeof Ultraviolet !== 'undefined' && uvConfig)
        ? uvConfig.prefix + uvConfig.encodeUrl(tab.url)
        : tab.url;

      const iframe = document.createElement('iframe');
      iframe.setAttribute('allowfullscreen', '');
      iframe.setAttribute('sandbox', 'allow-scripts allow-same-origin allow-forms allow-popups allow-modals allow-downloads');
      iframe.src = proxiedUrl;

      let loadHandled = false;
      const timeout = setTimeout(() => {
        if (!loadHandled) {
          loadHandled = true;
          stopLoading();
          showBlockedMessage(wrap, tab.url);
        }
      }, 5000);

      iframe.onload = () => {
        if (loadHandled) return;
        loadHandled = true;
        clearTimeout(timeout);
        stopLoading();
        try {
          const doc = iframe.contentDocument || iframe.contentWindow?.document;
          if (doc && doc.title) {
            updateTabLabel(tabId, doc.title, `https://www.google.com/s2/favicons?domain=${getDomain(tab.url)}&sz=32`);
          } else {
            updateTabLabel(tabId, getDomain(tab.url), `https://www.google.com/s2/favicons?domain=${getDomain(tab.url)}&sz=32`);
          }
        } catch {
          updateTabLabel(tabId, getDomain(tab.url), `https://www.google.com/s2/favicons?domain=${getDomain(tab.url)}&sz=32`);
        }
        updateLockIcon(tab.url);
      };

      iframe.onerror = () => {
        if (loadHandled) return;
        loadHandled = true;
        clearTimeout(timeout);
        stopLoading();
        showBlockedMessage(wrap, tab.url);
      };

      wrap.appendChild(iframe);
    }

    function showBlockedMessage(wrap, url) {
      wrap.innerHTML = `
        <div class="blocked-page">
          <h2>🌐 Page unavailable</h2>
          <p>${getDomain(url)} blocked embedding. Open directly:</p>
          <span class="blocked-url">${url}</span>
          <button class="open-btn" onclick="window.open('${url.replace(/'/g, "\\'")}', '_blank')">Open externally</button>
        </div>`;
      updateTabLabel(activeTabId, getDomain(url), null);
    }

    function buildNewTabPage() {
      const div = document.createElement('div');
      div.className = 'newtab-page';
      div.innerHTML = `
        <div class="logo">Orion</div>
        <div class="search-box">
          <input id="nt-search" type="text" placeholder="Search or enter address" autocomplete="off" />
        </div>
        <div class="quick-links">
          ${QUICK_LINKS.map(l => `
            <div class="quick-link" data-url="${l.url}">
              <img src="${l.icon}" onerror="this.style.display='none'" alt="${l.label}" />
              <span>${l.label}</span>
            </div>`).join('')}
        </div>`;
      div.querySelector('#nt-search')?.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { navigateTo(e.target.value); e.target.blur(); }
      });
      div.querySelectorAll('.quick-link').forEach(el => {
        el.addEventListener('click', () => navigateTo(el.dataset.url));
      });
      return div;
    }

    function updateTabLabel(tabId, title, favicon) {
      const tabEl = document.querySelector(`.tab[data-id="${tabId}"]`);
      if (!tabEl) return;
      tabEl.querySelector('.title').textContent = title || 'Loading...';
      const img = tabEl.querySelector('.favicon');
      if (favicon) { img.src = favicon; img.style.display = 'inline'; }
      else img.style.display = 'none';
      const tab = getTab(tabId);
      if (tab) tab.title = title;
    }

    function updateNavFromTab(tab) {
      $('#url-input').value = tab.url === HOME ? '' : tab.url;
      $('#btn-back').disabled = tab.historyPos <= 0;
      $('#btn-forward').disabled = tab.historyPos >= tab.history.length - 1;
      updateLockIcon(tab.url);
    }

    function updateLockIcon(url) {
      const icon = $('#lock-icon');
      if (url === HOME || url.startsWith('https://')) {
        icon.textContent = '🔒'; icon.style.color = 'var(--green)';
      } else {
        icon.textContent = '🔓'; icon.style.color = 'var(--text3)';
      }
    }

    // ── EVENT LISTENERS ──
    $('#new-tab-btn').addEventListener('click', () => createTab());
    $('#btn-home').addEventListener('click', () => navigateTo(HOME));
    $('#btn-back').addEventListener('click', () => {
      const tab = getActiveTab();
      if (tab && tab.historyPos > 0) {
        tab.historyPos--;
        tab.url = tab.history[tab.historyPos];
        renderContent(tab.id);
        updateNavFromTab(tab);
      }
    });
    $('#btn-forward').addEventListener('click', () => {
      const tab = getActiveTab();
      if (tab && tab.historyPos < tab.history.length - 1) {
        tab.historyPos++;
        tab.url = tab.history[tab.historyPos];
        renderContent(tab.id);
        updateNavFromTab(tab);
      }
    });
    $('#btn-refresh').addEventListener('click', () => {
      const tab = getActiveTab();
      if (tab) renderContent(tab.id);
    });

    const urlInput = $('#url-input');
    urlInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { navigateTo(urlInput.value); urlInput.blur(); }
       if (e.key === 'Escape') urlInput.blur();
    });
    urlInput.addEventListener('focus', () => urlInput.select());
    $('#go-btn').addEventListener('click', () => navigateTo(urlInput.value));

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 't') { e.preventDefault(); createTab(); }
      if ((e.ctrlKey || e.metaKey) && e.key === 'w') { e.preventDefault(); if (activeTabId) closeTab(activeTabId); }
      if ((e.ctrlKey || e.metaKey) && e.key === 'l') { e.preventDefault(); urlInput.focus(); }
    });

    // Start with a fresh tab
    createTab();
  })();
</script>
</body>
</html>
