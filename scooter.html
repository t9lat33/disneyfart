<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Dida Scooter Mod</title>
</head>
<body>
    <h2>Dida Scooter Mod (Web Bluetooth)</h2>
    <input type="text" id="nameInput" value="BLE Device 9573FF">
    <button id="scanBtn">Find & Connect</button>
    <input type="number" id="speedInput" placeholder="Speed km/h" step="0.1">
    <button id="sendBtn">Send Mod</button>
    <div id="status"></div>
    <script>
        let device = null;
        let characteristic = null;
        let writeWithoutResponse = false;
        const SERVICE_UUID = "0000ffe0-0000-1000-8000-00805f9b34fb";
        const CHAR_WRITE_UUID = "0000ffe1-0000-1000-8000-00805f9b34fb";

        function setStatus(msg) {
            document.getElementById('status').innerText = msg;
        }

        document.getElementById('scanBtn').addEventListener('click', async () => {
            try {
                if (!navigator.bluetooth) {
                    setStatus("Web Bluetooth not supported.");
                    return;
                }
                const targetName = document.getElementById('nameInput').value.trim();
                setStatus("Requesting device: " + targetName + "...");
                device = await navigator.bluetooth.requestDevice({
                    filters: [{ name: targetName }],
                    optionalServices: [SERVICE_UUID]
                });

                device.addEventListener('gattserverdisconnected', () => {
                    characteristic = null;
                    setStatus("Disconnected: " + device.name);
                });

                setStatus("Connecting to " + device.name + "...");
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                characteristic = await service.getCharacteristic(CHAR_WRITE_UUID);

                // Some BLE modules only support write-without-response
                writeWithoutResponse = characteristic.properties.write === false
                    && characteristic.properties.writeWithoutResponse === true;

                setStatus("Connected: " + device.name +
                    (writeWithoutResponse ? " (write-without-response)" : " (write)"));
            } catch (e) {
                setStatus("Error: " + e);
            }
        });

        function calcChecksum(bytes) {
            let csum = 0;
            for (let b of bytes) csum ^= b;
            return csum;
        }

        function buildFrame(speedKmh) {
            const speedUnits = Math.round(speedKmh * 10);
            const high = (speedUnits >> 8) & 0xFF;
            const low = speedUnits & 0xFF;
            const payload = [0x55, 0x14, high, low];
            const checksum = calcChecksum(payload);
            return new Uint8Array([...payload, checksum]);
        }

        document.getElementById('sendBtn').addEventListener('click', async () => {
            if (!characteristic) {
                setStatus("Not connected.");
                return;
            }
            const speed = parseFloat(document.getElementById('speedInput').value);
            if (isNaN(speed) || speed <= 0) {
                setStatus("Invalid speed.");
                return;
            }
            const frame = buildFrame(speed);
            const hex = Array.from(frame).map(b => b.toString(16).padStart(2, '0')).join(' ');
            try {
                if (writeWithoutResponse) {
                    await characteristic.writeValueWithoutResponse(frame);
                } else {
                    await characteristic.writeValue(frame);
                }
                setStatus("Sent to " + device.name + ": " + hex);
            } catch (e) {
                setStatus("Write failed (" + hex + "): " + e);
            }
        });
    </script>
</body>
</html>
